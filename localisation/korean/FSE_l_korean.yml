fse.1.t: "불길에 휩싸인 유럽"
fse.1.d: "소위 '세계정부'는 유럽 대륙을 불길 속에 방치했다. 이제 통제된 민주주의와 자유의 이름으로 이 대륙, 나아가 이 행성을 해방할 때다!"
fse.1.a: "내 리버-티 좀 맡아줘"

fse.2.t: "통제된 민주주의의 부름"
fse.2.d: "슈퍼지구를 위하여!"
fse.2.a: "자유가 나를 구원하리라!"
fse.2.b: "난 사양할게..."

fse_news.1.t: "슈퍼지구 연방 탄생"
fse_news.1.d: "최근 세계정부 붕괴 이후 번영시, 구 스톡홀름에서 송출된 충격적인 방송을 통해, 새로 구성된 진실부는 전 인류에게 자유와 번영, 안보를 가져다줄 \"통합 세계 권위\"인 슈퍼 지구 연방의 창설을 발표했다. 우렁찬 찬가와 흠잡을 데 없는 열병식, 그리고 \"구세계를 구원\"하겠다는 엄숙한 맹세 속에서, 새 정권은 통제되지 않은 민주주의의 시대가 끝났음을 선언했다.\n\n이것이 인류의 가장 위대한 시대의 여명인지, 아니면 훨씬 기묘한 무언가의 시작인지는 알 수 없다. 그러나 스웨덴 전역의 모든 화면에서는 하나의 메시지가 울려 퍼지고 있다.\n\n슈퍼 지구를 위하여!"
fse_news.1.a: "오늘, 자유의 빛이 이 세계의 하늘을 다시 한 번 수놓으리라!"


