 ZZZ_kaiser_economy: "§Y라이히스브뤼거 경제§!"
 ZZZ_KAISER_ECO_TT: "§Y라이히스브뤼거 경제§!"
 ZZZ_KAISER_ECO_TT_LONG: "§g새로운 제정의 경제체제에는 신봉건주의적 관행과 농업의 우위가 복잡하게 얽혀 있습니다. 은행업을 모든 사회악의 근원으로 보며, 여기서 한 걸음 더 나아가 독일 경제와 독일 농촌의 쇠퇴, 즉 도시화가 유대인 은행업의 이익에 의해 주도되었다고 노골적으로 비난합니다.\n이 경제체제는 환경에 큰 피해를 주지 않는 소규모 기업체에 초점을 맞춰 번창하는 향토적 시장경제를 조성하는 것을 목표로 합니다. 남아있는 모든 산업력을 군과 끊임없이 늘어나는 병력의 필요를 충족시키는 데 전념하는 동안 말이죠.§!\n\n\n\n\n£GFX_ZZZ_kaiser_economy_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-5.0%§!\n £construction_speed_civfactory_texticon §Y민간공장§! 건설 속도: §R-10.0%§!\n £construction_speed_milfactory_texticon §Y군수공장§! 건설 속도: §G+3.5%§!\n £mil_factory 공장 생산량: §G+1.0%§!\n £mobilisation_texticon 동원 속도: §G+15.0%§!\n £production_efficiency_loss_texticon 생산 효율 유지: §R-10.0%§!\n £development 월간 빈곤율 개선:  §R-2.0%§!\n £GFX_dx 월간 수입 증가: §R-15.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §R-15.0%§!\n £GFX_dx_yellow 개인 비용 변동치: §Y-15.0%§!"
 ZZZ_left_corporatism: "§Y좌익 협동조합주의§!"
 ZZZ_LEFT_CORPORATISM_TT: "§Y좌익 협동조합주의§!"
 ZZZ_LEFT_CORPORATISM_TT_LONG: "§g좌익 협동조합주의는 노동, 자본, 국가 등 다양한 사회 집단의 이해관계를 협력과 협상의 구조를 통해 균형 있게 맞추려는 경제 모델입니다. 이는 사회적 형평성, 환경 지속 가능성, 민주적 참여를 강조하는 보다 진보적이거나 좌파적인 행정 접근 방식과 연관되어 있습니다.\n좌익 협동조합주의는 일반적으로 정부, 기업, 노동조합이라는 세 주요 이해관계자 간의 협력을 포함합니다. 이 삼자 모델은 경제 및 사회 문제를 해결하기 위해 이해관계자 간의 대화와 합의를 촉진하는 것을 목표로 합니다.§!\n\n\n\n\n£GFX_ZZZ_left_corporatism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y2.5%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §G+10.0%§!\n £mil_factory 공장 생산량: §G+3.5%§!\n £construction_speed_texticon 건설 속도: §G+5.0%§!\n £GFX_dx 월간 수입 증가: §R-10.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §G+10.0%§!"
 ZZZ_liberal_corporatism: "§Y자유주의적 협동조합주의§!"
 ZZZ_LIBERAL_CORPORATISM_TT: "§Y자유주의적 협동조합주의§!"
 ZZZ_LIBERAL_CORPORATISM_TT_LONG: "§g자유주의적 협동조합주의는 국가, 기업, 노동단체 간의 협력을 강조하면서도 시장 중심의 경제를 유지하는 경제 및 정치 모델입니다. 협상과 협력을 촉진하는 제도적 체계를 통해 이러한 집단들의 이익 균형을 추구합니다. 자유주의적 협동조합주의는 자본주의라는 틀 안에서 작동하지만, 시장 실패를 바로잡고 공정한 경쟁을 보장하며 노동자의 권리를 보호하기 위한 정부 개입의 필요성을 인정합니다.§!\n\n\n\n\n£GFX_ZZZ_liberal_corporatism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-1.5%§!\n £prod_eff_cap 생산 효율 한도: §R-5.0%§!\n £construction_speed_texticon 건설 속도: §G+2.5%§!\n  £development 월간 빈곤율 개선:  §G+0.05%§!\n £GFX_dx_blue 사업 가치 변동치: §G+10.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §G+10.0%§!"
 ZZZ_maga_capitalism: "§YMAGA 자본주의§!"
 ZZZ_MAGA_CAPITALISM_TT: "§YMAGA 자본주의§!"
 ZZZ_MAGA_CAPITALISM_TT_LONG: "§gMAGA 자본주의는 미국 자본주의 모델의 기본 기준을 따르지만, 훨씬 더 보호주의적이며 대기업에 굴복하지 않습니다.\n대신 중소기업뿐만 아니라 소규모 독립 사업체와 생산자를 지원합니다. 과도한 경제력을 제한하거나 제거하기 위한 강력한 반독점법을 고수합니다.\n이 경제체제의 또 다른 주요 특징은 노동자의 이익을 보호하고 증진하는 데 중점을 둔다는 것입니다. 목표는 사회보장, 메디케어 및 기타 복지 프로그램을 유지하고 가능하면 강화하는 동시에 미국 경제에 가해지는 부담을 최소화하는 것입니다.§!\n\n\n\n\n£GFX_ZZZ_maga_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y2.0%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §G+5.0%§!\n £efficiency_growth_texticon 생산 효율 성장: §R-5.0%§!\"\n £construction_speed_civfactory_texticon §Y민간공장§! 건설 속도: §G+5.0%§!\n £GFX_dx_blue 사업 가치 변동치: §R-5.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §G+10.0%§!\n £GFX_dx_yellow 개인 비용 변동치: §Y+3.0%§!"
 ZZZ_america_first_capitalism: "§Y미국 우선 자본주의§!"
 ZZZ_AF_CAPITALISM_TT: "§Y미국 우선 자본주의§!"
 ZZZ_AF_CAPITALISM_TT_LONG: "§g미국 우선 자본주의는 미국이라는 체제의 현대화된 개선판입니다. 목표는 미국 기업에 큰 이익을 주는 보호무역주의 경제를 만드는 것입니다. 그 목표는 관세를 이용해 미국의 제품과 기업을 외국과의 경쟁으로부터 보호함으로써 달성할 수 있습니다. 이는 또한 국가를 \"바람직하지 않은\" 영향으로부터 차단합니다. 이 체제는 또한 국가를 연결하고 더 많은 수익을 창출하기 위한 기반시설 건설 계획에 크게 중점을 둡니다.\n미국 우선 자본주의는 미국 기업을 크게 선호하며, 기업을 개혁하거나 국가의 의지에 부응할 새로운 대기업들을 만드는 것을 목표로 합니다.§!\n\n\n\n\n£GFX_ZZZ_america_first_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-4.0%§!\n£prod_eff_cap 생산 효율 한도: §G+3.5%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §G+5.0%§!\n £mil_factory 공장 생산량: §R-5.0%§!\n £GFX_dx_blue 사업 가치 변동치: §G+15.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §R-15.0%§!"
 ZZZ_state_capitalism: "§Y국가자본주의§!"
 ZZZ_STATE_CAPITALISM_TT: "§Y국가자본주의§!"
 ZZZ_STATE_CAPITALISM_TT_LONG: "§g국가자본주의는 정부가 이윤을 목적으로 사업 및 상업 활동에 적극적으로 참여하는 경제 시스템입니다. 이 체제에서는 생산수단이 국유화되고 국영기업을 통해 생산수단을 국가가 통제합니다. 여기에는 자본 축적, 중앙 집중식 관리 및 임금 노동의 사용이 포함됩니다.§!\n\n\n\n\n£GFX_ZZZ_state_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-2.0%§!\n £efficiency_growth_texticon 생산 효율성 성장: §R-2.0%§!\n £construction_speed_civfactory_texticon §Y민간공장§! 건설 속도: §G+2.5%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §G-1.5%§!\n £GFX_dx 월간 수입 증가: §R-4.0%§!\n £efficiency_base_texticon 기본 생산 효율: §G+5.0%§!§!"
 ZZZ_party_state_capitalism: "§Y일당국가 자본주의§!"
 ZZZ_PARTY_STATE_CAPITALISM_TT: "§Y일당국가 자본주의§!"
 ZZZ_PARTY_STATE_CAPITALISM_TT_LONG: "§g일당국가 자본주의는 국가가 경제의 주요 동력이 아니며 당의 구조가 국가의 구조보다 우선시되는 경제 모델입니다.\n일당국가 자본주의가 확장되는 것을 보여주는 주요 지표 중 하나는 심지어 외국 기업을 포함한 민영 기업 내에서 당 조직의 존재감이 커지는 것입니다. 이 모델의 또 다른 핵심 특징은 국영 기업을 넘어 국가의 자본이 확장된다는 것입니다. 이 과정은 \"국가 금융화\"라고 불립니다. 일당국가적 경제활동이 가시화되는 또 다른 방식은 산업 정책의 진화입니다.§!\n\n\n\n\n£GFX_ZZZ_party_state_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-3.0%§!\n £efficiency_growth_texticon 생산 효율성 성장: §R-2.0%§!\n £construction_speed_civfactory_texticon §Y민간공장§! 건설 속도: §G+4.0%§!\n £construction_speed_infrastructure_texticon §Y사무단지§! 건설 속도: §G+4.0%§!\n £GFX_dx 월간 수입 증가: §G+2.5%§!\n £efficiency_base_texticon 기본 생산 효율: §R-1.5%§!§!"
 ZZZ_mixed_economy: "§Y혼합 경제 모델§!"
 ZZZ_MIXED_ECONOMY_TT: "§Y혼합 경제 모델§!"
 ZZZ_MIXED_ECONOMY_TT_LONG: "§g혼합 경제는 사기업과 같은 자본주의 요소와 국유화된 정부 서비스와 같은 사회주의 요소를 결합한 경제체제입니다.\n혼합 경제를 정의하는 방법은 다양합니다. 예를 들어, 어떤 사람들은 혼합 경제란 시장경제와 계획경제를 결합한 경제체제라고 말합니다. 또 다른 사람들은 혼합 경제란 시장과 국가개입주의를, 또는 사기업과 공기업을 결합한 것이라고 말합니다.§!\n\n\n\n\n£GFX_ZZZ_mixed_economy_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-2.5%§!\n £efficiency_base_texticon 기본 생산 효율: §G+2.0%§!\n £construction_speed_civfactory_texticon §Y민간공장§! 건설 속도: §G+1.5%§!\n £construction_speed_infrastructure_texticon §Y사무단지§! 건설 속도: §G+1.5%§!\n £GFX_dx_blue 사업 가치 변동치: §G+3.5%§!\n £GFX_dx_yellow 개인 가치 변동치: §R-1.5%§!"
 ZZZ_more_content_soon_tt: "§Y더 많은 콘텐츠가 곧 추가됩니다!§!\n---------------\n§g새로운 하위 경로, 확장, 또는 일반적인 추가 요소 등 무엇이든 곧 찾아옵니다!§!"
 USA_usc_path_tt: "§Y미입헌정부§!\n---------------\n\n\n\n\n£GFX_USC_path_banner\n\n\n\n\n\n§g미국을 구하십시오, 트럼프 대통령 각하!\n\n그래서 난 미국인임에 자랑스럽네.\n적어도 내가 자유롭다는걸 알 수 있는 곳.\n그리고 이 권리를 위해 희생한 순교자들은\n절대로 잊지 않으리라.§!"
 USA_apla_path_tt: "§Y미인민해방군§!\n---------------\n\n\n\n\n£GFX_APA_path_banner\n\n\n\n\n\n§g자본주의 심장부에서의 혁명.\n\n저들의 금무더기보다 더 강한 힘이 우리 손에 있다네\n군대의 힘보다 수천 배 더 강한 힘이 있다네\n우리는 과거의 잿더미에서 새 세상을 일궈낼 수 있다네\n조합이 우리를 강하게 하니까.§!"
 USA_usb_path_tt: "§Y미연방정부§!\n---------------\n\n\n\n\n£GFX_USB_path_banner\n\n\n\n\n\n§g증오에 아니, 편협함에 아니라고 외칩시다.\n\n오, 광활한 하늘 아래 펼쳐진 아름다운 나라여\n황금빛 물결이 넘실거리고\n푸른 산들이 위엄 있게 솟아오른\n풍요로운 대지 위의 미국이여!\n미국이여! 미국이여!§!"
 USA_ptf_path_tt: "§Y애국전선§!\n---------------\n\n\n\n\n£GFX_PTF_path_banner\n\n\n\n\n\n§g미국을 되찾으십시오. 당신의 권리를 되찾으십시오.\n\n주님께서 재림하는 영광 내 눈에 보이네\n재어 두신 분노의 포도 짓밟고 오시네\n공포의 검 휘두르며 운명의 번개 내리시노라\n주님의 진리가 오나니§!"
 USA_nsm_path_tt: "§Y국가사회주의 운동§!\n---------------\n\n\n\n\n£GFX_NSM_path_banner\n\n\n\n\n\n§g인종의 미래를 위해 싸우십시오.\n\n아직 살아 있는 망자들 앞에 깃발이 내려지리라\n폭풍같은 사단들이 주먹을 불끈 쥐고 맹세하니\n용서 없는 복수의 날이 올 것을\n하일과 지크가 조국에 울려 퍼질 날을§!"
 USA_atw_path_tt: "§Y아톰바펜 사단§!\n---------------\n\n\n\n\n£GFX_ATW_path_banner\n\n\n\n\n\n§g이 썩은 세상을 잿더미로 만들어버리십시오.\n\n불태워라, 약탈하라\n폭도들이 대중을 학살하리라\n해질녘은 죽음을 가져오리라\n도시가 잿더미로 변하리라§!"
 SOV_ur_path_tt: "§Y통합 러시아§!\n---------------\n\n\n\n\n£GFX_SOV_we_trust_in_medvedev_banner\n\n\n\n\n\n§g§Y진정한 주권§!을 위한 길을 닦으십시오. §C그§!의 유산을 지키십시오.§!"
 SOV_cprf_path_tt: "§Y러시아 연방 공산당§!\n---------------\n\n\n\n\n£GFX_SOV_CPRF_banner\n\n\n\n\n\n§g가장 큰 공산주의 건설자가 되십시오.§!"
 SOV_ldpr_path_tt: "§Y러시아 자유민주당§!\n---------------\n\n\n\n\n£GFX_SOV_ldpr_always_only_truth_banner\n\n\n\n\n\n§g유럽을 정복하십시오. 진정한 제국을 만들거나 국민민주주의를 구축하십시오.§!"
 SOV_eurasia_path_tt: "§Y두긴의 유라시아§!\n---------------\n\n\n\n\n£GFX_apotheosis_of_history\n\n\n\n\n\n§g세계주의의 위협을 분쇄하십시오. 모더니스트들의 사고방식에서 벗어나십시오.§!"
 SOV_navalny_path_tt: "§Y대중주의 나발니§!\n---------------\n\n\n\n\n£GFX_SOV_beautiful_russia_of_the_future_banner\n\n\n\n\n\n§g초국가적 자유주의의 손길로 유럽을 스스로로부터 해방시키세요.§!"
 USA_los_path_tt: "§Y남부 연맹§! - §R개발 중!§!\n---------------\n\n\n\n\n£GFX_LOS_path_banner\n\n\n\n\n\n§g살고파라, 딕시 땅에, 만세! 만세!\n나 다짐하리, 딕시 땅에서 살고 죽으리라고,\n멀리, 멀리, 남쪽 멀리 딕시 땅에서,\n멀리, 멀리, 남쪽 멀리 딕시 땅에서§!"
 USA_rrr_path_tt: "§Y레드넥 반군§! - §R개발 중!§!\n---------------\n\n\n\n\n£GFX_RRR_path_banner\n\n\n\n\n\n§g그는 고작 열아홉 명의 적은 병력으로 하퍼스 페리를 점령하였고,\n\"올드 버지니아\"를 공포에 떨게 하였네.\n그들은 그를 반역자로 목매달았지만,\n정작 그들 자신이야말로 반역자의 무리였으니,\n그러나 그의 영혼은 계속 행진하리라.§!"
 USA_cascadia_path_tt: "§Y캐스케이디아§! - §R개발 중!§!\n---------------\n\n\n\n\n£GFX_CAC_path_banner\n\n\n\n\n\n§g소나무 숲, 소나무 숲 속에선\n태양이 결코 비추어지지 않고\n나는 밤새도록 떨고 있으리§!"
 USA_bla_path_tt: "§Y흑인 해방군§! - §R개발 중!§!\n---------------\n\n\n\n\n£GFX_BLA_path_banner\n\n\n\n\n\n§g\"무장하지 않은 인민은 노예거나 언제든 예속될 수 있는 대상일 뿐이다\"§!"
 SOV_nazbol_path_tt: "§Y민족볼셰비키 실험§! - §R개발 중§!\n---------------\n\n\n\n\n£GFX_Nazbol_Path_Banner\n\n\n\n\n\n§g별난 작가가 창조하고, 광신적인 펑크족들이 이끄는 아방가르드 이념. 서방은 조심하라!§!"
 SOV_srzp_path_tt: "§Y공정 러시아 - 진실을 위하여§! - §R개발중!§!\n---------------\n\n\n\n\n£GFX_SOV_SRZP_banner\n\n\n\n\n\n§g공정과 진실이 지배하는 세상을 만들기 위해 투쟁하십시오.§!"
 FRA_democratic_path_tt: "§Y프랑스 공화국§!\n---------------\n\n\n\n\n£GFX_FRA_republic_banner\n\n\n\n\n\n§g위험한 세계적 불안정 속에서 프랑스 공화국을 이끌어라.\n\n무기를 들어라, 시민들이여,\n대대를 형성하라,\n나아가자, 그래, 나아가자!§!"
 FRA_communist_path_tt: "§Y프랑스 코뮌§!\n§RNATO가 지리놉스키의 러시아에게 패배§!\n---------------\n\n\n\n\n£GFX_FPR_commune_banner\n\n\n\n\n\n§g민족주의와 제국주의로부터 프랑스를 구할 유일한 방법을 프랑스는 이미 알고 있다... §R혁명.§!\n\n우리에 대항하여, 압제자의\n피 묻은 깃발이 일어났도다!§!"
 FRA_nationalist_path_tt: "§Y국방정부§!\n§RNATO가 공산주의 러시아에게 패배§!\n---------------\n\n\n\n\n£GFX_FAF_national_duty\n\n\n\n\n\n§g프랑스적이지 않은 모든 것을 정화함으로써 프랑스의 영혼을 구하라.  \n\n고국의 아이들이여, \n영광의 날이 왔다!§!"
 FRA_eu_path_tt: "§Y연방화§!\n§RNATO가 메드베데프 러시아에게 패배§!\n---------------\n\n\n\n\n£GFX_FRA_EU_eiffel_banner\n\n\n\n\n\n§g유럽의 십이성기 아래 프랑스는 통일되리라.  \n\n새로운 평화를 위해 노래하자,\n통일된 우리 유럽을 위해.§!"
 FRA_conservative_path_tt: "§Y국민연합§!\n---------------\n\n\n\n\n£GFX_FRA_conservatism_banner\n\n\n\n\n\n§g러시아와 세계주의로부터 프랑스를 구하자!§!"
 FRA_liberal_path_tt: "§Y전진 앞으로!§!\n---------------\n\n\n\n\n£GFX_FRA_french_spirit\n\n\n\n\n\n§g유럽의 보석, 프랑스의 미래를 보장하자.§!"
 FRA_socialist_path_tt: "§Y신인민전선§!\n---------------\n\n\n\n\n£GFX_FRA_NFP_banner\n\n\n\n\n\n§g로베스피에르에 맞서자, 혁명 없는 혁명을 만들자.§!"
 FPR_socialism_path_tt: "§Y사회주의§!\n---------------\n\n\n\n\n£GFX_FPR_didier_banner\n\n\n\n\n\n\n§g민중의 노래가 들리나?\n분노한 자들의 노래가?\n다시는 노예가 되지 않으려는\n민중의 음악이네!§!"
 FPR_anarchism_path_tt: "§Y아나키즘§!\n---------------\n\n\n\n\n£GFX_FPR_anarchism_banner\n\n\n\n\n\n§g한낱 신도 주인도 없어야 하느니라§!"
 FPR_trotskyist_path_tt: "§Y트로츠키주의§!\n---------------\n\n\n\n\n£GFX_FPR_trotskyism_banner\n\n\n\n\n\n§g\"연방 공화국으로서의 유럽, 그것은 반드시 이루어져야 한다. 이제 민족 자치로는 충분하지 않다. 경제적 발전을 위해 국가 간 국경은 철폐되야하며, 만약 유럽이 민족 집단으로 분열된 채로 남아 있다면, 제국주의는 다시금 그 일을 벌일 것이다.\"\n-레온 트로츠키§!"
 FPR_rev_guard_path_tt: "§Y혁명 근위대§!\n---------------\n\n\n\n\n£GFX_FPR_soviet_banner_banner\n\n\n\n\n\n§g공포는 정의일 뿐이다.§!"
 FAF_ultranat_path_tt: "§Y국수주의§!\n---------------\n\n\n\n\n£GFX_FAF_benedetti_banner\n\n\n\n\n\n§g그들은 지나가지 못하리라.§!"
 FAF_identitarian_path_tt: "§Y정체성주의§!\n---------------\n\n\n\n\n£GFX_FAF_identitarian_banner\n\n\n\n\n\n§g우리가 없으면 프랑스는 다시는 프랑스가 아니다.§!"
 FAF_juntists_path_tt: "§Y군사정권§!\n---------------\n\n\n\n\n£GFX_FAF_petainism\n\n\n\n\n\n§g그들이 다시금 나를 불러 국가를 맡기려 한다.§!"
 FAF_democrats_path_tt: "§Y민주주의 회복§!\n---------------\n\n\n\n\n£GFX_FAF_populist_gaullism\n\n\n\n\n\n§g프랑스는 전투에서 패했지 전쟁에서 패하지 않았다.§!"
 FRA_eu_unified_tt: "§Y완전한 통합§!\n§R당신의 게임이 끝납니다!§!\n---------------\n\n\n\n\n£GFX_FRA_EU_eiffel_banner\n\n\n\n\n\n§g완전하고 완전한. 하나의 유럽 국가.§!"
 FRA_EU_iberian_fed_path_tt: "§Y프랑스-이베리아 연방§!\n---------------\n\n\n\n\n£GFX_FRA_EU_francoiberia_banner\n\n\n\n\n\n§g유럽은 단결할 수 있지만 단순히 하나의 국가, 하나의 깃발이 될 수는 없습니다. 우리 모든 민족은 하나되어 일해야 합니다.§!"
 GER_democratic_path_tt: "§Y독일의 민주주의§!\n---------------\n\n\n\n\n£GFX_GER_democratic_path_banner\n\n\n\n\n\n§g세계적인 불안정의 시기를 독일 민주주의로 이끌어 가십시오.\n\n통일과 정의, 자유\n조국 독일을 위하여!\n함께 이를 위해 노력하자,\n형제애로, 마음과 손으로!§!"
 GER_fascist_path_tt: "§Y게르만 민족의 부흥§!\n§RNATO가 공산주의 러시아에게 패배§!\n---------------\n\n\n\n\n£GFX_GER_fascist_path_banner\n\n\n\n\n\n§g증오를 마음속에 초대하라. 단 한 번만, 증오에게 기회를 주어라.  \n\n검은 제복을 차려입고  \n우리는 행진하며 시간을 보냈네  \n우리의 모든 죄악의 수치를 입고 \n정해진 걸음으로 줄을 지어 걸었네§!  \n\n§R전쟁 이전 극단적 군인들을 숙청하여 두 가지 추가 경로를 여십시오!§!"
 GER_communist_path_tt: "§Y유럽 공산주의§!\n§RNATO가 지리놉스키의 러시아에게 패배§!\n---------------\n\n\n\n\n£GFX_GER_communist_path_banner\n\n\n\n\n\n§g과거에 대한 향수를 받아들이거나 새로운 형태의 사회주의를 구축하세요.\n\n그러니 왼쪽으로, 둘, 셋!\n그러니 왼쪽으로, 둘, 셋!\n그대의 자리는, 동지여, 어디인가!\n노동자 통일전선에 합류하라,\n그대도 노동자이기 때문이다!§!\n\n§R전쟁 이전 '묵인'을 택하여 새 경로를 여십시오!§!\n\n§R2021년에 좌파당을 선택하여 새 경로를 여십시오!§!"
 GER_ultraliberal_path_tt: "§Y초자유주의 유럽§!\n§RNATO가 메드베데프의 러시아에게 패배§!\n---------------\n\n\n\n\n£GFX_GER_ultraliberal_path_banner\n\n\n\n\n\n§g당신은 신세계 질서를 맞이할 준비가 되었는가?  \n\n다보스  \n우리는 여기 있다  \n의제는 매우 분명하다  \n우리는 너를 공포 속에 살게 만들 것이다!  \n너는 꼭두각시다,  \n그리고 나는 인형사다!§!"
 JAP_ldp_path_tt: "§Y자유민주당§!\n---------------\n£GFX_JAP_ldp_conservatives_banner\n\n\n\n\n\n\n\n\n\n§g어제에서 배우고,\n오늘을 살며, 내일을 희망하라.§!"
 JAP_liberal_civil_coalition_path_tt: "§Y자유주의 시민연정 - 입헌민주당§!\n---------------\n\n\n\n\n£JAP_economic_populism\n\n\n\n\n\n§g가장 작은 선행이\n가장 위대한\n선의보다 낫다.§!"
 JAP_liberal_civil_coalition_1_path_tt: "§Y자유주의 시민연정 - 일본유신회§!\n---------------\n\n\n\n\n£JAP_technological_advancement\n\n\n\n\n\n§g느리게 가는 것을 두려워하지 말고,\n멈춰 서는 것을 두려워하라.§!"
 JAP_junta_path_tt: "§Y군사정부§! - §R개발 중!§!\n---------------\n£GFX_JAP_ldp_nationalists_banner\n\n\n\n\n\n\n\n\n\n§g정신 차려라, 사무라이의 딸아.\n끝에서 끝으로, 소리가 점점 잦아든다면\n머리가 터질 때까지\n나는 웃으리라.\n바다와 섬들을 향하여.§!"
 JAP_republic_path_tt: "§Y공화주의 일본§! - §R개발 중!§!\n---------------\n\n\n\n\n£GFX_JAP_republican\n\n\n\n\n\n§g자유는 산바람과 같다. 약자는 견딜 수 없다.§!"
 PRC_centrist_path_tt: "§Y시진핑주의 - 중앙파§!\n---------------\n\n\n\n\n£GFX_PRC_forwards_to_the_future_banner\n\n\n\n\n\n§g나를 잊을지언정, 인민을 저버리지 않겠다.\n\n중국공산당원의 초심과 사명은\n중국인민의 행복을 추구하고\n중화민족의 부흥을 도모하는 것이다.§!"
 PRC_new_left_path_tt: "§Y신좌파§!\n§R중국이 대만 전쟁에서 패배§!\n---------------\n\n\n\n\n£GFX_PRC_defend_of_maos_homeland_banner\n\n\n\n\n\n§g인민이야말로 역사의 진정한 창조자이다.\n\n오성홍기 바람에 높이 날리고,\n혁명가는 우렁차게 울려 퍼지네.\n새벽의 찬란한 빛을 받으며,\n사회주의 조국을 노래하세.§!"
 PRC_liberal_path_tt: "§Y자유파§!\n§R중국이 대만 전쟁에서 패배§!\n---------------\n\n\n\n\n£GFX_PRC_let_flowers_grow_banner\n\n\n\n\n\n§g그 무엇도 자유를 향한 열망을 억누를 수는 없다.\n\n우리는 쓰러지지 않으니,\n사형집행인의 키가 아무리 커도\n자유의 바람을 막을 수는 없을 것이다.§!"
 PRC_nationalist_path_tt: "§Y보복파§!\n§R중국이 대만 전쟁에서 패배§!\n---------------\n\n\n\n\n£GFX_PRC_nationalist_banner\n\n\n\n\n\n§g백년의 국치, 그 한은 바다로도 씻지 못하리라.\n\n네게 효를 다하라고 하지 않으마,\n오직 나라에 충성하기를 바랄 뿐.§!"
