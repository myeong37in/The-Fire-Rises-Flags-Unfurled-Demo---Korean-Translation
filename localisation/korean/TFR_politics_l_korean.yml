 USA_slb_path_tt: "§Y자유의 아들들§! - §R개발 중!§!\n---------------\n\n\n\n\n£GFX_SLB_path_banner\n\n\n\n\n\n§g그러니 만약 어떤 놈이 너에게 무슨 일을 하는지 이름이 무엇인지 묻거든\n가서 좆이나 까라고 말해, 그 놈 친구들한테도 똑같이 말해\n안전하지만 꿈 없는 잠을 위해 자신의 자유를 팔아넘기는 놈은\n그 둘 모두를 누릴 자격도 없고 둘 다 가질 수도 없을 테니까§!"
 USA_gma_path_tt: "§Y그린 마운틴 아나키스트 공동체§! - §R개발 중!§!\n---------------\n\n\n\n\n£GFX_GMA_path_banner\n\n\n\n\n\n§g지구를 돌아보자, 생명의 불꽃이 잦아들고\n어딜 가나 비탄과 슬픔만이 가득해\n오염이 공기와 땅, 바다를 죽이고\n인간은 자신의 운명을 맞이할 준비를 하네, 그래§!"
