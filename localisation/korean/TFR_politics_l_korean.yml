 TFR_INCLUSIVE_CAPITALISM_TT_LONG: "§g포용적 자본주의는 소득과 부의 불평등 심화 문제를 해결하고 경제 내 가치 분배의 공정성과 형평성을 높이는 것을 목표로 하는 경제 이론입니다.\n\n포용적 자본주의의 핵심은 기업, 투자자, 노동자, 소비자, 정부, 지역사회, 사회 전체, 환경 등 모든 이해관계자의 이익을 충족하는 지속 가능한 성장을 촉진하는 데 있습니다.§!\n\n\n\n\n£GFX_ZZZ_inclusive_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y2.0%§!\n £construction_speed_infrastructure_texticon §Y사무단지§! 건설 속도: §G+2.0%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §G+1.5%§!\n £construction_speed_civfactory_texticon §Y민간공장§! 건설 속도: §R-2.5%§!\n £GFX_dx_blue 사업 가치 변동치: §G+2.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §G+2.0%§!"
