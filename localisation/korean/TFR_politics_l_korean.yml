 TFR_UPDATE_TOOLTIP: "§C정신박힌 일출§! 서브모드 \n\n\n\n\n£GFX_update_sunrise_sanity_banner\n\n\n\n\n\n §H주요 추가 사항§!: \n\n -- §C유엔§!의 콘텐츠와 경로 개편: -- \n -- §C안전보장이사회§! & §8평화유지군§! -- \n\n -- 2차 미국 내전의 더 많은 §Y플레이버 및 뉴스 이벤트§! -- \n\n -- §Y고유§! 기술 계통도, 군수산업체, 이념, 장군 등 추가 -- \n\n -- 고유 §Y유엔 개입§! 메커니즘 -- \n\n -- 6개의 §Y통일§! 슈퍼 이벤트 -- \n\n§Y크레딧§!\n\n§Y프로젝트 리드§!\n§Wjagdcyber77 (AKA Boomy), TrexGHZ, Kobalt, Fellow Tankie, Kisaragi Hito, knmc§!\n\n§Y코더§!\n§Wjagdcyber77, Kobalt, le capitaliste, TrexGHZ, Cooldownboi, Cryo, BaWaHP, Adam29, Darwin855, Thatone200, Tnt§!\n\n§Y아티스트§!\n§WTrexGHZ, Zaetang, svblockz, Hohenzollern, Thisisahumanboi, ASDASDADAS, Snowyy, DoritoDew97, Notjorjo, MrInferior, Parchokhalq, nicolofr03, Reconqueror, Ezo, bilbley, Fumychev, Jack, cookiemaster451, Truemaglev, Sinisterultra§!\n\n§Y작가§!\n§WKisaragi Hito, Fellow Tankie, Kay, Kobalt, Razormind, Lay, TrexGHZ, orticwales, freiheit, kaiserrusidb, lethalstraight, Exusiai (Penguin), TheNextChapterBegins§!\n\n§Y번역가§!\n§Wknmc (러시아어), FrostyK (중국어)§!\n\n§Y특별 감사§!\n§WTom (Actual Moreau), The Marshal, Tully, FBOWEN, Bravoman80000, Sayarce, ytytyt, tundrafox, Anwar Harari§!"
