 ZZZ_capitalist_economy: "§Y자유시장 자본주의§!"
 TFR_CAPITALISM_TT: "§Y자본주의 모델§!"
 TFR_CAPITALISM_TT_LONG: "§g자본주의는 사기업과 수많은 사업체들이 정부의 간섭 없이 운영되는 경제 체제입니다. 이 체제 안에서는 비용, 임금과 같은 생산요소와 상품 가격은 수요와 공급과 같은 시장의 힘에 의해 결정됩니다. 자본주의는 시장자유주의자들의 최애이자, 전 세계적으로 가장 널리 채택된 경제 체제가 되었습니다.§!\n\n\n\n\n£GFX_ZZZ_capitalism_banner\n\n\n\n\n\n£consumer_goods_texticon 소비재 공장 변동치:§Y-2.0%§!\n £efficiency_growth_texticon 생산 효율 성장: §G+2.0%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도:§R-1.5%§!\n£construction_speed_infrastructure_texticon §Y사무단지§! 건설 속도: §G+1.5%§!\n £GFX_dx_blue 사업 가치 변동치:§G+5.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §R-5.0%§!"
 ZZZ_american_capitalism: "§Y미국 자본주의§!"
 TFR_AMERICAN_CAPITALISM_TT: "§Y미국 자본주의§!"
 TFR_AMERICAN_CAPITALISM_TT_LONG: "§g미국의 시장 경제 체제는 다른 나라들의 자유 시장 경제의 대표적인 모델입니다. 이는 자유무역과 정부의 최소한의 경제적 문제 개입을 기반으로 합니다. 그러나 이 체제는 다른 수많은 자본주의들과 차별화되는 몇 가지 독특한 특징이 있습니다.\n바로 미국의 경제 기반입니다. 미국의 달러화는 안정성으로 높히 평가받는 강력한 통화입니다. 결과적으로 미국의 달러화는 수많은 나라들의 주요한 기축통화로 널리 사용됩니다.§!\n\n\n\n\n£GFX_ZZZ_american_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치:§Y-3.0%§!\n £efficiency_growth_texticon 생산 효율 성장: §G+3.5%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도:§R-3.5%§!\n £construction_speed_infrastructure_texticon §Y사무단지§! 건설 속도: §G+5.0%§!\n £GFX_dx_blue 사업 가치 변동치: §G+10.0%§!\n£GFX_dx_yellow 개인 가치 변동치: §R-10.0%§!"
 ZZZ_oligopolistic_capitalism: "§Y독과점자본주의§!"
 TFR_OLIGOPOLY_CAPITALISM_TT: "§Y독과점 경제§!"
 TFR_OLIGOPOLY_CAPITALISM_TT_LONG: "§g다른 수많은 국가와 마찬가지로 이 국가의 경제 체제는 자유 시장 원칙에 따라 운영됩니다. 그러나 이 체제의 가장 차별화되는 특징은 소수의 기업이 시장을 지배하는 높은 수준의 과점 체제입니다. \n이 경제 체제에서 다른 자본주의 체제와 또 다른 차별점은 최소한의 정부 개입입니다. 정부의 규제 및 행정 기능은 상당히 제한적이거나, 기업에 의해 제한받거나, 크게 비효율적입니다. 주요 기업들의 사적 욕구가 공공의 이익보다 우선시됩니다.§!\n\n\n\n\n£GFX_ZZZ_oligopolistic_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-4.0%§!\n £prod_eff_cap 생산 효율 한도: §G+3.5%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §R-6.0%§!\n £construction_speed_refinery_texticon §Y정제소§! 건설 속도: §G+10.0%§!\n £GFX_dx_blue 사업 가치 변동치: §G+15.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §R-15.0%§!"
 ZZZ_collective_capitalism: "§Y집단자본주의§!"
 ZZZ_collective_capitalism2: "§Y집단자본주의§!"
 TFR_COLLECTIVE_CAPITALISM_TT: "§Y집단자본주의§!"
 TFR_COLLECTIVE_CAPITALISM_TT_LONG: "§g집단자본주의는 기업과 정부 간의 긴밀한 관계와 기업과 공급업체, 고객, 그리고 기타 이해관계자들 간의 강력한 협력 관계를 특징으로 하는 일본식 경제 모델입니다. 이 경제 모델은 경쟁과 같은 모든 시장 행위보다 장기적 안정과 협력을 강조하며, 기업과 사회가 유기적으로 연결되어 서로에게 성공에 대한 책임을 공유한다는 철학에 기반하고 있습니다.§!\n\n\n\n\n£GFX_ZZZ_collective_capitalism_banner\n\n\n\n\n\n [JAP_collective_capitalism_bonus]"
 ZZZ_welfare_capitalism: "§Y복지자본주의§!"
 TFR_WELFARE_CAPITALISM_TT: "§Y복지자본주의 모델§!"
 TFR_WELFARE_CAPITALISM_TT_LONG: "§g복지자본주의 체제에서 정부는 민간 기업과 사업체에 대해 적당한 수준의 통제와 개입을 통해 경제의 올바른 기능을 보장합니다. 지지자들에 따르면, 이 경제 체제는 높은 경제 성장률, 낮은 인플레이션과 실업률, 더욱 유리한 근로 조건과 일정 수준의 사회 보장의 균형을 이룹니다.§!\n\n\n\n\n£GFX_ZZZ_welfare_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y2.5%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §G+5.0%§!\n £efficiency_growth_texticon 생산 효율 성장: §R-6.5%§!\"\n £construction_speed_civfactory_texticon §Y민간공장§! 건설 속도: §G+5.0%§!\n £GFX_dx_blue 사업 가치 변동치: §R-10.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §G+10.0%§!\n £GFX_dx_yellow 개인 비용 변동치: §Y+3.5%§!"
 ZZZ_corporatism: "§Y협동조합주의§!"
 TFR_CORPORATISM_TT: "§Y협동조합주의 모델§!"
 TFR_CORPORATISM_TT_LONG: "§g협동조합주의는 기업체를 통해 국가와 사회는 통합하려는 경제 체제입니다. 이는 번영하고 안정된 경제를 구축하는 가장 효과적인 방법으로 간주됩니다.\n협동조합주의는 종종 파시스트 및 권위주의 정부와 연관 지어집니다. 이 정권은 국가에 대한 확고한 충성을 요구합니다. 하지만 국가와 기업 간의 경계가 모호해지는 기업독재와 구분하는 것이 매우 중요합니다.§!\n\n\n\n\n£GFX_ZZZ_corporatism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-2.5%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §G+10.0%§!\n £production_efficiency_loss_texticon 생산 효율 유지: §R-5.0%§!\n £sabotaged_resource_texticon 자원 부족으로 인한 불이익: §R+3.5%§!\n £mil_factory 공장 생산량: §G+6.0%§!\n £GFX_dx 월간 수입 증가: §R-10.0%§!\n £GFX_dx_yellow 개인 비용 변동치: §Y-10.0%§!"
 ZZZ_command_economy: "§Y통제 경제§!"
 TFR_COMMAND_ECONOMY_TT: "§Y통제 경제§!"
 TFR_COMMAND_ECONOMY_TT_LONG: "§g계획경제 체제는 고도로 중앙집권화된 형태의 협동조합주의로, 특히 방위 산업과 중공업과 같은 전략적 부분에서 국가의 직접적인 개입을 통해 경제의 상당한 부분이 국유화되어 있습니다.§!\n\n\n\n\n£GFX_ZZZ_command_economy_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-3.0%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §G+10.0%§!\n £efficiency_base_texticon 기본 생산 효율: §G+10.0%§!\n £efficiency_growth_texticon 생산 효율 성장: §R-10.0%§!\"\n £mil_factory 공장 생산량: §G+5.6%§!\n £GFX_dx 월간 수입 증가: §R-15.0%§!\n £GFX_dx_yellow 개인 비용 변동치: §Y15.0%§!"
 ZZZ_managed_economy: "§Y나치 협동조합주의§!"
 TFR_MANAGED_ECONOMY_TT: "§Y국가사회주의 협동조합주의§!"
 TFR_MANAGED_ECONOMY_TT_LONG: "§g나치 협동조합주의는 나치 독일의 경제 체제 모델 기반의 체제를 말합니다. 이는 현재 멸망한 정권의 실패로서 널리 여겨지지만, 네오나치 운동 지지자들은 여전히 이 체제가 \"아리아인\"들을 위한 유일하고 진정한 경제 체제라 주장합니다.\n모든 노력은 국가와 최고 권력자(위대한 지도자나 기구)의 요구를 충족시키는데 집중됩니다. 모든 행동들은 철저히 감시되며, 정부의 요구는 끝이 없고, 그들의 계획은 다른 모든 문제보다 우선시됩니다.§!\n\n\n\n\n£GFX_ZZZ_managed_economy_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-5.0%§!\n £construction_speed_milfactory_texticon §Y군수공장§! 건설 속도: §G+10.0%§!\n £mil_factory 공장 생산량: §G+6.0%§!\n £production_efficiency_loss_texticon  효율 유지: §R-10.0%§!\n £development 월간 빈곤율 개선:  §R-1.5%§!\n £GFX_dx 월간 수입 증가:   §R-15.0%§!\n £GFX_dx_yellow 개인 비용 변동치: §Y-10.0%§!"
 ZZZ_planned_economy: "§Y계획 경제§!"
 TFR_PLANNED_ECONOMY_TT: "§Y계획 경제§!"
 TFR_PLANNED_ECONOMY_TT_LONG: "§g계획 경제란 전체 인구와 국가 전체의 필요를 충족시키기 위해 모든 경제 생산량과 성장을 미리 계획하는 경제 체제입니다. 이러한 계획은 중앙 집중 또는 분산을 통해 수행될 수 있으며, 전문가로 구성된 전담 위원회가 결정하거나 국민이 직접 참여 방식으로 결정할 수도 있습니다.§!\n\n\n\n\n£GFX_ZZZ_planned_economy_banner\n\n\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-5.0%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §G+10.0%§!\n £efficiency_base_texticon 기본 생산 효율: §G+7.5%§!\n £efficiency_growth_texticon 생산 효율 성장: §R-10.0%§!\n £production_efficiency_loss_texticon 생산 효율 유지: §R-5.0%§!\n £mil_factory 공장 생산량: §G+10.0%§!\n £GFX_dx 월간 수입 증가: §R-25.0%§!\n £GFX_dx_yellow 개인 비용 변동치: §Y10.0%§!"
 ZZZ_developed_socialism: "§Y선진사회주의§!"
 TFR_DEVELOPED_SOCIALISM_TT: "§Y선진사회주의 이론§!"
 TFR_DEVELOPED_SOCIALISM_TT_LONG: "§g소련 브레즈네프 시대의 유물이었던 선진사회주의 개념이 현대 러시아 경제학자들에 의해 부활했습니다. 이 새로운 관점에서는 코시긴의 제안과 개혁이 더 많이 실행되어 더욱 다양한 경제 환경과 시스템이 만들어졌습니다.\n중앙의 계획은 여전히 중요한 역할을 하지만, 민영의 진취성을 완전히 포기한 것은 아닙니다. 민영기업은 생산, 계획, 직원 인센티브 측면에서 더 많은 독립성을 부여받습니다. 이러한 독립성은 기업이 더 많은 이윤을 창출할 수 있도록 하고, 이는 다시 생산량을 늘리도록 동기를 부여합니다. 또한, 경제활동참가율을 기반으로 하는 새로운 임금체계가 도입되었습니다. 이 체계는 직원이 회사의 생산에 얼마나 기여했는지에 따라 급여를 지급합니다.§!\n\n\n\n\n£GFX_ZZZ_developed_socialism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-3.0%§!\n £construction_speed_civfactory_texticon §Y민간공장§! 건설 속도: §G+10.0%§!\n £mil_factory 공장 생산량: §G+5.0%§!\n £production_efficiency_loss_texticon 생산 효율 유지: §R-10.0%§!\n £sabotaged_resource_texticon 자원 부족으로 인한 불이익:  §G-5.0%§!\n £efficiency_growth_texticon 생산 효율 성장:   §R-10.0%§!\n £GFX_dx_yellow 개인 비용 변동치: §Y+5.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §G+5.0%§!"
 ZZZ_military_controlled_economy: "§Y군사 통제 경제§!"
 TFR_MILITARY_CONTROLLED_TT: "§Y군사 통제 경제§!"
 TFR_MILITARY_CONTROLLED_TT_LONG: "§g군사 통제 경제에서 군부는 경제에 대해 직접적인 감독권을 행사합니다. 전부는 아니더라도 경제 활동의 대다수는 군부의 요구를 충족시키는 데 맞춰져 있습니다. 이러한 경제체제는 군사 독재 국가 또는 군정 국가에서 흔히 볼 수 있습니다. 체제는 종종 시민의 복지보다는 군부의 이익을 우선시하는 경향이 있습니다. 이러한 경제 모델을 채택하는 정권은 민족주의, 나아가 극단적인 민족주의 성향을 띠는 경우가 많기 때문입니다.§!\n\n\n\n\n£GFX_ZZZ_military_controlled_banner\n\n\n\n\n\n £consumer_goods_texticon C소비재 공장 변동치: §Y-5.0%§!\n £construction_speed_milfactory_texticon §Y군수공장§! 건설 속도: §G+10.0%§!\n £efficiency_base_texticon 기본 생산 효율: §R-7.5%§!\n £efficiency_growth_texticon 생산 효율 성장: §G+10.0%§!\n £sabotaged_resource_texticon 자원 부족 불이익: §G-10.0%§!\n £mil_factory 공장 생산량: §G+5.0%§!\n £GFX_dx_yellow 개인 비용 변동치: §Y-10.0%§!\n £development 월간 빈곤율 개선: §R-2.5%§!"
 ZZZ_worker_controlled_economy: "§Y노동자 통제 경제§!"
 TFR_WORKER_CONTROLLED_TT: "§Y노동자 통제 경제§!"
 TFR_WORKER_CONTROLLED_TT_LONG: "§g계획 경제는 전적으로 정부가 통제하는 경제로 여겨지는 경향이 있지만, 모든 계획 경제가 그런 것은 아닙니다.\n노동자 통제 경제는 국가 관료나 공무원이 아닌 노동자들 스스로, 주로 노동자평의회나 노동조합을 통해 운영됩니다. 이러한 조직을 통해 노동자들은 생산에 대한 직접적인 통제권을 유지하며 높은 수준의 자율성을 누립니다.§!\n\n\n\n\n£GFX_ZZZ_worker_controlled_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y2.0%§!\n £construction_speed_civfactory_texticon §Y민간공장§! 건설 속도: §G+10.0%§!\n £efficiency_growth_texticon 생산 효율 성장: §G+10.0%§!\"\n £prod_eff_cap 생산 효율 한도: §G+5.0%§!\n £mil_factory 공장 생산량: §G+5.0%§!\n £GFX_dx_yellow 개인 비용 변동치: §Y10.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §G+10.0%§!"
 ZZZ_socialist_market: "§Y사회주의 시장경제§!"
 TFR_SOCIALIST_MARKET_TT: "§Y사회주의 시장경제§!"
 TFR_SOCIALIST_MARKET_TT_LONG: "§g사회주의 시장경제에서는 정부와 사기업이 협력하여 보다 공정한 사회를 구축합니다. 정부는 일부 기업을 소유하고 경제를 감독하며 형평성을 보장하고 사기업은 그 아래 조업과 발전을 담당합니다. 주요 목표 중 하나는 모든 사람이 식료품, 주택, 의료와 같은 필수 서비스를 이용할 수 있도록 보장하는 것입니다. 또 다른 목표는 혁신과 기업가 정신을 육성하는 동시에 기업이 공공의 이익을 위해 운영되도록 보장하는 것입니다.§!\n\n\n\n\n\n£GFX_ZZZ_socialist_market_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-1.5%§!\n £mil_factory 공장 생산량: §G+3.5%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §G+5.0%§!\n £efficiency_base_texticon 기본 생산 효율: §G+5.0%§!\n £efficiency_growth_texticon 생산 효율 성장: §R-3.5%§!\n £GFX_dx 월간 수입 증가: §G+10.0%§!\n £GFX_dx_yellow 개인 비용 변동치: §Y+10.0%§!"
 ZZZ_chaostic_economy: "§R혼돈 경제§!"
 TFR_CHAOSTIC_TT: "§Y혼돈§!"
 TFR_CHAOSTIC_TT_LONG: "§g현재 우리 경제는 §R혼란과 혼돈§g에 빠져 있습니다. 기업은 문을 닫고, 근로자는 직장을 떠나고, 점점 더 많은 사람들이 실업에 직면하고 있습니다. 정부와 관료들은 질서를 회복하고 국내에서 벌어지고 있는 불안을 막기 위해 신속하게 행동해야 합니다.\n\n\n\n\n£GFX_ZZZ_chaostic_economy_banner\n\n\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y5.0%§!\n £construction_speed_texticon 건설 속도: §R-10.0%§!\n £mil_factory 공장 생산량: §R-10.0%§!§!"
 ZZZ_collective_capitalism_bonus1: "£consumer_goods_texticon 소비재 공장 변동치: §Y-2.0%§!\n £dockyard_output_texticon 조선소 생산량: §G+5.0%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §R-5.0%§!\n £construction_speed_infrastructure_texticon §Y사무단지§! 건설 속도: §G+7.5%§!\n £GFX_dx_blue 사업 가치 변동치: §G+10.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §R-5.0%§!"
 ZZZ_collective_capitalism_bonus2: "£consumer_goods_texticon 소비재 공장 변동치: §Y-4.0%§!\n £dockyard_output_texticon 조선소 생산량: §G+5.0%§!\n £mil_factory 공장 생산량: §G+5.0%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §R-10.0%§!\n £construction_speed_infrastructure_texticon §Y사무단지§! 건설 속도: §G+2.5%§!\n £GFX_dx_blue 사업 가치 변동치: §G+5.0%§!"
 ZZZ_minarchism: "§Y최소정부주의§!"
 TFR_MINARCHISM_TT: "§Y최소정부주의§!"
 TFR_MINARCHISM_TT_LONG: "§6최소정부주의§!§g는 법, 질서, 국방만을 담당하는 최소한의 국가를 주장하며, 나머지 모든 것은 시장의 혼란스러운 힘에 맡깁니다. 그 어떤 제약도 없는 자본주의가 번성하고 용감한 자에게 힘을 실어주는 동시에 나약한 자는 가차 없이 버려집니다.§!\n\n\n\n\n£GFX_ZZZ_minarchism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-5%§!\n £efficiency_growth_texticon 생산 효율 성장: §G+3%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §R-10%§!\n £construction_speed_infrastructure_texticon §Y사무단지§! 건설 속도: §G+2%§!\n £GFX_dx_blue 사업 가치 변동치: §G+5.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §G+5.0%§!"
 ZZZ_ancap: "§Y아나르코자본주의§!"
 TFR_ANCAP_TT: "§Y아나르코자본주의§!"
 TFR_ANCAP_TT_LONG: "§g§Y아나르코자본주의§!는 국가가 사라지고 자유시장과 민간기업으로 대체되는 세상을 그립니다. 법, 안보, 서비스는 서로 경쟁하는 기업들이 담당하며, 재산권과 자발적 교환이 기본 원칙이 됩니다. 지지자들은 이를 진정한 자유라고 칭송하지만, 비판가들은 기업의 지배를 경고합니다. 아나르코자본주의 사회는 곧 절대적 자유와 혼돈이 서로의 손을 맞잡고 걷는 사회입니다.§!\n\n\n\n\n£GFX_ZZZ_ancap_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y-15%§!\n £efficiency_growth_texticon 생산 효율 성장 §G+12%§!\n £construction_speed_infrastructure_texticon §Y기반시설§! 건설 속도: §R-39%§!\n £construction_speed_infrastructure_texticon §Y사무단지§! 건설 속도: §G+25%§!\n £GFX_dx_blue 사업 가치 변동치: §G+15.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §G+5.0%§!\n £GFX_stability_texticon 안정도: §R-10.0%§!"
 TFR_UPDATE_MINI_TOOLTIP: "§3브뤼셀 효과§!\n\n\n\n\n£GFX_update_brusselles_effect_banner\n\n\n\n\n\n\n§Y독일§!:\n\n - §Y민주주의 독일§!의 §7경제 §3매커니즘§!§! 개편\n\n§Y이탈리아§!:\n\n - 이탈리아의 §Y스켈레톤 컨텐츠§! 개편\n\n - 이탈리아의 §Y1차 유럽 전쟁§! 계통도\n\n§Y스페인§!:\n\n - §Y스페인 내전§! 확장\n\n§Y유럽 위원회§!:\n\n - 유럽 위원회의 §Y스켈레톤 컨텐츠§!\n\n§Y마그레브와 리비아§!:\n\n - 마그레브와 리비아의 새로운 §Y스켈레톤 컨텐츠§!\n\n - 독일, 프랑스, 러시아의 §Y대리전§! 매커니즘 추가"
