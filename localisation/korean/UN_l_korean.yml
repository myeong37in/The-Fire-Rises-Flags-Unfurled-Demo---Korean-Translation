#MECHANIZED
LRA_mechanized_equipment_1: "라텔 20 IFV"
LRA_mechanized_equipment_1_short: "라텔 20 IFV"
LRA_mechanized_equipment_1_desc: "1970년대 남아프리카에서 세계 최초의 차륜형 보병전투차로 개발된 라텔 20은 부시 전쟁에서 요구된 지뢰 방호 능력과 높은 기동성을 갖춘 플랫폼의 필요에 대응했습니다. 2인승 포탑에 20mm 기관포를 장착한 이 차량은 보병 분대를 수송하면서 화력지원을 제공했습니다. 라텔은 여러 차례 매우 효과적인 성능을 보였으며, 6륜 구동은 험난한 지형에서도 야지 기동성과 신뢰성을 제공했습니다."
LRA_mechanized_equipment_2: "CV90 Mk III"
LRA_mechanized_equipment_2_short: "CV90 Mk III"
LRA_mechanized_equipment_2_desc: "1990년대 스웨덴에서 개발되어 지속적으로 개량된 CV90 Mk III는 높은 방호력과 모듈식 설계로 알려진 궤도식 보병전투차입니다. Mk III형은 개선된 전자장비, 강화된 장갑, 안정화 포탑에 장착된 40mm 보포스 기관포를 갖추고 있습니다. 북유럽과 유럽 각국 군대에서 폭넓게 운용되었으며, 라이베리아의 유엔 평화유지 임무에도 사용되었고 평화유지와 고강도 분쟁 모두에서 뛰어난 적응성을 인정받았습니다."
LRA_mechanized_equipment_3: "M3 브래들리"
LRA_mechanized_equipment_3_short: "M3 브래들리"
LRA_mechanized_equipment_3_desc: "M3 브래들리 기병전투차는 1980년대 미 육군을 위해 개발된 M2 브래들리의 파생형으로, 보병 수송 능력을 줄이는 대신 정찰 능력을 강화했습니다. 25mm 체인건과 TOW 미사일로 무장했으며, 첨단 센서와 정찰 장비를 갖추고 있습니다. M3는 기갑기병 역할에서 대규모로 운용되었고, 전장에서 화력과 상황 인식을 제공했습니다."
LRA_mechanized_equipment_4: "AMPV"
LRA_mechanized_equipment_4_short: "AMPV"
LRA_mechanized_equipment_4_desc: "장갑 다목적차량, 즉 AMPV는 2010년대 BAE 시스템스가 미 육군을 위해 개발한 차량으로, 지원 역할에서 M113 계열을 대체합니다. 궤도식 차체를 기반으로 하며 지뢰와 급조폭발물에 대한 현대적 방호력을 갖추었고, 의무후송형, 지휘형, 박격포 운반형 등 여러 파생형이 존재합니다. 비전투 지원부대에 향상된 생존성과 기동성을 제공합니다."
LRA_mechanized_equipment_5: "FCS XM1206"
LRA_mechanized_equipment_5_short: "FCS XM1206"
LRA_mechanized_equipment_5_desc: "XM1206 보병수송차는 2000년대 초 미 육군의 미래전투체계 프로그램에서 제안된 구성 요소였습니다. 신속 배치를 위한 경량 네트워크화 궤도차량으로 구상되었으며, 첨단 복합장갑과 하이브리드 전기 구동계를 특징으로 했습니다. FCS 프로그램은 2009년에 취소되었고, XM1206은 양산되지 않았습니다."

#LIGHT MECHANIZED
LRA_light_mechanized_equipment_1: "BTR-80"
LRA_light_mechanized_equipment_1_short: "BTR-80"
LRA_light_mechanized_equipment_1_desc: "BTR-80은 1980년대 소련에서 BTR-70의 개량형으로 개발된 8x8 차륜형 장갑병력수송차입니다. 향상된 상륙 능력, 개선된 장갑, 14.5mm 기관총 포탑을 갖추고 있으며 보병 분대 전체를 수송할 수 있습니다. 널리 수출되어 수많은 분쟁에서 사용되었고, 오늘날에도 많은 구소련권 군대의 주력 장갑차로 남아 있습니다."
LRA_light_mechanized_equipment_2: "M1126 스트라이커"
LRA_light_mechanized_equipment_2_short: "M1126 스트라이커"
LRA_light_mechanized_equipment_2_desc: "M1126 스트라이커 보병수송차는 2000년대 초 제너럴 다이내믹스가 미 육군을 위해 개발한 8x8 차륜형 장갑병력수송차로, 신속 배치를 위해 설계되었습니다. 원격무장장치를 장착했고, RPG 방호를 위한 슬랫 장갑을 갖추었으며, 9명의 보병 분대를 수송합니다. 스트라이커는 이라크와 아프가니스탄에서 폭넓게 운용되었습니다."
LRA_light_mechanized_equipment_3: "파트리아 AMV"
LRA_light_mechanized_equipment_3_short: "파트리아 AMV"
LRA_light_mechanized_equipment_3_desc: "파트리아 장갑 모듈식 차량, 즉 AMV는 2000년대 초 핀란드에서 개발된 8x8 차륜형 모듈식 플랫폼으로, 높은 방호력과 적응성으로 알려져 있습니다. 뛰어난 지뢰 방호력과 다양한 무장 선택지를 갖추고 있으며, 전 세계에서 여러 구성으로 운용됩니다. AMV는 다목적성과 성능을 인정받아 여러 NATO 및 우방국에서 채택되었습니다."
LRA_light_mechanized_equipment_4: "K-808/806 백호"
LRA_light_mechanized_equipment_4_short: "K-808/806 백호"
LRA_light_mechanized_equipment_4_desc: "K-808 및 K-806 백호 계열은 2010년대 현대 로템이 대한민국 육군을 위해 개발한 8x8 및 6x6 차륜형 장갑차입니다. 첨단 복합장갑과 모듈식 설계를 갖추고 있으며, 강력한 방호력과 다양한 화력 선택지를 제공합니다. 백호 계열은 대한민국의 현대적 차륜형 전투차량을 대표합니다."
LRA_light_mechanized_equipment_5: "KTO 로소마크"
LRA_light_mechanized_equipment_5_short: "KTO 로소마크"
LRA_light_mechanized_equipment_5_desc: "KTO 로소마크는 2000년대에 개발된 파트리아 AMV의 폴란드 면허생산형으로, 8x8 차륜형 보병전투차입니다. 30mm 히트피스트 포탑을 포함한 다양한 포탑을 장착할 수 있으며, 높은 기동성과 방호력을 제공합니다. 로소마크는 폴란드 기계화부대의 중요한 전력으로 자리 잡았고, 아프가니스탄에서도 실전을 경험했습니다."
LRA_light_mechanized_equipment_6: "소모품"
LRA_light_mechanized_equipment_6_short: "소모품"
LRA_light_mechanized_equipment_6_desc: "소모품"

#Motorized
LRA_motorized_equipment_1: "캐스피르"
LRA_motorized_equipment_1_short: "캐스피르"
LRA_motorized_equipment_1_desc: "1970년대 남아프리카에서 개발된 캐스피르는 대반란 작전을 위해 설계된 지뢰 방호 V형 차체 장갑병력수송차입니다. 일체형 차체는 지뢰와 매복에 대해 뛰어난 방호력을 제공합니다. 부시 전쟁에서 널리 사용되고 전 세계로 수출된 캐스피르는 내부 치안과 평화유지 임무에서 잘 알려진 차량이 되었습니다."
LRA_motorized_equipment_2: "이베코 LMV"
LRA_motorized_equipment_2_short: "이베코 LMV"
LRA_motorized_equipment_2_desc: "이탈리아군 운용명으로 링스라고도 알려진 이베코 경다목적차량, 즉 LMV는 2000년대 초 현대 원정군을 위해 개발되었습니다. 높은 지뢰 및 탄도 방호력과 모듈식 설계를 갖추고 있으며, 정찰과 순찰 임무에 뛰어난 기동성을 제공합니다. 여러 NATO 국가가 채택한 LMV는 아프가니스탄 등에서 신뢰성을 입증했습니다."
LRA_motorized_equipment_3: "프로토랩 미수"
LRA_motorized_equipment_3_short: "프로토랩 미수"
LRA_motorized_equipment_3_desc: "프로토랩 미수는 2010년대 핀란드에서 개발된 6x6 장갑병력수송차로, 험난한 지형에서의 높은 기동성을 목표로 만들어졌습니다. 강한 지뢰 방호력과 모듈식 장갑을 갖추고 있어 우수한 야지 성능을 유지하면서 병력을 수송할 수 있습니다. 핀란드 방위군을 위해 설계된 미수는 생존성과 신속 배치 능력으로 알려져 있습니다."

