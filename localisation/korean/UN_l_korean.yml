LRA_jean_pierre_lacroix_leader_choice_tt: "\n다음 §C사무총장§!은...\n\n\n\n\n\n\n\n\n\n£GFX_Jean_Pierre_Lacroix_Portrait\n\n\n\n\n\n\n\n§W      Jean-Pierre Lacroix§!\n\n\n평화유지 작전 경험을 갖춘 프랑스 외교관으로서, 그는 유엔의 이상을 확산시키고 인류를 종내 분쟁에서 해방할 것입니다.\n\n\n§Y주도 이념: §C진정한 세계주의§!"

