LRA_gwtank_chassis: "SK-105A1 퀴라시어"
LRA_gwtank_chassis_short: "SK-105A1"
LRA_gwtank_chassis_desc: "SK-105는 기동식 대전차 차량에 대한 오스트리아 육군의 작전 요구를 충족하기 위해 자우러-베르크, 현재의 슈타이어-다임러-푸흐가 개발했습니다. 첫 시제차량은 1967년에 완성되었고, 선행양산 차량의 인도는 1971년에 시작되었습니다."
LRA_basic_light_tank_chassis: "FV101 스콜피온 90"
LRA_basic_light_tank_chassis_short: "스콜피온 90"
LRA_basic_light_tank_chassis_desc: "FV101 스콜피온은 영국의 장갑 정찰차량이자 경전차입니다. 알비스가 제작한 7종의 CVR(T), 즉 궤도식 전투차량 정찰 계열에서 선도 차량이자 화력지원형으로 운용되었습니다."
LRA_improved_light_tank_chassis: "B1 센타우로"
LRA_improved_light_tank_chassis_short: "센타우로"
LRA_improved_light_tank_chassis_desc: "센타우로는 경량에서 중형 수준의 국토 방어와 전술 정찰을 위한 차륜형 구축전차에서 출발한 이탈리아 군용차량 계열입니다. 이 차량은 이베코 피아트와 OTO 멜라라의 제조사 컨소시엄인 Societa Consortile Iveco Fiat - OTO Melara, 즉 CIO가 개발했습니다."
LRA_advanced_light_tank_chassis: "유엔 미래 전투지원차량"
LRA_advanced_light_tank_chassis_short: "UN-FCSV"
LRA_advanced_light_tank_chassis_desc: "원래 냉전기 미국에서 AAI 코퍼레이션이 제작한 HSTV-L로 생산되었습니다. 이후 유엔 미래 전투지원차량, 즉 UN-FCSV 프로그램 아래에서 개발되어 평화유지 작전을 지원하는 데 쓰였습니다."







