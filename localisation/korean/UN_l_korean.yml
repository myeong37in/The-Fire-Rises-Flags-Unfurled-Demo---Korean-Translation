LRA_infantry_equipment_3_desc: "작업 중"
LRA_infantry_equipment_4: "ACR"
LRA_infantry_equipment_4_short: "ACR"
LRA_infantry_equipment_4_desc: "레밍턴 ACR은 2008년 11월 13일, 초청자 전용 산업의 날 행사에서 미 육군 관계자들에게 공개된 무기 중 하나였습니다. 이 행사의 목적은 M4 카빈의 차기 대체품에 대한 공식 요구사항을 작성하기에 앞서, 당시의 카빈 기술을 검토하는 것이었습니다. 이 총은 M4를 대체하기 위한 개별 카빈 경쟁에도 참여했습니다."
