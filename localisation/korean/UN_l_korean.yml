#DECISION CATEGORIES
######################################################

LRA_mission_in_florida_category: "플로리다 유엔 개입"
LRA_mission_in_florida_category_desc: "우리의 푸른 헬멧들은 정복자로서도, 환호하는 군중에게 환영받는 해방자로서도 아닌, 실패하기에는 너무 거대하지만 스스로를 구하기에는 너무 망가진 한 국가의 붕괴 속으로 들어서는 이방인으로서 상륙했습니다. 북쪽으로 향하는 모든 마일은 무장한 자들만이 아니라 의심과도 다투어야 합니다. 우리가 보호한다고 주장하는 이들의 의심, 그리고 우리를 이곳으로 보낸 세계의 의심과 말입니다. 이 임무가 지속되려면, 단순히 살아남는 것 이상을 할 수 있음을 증명해야 합니다. 질서가 남아 있지 않은 곳에서 전진하고, 통치하고, 질서를 강제할 수 있음을 보여주어야 합니다.\n\n우리는 철조망 뒤에서 미국이 죽어가는 것을 지켜보러 온 것이 아닙니다.\n이곳에서 평화가 살아남으려면, 푸른 깃발의 무게 아래 한 걸음씩, 도시 하나씩 앞으로 운반되어야 할 것입니다.\n\n§2작전 준비도§!: [?Root.LRA_florida_operational_readiness_var|+0%]\n\n§R주요 도시§!:\n\n§Y포트마이어스§!: [GLOBAL.get_fort_myers_status]\n§Y탬파§!: [GLOBAL.get_tampa_status]\n§Y올랜도§!: [GLOBAL.get_orlando_status]\n§Y잭슨빌§!: [GLOBAL.get_jacksonville_status]\n§Y탤러해시§!: [GLOBAL.get_tallahassee_status]\n"

LRA_southern_logistical_crisis_category: "남부 군수 위기"
LRA_southern_logistical_crisis_category_desc: "임무단이 딥 사우스로 확대되면서 우리의 군수 체계는 한계점까지 늘어났습니다. 해외 원조는 말라가고 있고, 석유 위기의 여파 속에서 유가는 여전히 불안정하며, 확보한 마일 하나하나가 임무단이 감당하기 어려울 정도의 더 많은 연료, 더 많은 수송, 더 많은 정비를 요구하고 있습니다.\n\n이 예비량은 단순한 연료 그 이상을 의미합니다. 수송대 역량, 예비 부품, 조달 유연성, 그리고 임무단이 공세전을 지속할 수 있는 더 넓은 능력 전체를 뜻합니다. 예비량이 줄어들수록 우리 병력에 가해지는 작전 부담은 더욱 날카로워질 것입니다.\n새로운 연료 공급원을 확보하고 보급선을 안정화하지 못한다면, 이 끔찍한 분쟁을 끝내기도 전에 우리의 작전은 멈춰 설 위험이 있습니다.\n\n§Y보급 예비량:§! [?Root.LRA_southern_fuel_reserve_var|+0%]\n§Y소비 모드:§! [GetLRAFuelBurnMode]\n\n§Y보급 소모율:§! 남부 전역이 계속되는 동안 예비량은 시간이 지남에 따라 §R감소§!합니다.\n§Y안정화 방법:§! 핵심 군수 및 에너지 중심지를 §C확보§!하고, 지속 작전을 §C완료§!하며, 비상 결정을 §C내리십시오§!."

LRA_operations_category: "평화유지 작전"
LRA_operations_category_desc: "\n\n\n\n\n£GFX_LRA_peacekeeping_category\n\n\n\n\n\n\n\n§Y모집 작전 슬롯:§! [?Root.LRA_recruitment_slots_available_var|0]/2\n\n1945년 유엔이 출범한 이래, 국제 평화를 유지하고 세계적 협력을 증진하는 것은 우리의 임무였습니다. 우리는 이 노력에서 실패했습니다. 그러나 모든 것이 끝난 것은 아니며, 붕괴하는 미국에 아직 개입할 수 있는 기회가 남아 있습니다. 평화유지군, 장비, 차량, 손에 넣을 수 있는 모든 것을 가능한 한 많이 모집하고 조달하십시오. 이 일에는 모두가 힘을 보태야 합니다. \n\n§B이번에는 실패하지 않을 것입니다.§!"
LRA_american_sustainability_category: "미국의 지속가능성"
LRA_american_sustainability_category_desc: "\n\n\n\n\n£GFX_LRA_sustainability_category\n\n\n\n\n\n\n\n플로리다 반도에서의 평화유지 활동은 우리에게 한 가지 사실을 가르쳐 주었습니다. 미국의 국민들이 진정으로 회복하려면, 제2차 미국 내전의 영향이 서로 맞선 파벌들 사이의 혼란스러운 유혈극으로 더 깊이 빠져들지 않도록 우리가 큰 노력을 기울여야 한다는 것입니다. 국제사회가 평범한 시민을 돌보지 않은 태만은 우리를 이 산산이 부서진 나라의 사람들을 구할 힘을 가진 유일한 조직으로 남겨두었습니다. 우리는 더 밝은 미래를 강조하며 미국 사회를 재건할 것입니다. \n\n§3그 전환을 강제해야 하더라도 말입니다.§!"
LRA_reestablishing_ties_category: "관계 재수립"
LRA_reestablishing_ties_category_desc: "\n\n\n\n\n£GFX_LRA_diplomacy_category\n\n\n\n\n\n\n\n미합중국의 붕괴는 국제사회에 공백을 남겼습니다. 최대 후원자를 잃은 우리는 남아 있는 국제사회에 의존해야 합니다. 국가들, 국제기구들, 경제 블록들은 세계를 다시 한 번 현상 유지 아래 결집시킬 수 있는 최선의 기회입니다. 우리는 그저 가져가기만 해서는 안 됩니다. 세계 각 지역의 국제적 안정을 보장해야 합니다. 우리는 세계 최대 초강대국이 붕괴한 상황 앞에서도 긴장을 완화하고 세계 질서를 지켜낼 것입니다. \n\n§7어쩌면 평화는 결국 가능할지도 모릅니다.§!"
LRA_campaign_initiatives_category: "전역 구상"

