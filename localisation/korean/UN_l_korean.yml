lra.1.t: "유엔이 미국에 질서를 회복하다"
lra.1.desc: "수천만 명이 죽고, 전국의 모든 주요 도시가 폐허가 되었으며, 전 세계에 미국인 디아스포라가 생겨난 끝에, 빛나는 바다에서 빛나는 바다까지 미국 땅 전역을 수없이 많은 해 동안 휩쓸었던 피비린내 나는 전쟁이 마침내 끝났습니다. 새로 해방된 국가 전역에 마침내 질서가 회복되었습니다.\n\n일부 미국인들은 여전히 서로를 깊이 증오하고 있으며, 많은 이들이 과거 군벌들의 급진적이고 극단주의적인 이념에 동조하고 있지만, 미국 재통일의 발표는 유엔에게 역사적인 승리입니다. 미국인들은 가족을 갈라놓고, 1861년 이후 두 번째로 형제가 다시 형제와 싸우도록 만든 잔혹한 분쟁의 종식을 기념하고 있습니다.\n\n국가가 이제 재건과 인도주의 활동을 시작하는 가운데, 많은 미국인들은 새로운 미국의 지도자 자리에 오를 이가 누구든 깊은 의심의 눈초리를 보내고 있습니다. 임무는 이제 진정한 시험대에 들어섰습니다. 군사적 승리를 사람들이 받아들일 수 있는 지속적인 평화 합의로 바꾸는 일입니다. 권위를 미국의 후계국에 돌려주어야 합니까? 아니면 우리가 그 후계자가 되어야 합니까?"
lra.1.a: "이제 미국의 새로운 시대가 온다..."

lra.2.t: "유엔이 플로리다를 확보하다"
lra.2.desc: "마이애미에서 활동하는 플로리다 유엔 임무단은 플로리다 지역 전체에 대한 완전한 통제를 확보했다고 확인했습니다. 비교적 작은 규모에도 불구하고, 평화유지군은 뛰어난 훈련과 규율로 승리하여 아톰바펜 사단의 민병대와 플로리다 주방위군을 압도했습니다.\n\n평화유지군은 탬파와 잭슨빌 같은 주요 도시에 빠르게 질서를 회복했으며, 주민들은 임무단에 비교적 적극적으로 협력했습니다. 많은 이들이 평화유지군을 돕기 위해 자원 병력에 합류했고, 다른 이들은 주 재건을 돕기 시작했습니다. 마이애미 본부는 최근 기자회견에서 플로리다의 옛 주도였던 탤러해시로 이동하기 전, 가능한 한 빨리 플로리다의 정상화를 회복하기를 바란다고 밝혔습니다.\n\n플로리다에서의 평화유지군의 성공은 세계를 놀라게 했습니다. 많은 이들이 유엔이 이처럼 거대한 지역 분쟁에서 의미 있는 일을 할 수 없다고 생각했기 때문입니다. 성공으로 자신감을 얻은 안전보장이사회는 플로리다에 더 많은 인력과 장비를 쏟아붓기 시작했으며, 미국의 나머지 지역까지 확보할 계획이라는 소문도 돌고 있습니다."
lra.2.a: "악몽은 사라졌다."

lra.3.t: "UNMIF가 미국 남부를 통합하다"
lra.3.desc: "탤러해시 UNMIF 본부(AP) - 플로리다 유엔 임무단, 즉 UNMIF의 사령관은 텍사스에서 노스캐롤라이나에 이르는 구 미합중국 남부 주들이 평화유지군의 통제 아래 놓였다고 선언했습니다. 그는 최근 기자회견에서 이 병력들이 남아 있는 반군 세포와 극단주의 집단을 진압하기 위해 활동 중이라고 밝혔습니다.\n30분 동안 이어진 질의응답에서 AP 기자들은 이 지역의 통치 문제를 질문했습니다. 사령관은 "우리는 통제하에 있는 주들에 질서와 평화를 회복하기를 기대하고 있습니다"라고 말했습니다. "우리는 다른 주 정부들과 긴밀히 접촉하고 있으며, 그들의 권력을 임무단에 이양하기 위한 협상을 진행하고 있습니다."\n\n그는 "우리 평화유지군의 역량은 뛰어납니다"라고 말했습니다. "하지만 자원부대, 현지 집단, 심지어 기업 보안요원 사이의 혼란스러운 지휘 체계가 효과적인 조율 능력을 심각하게 저해하고 있습니다. 그렇기 때문에 우리는 지휘를 중앙집중화하고 더 효율적인 평화유지 임무를 추구하기 위해 유엔군 프로그램을 출범시키는 것입니다."\nUNMIF의 성과가 상당했음에도, 일부 현지 주민들은 미국 내 임무단의 존재를 여전히 회의적으로 바라보고 있습니다. 그들은 내전이 끝난 뒤에도 외국 세력이 자신들의 삶을 통제할 것을 두려워하고 있습니다."
lra.3.a: "이 주들은 다시 한 번 하나가 될 것이다."

lra.4.t: "윈우드 월스 학살"
lra.4.desc: "유엔 평화유지군이 마이애미에 상륙한 직후, 한때 도시를 지배하던 마피아는 빠르게 진압되었고, 미 본토 최남단의 대도시는 평화유지군의 첫 작전 기지가 되었습니다. 그러나 제한된 인력 탓에 평화유지군은 마이애미-포트로더데일 광역권의 도심부와 간선도로 이상을 통제할 수 없었습니다. 전선의 틈을 이용해 극우 '가속주의' 단체인 아톰바펜 사단은 방어가 약하거나 전혀 없는 동네를 끊임없이 괴롭혔습니다.\n\n그처럼 방어가 약한 정착지 중 하나가 95번 주간고속도로 근처에 위치한 윈우드였습니다. 이곳은 활기찬 예술, 패션, 오락 시설로 유명했습니다. 해가 지자, 아톰바펜 전투원들은 95번 주간고속도로의 유엔 방어선을 몰래 지나 윈우드를 유린했습니다. 인력 부족에 시달리던 평화유지군은 이 지역을 확인하기 위해 병력을 파견하는 데 어려움을 겪었습니다. 현장에 도착한 평화유지군은 아톰바펜 전투원들과 교전을 벌였고, 얼마 지나지 않아 그들이 퇴각하자 피해를 확인하게 되었습니다. 손전등 빛에 드러난 광경은 참혹했습니다. 처형된 민간인의 시신이 곳곳에 흩어져 있었고, 한때 벽을 채웠던 생생한 색채는 흘러내리는 피로 바뀌었으며, 주변 사람들의 비명은 병사들의 고막을 찢었습니다.\n\n전투원들은 멀리 도망가지 못했고, 결국 사살되거나 체포되었습니다. 그러나 몇몇 전투원들이 고문당한 뒤 즉결 처형되었다는 사실도 드러났습니다. 평화유지 본부는 기자회견에서 전범들이 재판을 받게 될 것이라고 밝혔지만, 방어를 강화하고 또 다른 학살을 막기 위해 증원군을 승인하려면 안전보장이사회의 승인이 필요하다고 말했습니다. 사령관은 테러리스트들이 그들의 범죄에 대한 대가를 치르게 하겠다고 맹세하며 연설을 끝맺었습니다."
lra.4.a: "우리는 대체 어떤 지옥에 떨어진 거지?"

#Antonio explodes
lra.5.t: "오염"
lra.5.desc: "플로리다에서의 평화유지 작전이 점차 마무리되면서, UNSMIF는 두 번째 단계인 재건에 들어섰습니다. 앞으로 기념비적인 과제가 놓여 있지만, 플로리다의 평정은 축하와 소통 모두를 위한 훌륭한 기회였습니다. 유엔이 자신들의 진전에 자부심을 느낄 기회였고, 다른 이들이 유엔을 우러러볼 기회였습니다. 기념식에서 UNCHR은 인권을 전쟁 전 기준과 대체로 비슷한 수준으로 회복한 평화유지군을 치하했지만, 플로리다 밖의 상황에는 즉각적인 관심이 필요하다고 인정하며 현재 진행 중인 내전을 "중대한 인도주의 위기"라고 불렀습니다.\n\n이어서 재건을 담당하는 전문가와 위원단이 마이애미를 포함한 플로리다의 모든 주요 도시가 처한 심각한 상황을 설명했습니다. 여러 도시는 안전한 식수, 의약품, 심지어 식량 부족으로 인해 지역 전염병에 직면해 있습니다. 전문가들은 도심뿐만 아니라 미국 교외 지역에도 번영을 회복하기 위해, 재건 노력을 도시에서 바깥으로 확산시키겠다는 계획을 발표했습니다.\n\n마지막으로 연단에 선 이는 안토니우 구테흐스 사무총장이었습니다. 연설에 앞서 구테흐스는 대의를 위해 목숨을 잃은 이들을 위해 묵념을 요청했습니다. 바로 그 순간, 알 수 없는 인물이 좌석에서 일어나 무기를 드러내고 즉시 연사와 청중을 공격하기 시작했습니다. 허를 찔린 보안 병력의 대응은 귀중한 몇 초 동안 지연되었고, 그 틈에 공격자는 현장에서 사살되기 전 여러 개의 폭발물을 던질 수 있었습니다."
lra.5.a: "맙소사, 이번엔 또 뭐야?!"

#Choice event for politics via 'What are we now?'
lra.6.t: "유엔이 서 있는 곳"
lra.6.desc: "안토니우 구테흐스가 사망했습니다. 그와 함께 기자, 민간인, 경비원을 포함한 12명이 목숨을 잃었습니다. 공격자의 소지품에서 아톰바펜 사단의 선언문인 "공성전" 사본이 발견되면서, 그가 현지 테러리스트와 연관되어 있음이 밝혀졌습니다. 어떻게 된 일인지 범인은 우리의 보안 조치를 빠져나갔습니다. 인력 부족 때문이었을 수도 있고, 더 나쁘게는 우리 대열 안의 자산이 오염되었기 때문일 수도 있습니다.\n\n어떻게, 언제, 왜 그런 일이 벌어졌든, 안토니우 구테흐스의 죽음은 비극일 뿐만 아니라 전 세계 수천, 아니 수백만 명 앞에서 우리의 임무를 굴욕스럽게 만들었습니다. 모습을 드러내기 시작했던 희망의 빛은 다시 한 번 먹구름에 가려졌고, 또다시 폭풍이 몰려오는 것처럼 보입니다. 하지만 우리는 그 희망을 그렇게 쉽게 놓아버리기에는 너무 멀리 왔습니다. 이는 유엔 내부의 많은 이들, 특히 사무부총장 아미나 J. 모하메드의 생각이었습니다. 윌키 D. 퍼거슨 주니어 법원에서의 참극이 벌어진 지 하루 만에, 모하메드는 실제 투표가 가능해질 때까지 임시 사무총장직을 승계한다고 발표했으며, 임무는 여기서 멈추지 않을 것이라고 밝혔습니다.\n\n비공개 장소에서 아미나는 유엔과 평화유지군에 대한 희망과 신뢰를 회복하기 위한 연설을 했습니다. 그녀는 "어려운 세계 속에서 우리는 실패가 모든 인류의 선을 위한 투쟁을 멈추게 해서는 안 됩니다"라고 말했습니다. 새 사무총장은 안토니우 구테흐스가 살아서 이루지 못한 일을 끝마치겠다는 뜻을 밝혔습니다. 혼돈에 평화를 가져오고, 절망에 희망을 가져오는 일입니다."
lra.6.a: "이번에는 그렇게 쉽게 멈추지 않을 것이다."

lra.9.t: "미국 해적의 부상"
lra.9.desc: "플로리다 유엔 임무단 보고서 #039 '미국 내전 해적 행위'\n\n미국 내전 발발과 플로리다 유엔 임무단 창설 이후, 우리는 인도주의 물자가 배급소에 도착하기 전에 무장한 개인, 도적 집단, 그리고 지역적으로 강력한 네오나치 테러 준군사조직인 '아톰바펜 사단' 구성원들에게 약탈당하고 습격당했다는 보고를 받아 왔습니다.\n\n그러나 최근 포트로더데일과 노스팜비치의 구호 배급소에서는 보급 호송대가 해안에 도착하지도 못한 채 완전히 실종되었다고 보고하기 시작했습니다. 마찬가지로 해안가의 민간인과 평화유지군은 고무보트, 요트, 모터보트, 심지어 USCG 소유였던 도난 RHIB까지 온갖 선박이 대형 화물선에 접근해 승선하는 것을 보고했으며, 이들은 물자를 빼앗으려 한 것으로 보입니다. 한 보고에 따르면 그런 승선 과정에서 총성이 들렸다고 합니다.\n\n우리가 확보한 증거에 따르면, 여러 집단이 작지만 빠른 보트 함대를 모아 플로리다 해안, 잠재적으로는 멕시코만 더 깊은 곳에서도 해적 행위를 벌이고 있다고 추정해도 무리가 없습니다. 정보에 따르면 이들은 더 큰 선박을 '모선'으로 사용하고 있으며, 이 선박들은 수송선을 찾기 위해 해상을 순찰하고 화물을 내려놓는 거점으로 활용됩니다. 이는 10여 년 전 아프리카의 뿔 지역에서 목격되었던 양상을 떠올리게 합니다.\n\n우리 보급선과 인도주의 구호 활동을 방해하는 만연한 해적 위협에 대응하기 위해, 유엔이 멕시코만, 카리브해, 대앤틸리스 제도에 해군 주둔을 확립해야 할 필요성은 분명합니다. UNMIF는 제공 가능한 모든 국가로부터 평화유지 전함 함대를 모아야 합니다. 그래야-\n"해적이라고? 여기 미국에서? 대체 지금이 몇 세기야?!"\n"이건 최대한 빨리 처리해야 합니다."\n"좋아, 연락을 돌려. 제네바에 연결해.""
lra.9.a: ""오랜 친구들에게 연락해 보지.""

lra.10.t: "검은 안개"
lra.10.desc: "태양이 떠오르자 평화유지군과 민간인들은 저마다 새로운 삶을 살아가기 시작했지만, 유엔 평화유지군이라는 점령군과 한때 이곳을 고향이라 불렀던 미국인들 사이의 의심스러운 공기는 여전히 남아 있었습니다. 인근의 여러 부대에는 '아톰바펜 사단'이라는 위험한 극단주의 조직과 협력한 혐의가 있는 용의자들의 집을 급습하라는 명령이 내려졌습니다. 이 작전으로 여러 명이 체포되었지만, '데번 아서스'의 집에서 압수된 물품을 통해 분쟁과 조직 자체에 관련된 영상과 기타 혐오스러운 파일들이 드라이브에서 발견되었습니다. 유엔 경찰이 그를 심문했을 때, 그는 놀라울 정도로 협조적이었고 윈우드 월스 학살에 관여한 것을 후회하는 듯 보였습니다. 아서스는 아톰바펜 사단이 위험하다고 반복해서 말했고, 그 학살이 자신이 이탈한 이유라고 밝혔습니다.\n\n증거물을 다루던 평화유지군 일부는 사단 구성원 한 명이 제복을 입고 선글라스와 상징적인 해골 마스크로 정체를 가린 채 등장하는 생방송 영상을 발견했습니다. 방이 조용해지자 영상이 재생되었고, 남자는 거의 알아들을 수 없을 정도로 횡설수설했습니다. 방 밖에서는 사이렌과 두드리는 소리가 들렸습니다. 그는 권총을 휘두르며 카메라에 대고 소리쳤고, 점점 이성을 잃어 갔으며, 결국 카메라를 붙잡아 돌렸습니다. 방 안의 평화유지군은 공포와 고통 속에서 젊은 여성과 나이 든 여성이 서로 웅크린 채 쓰러져 있는 시신을 목격했습니다. 누군가가 안으로 침입하려는 듯 두드리는 소리는 훨씬 커졌고, 곧 문 밖의 누군가와 남자 사이에 총격전이 시작되었습니다. 총격전이 시작된 지 거의 1분이 지났을 때, 시간도 선택지도 다한 채 명백히 공황에 빠진 그는 총구를 자신에게 돌렸습니다.\n\n그들이 싸우고 있는 적은 신념만 광신적인 것이 아니라, 제정신이 아니라는 것도 분명했습니다. 뒤쪽에서 한 사람이 말했습니다:"
lra.10.a: ""주여, 우리에게 힘을 주시고 이 악에서 구하소서...""

lra.11.t: "귀중한 화물"
lra.11.desc: "평화유지군이 팜비치에 도착하고 마이애미시를 확보한 순간부터, 1970년대까지 거슬러 올라가는 우리의 구식 장비는 플로리다의 평화를 확보하는 임무 수행 능력을 제약해 왔습니다. 우리의 군수 상황은 충격적일 만큼 암울했습니다. 우리는 유럽 지도자들과 비밀 협상을 시작했고, 그 결과 북대서양 조약기구의 잔존 세력으로부터 새로운 수송품이 들어오게 되었습니다. 독일 장갑차, 프랑스 항공기, 영국 장비, 튀르키예 드론, 그리고 다른 많은 회원국들이 남부 플로리다 유엔 임무단에 군사 장비를 기여하고 있습니다.\n\n우리는 지역 미국 세력들을 자극하지 않기 위해 협상을 비밀리에 유지했습니다. 그들은 서로 싸우느라 정신이 없거나, 이 지역의 평화유지군에 직접 맞서고 있기 때문입니다. 이러한 수준의 비밀주의는 일부 참모진 사이에 혼란과 도착 일정의 문제를 낳았지만, 마이애미 항구를 지키는 많은 평화유지군은 이 수송품을 새롭고 진보한 장비라는 이유로 '귀중한 화물'이라 부르고 있습니다. 항구 자체는 허가받지 않은 사람이 구역을 떠나지 말라는 표지판이 세워진 제한구역으로 여겨졌지만, 그것이 사람들이 하역 중인 대형 화물선 사진을 찍는 것을 막지는 못했습니다. 안타깝게도 최근 현지 주민이자 동조자인 저스틴 애드킨스를 급습하는 과정에서 밝혀진 바에 따르면, 이 선박들의 이미지는 아톰바펜 사단과 연계된 온라인 포럼에 퍼지기 시작했으며, 그는 막대한 온라인 지지를 등에 업고 가능한 모든 현지 세력에게 항구에 정박한 선박을 습격하라고 촉구하고 있었습니다. 일요일 경찰청장 파이살 샤카르와의 회견에서 그는 이 지역에 통금령이 시행될 것이며, 통금령을 위반하는 사람은 누구든 구금될 것이라고 발표했습니다."
lra.11.a: "절박한 때에는 절박한 조치가 필요하다."

lra.12.t: "라 라사의 종말"
lra.12.desc: "태양이 마이애미를 비추기 직전, 평화유지군 분견대는 인도주의 구호와 자원봉사자들이 지나갈 길을 확보하기 위해 도시 경계와 주변 지역에 조용히 배치되었습니다. 간단한 군중 통제 임무를 예상한 지휘관들은 주민들에게 배급할 식량과 의약품을 먼저 하역하기로 했지만 마이애미 항구 동쪽에서 뜻밖의 총성이 들렸습니다.\n\n평화유지군은 포위당했지만, 침입자들을 성공적으로 막아내며 시간을 벌었고, 그 덕분에 화물선 중 한 척에 탑승한 평화유지군이 남아프리카공화국에서 공수된 IFV 라텔(Ratel)로 교착 상태를 타개할 수 있었습니다.  중장갑 전투차량에 맞설 방법이 없었던 매복자들은 현장에서 도주했습니다. 전투 후 평가 결과 그들은 '라 라사'라는 현지 범죄 조직과 관련이 있는 것으로 드러났습니다.\n\n현지 경찰서의 도움으로 평화유지군은 이 조직과 관련된 여러 주택을 표적으로 삼아 급습할 수 있었고, 그중에는 공격의 주동자로 여겨지는 살바도르 루이스의 집도 포함되어 있었습니다. 그의 집 주변에서, 라 라사의 구성원들에게 항복을 종용하려다 실패한 후 격렬한 총격전이 벌어졌습니다. 얼마 지나지 않아 라 라사의 머리는 몸통에서 떨어졌고, 구더기들이 들끓는 것을 막기 위해 그 시체는 압수되었습니다.\n\n살바도르 루이스가 사라지자 마이애미 도심에는 질서가 성공적으로 회복되었습니다. 한때 공포에 떨던 현지 주민들과 임무단 지휘관들은 마침내 조폭들이 더 이상 이 도시를 지배하지 않는다는 사실을 알고 제대로 잠을 잘 수 있었습니다."
lra.12.a: "공포의 바다 속 한순간의 평화."

lra.13.t: "제네바의 비 오는 날"
lra.13.desc: "스위스 제네바의 비 오는 날입니다. 전 세계적 정치 불안정과 경제 침체 속에서도 로망디의 이 국경 도시는 여전히 평온과 번영에 둘러싸여 있습니다. 대부분의 기업과 현지 주민들에게는, 이 중립 도시를 본부로 둔 많은 국제기구들과 마찬가지로 평소와 다름없는 업무가 이어지고 있습니다. 단 한 곳만 제외하면 말입니다.\n\n이제 유엔의 임시 수도로 전용된 WHO 본부에서는, 유엔 평화유지군이 마이애미 본토 대부분에 상륙해 확보했다는 갑작스러운 소식에 대표들이 충돌하며 회의실을 긴장된 분위기가 뒤덮었습니다.\n\n분노한 러시아 대표는 선언했습니다. '이것은 결의안 2578호에 대한 노골적인 위반입니다! 회원국들의 목소리를 이런 식으로 무시하는 것은 유엔의 온전성과 그것이 지키는 원칙 자체를 훼손하는 일입니다!'\n\n의장의 허가를 받아 중국 대표가 뒤를 이었습니다. '안전보장이사회는 미국 문제에 대한 어떠한 개입도 승인하지 않았습니다. 우리는 국제 절차를 준수하여 모든 병력의 즉각 철수를 요구합니다.'\n\n영국과 프랑스 외교관들은 이 평화유지군에 어떤 명령도 내리지 않았고 그들의 행동을 통제할 수 없다고 주장했습니다. 그러나 이어서 그들은 마이애미에 추가 평화유지군을 상륙시켜 현지 부대의 철수를 강제하는 결의안에 거부권을 행사했습니다. 격렬한 논쟁이 벌어졌고, 남은 대표들은 빠르게 편을 갈랐습니다. 그러나 미국 대표는 뉴욕시에 고립되어 떠날 수 없었기 때문에 불참했습니다.\n\n먹구름이 걷히고 비가 그치자, 햇빛이 다시 한 번 제네바 위로 비쳤습니다. 이제 텅 빈 회의실 안으로 빛줄기가 쏟아지는 가운데, 개입에 반대하던 대표들은 긴급 전화를 받았습니다:"
lra.13.a: "당신의 유엔 임무는 끝났습니다."

#The Military Staff Committee
lra.14.t: "군사참모위원회"
lra.14.desc: "현재 유엔은 유엔 헌장에 따라 상비군을 편성할 수 없습니다. 따라서 우리의 평화유지 임무는 인력과 군사 장비 모두에서 전적으로 회원국들의 자발적 기여에 의존합니다. 지금까지 이 지원은 플로리다 개입 동안 충분했으며, 회원국의 지원은 주에 대한 통제력을 행사하기에 충분했습니다.\n\n그러나 세계는 날마다 더 불안정해지고 있습니다. 이러한 임시 지원에 대한 의존은 한계를 드러내고 있습니다. 우리는 동시에 모든 곳에 있을 수 없으며, 국가들은 현상 유지의 붕괴를 이용하면서 지원을 철회하거나, 이웃 국가의 공격을 받을 수도 있습니다. 변화가 없다면 인력과 외국 군사 지원이 고갈되면서 우리의 임무는 곧 점점 더 큰 어려움에 직면하게 될 것입니다.\n\n이에 대응하여 안전보장이사회 상임이사국 5개국 대표들로 구성된 군사참모위원회가 긴급 회의를 소집했습니다. 그들의 제안은 제43조를 폐지하고, 참전용사부터 민간인에 이르는 국제 자원자와 미국 시민을 기반으로 유엔 상비군 창설을 승인하는 것입니다. 이 행위가 침략 행위로 보일 수도 있지만, 우리의 임무 성공과 미국에 평화를 되돌리기 위해서는 절대적으로 필요합니다."
lra.14.a: "군대 없이는 평화도 없다."

#Insanity in the Void Left Behind
lra.15.t: "남겨진 공백 속의 광기"
lra.15.desc: "플로리다에서 아톰바펜 사단이 패배한 뒤에도, 일부 잔당과 동조자들은 이전 영토에서 여전히 활동하고 있으며, 제2차 미국 내전의 여러 극우 세력으로 이루어진 광범위한 연합인 '국민전선'과 협력하는 수십 개의 소규모 세포조직으로 흩어져 있습니다. 평화유지군은 지금까지 이 세포조직을 상대로 대체로 성공적인 작전을 수행하여 수십 명을 체포했습니다.\n\n보고된 체포 사례 중 하나는 한 세포조직원이 트럭 지붕에 스피커를 달고 마이애미 도심을 4시간 넘게 돌아다니며 반유엔 선전을 틀었을 때 발생했습니다. 목격자들은 그 스피커에서 '미국 평화유지 캠페인 광고'로 묘사된 음성과 적그리스도의 도래에 대한 장광설이 울려 퍼졌다고 말했습니다. 그 음성에는 "왜 군대에 들어가려 하느냐, 아들아?"라는 물음 뒤에 "-검열됨-하기 위해서입니다, 각하!"와 "살육하고 약탈하기 위해서입니다!"라는 응답이 포함되어 있었다고 합니다. 여기에 백인들에게 '현지 나치에 가입하라'고 외치고, '백인종'에게 '적그리스도의 유대-볼셰비키 세력에 맞선 다가오는 인종 성전'에 대비하라고 촉구하는 고함이 섞여 있었습니다.\n\n그 세포조직원은 맥도날드 드라이브스루에 충돌한 뒤 치안 요원들에게 체포되었습니다. 목격자들은 체포 과정에서 그가 "히틀러가 가장 가까운 맥도날드로 가속하라고 말했다", "나는 히틀러의 최고 부하다", "나는 적그리스도가 싫다" 같은 말을 외쳤다고 보고했습니다. 경찰은 그 '세포' 구성원이 여러 정신 문제를 가지고 있었으며, 그중 주된 문제가 조현병임을 알게 되었습니다."
lra.15.a: "'히틀러의 최고 부하'? 그게 대체 무슨 뜻이지??"

#The Devil's Basement
lra.16.t: "악마의 지하실"
lra.16.desc: "아톰바펜 병력이 완전히 붕괴하고 유엔이 포트마이어스를 점령하자, 도시 안에 자리 잡은 그들의 본부를 급습하는 작전이 승인되었습니다. 체포된 아톰바펜 장교들을 심문해 얻은 위치에 도착하자, 그곳은 도심의 평범한 주거용 건물처럼 보였습니다.\n\nUNPOL은 건물에 돌입했지만, 내부가 그들이 도착하기 전에 이미 깨끗이 지워진 듯 보여 믿기 어려웠습니다. 방을 수색하던 중, UNPOL 장교 한 명이 침실에 설치된 조잡한 산탄총 부비트랩에 부상을 입었습니다. 다행히 그는 살아남았고 건물 밖으로 안전하게 후송될 수 있었습니다.\n\n구석구석을 뒤졌음에도 건물은 거의 흠잡을 데 없이 깨끗해 보였습니다. 가끔 여기저기 부비트랩이 있을 뿐이었습니다. 장교들이 포기하려던 순간, 한 명이 방 하나 안에 숨겨진 지하실을 발견했습니다. 그들이 내려가자, 반응하기도 전에 끔찍한 냄새가 그들을 덮쳤습니다. 한 남자가 구역질하며 뒤로 비틀거렸고, 다른 한 명은 동료들이 붙잡기도 전에 계단 위에서 쓰러졌습니다. 동료들은 그를 곧장 신선한 공기가 있는 곳으로 대피시켰고, 건물 전체가 격리되었습니다.\n\nUNPOL 장교들은 지역 주변에 경계를 세우고 화학 및 생물전 전문가들을 호출했습니다. 안에 무엇이 있든, 심약한 자가 볼 만한 것은 아니었습니다."
lra.16.a: "봉쇄해. 전문가들을 불러."

#Corrupted Veins
lra.17.t: "오염된 혈관"
lra.17.desc: "UNPOL CBRN 위협부대가 투입됩니다. 그들의 방독면은 헐렁하고 후드가 달린 점프슈트에서 튀어나와 있으며, 모두 각자의 업무 분야에서 마주할 요소들로부터 그들을 보호하도록 설계되어 있습니다. 일부는 금속 장비와 화학 탐지기를 달고 있었고, 다른 이들은 소총, 공성추, 섬광탄, 테이저를 들고 있었습니다.\n\n그들은 아톰바펜 사단 본부 현장에 도착해 지하실로 진입했고, 불과 몇 층 위에서 발견된 지뢰 같은 장치가 더 있는지 경계했습니다. 네 명으로 구성된 팀이 계단을 따라 지하로 내려가자, 손전등 빛이 천장에서 내려앉은 짙은 먼지를 비췄습니다. 요원들은 지하실을 매끄럽게 통과하며 방을 정리하고, 함정과 존재할 수 있는 모든 종류의 화학제를 확인했습니다. 모두 안전하다는 것을 확인한 뒤, 그들은 조사를 시작했습니다.\n\n한 방은 부대의 특별한 관심을 끌었습니다. 그 안에는 접이식 의자와, 그 위에 앉은 움직이지 않는 창백한 남자가 있었습니다. 그의 오른팔은 팔꿈치 아래쪽부터 근처 탁자 위에 놓여 있었고, 권총은 그의 오른손의 축 늘어진 손가락 사이에 무심히 놓여 있었습니다. 방은 도색되지 않았고 사방이 우울한 회색이었지만, 남자의 머리 일부가 약간 어둡게 변한 채 그의 왼쪽 벽 전체에 흩어져 있었습니다. 요원들은 남자를 포함해 눈길을 끄는 모든 것을 촬영했습니다. 그들은 정체불명의 결정화된 물질이 든 0.5파운드짜리 포장물을 여러 개 발견했고, 그 사진과 검사할 샘플을 채취했습니다.\n\n팔과 권총 외에도 탁자 위에는 플로리다 지도가 놓여 있었고, 몇 달 전 아톰바펜 부대의 배치가 명확히 표시되어 있었습니다. 지도 위에 흩어진 흰색 가루 물질을 알아챈 팀원 한 명은 현장 검사 키트를 가져오기 위해 떠났고, 다른 이들은 물질을 모았으며, 또 다른 한 명은 샘플을 위층으로 가져갔습니다. 남은 팀원들은 조명을 끄고 자외선 램프를 켰습니다. 그들은 지하실 전체를 훑었습니다. 예상 밖의 것은 아무것도 드러나지 않았습니다. 벽과 천장에 쇠사슬이 달린 근처 방을 확인하기 전까지는 말입니다. 그곳은 불을 켰을 때보다 더 밝았습니다...\n\n그들은 곳곳에 흩어진 여러 체액의 샘플을 수집했습니다. 이 시점에서는 그것들이 정확히 무엇인지 알 방법이 없었지만, 전망은 좋지 않았습니다."
lra.17.a: "대체 여기서 무슨 일이 벌어진 거지..?"

#Burning Lot
lra.18.t: "불타는 주차장"
lra.18.desc: "빨간색과 파란색 경광등을 단 무겁고 흰 MRAP들이 사우스뱅크 호텔 주차장으로 굴러 들어왔습니다. 건물의 파란색과 흰색 배색은 도착한 UNPOL 부대 안의 그리스인들에게 고향을 떠올리게 했을지도 모릅니다. 불탄 창문과 쓰레기 더미의 불, 곳곳의 차량 잔해만 아니었다면 말입니다. 무장 경찰은 차량에서 기어나와 소총의 총구를 사방으로 향한 채 건물 입구와 내부, 호텔 접수대로 이동했습니다.\n\n그들은 바닥 전체에 흩어진 의자와 종이, 쓰레기, 탄피, 피, 총알 구멍을 발견했습니다. 이곳은 MS-13의 거점으로 보고된 곳이었지만, 그들은 아무런 저항도 받지 않고 그들의 왕국의 열쇠였던 곳으로 걸어 들어가고 있었습니다. 그들은 앞쪽의 사무실들을 확인했습니다. 어떤 방은 코카인 보관소로 쓰였습니다. 다른 방의 탁자 위에는 지폐 계수기와 함께 현금이 흩어져 있었고, 아마 2천, 3천 달러 정도가 남아 있었습니다. 분명히 현금이 그들이 챙길 수 있던 전부였던 것입니다. UNPOL 부대는 계속 이동해 호텔의 헬스장 구역으로 돌입했습니다.\n\n헬스장 구역에서 그들은 운동기구라고 할 만한 것을 거의 찾지 못했습니다. 벽을 따라 피트니스 매트가 한 줄로 놓여 있었고, 다양한 인종의 여성들이 그 위에 누워 있었습니다. 대부분은 멍이 들어 있었고, 마른 마스카라가 뺨을 뒤덮고 있었으며, UNPOL이 자신들의 '거주 공간'에 돌입하는 모습과 소리에 비명을 지르며 얼굴을 가렸습니다. 헬스장 입구 옆에는 바인더가 놓인 연단이 있었고, 한 장교가 그것을 살펴보러 갔습니다. 그 바인더는 일종의... '카탈로그'였습니다. 여성들 각각의 사진 밑에 가격표가 붙어 있었습니다. 고객은 하룻밤 비용을 지불했고, 호텔 객실은 그들을 '수용'했습니다. 특정 구역의 방들은 깨끗하게 유지된 반면 다른 방들은 썩어가도록 방치된 것을 보면 분명했습니다.\n\nUNPOL 장교들이 들어섰고, 의무요원들은 여성들의 부상을 확인했습니다. 대부분은 부상을 입고 있었습니다. 심문을 받자 그들은 이틀 전 모두가 헬스장으로 옮겨져 문이 잠겼다고 말했습니다. 그들에게 식량도 물도 주어지지 않았지만, 적어도 몇 주 만에 처음으로 그들은 내버려졌습니다.\n"여기서는 아무도 못 찾을 것 같습니다, 각하." 한 장교가 부대 지휘관에게 말했습니다.\n"왜 그렇게 생각하나, 하사?"\n"이런 짓은 겁쟁이들만 합니다. 놈들은 돈을, 챙길 수 있는 전부를 들고 도망쳤습니다."\n"오래 도망치지는 못할 거다, 하사.""
lra.18.a: ""알겠습니다.""

