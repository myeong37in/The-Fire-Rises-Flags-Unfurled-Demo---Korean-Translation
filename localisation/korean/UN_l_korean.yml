#READINESS DECISIONS
LRA_survey_the_battlefield: "전장 조사"
LRA_survey_the_battlefield_desc: "임무단이 확신을 가지고 전진하려면, 먼저 자신들이 진입할 분열된 지형을 이해해야 합니다. 현장 보고, 경로 약도, 항공 정찰을 종합하여 플로리다 전쟁의 모습을 더 명확하게 그려낼 것입니다."
LRA_coordinate_local_informants: "현지 정보원 조율"
LRA_coordinate_local_informants_desc: "난민, 경찰 연락책, 탈주자, 겁에 질린 민간인들은 저마다 무언가를 알고 있습니다. 그 목소리들을 쓸 수 있는 정보로 엮어내는 일은 느리고 불확실하지만, 다음 작전이 시작될 때 생명을 구할 수 있습니다."
LRA_preposition_fuel_and_ammunition: "연료와 탄약 사전 배치"
LRA_preposition_fuel_and_ammunition_desc: "선두 부대가 자신의 보급선을 앞질러 버린다면 어떤 공세도 성공할 수 없습니다. 전선이 움직이기 전에 비축 물자를 배치하고, 임무단의 부족한 수송 수단을 정리해야 합니다."
LRA_secure_relief_corridors: "구호 회랑 확보"
LRA_secure_relief_corridors_desc: "보호된 모든 구호로는 미래의 진격로이기도 합니다. 지금 구호 회랑을 안정화함으로써, 임무단은 이후 더 깊은 작전을 위한 토대를 마련합니다."
LRA_rehearse_joint_entry_drills: "합동 진입 훈련 실시"
LRA_rehearse_joint_entry_drills_desc: "다국적 병력, 현지 보조 병력, 인도주의 호송대는 하나처럼 움직이는 법을 익혀야 합니다. 임무단이 지금 더 많이 훈련할수록, 전투에 끌고 들어갈 혼란은 줄어들 것입니다."
#OFFENSIVE DECISIONS
LRA_launch_offensive_operation: "공세 작전 개시"
LRA_launch_offensive_operation_desc: "임무단은 더 이상 제자리에 묶여 있을 수 없습니다. 예비대를 집중시키고 일시적인 공세 태세를 강제함으로써, 비록 한동안일지라도 주도권을 장악할 수 있습니다."
LRA_operation_iron_veil: "아이언 베일 작전"
LRA_operation_iron_veil_desc: "아톰바펜 조직원들과 군벌들은 혼란, 공포, 그리고 우리 전선 깊숙한 곳에 숨겨진 거점을 먹고 삽니다. 이 작전은 그들이 재집결하거나 플로리다의 도시 난개발 속으로 사라지기 전에 집중된 무력으로 타격하기 위해 설계되었습니다."
LRA_operation_statebreaker: "스테이트브레이커 작전"
LRA_operation_statebreaker_desc: "플로리다 정부의 남은 기구는 체계적으로 분쇄되어야 합니다. 이 작전은 조직화된 주 정부 저항과 여전히 탤러해시에 충성하는 진지들을 상대로 임무단의 힘을 집중할 것입니다. 폭군은 쓰러질 것입니다."
#CITY DEADLINE MISSIONS
LRA_fort_myers_deadline: "포트마이어스 확보"
LRA_fort_myers_deadline_desc: "임무단이 기세를 보여주고 극단주의자들이 걸프 해안에 거점을 마련하지 못하게 하려면, 포트마이어스는 빠르게 함락되어야 합니다."
LRA_orlando_deadline: "올랜도 확보"
LRA_orlando_deadline_desc: "올랜도의 갈라진 거리를 경쟁하는 총잡이들에게 오래 내버려둘 수는 없습니다. 도시가 오래 분쟁 상태로 남을수록, 임무단은 결단력 있는 세력이 아니라 반응만 하는 세력처럼 보이게 됩니다."
LRA_tampa_deadline: "탬파 확보"
LRA_tampa_deadline_desc: "탬파의 항구와 도심은 더 넓은 전역에 필수적입니다. 이곳에서의 지연은 기세와 국제적 평판뿐만 아니라, 임무단의 군수적 미래까지 위협합니다."
LRA_jacksonville_deadline: "잭슨빌 확보"
LRA_jacksonville_deadline_desc: "잭슨빌은 관문 도시입니다. 임무단이 제때 이곳을 확보하지 못한다면, 북쪽을 향한 야망은 아군과 적군 모두에게 공허하게 보이기 시작할 것입니다."
LRA_tallahassee_deadline: "탤러해시 확보"
LRA_tallahassee_deadline_desc: "탤러해시의 함락은 플로리다에서 조직화된 주 권위의 마지막 명분을 무너뜨릴 것입니다. 그때까지 이 전역은 끝나지 않은 채로 남아 있을 것입니다."

