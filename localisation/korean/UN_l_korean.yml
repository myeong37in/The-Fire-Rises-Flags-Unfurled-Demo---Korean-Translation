#LIGHT TANKS
LRA_light_tank_equipment_1: "FV101 스콜피온 90"
LRA_light_tank_equipment_1_short: "스콜피온 90"
LRA_light_tank_equipment_1_desc: "FV101 스콜피온은 영국의 장갑 정찰차량이자 경전차입니다. 알비스가 제작한 7종의 CVR(T), 즉 궤도식 전투차량 정찰 계열에서 선도 차량이자 화력지원형으로 운용되었습니다."
LRA_light_tank_equipment_2: "B1 센타우로"
LRA_light_tank_equipment_2_short: "센타우로"
LRA_light_tank_equipment_2_desc: "1980년대 이탈리아 기업 컨소시엄이 개발한 센타우로는 레오파르트 1 주력전차에 맞먹는 화력을 지니면서도 빠르고 기동성 있는 구축전차를 요구한 이탈리아 육군의 필요에 대응했습니다. 센타우로는 8륜 차체에 105mm 포를 탑재했습니다. 최종 시제차량은 1986년에 공개되었고, 1993년에 마침내 평화유지 임무에 투입되었으며 이후 세계 여러 분쟁에서 활약했습니다."
LRA_light_tank_equipment_3: "루이캇 중형포탑 기술실증차"
LRA_light_tank_equipment_3_short: "루이캇 MTTD"
LRA_light_tank_equipment_3_desc: "루이캇 차체를 기반으로 원격 포탑에 장착된 자동장전장치의 가능성을 시험하기 위해 제작된 시제차량입니다. 장전수와 차장 위치는 차체 안으로 내려갔고, 포탑에는 포와 자동장전장치 버슬만 남았습니다. 포탑 위에는 능동방호체계용 모의 발사기도 설치되었지만, 유엔 평화강제 개발위원회 아래에서 실제 작동에 필요한 장비는 장착되지 않았습니다."
LRA_light_tank_equipment_4: "유엔 미래 전투지원차량"
LRA_light_tank_equipment_4_short: "UN-FCSV"
LRA_light_tank_equipment_4_desc: "원래 냉전기 미국에서 AAI 코퍼레이션이 제작한 HSTV-L로 생산되었습니다. 이후 미국 내 평화유지 작전을 지원하기 위해 유엔 미래 전투지원차량, 즉 UN-FCSV 프로그램 아래에서 개발되었습니다."
LRA_light_tank_equipment_5: "FCS XM1201"
