######################################################
#STUFF BELONGING TO OTHER NATIONS
######################################################
USA_side_with_resistance_tooltip: "정상으로의 복귀를 위해 §C바이든§!의 편에 서십시오!\n다음 세력으로 플레이할 수 있습니다: \n- @USB §Y[USB.GetName] (바이든)§!\n- @APA §Y[APA.GetName]§!\n- @PTF §Y[PTF.GetName]§!\n- @NSM §Y[NSM.GetName]§!\n- @ATW §Y[ATW.GetName]§!\n- @UNN §Y$LRA_social_liberal$§!\n§Y$party_popularity_dynamic_modifier$§! 변동치는 $social_liberal_color_name$ 정당에 대응됩니다"
play_UN_tooltip: "§Y유엔§!\n---------------\n\n\n\n\n£GFX_LRA_path_banner\n\n\n\n\n\n§g인류 역사상 그 어느 때보다, 우리는 공동의 운명을 나누고 있습니다.\n\n태양이 아침을 맞이하고\n강물이 바다로 흘러가듯\n인류를 위한 새날이 밝아오니\n우리 아이들은 당당하고 자유롭게 살아가리라\n\n깃발을 펼친 유엔이 행진한다\n승리를 위해 함께 싸워라, 자유로운 신세계를 위하여!§!\n\n§R내전§!이 시작되면 §Y유엔§!으로 플레이하십시오!"
usa.105.z: "더 나은 세계를 위하여!"

USA_country_paths: "\n\n\n§Y국가 경로§!:\n- §3아메리카 연합§!\n- §C미국 헌법정부§!\n- §A미국 인민해방군§!\n- §P패트리어트 전선§!\n- §n국가사회주의 운동§!\n- §a아톰바펜 사단§!\n- §B플로리다 유엔 임무단!"
USA_country_other: "\n\n\n§Y팁과 요령:§!\n피할 수 없습니다"
######################################################
#SUMMARY
######################################################
LRA_country_summary: "§Y국가 요약§!:\n유엔은 전후 평화를 유지하기 위해 창설된 전 지구적 조직입니다. 유엔은 역사 대부분의 기간 동안 외교 문제의 중심지라는 지위를 유지해 왔으며, 전 세계 국가들 사이의 평화를 중재해 왔습니다. 그러나 이처럼 세계를 아우르는 조직은 전 세계 어느 지역에서든 평화를 안정시키고 보장할 힘 없이는 홀로 설 수 없었습니다. 그런 병사들은 온갖 신념과 국적에서 모여들었지만, 모두가 평화를 가져오기 위해 함께 뭉쳤고, 그들에게는 평화유지군이라는 이름이 붙었습니다.\n\n새천년의 여명이 밝아오자 흐름은 유엔에게 불리하게 바뀌기 시작했고, 전 세계의 정부와 사회는 불과 10년 전까지만 해도 두드러졌던 세계주의적 이상주의를 거부하기 시작했습니다. 관료주의, 예산 삭감, 세계적 회의론이라는 험난한 싸움, 그리고 여러 분쟁에 개입하지 못한 실패는 유엔이라는 조직의 신뢰를 거의 무너뜨렸습니다. 우한에서의 신종 바이러스 소문과 양극화된 세계는 이 조직을 기로에 세웠습니다. 무엇을 선택하든, 유엔은 이 혼돈의 물결 속에서 인류의 목자로서 세계를 이끌어야 할 것입니다.\n\n"우리는 새로운 세계, 훨씬 더 나은 세계, 인간의 영원한 존엄성이 존중받는 세계를 건설해야 합니다.""

LRA_country_paths: "\n\n\n\n\n\n§Y국가 경로§!:\n- §Y평화작전국§!\n- §C안전보장이사회§!"

LRA_country_other: "\n\n§Y팁과 요령:§!\n"전쟁을 통해 평화를 짊어지는 것은 가장 무거운 짐입니다.""
