lra.215.d: "아프리카의 후원국들은 전투 준비를 마친 병력과 첨단 무장을 제공하기 위한 일련의 조치를 승인했습니다. 이 부대들은 교육 수준이 높고, 규율 잡혀 있으며, 경험이 풍부할 뿐만 아니라 여러 단계의 훈련에 참여했던 노련한 지휘관들의 지휘를 받고 있습니다.\n\n남아프리카의 기여는 분명 우리의 평화유지 노력에 대한 그들의 영향력과 관여를 확대할 것입니다. 이것이 평화유지 지휘부에 대한 그들의 통제력을 키우는 일이기는 하지만, 테러리스트와 싸우는 지금 우리에게 정치적 문제를 따질 여유는 없습니다. 남아프리카 병력은 마이애미에서 하역을 마치고 우리의 지휘 구조에 익숙해지는 대로, 불안정과 혼돈에 맞서는 날카로운 창끝으로서 우리 병력에 합류할 것입니다."
lra.215.a: "확인했다."

lra.216.t: "가나 증원군 도착!"
lra.216.d: "아프리카의 후원국들은 전투 준비를 마친 병력과 첨단 무장을 제공하기 위한 일련의 조치를 승인했습니다. 이 부대들은 교육 수준이 높고, 규율 잡혀 있으며, 경험이 풍부할 뿐만 아니라 여러 단계의 훈련에 참여했던 노련한 지휘관들의 지휘를 받고 있습니다.\n\n가나의 기여는 분명 우리의 평화유지 노력에 대한 그들의 영향력과 관여를 확대할 것입니다. 이것이 평화유지 지휘부에 대한 그들의 통제력을 키우는 일이기는 하지만, 테러리스트와 싸우는 지금 우리에게 정치적 문제를 따질 여유는 없습니다. 가나 병력은 마이애미에서 하역을 마치고 우리의 지휘 구조에 익숙해지는 대로, 불안정과 혼돈에 맞서는 날카로운 창끝으로서 우리 병력에 합류할 것입니다."
lra.216.a: "확인했다."

