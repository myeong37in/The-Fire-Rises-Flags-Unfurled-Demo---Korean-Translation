TFR_SUSTAINABLE_CAPITALISM_TT: "§C지속가능 자본주의 모델§!"
TFR_SUSTAINABLE_CAPITALISM_TT_LONG: "지속가능 자본주의 모델은 유엔이 설정한 지속가능발전목표(SDGs)를 달성하는 데 전념하는 자본주의 체제입니다. 유엔은 미국의 오랜 자유시장 경제 역사 때문에 자본주의 모델을 채택했지만, 사회 계층 분열의 강화와 환경 피해 유발 등 전통적 미국 자본주의와 관련된 여러 문제를 피하고자 합니다. 대신 이 모델은 생물다양성 보전과 청정에너지 공급 확대 같은 환경 목표, 기아와 빈곤 퇴치, 모두를 위한 저렴한 의료와 교육 제공 같은 사회 목표를 포함한 SDGs를 지키는 데 전념합니다.\n\n\n\n\n£GFX_ZZZ_Sustainable_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon 소비재 공장 변동치: §Y+25.0%§!\n £GFX_dx_yellow 개인 가치 변동치: §G+20.0%§!\n £GFX_dx_blue 사업 가치 변동치: §R-15.0%§!\n £GFX_dx_yellow 개인 비용: §Y+0.25B§!\n £mil_factory 공장 생산량: §R-2.5%§!\n £dockyard_output_texticon 조선소 생산량: §R-2.5%§!\n £development 월간 빈곤율 개선:  §G+1.5%§!\n £development 월간 사회 발전: §G+1.5%§!\n £development 월간 산업 발전: §G+1.5%§!\n £development 월간 농업 발전: §G+1.5%§!"
