LRA_un_victory_super: "아메리카 위의 푸른 깃발"
LRA_un_victory_super_text: ""유엔은 안정, 안보, 민주주의, 인권, 경제 발전을 증진하는 데 중요한 역할을 맡고 있습니다. 유엔은 역사상 그 어느 때만큼이나 오늘날에도 중요하지만, 개혁이 필요합니다."\n- Chuck Hagel"
LRA_un_victory_super_button: "깃발을 펼치고 행진하라"
LRA_steiner_victory_super: "녹색 여명"
LRA_steiner_victory_super_text: ""우리는 공동의 역사에서 중대한 순간에 서 있습니다. 건강한 행성, 사회적 평등, 모두를 위한 경제적 기회라는 세계적 목표는 손에 닿을 곳에 있습니다. 그러나 우리는 우물쭈물할 수 없습니다."\n- Achim Steiner"
LRA_steiner_victory_super_button: "한 남자의 꿈이 이루어지다"
LRA_lacroix_victory_super: "세계주의가 미국에서 승리하다"
LRA_lacroix_victory_super_text: ""유엔은 인류를 낙원으로 데려가기 위해 만들어진 것이 아니라, 인류를 지옥에서 구하기 위해 만들어졌습니다."\n- Dag Hammarskjöld"
LRA_lacroix_victory_super_button: "'미국주의'의 종말"

LRA_mccain_victory_super: "평화유지군이 미국을 재통일하다"
LRA_mccain_victory_super_text: ""우리가 무력을 사용해야 한다면, 그것은 우리가 미국이기 때문입니다."\n- Madeleine Albright"
LRA_mccain_victory_super_button: "공화국이 다시 행진한다"

LRA_pearce_victory_super: "미국에 질서가 회복되다"
LRA_pearce_victory_super_text: ""규율은 군대의 영혼이다."\n- George Washington"
LRA_pearce_victory_super_button: "평화는 제복을 입는다"

LRA_zouev_prins_victory_super: "감독되는 평화" #Order is Restored in America
LRA_zouev_prins_victory_super_text: ""국가는 국민에게 봉사하는 도구입니다."\n- Kofi Annan"
LRA_zouev_prins_victory_super_button: "자유는 기다려야 한다"

#Third American Revolution
LRA_third_american_revolution_super: "제3차 미국 혁명"
LRA_third_american_revolution_super_text: ""체제는 인간의 필요를 충족시키기 위해 존재하지 않으며, 그렇게 존재할 수도 없다. 오히려 체제의 필요에 맞추기 위해 인간의 행동이 수정되어야 한다."\n- Ted Kaczynski"
LRA_third_american_revolution_super_button: "미국 실험의 종말"

#UN VS WG #War of Two Words, or One World War?
LRA_world_government_war_super: "하나의 세계대전"
LRA_world_government_war_super_text: ""미래는 그저 일어나는 것이 아닙니다. 미래는 우리가 건설하는 것입니다."\n- Klaus Schwab"
LRA_world_government_war_super_button: "통합 대 질서"

#UN VS CHINA, multiple outcomes
LRA_war_with_china_super: "태평양의 결산"
LRA_war_with_china_super_text: ""어떠한 힘도 중국 인민과 중화민족의 전진을 막을 수 없습니다."\n- Xi Jinping"
LRA_war_with_china_super_button: "태평양이 세기를 결정할 것이다"

LRA_war_with_loji_super: "궤도 전쟁"
LRA_war_with_loji_super_text: ""지구는 인류의 요람이지만, 인류는 영원히 요람에 머물 수 없다."\n- Konstantin Tsiolkovsky"
LRA_war_with_loji_super_button: "테라의 결산"

