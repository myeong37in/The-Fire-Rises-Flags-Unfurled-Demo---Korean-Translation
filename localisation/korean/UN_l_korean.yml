#ECONOMY BRANCH, 30 FOCUSES#
############################
clearing_out_the_rubble: "잔해 치우기"
clearing_out_the_rubble_desc: "우리 평화유지군이 미국 남부를 지나 나아가면서, 우리는 전쟁이 인간 발전에 남기는 끔찍한 결과를 직접 마주해야 합니다. 한때 전 세계가 부러워할 공장과 도시를 자랑하던 이 주들은 폐허로 남았습니다. 한때 불가능하다고 여겨졌던 사건들 속에서 공장과 도시가 잔해로 변했고, 그것은 세계의 경찰이라 불리던 나라의 뒷마당에서 일어난 일이었습니다.\n\n평화유지군으로서 우리의 의무는 아메리카에 질서와 평화를 회복하는 데 그치지 않고, 그녀가 다시 일어서도록 하는 것입니다. 그녀의 도시들은 잔해 속에 남겨졌을지 모르지만, 잔해는 주워 더 강하고 튼튼한 벽돌로 다시 만들어 더 나은 토대를 세울 수 있습니다. 우리의 노력이 진정한 평화가 이 땅에 찾아온 순간으로 시대를 넘어 울려 퍼지게 하십시오!"
construct_new_military_complexes: "전쟁 기계 장악"
construct_new_military_complexes_desc: "플로리다주는 언제나 군산복합체의 경이로운 축이었으며, 텍사스와 버지니아 같은 주들과 계약 및 생산 책임을 두고 경쟁했습니다. 우리의 군수 생산 능력은 평화유지군이 현대적 장비와 탄약을 충분히 보급받을 수 있도록 빠르게 전환되어야 합니다. 전쟁 전 미국에서 플로리다는 우주 및 방위 체계 제조에서 2위를 차지했습니다. 우리는 제2차 세계대전 이래 이 주에 강하고 확고하게 자리 잡아 온 기존 군산복합체를 기반으로 삼아야 합니다.\n\n주의 견고한 군수산업을 재전용하여 주 내부에서 평화유지군을 위한 보급품 생산 규모를 확대함으로써, 우리는 최대한의 생산성과 제조 능력을 보장하고 병력이 보급품 부족에 시달리지 않도록 할 수 있습니다. 이에 따라 록히드 마틴과 레이시온처럼 이 주에 기반을 둔 기존 기업 거물들에게는 무기 제조를 위한 독점 계약이 제공될 것입니다."
utilize_useful_civilian_assets: "유용한 민간 자산 활용"
utilize_useful_civilian_assets_desc: "플로리다는 사업이 풍부한 땅입니다. 전쟁 전 이 주는 경제 성장의 견고한 기반과 대체 불가능한 금융 감각을 지닌 전문 시민 계층으로 번성하고 있었습니다. 산업 제조 시설, 군사 인접 차량, 민간 무기 등 민간 자산을 활용하는 것은 우리의 평화유지군이 전투 상황에 대비해 충분히 보급되고 유지되도록 보장하는 데 필수적입니다.\n\n평화유지군에 자산을 제공하려는 민간인들에게 인센티브를 제공함으로써, 우리는 단결과 협력의 감각을 키울 수 있을 뿐만 아니라, 이 지역에 주둔한 우리 병력의 다양한 필요를 동시에 충족시켜 최대 수준의 역량과 안정을 보장할 수 있습니다."
kickstart_domestic_production: "현지 산업 시동"
kickstart_domestic_production_desc: "국제 연대는 국제기구로서 우리의 발전에 있어 근본적인 기둥입니다. 그러나 날이 갈수록 그 기둥을 떠받치는 일은 점점 더 어려워지고 있습니다. 국가들이 관계를 찢어 버리고, 미국의 몰락을 이용해 저마다의 의제를 드러내려 하기 때문입니다.\n\n우리는 군수 생산을 이 불안정한 세계에 의존할 수 없습니다! 미국 남부는 산업 거인이 될 토대를 갖추고 있습니다. 이 공장들이 재건된다면, 우리는 자체 산업으로 무기를 생산할 수 있으며 그 생산량도 훨씬 커질 것입니다."
motivate_workers_of_war: "전쟁 노동자 독려"
motivate_workers_of_war_desc: "제2차 미국 내전의 발발은 미국을 끔찍한 폭력 속으로 떨어뜨렸고, 수백만의 삶을 파괴했으며 그 뒤에 막대한 황폐와 불확실성을 남겼습니다. 이는 플로리다에서 가장 뚜렷하게 드러납니다. 플로리다는 각종 범죄 조직과 아톰바펜 사단의 난동으로 거의 완전히 파괴되었습니다. 이곳 사람들은 완전히 궁핍해졌고, 난민 수용소는 이 내전의 종식과 아메리카의 폐허에 평화와 안정이 돌아오기를 기다리는 사람들로 가득 차 있습니다. 동시에 플로리다의 파괴된 기반시설은 주 밖으로 작전을 수행하는 데 장애물이 되고 있습니다. 기반시설 재건과 관련된 일자리 창출을 장려하고 플로리다의 산업을 재가동함으로써, 우리는 플로리다를 재건하는 일을 통해 이곳 사람들이 삶을 재건하도록 도울 수 있고, 동시에 주 밖으로 힘을 투사하고 작전을 수행할 수단을 구축할 수 있습니다. 이는 결국 이 내전을 끝내고 아메리카에 평화와 질서를 회복하려는 우리의 노력을 주민들이 더 많이 돕도록 고무할 것입니다."
use_our_leverage: "우리의 영향력 활용"
use_our_leverage_desc: "아톰바펜과 여러 갱단이 초래한 폭력으로부터 플로리다를 해방한 우리의 행동은 살아남은 주민들의 감사와 지지를 얻었습니다. 이는 우리를 주민들에게 상당한 영향력을 행사할 수 있는 위치에 놓았고, 아메리카의 질서를 회복하려는 우리의 노력에 큰 도움이 될 것입니다. 우리는 이 영향력을 활용하여 딥 사우스로 진입하는 지속 작전을 더 잘 지원할 자원, 인력, 노동자를 확보할 수 있습니다."
source_foreign_materials: "해외 자재 확보"
source_foreign_materials_desc: "미국 딥 사우스를 지나 진격하면서, 이 지역은 물론 이 나라에서 평화유지군의 지속 작전을 뒷받침할 자원이 충분하지 않다는 사실이 분명해지고 있습니다. 사용할 수 있었던 자원의 대부분은 여러 세력 사이의 전투로 파괴되었습니다. 우리가 미국에서 장기 작전을 유지하려면, 외부 공급원과 다른 국가들로부터 물자를 확보해야 합니다. 유럽, 아프리카, 아시아에서 세계적 긴장이 고조되고 있는 만큼, 해외 물자를 누구에게서 조달할지 신중해야 합니다. 이는 잠재적으로 우리의 공급자들과 지정학적 이해가 충돌하는 경쟁 강대국들을 자극할 수 있기 때문입니다."
flexible_conversion: "유연한 전환"
flexible_conversion_desc: "우리가 재건을 돕는 공장들은 무기, 탄약, 또는 평화유지군을 지원할 일반 보급품을 생산하는 방식이든 가능한 모든 방법으로 우리의 대의를 지원해야 합니다. 물론 이런 생산품은 평화로운 시기에는 쓸모가 없습니다. 안타깝게도 지금은 평화로운 시대가 아니며, 그러한 희생은 치러져야 합니다.\n\n이 보급품 중 다수는 우리 국민과 황폐해진 도시를 지원하는 데도 쓰일 것입니다. 그러나 먼저 우리는 이 도시들이 다시는 전쟁의 표적이 되지 않도록 보장해야 하며, 이를 위해 평화유지군은 그 일을 해낼 수단을 가져야 합니다."
fix_the_logistical_nightmare: "군수 악몽 해결"
fix_the_logistical_nightmare_desc: "군수는 군사 작전의 결정적 요소입니다. 내전은 교통망, 철도, 고속도로를 황폐화시켰고, 필수 보급품을 전선으로 수송하는 과제를 만들어 냈습니다. 이 지원선들을 유지하지 못한다면 향후 작전은 위험에 빠지고 임무의 진전은 더욱 정체될 것입니다.\n\n이를 해결하기 위해 우리는 핵심 기반시설을 재건하고, 병력에 효율적으로 보급품을 분배할 수 있는 보급 거점을 설치해야 합니다. 그렇게 함으로써 우리는 병사들이 항상 장비를 갖추고 전투를 지속할 수 있도록 보장합니다."
implementing_lean_manufacturing: "린 생산 방식 시행"
implementing_lean_manufacturing_desc: "전후 재건이 진행되면서, 린 생산 방식은 작업을 간소화하는 실용적 방법으로 떠올랐습니다. 낭비를 줄이고 효율성을 높이는 일은 플로리다의 전후 재건에 가장 필요한 것이었습니다. 우리는 가장 적은 자재로 최고의 제품을 생산해야 했습니다.\n\n문제는 생산 라인의 개혁에 있습니다. 성공적인 린 생산 방식에는 명확한 리더십, 지속적인 교육, 끊임없이 개선되는 작업 방식이 필요합니다. 우리는 이것을 해낼 힘을 가지고 있지 않습니까?"
expand_the_marta_line: "MARTA 노선 확장"
expand_the_marta_line_desc: "공공 기반시설과 교통은 제한된 자원과 연료의 새로운 세계에서 훨씬 더 큰 힘과 무게를 지닙니다. 특히 자동차 중심 생활양식을 가진 미국에서는, 옛 도로망과 기반시설이 파괴되었거나 사용할 수 없거나 그저 위험해졌고, 휘발유는 민간인에게 희귀한 물자가 되었습니다. 하지만 사회와 일상이 돌아오려면, 우리는 사람들에게 이동할 권리를 허용해야 합니다. 바로 여기서 MARTA 노선이 역할을 하게 됩니다.\n\n우리의 가장 큰 도시 중심지 중 하나가 애틀랜타인 만큼, 우리는 기술적 전문성을 활용해 도시 대중교통 기반시설을 복구하고, 어쩌면 확장까지 해야 합니다. 지역 주민들에게는 정상으로 돌아가는 한 걸음, 지역 경제에는 도움의 줄, 현지인들에게는 또 다른 노동의 원천이 될 MARTA 노선은 공공교통에 대한 우리의 새로운 집중을 시작하게 할 것이며, 동시에 민간 인구의 연료 소비와 수요를 낮춰 우리가 가장 중요한 곳에 연료를 사용할 수 있도록 도울 것입니다."
temporary_war_economy: "임시 전시경제"
temporary_war_economy_desc: "우리가 조직으로서 마주하고 싸워 온 다른 모든 분쟁과 마찬가지로, 장비, 탄환, 무기의 중요성은 아무리 강조해도 지나치지 않습니다. 우리가 인력에서 부족했던 것은 언제나 기술적, 전략적 우위로 메워 왔습니다. 하지만 이번에는, KKK, 갱단, 심지어 현지 주 정부 같은 집단들이 존재하는 혼돈과 무규제 전쟁의 시대 속에서, 우리의 비축품은 제한적이고 임시방편에 불과합니다. 모든 탄환과 총이 계산될 수 있다 해도, 전쟁은 그럼에도 비용이 많이 들고 소모적인 작전입니다.\n\n우리의 근본 원칙에 반하더라도, 병력이 탄약 없이 싸우는 일이 없도록 하기 위해 우리는 일정한 권위주의적 감각을 사용해야 할 것입니다. 산업 시설, 작업장, 창고를 접수하여 끊임없는 생산 주기에 투입할 것입니다. 민간 산업을 장비 제조에 전용할 것입니다. 민간 무기를 압수하고, 필요하다면 보조 평화유지군과 예비군을 노동자로 사용할 것입니다. 희생은 필요하지만, 우리는 조직의 토대와 목표를 희생해서는 안 됩니다."
necessary_security_expansion: "필수적인 안보 확장"
necessary_security_expansion_desc: "우리가 마주하는 적들이 규모와 장비, 잔혹성에서 커져 가는 만큼, 현지 테러리스트들의 손아귀로부터 이 지역을 보호하고 반격할 수 있도록 우리 병력도 확장해야 합니다. 우리는 언제나 세계 각지에서 온 병사들로 구성된 자원자와 전문 인력의 조직이었습니다. 그러나 세계가 저마다의 문제와 혼돈에 직면한 지금, 우리는 새로운 병력을 현지 주민에게서 찾는 방안을 살펴야 합니다.\n\n우리는 미국 연방 및 주 정부가 남기고 간 인원들에게 협력의 손을 내밀어 유엔 평화유지군 대열에 합류하도록 해야 합니다. 군 경력자, 기술 전문가, 심지어 경험 없는 민간인이라도 국민과 평화를 보호하기 위해 우리 군에 합류하도록 유도해야 합니다. 더 많은 자원이 필요하겠지만, KKK 같은 적대 세력이 전국적 도피망을 이용하거나 현지 기회주의자들이 용병을 고용하는 상황에서, 윤리적으로 길러진 평화유지군의 필요성은 더욱 중요해질 뿐입니다."
a_new_style_of_transportation: "새로운 교통 방식"
a_new_style_of_transportation_desc: "미국 땅에서 벌어진 분쟁의 참화는 도시 전체를 폐허로 만들고, 고속도로를 버려진 자동차와 파괴된 군사 장비로 막아 버렸습니다. 그 결과 자동차 교통은 부담이 되었고, 만성적인 연료 부족과 열악한 도로 상태 때문에 제대로 활용하는 것이 거의 불가능해졌습니다.\n\n이제 교통 방식을 바꿀 때가 왔습니다. 옛 철도 노선을 재건하고 노면전차 체계를 도시와 통합함으로써, 우리는 교통 흐름을 회복할 기반을 마련하고, 지역 경제와 병력 이동을 더 현대적인 방식으로 다시 활성화할 수 있습니다."
establish_the_escna: "ESCNA 설립"
establish_the_escna_desc: "미합중국의 붕괴와 뒤이은 내전으로 주 보건부, 농무부, 주택 당국 등 모든 층위의 통치가 파편화되면서, 민간인들은 보조금이나 긴급 원조 없이 취약한 상태에 놓였습니다. 북아메리카 경제사회이사회, 즉 ESCNA는 이러한 문제를 해결하는 임무를 맡아 배급 분배를 통제하고, 위험 지역의 보급품을 창고로 이전하며, 현지 노동자들에게 도구 키트를 제공하여 상업 활동의 재개를 촉진할 것입니다."
one_brick_at_a_time: "벽돌 하나씩"
one_brick_at_a_time_desc: "분쟁은 미국 남부를 황폐화시키고 상처 입혔습니다. 주거 구역 전체가 잔해로 변했고, 그들을 지배하던 정부와 군벌들에게 방치되었습니다. 이 모든 것을 재건하는 일은 결코 쉽지 않을 것입니다. 그러나 평화유지군과 현지 주민 자원자들의 노력으로, 재건은 필연적으로 찾아올 것입니다. 천천히, 작은 걸음으로, 삶이 이전의 모습으로 돌아올 수 있도록 말입니다."
send_out_loans_to_small_businesses: "사업 확장 대출"
send_out_loans_to_small_businesses_desc: "우리 경제에서 가장 큰 타격을 받은 부분이 하나 있다면, 그것은 기업가들입니다. 소규모 사업체들은 지난 몇 년 동안 스스로를 발전시키는 데 믿기 어려울 만큼 큰 어려움을 겪어 왔습니다. 그리고 전투가 끝났다고는 해도, 전선은 여전히 우리의 최우선 과제 중 하나입니다.\n\n따라서 기업가와 가족 사업체에 무이자 또는 저리 대출을 제공하여 돕는 것은 너무나 자연스러운 일입니다. 이제 우리는 우리의 사업체들이 그 어느 때보다 번창하도록 도울 수 있습니다. 전쟁의 북소리는 여전히 공동체 곳곳에 울리겠지만, 사업체들은 이 새로운 현실에 훨씬 더 쉽게 적응할 수 있을 것입니다."
creating_a_miami_industry: "지역 산업 활성화"
creating_a_miami_industry_desc: "전쟁은 지역 경제를 초토화하여 산산조각 냈고, 소규모 사업체는 파괴되었으며 산업은 완전히 마비되어 지역 전역의 수많은 사람들의 생계를 끊어 놓았습니다. 이를 염두에 두고, 우리는 상점과 공장 재개장을 위한 저리 대출, 목공과 기계 같은 중요한 분야의 노동자 훈련 보조금을 통해 이러한 사업체들의 부활을 지원할 뿐만 아니라 재정적으로 뒷받침해야 합니다.\n\n또한 우리는 새로운 현지 시장의 창출을 도와야 하며, 이는 결과적으로 새롭고 신선한 상품에 대한 수요를 늘려 농촌 지역의 농업과 축산 회복을 가속할 것입니다. 더불어 노동자에 대한 세제 혜택은 안정적인 현금 흐름을 유지하는 데 필수적일 것입니다. 이러한 조치는 미국 산업의 회복을 크게 앞당기는 데 도움이 될 것입니다."
further_developement_measures: "추가 개발 조치"
further_developement_measures_desc: "우리의 단기 계획이 마무리되고 있는 지금, 이제는 더 큰 그림에 집중할 때입니다. 플로리다는 아메리카가 아닙니다. 우리의 노력이 반도에 나름의 이익을 가져다주었지만, 모든 미국인이 그것으로 변화될 수 있도록 이러한 개혁과 더 많은 개혁을 더 큰 규모로 시행해야 합니다.\n\n미국인들에게 평화를 가져오는 데 성공하고자 한다면, 우리는 이 평화가 번영을 가져오도록 보장해야 합니다. 모든 미국인을 위한 번영. 소수의 공동체나 사회 계층이 아니라, 모든 미국인. 모든 사람을 위한 번영입니다. 우리는 지금 시작해야 합니다. 우리 모든 사람들을 포함하는 새로운 미국 경제 계획을 세워야 합니다."
american_efficency_and_prosperity: "미국의 효율성과 번영"
american_efficency_and_prosperity_desc: "미합중국은 한때 공장들이 밤낮없이 가동되고, 들판이 언제나 풍성한 수확을 준비하던 생산 강국이었습니다. 내전은 이 유산을 파괴하여 공장을 폐허로 만들고, 들판을 전쟁에 그을린 쓸모없는 불모지로 전락시켰습니다. 그 결과 생산은 급감했습니다. 이를 되살리려면, 먼저 파괴된 공장의 잔해를 제거하고 핵심 산업을 재가동하여 기계와 농업 분야의 새로운 일자리를 제공하는 데 집중해야 합니다.\n\n이와 함께 재건 노력에 필요한 노동자를 양성하는 훈련 프로그램과 중소기업에 대한 인센티브는 빠르고 안정적인 회복을 촉진할 것입니다. 이러한 구상은 평화유지군의 지원과 결합되어, 우리의 영향력을 유지하면서 지역 안정화를 보장할 것입니다."
the_permian_basin: "페름기 분지"
the_permian_basin_desc: "내전은 우리의 연료 비축량을 고갈시켜 임무와 작전을 방해하고 위태롭게 만들었으며, 지역 전체를 전력 없이 남겨 우리에게 딜레마를 안겼습니다. 우리가 옹호하는 지속가능성에 반하는 일이기는 하지만, 페름기 분지에서 화석연료를 추출하는 것은 작전을 계속 유지하기 위한 필요악이 되었습니다."
end_the_rolling_blackouts: "순환 정전 분쇄"
end_the_rolling_blackouts_desc: "누구도 내전을 깨끗하게 이기지는 못합니다. 전력망은 결코 표적이 아니었지만, 송전탑은 형편없는 병사이자 훌륭한 잔해가 되었습니다. 수년간의 방치, 사보타주, 단순한 소모는 미국의 전력 기반시설을 끊어진 선로와 과로한 발전기들의 누더기로 만들었습니다. 이제 도시 전체가 산발적인 전력에 의존합니다. 네 시간 켜지고, 여섯 시간 꺼지는 식입니다.\n\n에너지부, 또는 임무단이 재구성한 그것은 무엇이 아직 작동하는지 몇 달 동안 조사해 왔습니다. 가스 발전소는 부품과 인력만 있으면 다시 가동될 수 있습니다. 원자력 시설은 온전하게 서 있으며, 필요한 것은 인력과 공급망뿐입니다. 태양광 프로그램은 전력망이 수년 동안 돌아오지 못할 곳에서 시간을 벌어 줍니다.\n\n이 일은 화려하지 않습니다. 허가, 엔지니어, 그리고 변압기 사양에 대한 논쟁의 문제입니다. 그러나 불이 다시 들어오는 모든 가정은 임무단이 자신이 무엇을 하고 있는지 알고 있는지 묻지 않게 되는 가정입니다. 그리고 자신감을 가진 가정은 자신감 있는 임무단을 만듭니다."
gain_the_peoples_trust: "민심에 집중"
gain_the_peoples_trust_desc: "유엔은 위기가 고조되는 동안 대응이 느린 비효율적인 관료조직이라는 비판을 오랫동안 받아 왔습니다. 어려운 환경에 자주 배치되는 평화유지군은 자신들을 보호자가 아니라 외부인으로 보는 현지 공동체의 회의적 시선을 자주 마주합니다. 이러한 인식을 바꾸기 위해, 식량 전달, 주택 재건, 난민 구조 같은 그들의 기여를 지역 라디오 방송, 소셜 미디어 업데이트, 민간인과 직접 소통할 수 있는 공개 토론을 통해 강조해야 합니다. 이러한 노력을 눈에 보이게 함으로써, 우리는 회의론을 더 안전한 미래에 대한 진정한 희망으로 바꿀 수 있을지도 모릅니다."
pursue_agenda_2030: "2030 의제 추진"
pursue_agenda_2030_desc: "내전의 불길 속에서 2030 의제는 더 이상 구호로 남아 있을 수 없으며, 재건을 위한 의무적 틀이 되어야 합니다. 우리의 기술적 방식과 신중한 정치 전략을 통해, 우리는 SDGs, 즉 지속가능발전목표가 신탁통치 지역 안에서 효과적으로 시행되고 검증 가능하게 집행되도록 보장할 것입니다.\n\n우리의 목표는 단순히 잃어버린 것을 재건하는 것이 아니라, 지속적인 안정, 형평성, 회복력의 토대를 세우는 것입니다."
a_secure_energy_grid: "안전한 전력망"
a_secure_energy_grid_desc: "한때 세계에서 가장 효율적이고 광범위한 전력망 중 하나로 여겨졌던 미국 전력망은 내전이 시작된 뒤 완전히 붕괴하여 민간인들에게 수많은 문제를 일으켰습니다. 전력을 회복하려면 모듈식 설계의 발전소를 재건하고, 송전선을 보강하고 재건하며, 분산형 풍력 및 태양광 발전 장치를 통합해야 합니다."
restore_confidence_in_the_dollar: "미국 통화 재정비"
restore_confidence_in_the_dollar_desc: "제2차 미국 내전으로 미국 달러의 지위가 국제 표준에서 사실상 장난감 돈에 가까운 것으로 추락했음에도, 사람들은 여전히 그것이 어떻게 작동하는지, 어떻게 생겼는지, 얼마나 가치 있었고 현지에서는 아직 얼마나 가치 있을 수 있는지 알고 있습니다. 그것은 여전히 두 합법 정부와 극단주의 집단 모두의 공식 통화이며, 이런 상황에도 불구하고 총알과 공포와 더불어 힘을 가진 몇 안 되는 것 중 하나입니다.\n\n우리는 현재 미국 정부 간 내분의 혼돈 속에서 중립적 당사자로 서 있지만, 여전히 미국 달러를 가져와 그것이 예전에 있던 받침대 위로 다시 올리는 데 도움을 주어야 합니다. 은행에서 준비금을 모으고, 재분배와 규제를 시행하면 우리의 보호 아래 있는 사람들의 삶에 어느 정도 정상성을 되돌릴 수 있을 것입니다. 일종의 유엔 중앙은행은 적어도 유엔을 전쟁의 혼란스러운 경제에 맞서는 적극적인 지역 경제 주체이자 권력으로 정당화하는 데 도움이 될 것입니다."
new_banknote_for_a_new_america: "새로운 지폐"
new_banknote_for_a_new_america_desc: "제2차 미국 내전 이전 세계의 통화 거인이었던 미국 달러는 이제 쓸모없는 종이 조각에 불과합니다. 미국 정부의 혼란과, 미 본토의 통제권을 두고 여러 정부, 기회주의자, 참칭자들이 다투는 가운데 국제적 행위자로서의 상실은 다른 국제 통화들이 그 자리를 두고 경쟁할 길을 열었습니다. 그러나 이곳에서 우리는 사람들이 생존을 위해, 혹은 어떤 이들에게는 즐거움을 위해, 물물교환과 약탈, 유린으로 되돌아가는 모습을 보고 있습니다.\n\n우리는 경제의 질서를 재수립해야 하며, 특히 제2차 미국 내전이 가져온 경제적 '문화' 충격을 다루어야 합니다. 유엔의 경제적 자원과 현재 우리가 통제하는 경제 자산에 기반한 우리만의 지폐와 통화를 만듦으로써, 우리는 우리 자신과 유엔 통치를 경제적, 정치적으로 더 정당하게 만들 수 있습니다."
double_cargo_hauls: "화물 운송량 두 배로"
double_cargo_hauls_desc: "전쟁은 해상 무역로를 사실상 끊어 놓았고, 항구를 폐허와 난파선으로 막히게 만들었습니다. 해안의 해적 존재는 해상로를 더욱 위험하고 제대로 보호되지 않는 곳으로 만들어 필수품 수입을 방해했습니다. 파괴되어 사실상 사용할 수 없게 된 부두는 식량과 자재의 운송을 늦추고, 지역 재건과 회복 노력을 지연시켰습니다. 이 문제를 해결하려면 항구에서 선박 잔해를 치우고, 크레인과 창고를 현대적이고 고품질의 장비로 되살리며, 평화유지군이 지속적으로 순찰하고 해상로를 방해할 수 있는 위험을 무력화할 선박을 배치해야 합니다.\n\n시간이 지나면 우리는 더 큰 규모의 해상 무역으로 관심을 돌릴 수 있겠지만, 지금은 바다를 정리하고 정화하는 데 집중해야 합니다."
gather_global_minds: "세계의 지성 모으기"
gather_global_minds_desc: "반지성주의, '퇴폐분자'와 '불신자'로 간주되는 이들에 대한 숙청은 모두 퇴행적이고 반동적인 이념의 이름으로 오늘날의 지식인과 밝은 정신을 절멸시키려는 더 넓은 흐름의 일부일 뿐입니다. 그러나 유엔은 사회와 세계의 진보와 기술 발전을 위해 일하는 모든 이들의 보루가 되어야 합니다!\n\n아톰바펜 사단 같은 집단이 그들의 사이비 과학적 헛소리를 믿지 않는 이들에게 저지른 잔혹 행위를 목격한 우리는, 보호받고 지원받아야 할 정신들을 위한 보루가 될 것입니다. 미국과 점점 더 폭력적으로 변하는 세계의 과학자, 지식인, 기술 전문가들을 위한 피난처가 됨으로써, 우리는 질서 회복과 주민들의 생활 조건 개선을 위해 자원을 집중할 것입니다."
start_a_new_iter_program: "새로운 ITER 프로그램 시작"
start_a_new_iter_program_desc: "2030 의제를 추구하려면, 우리는 단순히 화석연료를 포기하는 것을 넘어야 합니다. 오래된 핵분열 기술에서도 벗어나, 우리의 미래를 위해 더 효율적이고 지속가능한 차세대 전원으로 나아가야 합니다.\n\n첨단 핵분열과 막대한 청정 전력을 제공할 수 있는 에너지원인 핵융합 연구는 앞으로 몇 년 동안 우리의 두 가지 최우선 목표가 될 것입니다. 이를 달성하기 위해, 우리는 ITER에 준하는 자체 프로그램을 시작해야 합니다. 원자력 관련 연구를 위해 연구팀에 더 많이 투자함으로써, 우리는 회복력 있고 공정하며 지속가능한 미래에 대한 세계적 약속에 부합하는 에너지 체계의 토대를 놓을 것입니다."
############################################
#EAGLE AND DOVE MILITARY BRANCH, 29 FOCUSES#
############################################
the_north_american_theater: "북아메리카 전역"
the_north_american_theater_desc: "제2차 미국 내전의 시작은 북아메리카 대륙의 정부가 완전히 붕괴한 첫 사례였습니다. 이전의 모든 연방 기관은 서로 다른 편에 서거나 경쟁 파벌로 분열되었고, 주 당국은 각 주에 대한 통제력을 잃었습니다. 우리는 이에 허를 찔렸으며, 상황에 대한 통제를 보장하고 대륙의 또 다른 정부가 붕괴할 경우에 대비하기 위해 북아메리카 전역을 설치할 것입니다. 그 목적은 대륙의 작전센터 목표를 통합하고 이 지역에서의 계획 수립을 강화하는 것입니다."
united_by_one: "하나로 단결"
united_by_one_desc: "제2차 미국 내전이 시작된 이래, 우리의 평화유지군은 불안정한 전선, 예측 불가능한 적, 제한된 자원이 있는 파편화된 영토에서 작전을 수행해 왔습니다. 중앙집중식 지휘가 없다면, 우리 병력은 상충되는 명령을 받거나, 순찰을 중복하거나, 심지어 방어 범위에 틈을 남겨 적들이 전선을 돌파하기 쉽게 만들 위험이 있습니다.\n\n단일 지휘부는 정보를 조율하고, 항공 수송을 배분하며, 병력 교대 순서를 정합니다. 그것은 표준화된 교전규칙을 집행하여 우리 병력이 무규제 상태가 되지 않도록 하고, 연료, 탄약, 식량 같은 필수 자원이 적절한 부문에 적절한 시점에 도달하도록 군수를 하나의 경로로 통합합니다."
united_by_many: "여럿으로 단결"
united_by_many_desc: "여러 배로 불어날 것으로 예상되는 평화유지군을 영원히 소규모 원정 임무처럼 지휘할 수는 없습니다. 경직되고 중앙집중적인 통제는 절차를 만족시킬 수 있을지 모르지만, 임무단이 유연성을 가장 필요로 하는 바로 그 순간에 주도성을 질식시킬 것입니다. 더 분산된 지휘 철학을 채택함으로써, 현장의 장교들은 모든 명령이 지휘 계통을 기어 내려오기를 기다리는 대신 의도에 따라 행동하도록 신뢰받게 될 것입니다. 이는 임무단의 권위를 약화하지 않고 오히려 강화할 것이며, 지휘관과 병력 모두가 관료주의와 거리에 발목 잡히지 않고 더 빠르게 대응하고, 더 강하게 타격하며, 목표를 달성할 수 있게 할 것입니다."
supply_chain_issues: "보급에 대한 확신"
supply_chain_issues_desc: "보급망을 온전하게 유지하려는 우리의 노력에도 불구하고, 끊임없는 전투, 기습 공격, 약탈, 폭격은 도로와 통로를 파괴했으며, 우리 수송대와 보급품도 약탈당했습니다. 재보급을 안전하게 유지하려는 평화유지군과 인력이 직면한 이러한 지속적인 위험은 우리 영토 여러 지역에서 보급망 차질을 초래했습니다.\n\n이 문제를 완화하기 위해, 우리는 더 안전한 철도 노선과 중요 도로의 보호에 더 많이 투자하고, 장갑 트럭과 드론을 동반한 무장 호위를 늘려 공격을 방지할 것입니다. 이러한 투자는 더 비싸겠지만, 우리 작전에 큰 도움이 될 것입니다."
dysfunctional_air_command: "푸른 하늘을 지킬 토대"
dysfunctional_air_command_desc: "역사상 우리가 공중 평화유지 임무를 수행한 일은 드뭅니다. 게다가 우리의 평화유지군은 주로 지상군과 지휘관으로 구성되어 있습니다. 공중전에서의 상황을 더욱 악화시키는 것은, 우리가 보유한 소수의 항공기가 제대로 관리되고 활용되지 않아 쉽게 피할 수 있는 사고가 자주 발생한다는 점입니다.\n\n따라서 공중전에 관한 결정을 내리고, 우리가 가진 것으로는 아무것도 하지 못할 지휘부를 구성하는 데 자원을 투자하기 전에, 우리는 항공교통관제사, 항공기 조종사, 그리고 이 분야에서 더 많은 경험을 가진 이들에게서 배워야 합니다. 그래야 시간이 지나며 더 큰 그림을 생각하고 공군 창설에 투자할 수 있습니다."
unified_command_structures: "굳건한 단일 구조"
unified_command_structures_desc: "새로운 지휘 모델이 우리 영토와 병력 일부에서 효과를 내고 있지만, 우려스러운 일부는 그 구조를 무시하거나 노골적으로 거스르는 듯합니다. 일부 병사들은 사설 통신 채널에 숨어 별도의 명령을 받고 있습니다.\n\n지휘의 중앙집중화를 강화하기 위해, 모든 대대장은 일일 보고를 통해 작전 전역 사령부에 직접적이고 독점적으로 보고해야 하며, 병사들은 혼란을 피하기 위해 같은 사령부에서만 명령을 받을 것입니다."
form_force_intervention_brigades: "강제개입여단"
form_force_intervention_brigades_desc: "제2차 미국 내전은 한때 미합중국이었던 곳을 여러 무장 집단과 광신적 게릴라 무리로 분열시켰고, 우리가 수행하던 평화유지 순찰은 변덕스러운 게릴라와 민병대 앞에서 낡고 불충분한 것으로 드러났습니다. 개입여단은 바로 이 문제를 해결하기 위해 존재할 것이며, 기존 평화유지군이 작전하도록 훈련받지 못한 고위험 복합 전투 지역에 투입되도록 특별히 훈련된 정예부대와 기계화 중대로 구성될 것입니다."
peacekeeper_specialization: "평화유지군 전문화"
peacekeeper_specialization_desc: "한때 미합중국이었던 곳의 지형은 평원과 울창한 숲에서 거대한 건물이 늘어선 대도시에 이르기까지 다양합니다. 이러한 다양성은 아메리카가 제시하는 여러 전투 지형에 분명 준비되지 않았던 우리의 평화유지군에게 전투를 극도로 혼란스럽고 어렵게 만들었습니다.\n\n따라서 평화유지군은 여러 부대로 나뉘어 각각 특정 전투와 지형 유형에 맞춰 훈련되고 전문화될 것입니다. 고층건물 등반, 울창한 숲에서의 전투, 협곡 전투 등 어떤 형태든 말입니다. 이렇게 함으로써 우리 병력은 미국에서의 전투에 더 빠르게 적응하고, 작전의 효율성을 높일 것입니다."
contract_local_companies: "현지 기업 계약"
contract_local_companies_desc: "현지 상점과 기업들은 외부 계약업체가 자주 놓치는 지역 공급망, 가용 노동력, 복구 가능한 기반시설에 대한 깊은 지식을 가지고 있습니다.\n\n토목 작업, 위생 체계 수리, 급수 연결, 모듈식 주택 조립을 위한 단기 및 중기 계약을 체결함으로써, 다른 기능에 배정되었던 자원을 더 신뢰할 수 있는 납기 일정과 함께 공동체 시설로 직접 투입할 수 있습니다."
form_UNAF: "UNAF 창설"
form_UNAF_desc: "공중 지휘부가 없다면, 유엔 항공기는 직접적인 교전에 휘말릴 위험이 있으며, 적의 공중 침입을 무력화하지 못해 지상 군수를 마비시킬 수 있습니다. 따라서 모든 전투 항공대를 계층적 구조로 통합하고, 지역 전역에 퍼진 지휘소에서 내려지는 합동 임무 명령 체계를 확립하기 위해 유엔 공군, 즉 UNAF의 창설이 필요합니다.\n\n이 부대의 주된 임무는 우리 영토 안팎에서 유엔의 제공권을 보장하는 것이며, 이를 통해 적에 대한 우위를 확보하고 적 진지를 항공기가 약화시킨 뒤 현장 병사들의 부담을 줄일 것입니다."
arms_of_peace: "평화의 무기"
arms_of_peace_desc: "무기가 없는 평화유지군은 헬멧 말고는 쓸모가 없습니다. 그 헬멧은 적 병사들의 표적으로나 쓰일 뿐이며, 그 밖에는 손잡이 없는 문짝만큼이나 쓸모없습니다. 따라서 모든 병사와 자원자가 새롭고 양호한 총기, 오랫동안 버틸 충분한 탄약, 그리고 보병 공격에 필요한 기타 장비를 받도록 보장하기 위한 노력이 필요합니다.\n\n필수적인 이러한 노력에는 쓰러진 적 병사에게서 무기를 약탈하고, 경쟁 세력의 검문소를 털고, USNCA에서 무기를 얻고, 심지어 암시장에서 구매하는 것까지 포함될 것입니다. 무기를 얻을 수만 있다면, 어떤 방법이든 고려될 것입니다."
advanced_training: "평화유지군 신병 훈련소"
advanced_training_desc: "제2차 미국 내전은 우리의 평화유지군을 많은 것에 노출시켰습니다. 도시 매복, 급조폭발물, 변덕스럽고 극도로 불안정한 전선 같은 것들이었고, 이는 어떤 과정이나 훈련도 예측할 수 없었던 일이었습니다. 게다가 많은 이들은 제대로 된 훈련 없이 도착했습니다. 따라서 우리의 훈련 방식은 미국 땅에서의 분쟁에 대비할 수 있도록 수정되어야 하며, 호별 전투, 대도시 전투, 고층건물 등반 등을 포함해야 합니다.\n\n그렇게 함으로써 평화유지군은 현대전의 복잡성에 대비한 상태로 훈련을 마치게 될 것입니다."
develop_flechette_ammunition: "압전 탄약"
develop_flechette_ammunition_desc: "더 흔히 '충격탄'이라 불리는 압전 탄약은 이른바 비살상 기술에서 논란 많은 도약을 의미합니다. 발사체 안에 PZT 세라믹 요소를 삽입함으로써, 이 탄은 충돌 시 무력화 전기 충격을 전달하여 구금팀이 진입할 수 있을 만큼 표적을 기절시키도록 설계되었습니다. 이 개념은 여전히 최첨단이며 대규모 운용에는 지나치게 비싸지만, 미국에서 임무단의 책임이 확대되면서 기존 선택지는 점점 부적절해졌습니다. 특히 민간인 사상자 최소화가 정치적 필요가 된 혼잡한 도시 환경에서는 더욱 그렇습니다.\n\n새로운 예산이 승인되고 구금 작전의 중요성이 커지면서, 평화작전국은 유엔 감독 아래 군사경찰과 검증된 법집행 요소에 압전탄을 개발하고 배포하는 프로그램을 승인했습니다. 목표는 표적 급습과 검문소에서 치명적 교전 발생을 줄이고, 심문과 정보 수집을 위해 고가치 인물을 생포할 가능성을 높이는 것입니다."
explore_the_adaptive_combat_rifle: "적응형 전투소총 탐구"
explore_the_adaptive_combat_rifle_desc: "내전 이전의 미국 무기고는 거의 전적으로 소총과 구식 무기로 구성되어 있었습니다. 이는 능력이 부족해서가 아니라, 표준화된 부품, 훈련 교범, 탄약 공장으로 이루어진 수십 년간의 '생태계'가 구축되어 비용을 비교적 낮게 유지했기 때문입니다. 그러나 제2차 미국 내전은 이 생태계를 완전히 파괴했습니다. 공장은 잔해로 변했고, 보급선은 끊어졌으며, 보급소는 게릴라에게 약탈당하고 불탔습니다.\n\n이 붕괴는 혁신을 위한 창을 열었고, 우리에게 옛 생태계의 잔재를 우회할 완벽한 기회를 주었습니다. 교체 부품이 더 적게 필요하고 생산비가 더 낮은 더 발전된 전투소총 설계는 우리가 새로운 생산 체계를 만들 수 있게 할 것입니다."
train_the_dove_squadrons: "비둘기 비행대 훈련"
train_the_dove_squadrons_desc: "미합중국의 붕괴는 하늘을 자유 난투장으로 바꾸었습니다. 드론, 적 집단의 공격 헬리콥터, 밀수업자 항공기가 한때 성조기의 것이었던 영공을 가르고 있습니다. 유엔 공군의 첫 명령은 우리가 통제하는 영토 위 하늘의 평화와 안정을 유지하는 것입니다. 과거 민간 및 군용 항공기를 조종하던 조종사들은 이 질서를 강화하는 데 필요한 훈련을 받을 것이며, 적 항공기나 투사체가 우리 영공을 침범하는 즉시 격추할 것입니다."
formulate_armored_peacekeepers: "푸른 헬멧과 장갑"
formulate_armored_peacekeepers_desc: "1945년 창설 이래, 우리가 따르던 평화유지 교리는 공세적 기갑차량을 피하고, 파견대를 경정찰 순찰로 제한했습니다. 이는 제2차 미국 내전이 시작될 때까지 이어졌고, 첫 보병대대들은 전차나 장갑차 없이 상륙했습니다. 그러나 이는 곧 비효율적일 뿐만 아니라 우리 병력에게 치명적이라는 사실이 드러났습니다. 그들은 뚫을 수 없는 도로봉쇄와 적 기갑차량에 끊임없이 갇혔습니다.\n\n우리 임무에 성공 가능성이 조금이라도 있으려면, 보급소, 옛 기지, 심지어 넓은 거리에서 버려진 차체를 해체하고 회수하는 관행은 당분간 적 병사에 대한 공격과 방어 능력, 그리고 기동성을 높일 즉흥적 수단을 제공할 것입니다."
army_of_the_future: "새 시대의 평화유지"
army_of_the_future_desc: "미합중국의 붕괴는 전투와 개입의 모든 규칙을 다시 썼습니다. 과거 우리의 평화유지군은 비교적 평화로운 국경을 순찰했고, 때로는 병사들에게 위험한 작전이 있을 뿐이었습니다. 그러나 이제 그들은 광신적 민병대, 폭력적인 적, 제네바 협약 같은 규칙이 거의 적용되지 않는 총력전 지역을 마주하며, 우리 병사들은 끊임없이 몰살당할 위험에 놓여 있습니다. 따라서 옛 평화유지 방식은 끝났고, 이런 새로운 환경에 대처하기 위해 설계된 새로운 전략과 전술로 대체되었습니다."
the_need_for_mobile_peacekeepers: "평화유지군의 속도 필요"
the_need_for_mobile_peacekeepers_desc: "미합중국이 내전으로 완전히 붕괴하면서 모든 구조물과 도로는 전장으로 변했습니다. 걸어 다니는 보병은 쉬운 표적이 되었고, 우리의 수송대는 유용하기는 했지만 느리게 전진했으며 쉽게 포위되고 파괴되었습니다. 우리의 평화유지군이 노출된 전쟁 방식에서 속도는 필수 그 이상이었고, 이는 더 우수하고 최신이며 최첨단인 군용 차량을 요구했습니다.\n\n이 문제를 단번에 해결하려면, 차량화 및 기계화 차량 비축에 대한 투자를 늘려야 합니다. 병력을 보호하고 현장에서의 기동성을 높일 충분한 차량 수가 확보될 때까지 우리의 중점은 어느 정도 전환되어야 합니다."
the_peacekeeper_and_the_peacemaker: "평화유지군과 평화조성자"
the_peacekeeper_and_the_peacemaker_desc: "전장에서 총알은 적을 죽이기 위한 도구 이상입니다. 그것은 한 국가 전체가 멸망할지 살아남을지를 결정하는 요소입니다. 미국 땅에서는 서로 싸우는 모든 집단에게 이 법칙이 적용되며, 우리의 임무단에도 마찬가지입니다. 그러나 무기를 들고 적을 쏘는 병사보다 더 중요한 이는, 총알이 생산되어 우리 평화유지군의 탄창에 도달하도록 보장하는 사람입니다. 그리고 이 평화조성자들은 보호받아야 할 뿐만 아니라 확장되어야 합니다. 그래야 탄약 생산이 늘어나고, 더 많은 테러리스트가 그들에 의해 죽을 수 있습니다."
importance_of_strategic_destruction: "대장간 위의 조준기"
importance_of_strategic_destruction_desc: "미합중국이 수많은 세력과 게릴라 집단에 의해 찢겨 나가면서, 각 집단이 자신들의 전쟁 기계를 보관하고 유지하는 많은 임시 공장과 숨겨진 보급소가 만들어졌습니다. 이것들은 테러리스트의 생존을 위한 핵심 기관입니다. 이 지점들을 공격하는 것은 동맥을 때리는 것과 같습니다. 그들의 조립 라인을 파괴하고 보급소를 폭격함으로써, 병력은 새로운 탄약을 공급받지 못하게 되고 기존 탄약도 빠르게 소진될 것입니다.\n\n동시에 교량을 파괴하고 전략 고속도로를 폭격하면 적이 활용하는 동원 및 수송 능력이 약화될 것입니다. 이러한 조치를 시행함으로써, 시간이 지나고 적 부대가 보급품을 소진할수록 우위는 우리 쪽으로 이동합니다."
strive_for_BVR_expertise: "공중전 능력 강화"
strive_for_BVR_expertise_desc: "우리는 공세적 항공 교리를 채택할 위치에 있지 않습니다. 장거리 폭격기는 우리가 유지하고 운용할 수 있는 능력을 훨씬 넘어설 뿐만 아니라, 그러한 살인 기계는 민간인 사상자를 최소화한다는 우리의 원칙에도 직접적으로 어긋납니다. 우리가 파괴하겠다고 맹세한 바로 그 범죄자가 되어서는 안 됩니다.\n\nUNAF는 방어 부대로 기능하며, 폭격기와 공격기의 침입을 막는 데 집중하고, 우리가 전투를 벌이는 곳마다 제공권을 확립하기 위해 정기 초계 임무를 수행할 것입니다."
consolidate_american_armor: "미국 기갑 통합"
consolidate_american_armor_desc: "제2차 미국 내전에서 사용된 엄청난 수의 기갑차량은 미국의 들판과 거리 곳곳에 수많은 차량을 파괴되고 버려진 채 남겼습니다. 전차는 인도에 버려졌고, 병력수송차는 아직 방수포에 덮인 채 남아 있습니다. 이 지역 전역에서 이러한 차량의 사용이 만연하지만, 내전 발발 뒤 버려진 보급소와 병영에는 우리가 절실히 필요로 하는 많은 물자가 여전히 남아 있습니다.\n\n우리는 이 특별한 기회를 놓칠 수 없습니다. 자재와 차량이 아직 양호한 상태일 때 이를 장악해, 가져갈 수 없는 물자는 약탈하고 가져갈 수 있는 것은 평화유지군을 돕는 데 사용해야 합니다."
a_new_age_of_total_war: "총력전의 새 시대"
a_new_age_of_total_war_desc: "제2차 미국 내전의 장기화는 분석가들이 내놓을 수 있었던 어떤 예측도 넘어섰고, 그 모든 시간은 우리에게 큰 대가를 치르게 했습니다. 무기고는 고갈되고, 돈은 빠져나갔으며, 순찰대와 병사들은 줄어든 배급으로 버티고 있습니다. 장기적으로 이 전쟁에서 승리할 가능성을 조금이라도 가지려면, 이전에 여러 부문으로 향하던 모든 투자는 군사용으로 특별히 재배정되어야 합니다.\n\n많은 이들이 이러한 재배정을 총력전으로 나아가려는 시도로 볼 수 있겠지만, 우리는 그것이 우리가 원하거나 기뻐서 하는 일이 아니라 필요에 의한 것임을 인정해야 합니다."
priority_on_precision_munitions: "정밀 탄약 우선"
priority_on_precision_munitions_desc: "내전은 동네와 도시를 진정한 전장으로 바꾸었고, 포탄과 총알은 우리의 적과 아무 관련 없는 무고한 생명을 덮쳤습니다. 이러한 부수적 피해는 예상된 것이라 해도, 우리 병력 사이에서 정상화되어서는 안 됩니다. 이를 염두에 두고, 민간인 사망을 막기 위해 배워야 하고 투자해야 할 것은 여전히 많습니다.\n\n정밀 탄약과 전투 드론 같은 무기에 투자하는 것은 표적을 더 정확하게 타격하고, 투사체가 민간인이 피신한 주택과 대피소에 떨어지는 것을 막는 데 효과적일 수 있습니다."
a_new_age_of_airland_battle: "공지전의 새 시대"
a_new_age_of_airland_battle_desc: "냉전 종식 이후 전쟁 전략은 급격히 변했고, 어떤 수단으로든 환상적인 지배를 추구하면서 제공권과 지상 우위 사이의 연결을 끊었습니다. 그러나 현재 상황에서 우리의 적들은 그러한 전략을 사용하지 않습니다. 그들은 임시 혹은 실제 전투 드론을 조종하고, 초토화 전술과 인해전술을 사용하며, 더 극단적인 경우에는 심리적 고문을 통한 절멸과 예속까지 행합니다.\n\n공지전 교리를 되살림으로써, 우리는 근접항공지원과 전진하는 보병을 다시 연결하고, 지상과 공중 양쪽에서 평화유지군에게 더 통제되고 덜 위험한 접근 방식을 제공할 수 있습니다."
peace_in_the_blue_skies: "푸른 하늘의 평화"
peace_in_the_blue_skies_desc: "우리의 평화유지 임무는 지상 작전을 넘어 하늘의 통제까지 포함해야 합니다. 적대 세력은 평화유지군과 그 보호 아래 있는 민간인을 상대로 공습을 시도하여 그들을 큰 위험에 빠뜨릴 수 있습니다. 이러한 위협을 막으려면 적들이 먼저 제공권을 확립하기 전에 우리가 완전한 제공권을 확보하는 것이 중요합니다. 이를 위해서는 첨단 제공 전투기의 생산뿐만 아니라, 우리 인원을 보호하고 우리가 지키는 이들의 안전을 보장할 수 있는 완전한 대공 방어 체계를 구축해야 합니다."
weak_point_exploitation: "약할 때 타격"
weak_point_exploitation_desc: "우리의 평화유지군이 전진하면서 적들의 결속은 무너지고, 보급선은 늘어지며, 사기는 추락하고 있습니다. 따라서 우리는 이 특별한 기회를 붙잡아 지휘소와 고립된 주둔지에 집중 공격을 가해야 합니다. 그들의 예비대를 계속 고갈시킨다면, 증원군이 도착하기 전에 전 구역이 붕괴할 것입니다.\n\n또한 기갑과 전투 드론의 지원을 받는 보병 소탕 작전은 적 전선의 균열을 더욱 파고들어 분쟁 시간을 줄이고, 불필요한 인명 손실을 줄이며, 적 병력의 재집결을 막을 것입니다."
bombardment_to_an_artform: "예술적 포격"
bombardment_to_an_artform_desc: "우리는 첨단 장거리 무기가 부족하며, 이는 종심 타격을 제한하고 포병을 대포병 사격에 취약하게 만듭니다. 그러나 정밀유도탄에 투자하고, 전방 관측과 사격통제소에 대한 엄격하고 광범위한 훈련을 결합한다면, 포대는 훨씬 더 먼 거리에서 정밀한 명중을 달성하여 순항미사일을 거의 완벽하게 모방할 수 있습니다."
unmatched_in_the_air: "공중 전장 지배"
unmatched_in_the_air_desc: "전쟁은 결코 지상군만으로 승리할 수 없습니다. 하늘을 통제하지 못하면, 가장 강력한 지상 공세조차 파괴될 위험에 놓입니다. 승리를 달성하려면 우리는 영공을 지배해야 합니다. 우리의 조종사들은 적 항공기를 무력화하고, 전략 표적을 타격하며, 전진하는 부대에 엄호를 제공함으로써 아래의 평화유지군을 보호할 것입니다. 이 용감한 남녀들은 우리 병사들이 머리 위의 하늘이 확고히 우리의 통제 아래 있다는 사실을 알고 자신 있게 싸울 수 있도록 보장할 것입니다."
