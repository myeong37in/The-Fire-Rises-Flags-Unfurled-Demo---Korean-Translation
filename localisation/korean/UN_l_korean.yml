#IDEOLOGIES
######################################################
sustainable_progressivism: "지속가능 진보주의"
sustainable_progressivism_desc: "\n\n\n\n£GFX_Ideology_sustainable_progressivism\n\n\n\n\n\n§Y지속가능 진보주의§!. 1972년 UNCHE 이래, 유엔은 환경 보호의 풍향계 역할을 해왔습니다. 인류 공동의 미래를 보호해야 한다고 주장하며, 유엔은 개발 규제, 기업 책임, 생태 보전, 균형을 향한 흐름을 이끌어 왔습니다. 그 중심에는 유엔의 비전 있는 개발 정책의 걸작, 지속가능발전목표, 즉 SDGs가 있습니다.\n\n경제 성장과 영토 확장주의를 추구하는 세계 각국 정부의 무대책에 불만을 품고 불안해하던 SDGs 지지자들은 하나의 거대하고 통합된 운동으로 성장했습니다. §7지속가능 진보주의§!는 2015년의 SDGs를 지도 원칙으로 삼습니다. 기후 행동(7, 12, 15)과 보다 공정한 경제 성장(1, 5, 10)을 모두 중시하는 지속가능 진보주의자들은 2030 의제를 준수하고, 탄소중립을 달성하며, 모두를 위한 조화로운 미래를 창조하고자 합니다."
LRA_sustainable_progressivism: "지속가능 진보주의"

supervised_trusteeship: "감독 신탁통치"
supervised_trusteeship_desc: "\n\n\n\n£GFX_Ideology_supervised_trusteeship\n\n\n\n\n\n§Y감독 신탁통치§!. 자유는 보편적 권리이며, 자유롭지 못한 인간에게 존엄은 없습니다.\n\n세계가 자유화의 물결과 그 뒤를 이은 권위주의화의 물결을 목격하면서, 자유가 모든 인간에게 태어날 때부터 주어지는 것이 아니라 가르쳐야 하는 것임이 분명해졌습니다. 새로 수립된 민주주의 국가들이 스스로를 파멸로 몰아넣는 투표를 하지 않도록 하기 위해, §5감독 신탁통치§!는 시민사회를 안정시키고 발전시켜 자유의 무거운 책임을 감당할 수 있도록 준비시키는 제도로 설치됩니다.\n\n유엔의 위임에 따라, §5감독 신탁통치§!는 개인적 자유의 지속을 보호하지만 외부 위협, 내부 불안정, 또는 기타 명시되지 않은 이유로 일정 기간 민주 선거를 정지시킵니다. 과도기로 의도되었지만, 감독 신탁통치에는 일몰 조항이 적용되지 않으며, 환영받는 기간을 넘어 계속될 수도 있습니다."
LRA_supervised_trusteeship: "감독 신탁통치"

true_globalism: "진정한 세계주의"
true_globalism_desc: "\n\n\n\n£GFX_Ideology_true_globalism\n\n\n\n\n\n§Y진정한 세계주의§!. 유엔 창설 이래, 상호연결성, 공동의 가치, 보편정부 건설은 이 조직의 핵심 원칙이자 일반적 방향이었습니다. 그러나 철의 장막이 무너진 이후, 세계가 여러 부분으로 갈라지고 많은 나라가 하나의 보편적 미래를 위해 협력하기를 꺼리면서 이러한 목표는 큰 방해에 부딪혔습니다.\n\n옛 세계 질서가 붕괴하자, 새로운 유엔이 한 세기에 걸친 굴욕의 잿더미 속에서 일어섭니다. 하나의 비전을 품은 §C진정한 세계주의§!는 인류의 공동선을 추구하기 위해 급진적 사상과도 손을 잡으며, 가능한 모든 수단으로 그 이상을 진전시키려 합니다. 사회자유주의의 이상을 통합한 §C진정한 세계주의§!는 자유민주주의적 틀 아래 상품, 사람, 사상의 자유로운 흐름을 옹호하며, 이 목표를 추구하는 데 어떠한 노력도 아끼지 않겠다고 맹세합니다."
LRA_true_globalism: "진정한 세계주의"

peacekeeper_democracy: "평화유지 민주주의"
peacekeeper_democracy_desc: "\n\n\n\n£GFX_Ideology_peacekeeper_democracy\n\n\n\n\n\n§Y평화유지 민주주의§!. 국가의 붕괴, 극단주의 폭력의 확산, 그리고 낡은 국제 질서의 반복되는 마비는 유엔 내부의 많은 이들에게 평화가 더 이상 결의안만으로 살아남을 수 없다는 확신을 심어주었습니다. 분쟁이 벌어질 때마다 유엔은 질서를 보존해 달라는 요청을 받았지만, 그렇게 할 힘과 단결, 정치적 의지는 주어지지 않았습니다. §1평화유지 민주주의§!의 지지자들에게 미국은 최종적인 증거였습니다. 평화는 법이나 선의만이 아니라, 붕괴가 돌이킬 수 없는 지점에 이르기 전에 행동할 의지를 지닌 규율 잡힌 제도에 의해 수호되어야 합니다.\n\n평화유지 전통에 뿌리를 두었지만 21세기의 혹독한 교훈을 통해 변화한 §1평화유지 민주주의§!는 민주주의가 전문적이고 충성스러우며 영구적인 무력의 수호 아래 있을 때만 지속될 수 있다고 봅니다. 이 사상은 대의정부를 부정하지는 않지만, 그것을 안정, 지휘 체계의 결속, 공공질서의 보존에 종속시킵니다. 그 추종자들은 평화유지군이 더 이상 임시 감시자가 아니라 사회 자체의 방패가 되는 국가를 건설하고자 합니다. 규율과 봉사, 그리고 평화가 스스로를 지킬 수 없을 때 평화를 강제할 항상의 준비 태세를 통해 민주적 삶을 방어하는 국가를 말입니다."
LRA_peacekeeper_democracy: "평화유지 민주주의"

