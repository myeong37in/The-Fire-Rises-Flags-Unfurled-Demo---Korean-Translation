#OCEANIA
lra.224.t: "호주 증원군 도착!"
lra.224.d: "오세아니아의 후원국들은 전투 준비를 마친 병력과 첨단 무장을 제공하기 위한 일련의 조치를 승인했습니다. 이 부대들은 교육 수준이 높고, 규율 잡혀 있으며, 경험이 풍부할 뿐만 아니라 여러 단계의 훈련에 참여했던 노련한 지휘관들의 지휘를 받고 있습니다.\n\n호주의 기여는 분명 우리의 평화유지 노력에 대한 그들의 영향력과 관여를 확대할 것입니다. 이것이 평화유지 지휘부에 대한 그들의 통제력을 키우는 일이기는 하지만, 테러리스트와 싸우는 지금 우리에게 정치적 문제를 따질 여유는 없습니다. 호주 병력은 마이애미에서 하역을 마치고 우리의 지휘 구조에 익숙해지는 대로, 불안정과 혼돈에 맞서는 날카로운 창끝으로서 우리 병력에 합류할 것입니다."
lra.224.a: "확인했다."

lra.225.t: "뉴질랜드 증원군 도착!"
lra.225.d: "오세아니아의 후원국들은 전투 준비를 마친 병력과 첨단 무장을 제공하기 위한 일련의 조치를 승인했습니다. 이 부대들은 교육 수준이 높고, 규율 잡혀 있으며, 경험이 풍부할 뿐만 아니라 여러 단계의 훈련에 참여했던 노련한 지휘관들의 지휘를 받고 있습니다.\n\n뉴질랜드의 기여는 분명 우리의 평화유지 노력에 대한 그들의 영향력과 관여를 확대할 것입니다. 이것이 평화유지 지휘부에 대한 그들의 통제력을 키우는 일이기는 하지만, 테러리스트와 싸우는 지금 우리에게 정치적 문제를 따질 여유는 없습니다. 뉴질랜드 병력은 마이애미에서 하역을 마치고 우리의 지휘 구조에 익숙해지는 대로, 불안정과 혼돈에 맞서는 날카로운 창끝으로서 우리 병력에 합류할 것입니다."
lra.225.a: "확인했다."

#GENERIC
lra.300.t: "국제 자원병 오배치"
lra.300.d: "서류상으로는 특정 지역에 대한 요청이 발송되었습니다. 임무단 연락 참모들은 적절한 명단, 장비 목록, 배정된 조율 담당자를 갖춘 특정 집단이 도착하리라 예상하며 며칠 동안 새로운 국제 자원병 파견대를 확보하기 위해 노력했습니다. 그러나 수송 차량이 마침내 마이애미 활주로에 들어섰을 때, 명단의 이름들은 브리핑 내용과 맞지 않았습니다.\n\n잠시 동안 그 혼란은 군수상의 골칫거리로 번질 듯했습니다. 그러나 트럭에서 내리는 남녀들에게서 한 가지는 분명했습니다. 푸른 헬멧, 유엔 표식, 그리고 복무하겠다는 뚜렷한 의지였습니다. 그들은 멀리서 왔고, 각자의 위기를 뒤로한 채, 불가능해 보이는 임무의 전선에 배치될 준비를 마치고 도착했습니다. 관료적 실수든, 엇갈린 통신이든, 아니면 풀려 나가는 세계가 낳은 단순한 혼돈이든, 무엇이 이런 혼선을 초래했든 이 평화유지군은 이제 이곳에 있으며, 싸울 수 있습니다."
lra.300.a: "뭐라고? 적어도 싸울 수는 있겠지..."

#Diplomatic Mission Outcomes
lra.410.t: "임무 보고: 물자 지원"
lra.410.d: "대표단의 협상은 즉각적이고 실질적인 성과를 냈습니다. 외국 적하목록이 찍힌 상자들이 이미 무장 경비 아래 하역되고 있습니다. 소총, 무전기, 의료 가방, 예비 부품, 그리고 우리 임무단이 결코 충분히 빠르게 자체 생산할 수 없는 종류의 장비들입니다. 보급장교들은 물자의 목록화를 서두르고 있으며, 참모 장교들은 우선순위를 두고 논쟁하고 있습니다.\n\n임무단에게 이것은 단순한 재보급 이상의 의미가 있습니다. 조용하고 조건이 붙은 지원일지라도, 외부 세계가 여전히 우리의 생존에 가치를 두고 있다는 증거입니다. 이 지원만으로 전쟁에서 이길 수는 없겠지만, 우리에게 값을 매길 수 없는 시간과 추진력을 사 줍니다. 새로운 장비는 타협을 줄이고, 임기응변을 줄이며, 기본 도구가 부족해 사상자 명단에 이름이 더해지는 일을 줄입니다."
lra.410.a: "훌륭하군."

lra.411.t: "임무 보고: 정치적 지지"
lra.411.d: "대표단은 지지 성명과 함께, 임무단을 임시 파견대가 아닌 정부로 대우하려는 새 의지를 가지고 돌아왔습니다. 그 효과는 우리의 행정 부문에서 즉시 느껴집니다. 행정관들은 더 자신 있게 말하고, 현지 관리들은 더 기꺼이 협력하며, 임무단 대변인들은 유엔을 위임권 없는 외국 점령군이라고 부르는 비판자들에게 답할 만한 신뢰할 수 있는 말을 갑자기 얻게 되었습니다.\n\n정치적 지지와 함께 해방된 영토에 대한 해외 투자 약속도 따라왔습니다. 사무실, 공공시설, 그리고 우리의 재건과 통치를 훨씬 더 수월하게 만드는 민간 기반을 위한 계약과 재건 약속 몇 건이 이미 도착하기 시작했습니다. 이것이 하룻밤 사이에 참상을 지우지는 못할 것이고, 모든 반대자를 침묵시키지도 못할 것입니다. 그러나 이제 우리의 지위는 더 확고해졌고, 외부 강대국들은 연기가 걷힌 뒤에도 푸른 깃발이 여전히 휘날릴 것이라 판단하고 베팅하고 있습니다."
lra.411.a: "반가운 진전이다."

lra.701.t: "호송대 매복"
lra.701.d: "가벼운 호위를 받으며 북쪽으로 이동하던 구호 및 재보급 호송대가 작전 회랑 외곽에서 공격을 받았습니다. 공격은 신속하고 치밀했습니다. 한쪽에서는 소화기 사격이, 다른 쪽에서는 급조폭발물이 터졌고, 항공 지원이 도착하기 전에는 침묵만이 남았습니다. 혼란 속에서 트럭 몇 대가 버려졌고, 귀중한 보급품은 파괴되거나 공격자들에 의해 수풀 속으로 끌려갔습니다.\n\n물자 손실은 치명적이지 않지만, 정치적 피해는 측정하기 더 어렵습니다. 타격당한 호송대 하나하나, 길가에서 불탄 상자 하나하나가 임무단이 자신들이 장악했다고 주장하는 땅조차 여전히 제대로 통제하지 못하고 있음을 비판자들에게 상기시킵니다."
lra.701.a: "이런 손실은 감당할 수 없다!"

lra.702.t: "후방의 정전"
lra.702.d: "지역적 전력 장애가 후방 지역 일부를 휩쓸며, 최악의 순간에 냉장 시설, 통신 중계소, 현지 배급 지점을 마비시켰습니다. 공병들은 이미 작업에 착수했지만, 이 중단은 군수의 정교한 리듬을 멈춰 세웠고 기본 질서를 제공할 수 있는 우리의 능력에 대한 대중의 신뢰를 흔들었습니다.\n\n전선은 많은 것을 견딜 수 있지만, 후방의 혼란은 다른 모든 곳에 약점을 낳습니다. 망가진 체계를 복구하는 데 쓰이는 매 시간은 공세에서 빼앗긴 시간입니다."
lra.702.a: "불을 다시 켜라."

lra.703.t: "항구에서의 카르텔 사보타주"
lra.703.d: "사보타주범들이 임무단의 핵심 군수 거점 중 하나를 공격했습니다. 차량에 불을 지르고, 케이블을 절단했으며, 보안팀이 지역을 봉쇄하기 전에 노동자들을 흩어지게 만들었습니다. 목격자들은 복면을 쓴 총잡이들이 숙련된 속도로 움직이다가 조직적 저항이 형성되기 전에 혼돈 속으로 사라졌다고 말합니다. 그들이 카르텔 집행자였는지, 고용된 습격자였는지, 아니면 그 둘이 뒤섞인 불경한 혼합물이었는지는 이제 별로 중요하지 않습니다.\n\n중요한 것은 임무단이 차량, 장비, 그리고 귀중한 시간을 잃었다는 사실입니다. 플로리다의 지하세계는 자신들의 입장을 분명히 했습니다. 우리가 통치하려 한다면, 그들은 그 대가로 우리 피를 흘리게 할 것입니다."
lra.703.a: "즉시 항구 보안을 강화하라."

lra.704.t: "외국 대표단이 지원을 철회하다"
lra.704.d: "임무단을 지원할 의향을 조심스럽게 내비쳤던 한 외국 대표단이 이제 물러섰습니다. 플로리다에서 가시적인 진전이 부족하다는 점과 개입 범위가 확대되고 있다는 우려를 이유로 들었습니다. 공개 규탄은 나오지 않았지만, 그 의미는 분명합니다. 해외의 인내심이 얇아지고 있습니다.\n\n임무단에게 이것은 단순한 외교적 망신 이상의 문제입니다. 우리의 방향을 의심하기 시작하는 정부 하나하나는 우리가 국제사회가 부재한 틈을 대신하는 것이 아니라 국제사회를 대표해 행동한다는 주장을 약화시킵니다."
lra.704.a: "그들이 틀렸음을 증명해야 한다."

lra.705.t: "마이애미의 신뢰 위기"
lra.705.d: "또 하나의 보고서가 콘웰의 책상 위에 올라왔습니다. 또 하나의 전선 손실이었습니다. 유엔이 안전보장이사회와 세계 앞에서 탤러해시와 플로리다 자체를 확보하겠다고 맹세한 지 너무나 오랜 시간이 흘렀습니다. 그러나 그 약속은 끝없는 지연과 전선에서 쌓여 가는 사망자 수 아래 묻힌 채 깨져 버렸습니다.\n\n그는 손을 이마에 얹었습니다. 한때 임무처럼 느껴졌던 것은 이제 부담으로 말라붙었습니다. 그는 사람들이 그들을 어떻게 부르는지 들어 왔습니다.\n\n"유엔이 하는 또 하나의 보여주기식 행동일 뿐."\n"유엔 놈들 또 UN쓸모없네."\n"1946년부터 아무 일에도 UN관여 안 함."\n\n날이 갈수록 종소리는 더 크게 울리며, 시간이 얼마 남지 않았다고 경고하고 있습니다. 병사들의 사기는 역대 최저 수준에 이르렀고, 끊임없는 비판은 병사들과 고위 지휘부 모두를 짓누르고 있습니다.\n콘웰은 서류를 바라보았지만, 글자들은 흐릿한 안개처럼 번졌습니다. 사상자 명단 하나하나가 이전보다 더 무겁게 느껴졌고, 실패한 작전 하나하나는 그의 양심에 또 하나의 돌을 묶었습니다. 안전보장이사회는 진전을 요구하고, 언론은 답변을 요구하며, 가족들은 정의를 요구합니다. 그러나 그가 내놓을 수 있는 것은 공허한 보장뿐입니다. 반복될수록 더 텅 빈 소리로 울리는 재활용된 약속들뿐입니다.\n\n"각하," 동료들의 목소리가 마침내 그를 생각에서 끌어냈습니다. "괜찮으십니까?"\n\n콘웰은 몸을 뒤로 기대고 깊게 한숨을 내쉬었습니다. "아니, 아무것도 괜찮지 않다. 사람들은 벌써 우리에 대한 믿음을 잃고 있다. 우리는 빠르게 행동해야 한다.""
lra.705.a: ""그렇지 않으면 우리는 파국적인 붕괴를 겪게 될 것이다.""


unfaction.1.t: "유엔 제안"

#Fuel Crisis Events
lra_fuel.3.t: "북쪽으로 향하는 긴 길"
lra_fuel.3.d: "플로리다의 평야 지대에서, 한 호송대가 고속도로를 따라 요란하게 달리고 있습니다. 그 화물은 진격에 필수적인 물자입니다. 원래는 미국 딥 사우스로 향하는 단순한 공세가 될 예정이었지만, 이제 그것은 한 마일 한 마일이 이전보다 더 큰 대가를 요구하는 지리멸렬한 전역으로 굳어졌습니다. 도로는 끝없이 이어지고, 위험하며, 예측할 수 없습니다. 운전자는 창밖을 바라보며 가능한 위협을 살핍니다. 남부의 들판과 숲은 쉬운 길을 혼란과 지연으로 바꾸며 저항하기로 작정한 듯 보입니다. 이제 매 마일마다 모든 것이 무너질 수 있는 지점처럼 느껴집니다.\n\n트럭 뒤편에서는 병사들이 덜컹거리는 벽에 기대어 주저앉아 있습니다. 며칠 동안 이어진 끊임없는 행군에 지칠 대로 지친 모습입니다. 유엔이 북쪽으로 더 깊이 밀고 들어갈수록 휴식 시간은 날마다 줄어들고 있습니다. 이제 진짜 싸움은 단순히 앞으로 나아가는 것이 아니라, 보급선을 열어 두고 확보한 땅을 지키는 일입니다. 모든 검문소는 임시방편처럼 느껴지고, 모든 성과는 부서지기 쉬워 보입니다. 마치 이 땅 자체가 그들의 결의를 시험하는 것처럼 말입니다. 그러나 그들은 멈출 수 없습니다. 진전은 이루어져야 합니다."
lra_fuel.3.a: "임무는 계속되어야 한다."

lra_fuel.4.t: "후방의 그림자"
lra_fuel.4.d: "UNMIA가 분쟁 지역으로 더 깊이 들어가면서, 후방선은 새로운 전장이 되었습니다. UNPOL과 보안팀은 이제 한때 전선에 쏟던 집중력과 같은 집중력으로 이 지역들을 감시하며, 모든 마을, 교량, 보급소에서 사보타주 방지와 대반란 활동을 확대하고 있습니다. 사소한 절도와 경미한 괴롭힘으로 시작된 일은 이제 사보타주 전역으로 커졌습니다. 밤에는 교량이 폭파되고, 텅 빈 고속도로에서는 보급 호송대가 매복을 당하며, 정체불명의 공격자들이 비축 물자에 불을 지릅니다. 사보타주범들은 어둠 속을 빠져나가고, 낮에는 민간인 사이에 섞여 있다가 밤이 되면 공격합니다. 곡물 저장고, 연료 집적소, 심지어 의료 보급소까지 표적이 되고 있으며, 폭발음은 시골 전역에 울려 퍼지고 달빛 아래 들판 위로 연기가 피어오릅니다.\n\n임무단은 순찰을 늘리고, 더 많은 검문소를 세우며, 조용히 정보원을 모집하는 방식으로 대응하고 있습니다. 표시 없는 차량들이 밤낮없이 뒷길을 오가고, 드론 감시는 이제 흔한 일이 되었습니다. 한때 활기찼던 마을들은 이제 이웃끼리 서로를 경계하고 통금령이 더 엄격해지면서 긴장감에 휩싸여 있습니다. 성공은 압수된 폭발물, 좌절된 폭탄 음모, 막아낸 공격으로 측정되지만, 안전과 의심 사이의 경계는 흐려지고 있습니다. 새 규칙 하나하나는 더 많은 반감을 낳고, 모든 교차로마다 보이는 푸른 헬멧은 질서의 상징이자 점령의 reminder가 됩니다. 임무단의 장악력은 강해지고 있지만, 그림자 속의 싸움은 끝나지 않았습니다."
lra_fuel.4.a: "그림자는 결코 멀리 있지 않다."

lra_fuel.5.t: "평화는 어떻게 된 것인가?"
lra_fuel.5.d: "창고 안의 어둠을 가르는 것은 소총 손전등의 빛줄기와 여러 언어로 내려지는 날카로운 명령뿐이었습니다. UNPOL 장교 라미레스에게 이것은 결코 일상적인 순찰이 아니었습니다. 팀에는 확실한 정보가 있었습니다. 무장한 KKK 대원 여러 명, 깃발처럼 걸린 남부연합기, 그리고 하역장 근처에 묶인 인질들. 새는 지붕에서 떨어진 물웅덩이를 군화가 밟고 지나가는 가운데, 대원들이 대형을 유지하며 진입하자 공기는 폭력의 예감으로 무겁게 가라앉았습니다.\n\n진입은 빠르고 폭력적이었습니다. 수류탄이 서까래 사이에서 폭발했고, 훔친 배급품 상자 사이로 총성이 울려 퍼졌습니다. 공기에서는 화약과 공포의 냄새가 났고, 저항의 외침은 자동화기 사격에 잘려 나갔습니다. 총알이 상자와 팔레트를 찢고 지나가자 나무 파편이 떨어졌고, 몇 초 동안 창고는 순수한 혼돈이 되었습니다. 라미레스는 인질 하나를 안전한 곳으로 끌어내며 심장이 미친 듯이 뛰는 것을 느꼈고, 장갑에 묻은 피가 누구의 것인지도 알 수 없었습니다. 모든 것이 끝났을 때, 인질들은 멍한 얼굴로 밖으로 나왔고, 살아남은 납치범들은 수갑을 찬 채 끌려갔습니다.\n\n팀은 빠르게 움직였고, 얼굴은 굳어 있었으며, 아드레날린은 떨리는 손을 감추고 있었습니다. 라미레스는 남은 사람이 없는지 건물 나머지를 확인하며, 싸우기를 택한 무장분자들의 시신을 넘어갔습니다. 구출된 이들의 얼굴은 그의 머릿속에 남았습니다. 어떤 이들은 울었고, 다른 이들은 그저 충격 속에 멍하니 바라보았습니다. 잠시 동안 라미레스는 자신이 평화유지군과 병사 사이에서 얼마나 얇은 선 위에 서 있는지 생각했습니다. 그 선을 표시하는 것은 푸른 헬멧과 그것이 상징하는 것뿐이었습니다. 밖의 밤은 조용했지만, 살아남은 이들에게는 모든 것이 바뀌어 있었습니다."
lra_fuel.5.a: "우리는 해야 할 일을 했다."

lra_fuel.6.t: "강철의 혈관"
lra_fuel.6.d: "몇 주간의 협상과 수십억 달러의 지출 끝에, 유엔은 노퍽 서던의 거대한 철도망을 장악했고 이를 전역의 중추로 삼았습니다. 한때 텅 비어 있던 화물 야적장은 이제 활동으로 가득합니다. 유엔 공병들은 기관차를 다시 칠하고, 배차원들은 열차 경로를 재조정하며, 푸른 조끼를 입은 정비반은 낡은 선로를 수리합니다. 대형 크레인은 평판화차 사이로 컨테이너를 옮기고, 병사와 민간 노동자들은 기관차에 연료를 채우고 보급품을 싣기 위해 분주히 움직입니다.\n\n그 규모는 엄청납니다. 수백 마일의 선로, 해질녘 깜빡이는 신호등, 여러 언어로 작성된 화물 목록. 열차는 탄약과 배급품뿐만 아니라 난민과 의료 지원까지 실은 채 시골을 가로질러 구불구불 나아갑니다. 모든 철도 분기점은 이제 요새가 되었고, 순찰대가 경비하며 드론이 감시합니다. 디젤 엔진의 소리는 이제 임무단의 심장박동이 되었고, 남부의 철도가 새로운 통제 아래 놓였음을 상기시킵니다.\n\n이 인수는 단순한 상징 그 이상입니다. 유엔은 이제 남부를 통과해 진격하면서, 그 도시와 군대를 먹여 살리는 경로를 통제하고 있습니다. 적재된 열차 하나하나는 유엔이 이곳에 머무를 것이라는 증거이며, 전쟁은 열차가 움직이는 속도만큼 움직일 것입니다. 철도는 더 이상 도시를 연결하기만 하는 것이 아닙니다. 이제 그것은 지역 전체의 운명을 결정합니다. 날마다 임무단의 영향권은 커지고, 남부의 미래는 철도에 달려 있습니다."
lra_fuel.6.a: "이제부터 철도는 푸른 깃발 아래 달린다."

lra_fuel.7.t: "민간의 손"
lra_fuel.7.d: "전쟁의 혼돈 속에서, 작전지원부는 임무단의 흔들림 없는 손이 됩니다. 식량, 연료, 의약품, 수송은 더 이상 흩어진 기관과 자원봉사자들이 제각각 관리하지 않습니다. 이제 모든 것이 조율됩니다. 구호 호송대는 추적되고, 난민 수용소는 지도로 정리되어 보급되며, 모든 비축품은 마지막 약품 하나까지 계산됩니다. 부서의 지휘센터는 무전 교신과 서류 작업으로 분주합니다. 대형 지도는 색깔표로 뒤덮여 있고, 각각은 막아낸 위기나 아직 기다리는 필요를 나타냅니다.\n\n호송대는 새벽에 출발하며, 경로는 매복을 피하고 효율적으로 움직이도록 계획됩니다. 난민 등록 줄은 급히 세운 천막을 둘러 길게 이어지고, 의사와 군수 담당자들은 질병 발생을 막기 위해 함께 일합니다. 모든 전달은 감시되고, 모든 불만은 기록됩니다. 서류와 절차는 늘어났지만 결과는 분명합니다. 식량은 필요한 이들에게 도착하고, 병자는 약을 받으며, 혼돈은 천천히 통제 아래 들어옵니다.\n\n이것은 위기 관리 그 이상입니다. 구호와 권위, 연민과 통제를 결합하는 새로운 통치 방식의 시작입니다. 임무단은 싸우는 것만큼이나 통치하는 법도 배우고 있으며, 질서는 무력만이 아니라 전쟁으로 부서진 사회를 조직하는 꾸준한 노동에서도 나온다는 것을 보여주고 있습니다."
lra_fuel.7.a: "영속성이란 이런 모습이다."

lra_fuel.8.t: "전쟁의 기계"
lra_fuel.8.d: "한때 임시 사무실의 작은 조직에 불과했던 임무지원실은 이제 신경계처럼 전역 전체를 덮고 있습니다. 예전에는 스프레드시트와 다급한 전화로 처리하던 일들이 이제 군사적 정밀함으로 처리됩니다. 조달 일정은 몇 달 앞서 계획됩니다. 보급소는 지도에 표시되고, 요새화되며, 24시간 인력이 배치됩니다. 차량 정비는 하루 종일 이어지고, 정비공들은 교대로 일하며 호송대가 멈추지 않도록 합니다. 경로 계획은 이제 지연을 피하고 가장 외딴 전초기지에도 보급품이 도달하도록 공중, 도로, 철도를 함께 조율하는 일을 뜻합니다.\n\n즉흥적으로 처리하던 낡은 방식은 사라졌고, 오래 버틸 수 있는 강한 조직으로 대체되었습니다. 서류 작업이 탄약만큼 중요할 수 있다는 것을 아는 장교들이 배치되며, 성장하는 관료제가 형태를 갖추고 있습니다. 임무단은 뿌리를 내리고 전쟁 이후에도 남을 체계를 만들고 있으며, 인간과 물자로 이루어진 이 기계는 전투가 끝난 뒤에도 남부를 빚어낼 것입니다."
lra_fuel.8.a: "전쟁은 버티는 자와 조직하는 자가 이긴다."

lra_fuel.9.t: "검게 그을린 분지"
lra_fuel.9.d: "전쟁 전 페름기 분지는 미국에서 가장 생산량이 높은 유전이었습니다. 미국 석유 생산의 40%를 차지하던 이 유전은 구 미국 경제와 산업에서 가장 중요한 요소 중 하나로 여겨질 수 있습니다. 임무단은 플로리다 안정화 이후 이곳을 주시해 왔으며, 임무단의 지속적인 성공에 필수적인 요소로 보았습니다.\n\n그러나 현장의 진실은 전혀 다른 이야기입니다. 텍사스에서 서로 다투던 여러 세력은 상대의 노력을 약화시키기 위해 유전에 불을 질렀습니다. 트랜스페코스 사막의 에이커마다 주황빛과 검은빛이 뒤섞인 맹렬한 화염에 휩싸였고, 그 광경은 우주에서도 보일 정도였습니다. 음울하게도, 그것은 30년 전의 반복처럼 보였습니다. 임무단이 치러야 할 생태적, 경제적, 인도주의적 비용은 막대하며, 불타는 땅을 다시 안정화하려 애쓰는 지금 이곳의 대지에는 영구적인 흉터가 남은 듯합니다."
lra_fuel.9.a: "지상의 지옥."

lra_fuel.10.t: "독의 바다"
lra_fuel.10.d: "유엔군이 뉴올리언스에 진입하고 루이지애나 해안을 따라 이동했을 때, 그들은 이 지역의 중요한 에너지 시설을 확보하리라 생각했습니다. 그러나 그들이 발견한 것은 끊어진 송유관, 손상된 펌프 시설, 폭발물로 파괴된 해상 시추 시설이었습니다. 석유는 물 위에 떠올라 걸프만을 검게 물들이고 습지를 질식시켰습니다. 사보타주는 너무나 철저해서 전체 네트워크가 유엔에게 쓸모없게 되었습니다. 설상가상으로 딥워터 호라이즌 유출 사고에 맞먹는 환경 재앙이 시작되었습니다.\n\n뉴스가 기름에 뒤덮인 동물과 파괴된 어장을 보여주자 사람들은 분노했습니다. 시위대는 유엔이 재앙을 막지 못했다고 비난했고, 지역 지도자들은 답변을 요구했습니다. 임무단의 평화유지군은 자신들이 도우려 했던 사람들에게 야유를 받았습니다. 세계가 답변과 해결책을 모두 요구하면서, 이 재앙은 모든 선택에 영향을 미쳤습니다. 자원을 둘러싼 싸움은 신뢰를 둘러싼 싸움으로 변했습니다."
lra_fuel.10.a: "이제 우리는 우리가 소유한 적도 없는 기름 바다 때문에 비난받는군."

lra_fuel.11.t: "흙탕 속의 나날"
lra_fuel.11.d: "참호 바닥에 빗물이 고여 제복과 군화를 적십니다. 멘사 이병은 분대원들 곁에 바짝 붙어 앉아, 남은 물과 오래된 크래커를 나눕니다. 그들의 얼굴은 땀과 흙으로 뒤덮여 있지만, 진짜 피로는 눈에 드러나 있습니다. 매일은 똑같습니다. 드론 소리, 날아드는 박격포탄, 그리고 다음 공격 전의 긴장된 침묵.\n"우리 잊힌 거 아닐까?" 한 병사가 모래주머니 너머를 살피며 속삭였습니다.\n\n"그럴 리 없어. 지휘부도 우리처럼 묶여 있을 뿐이야." 멘사가 말했고, 근처에 박격포탄이 떨어져 흙을 뒤집어쓰자 몸을 움찔했습니다. 다른 병사는 늘 작동하지 않는 고장 난 무전기를 붙잡고 조용히 욕을 했습니다. 분대는 이미 재보급을 받았어야 한다는 것을 알고 있지만, 제때 도착하는 것은 문제뿐입니다. 잠깐 숨을 돌리기도 전에 누군가가 적의 공격을 외쳤고, 이어 군홧발 소리와 총성이 뒤따랐습니다. 그들은 소총을 붙잡고 굶주림과 공포 속에서 싸웠습니다. 참호는 그들의 집이자 지옥이며, 그들을 살아 있게 하는 유일한 것이었습니다."
lra_fuel.11.a: "우리는 참호에서 산다. 싸운다. 죽는다. 그게 전부다."

lra_fuel.12.t: "드론 매복"
lra_fuel.12.d: "호송대는 망가진 조지아 도로를 기어가듯 나아갔고, 트럭들은 쓰러진 우편함, 녹슨 차량, 버려진 농가의 유령 같은 껍데기를 지나며 먼지구름을 뒤에 남겼습니다. 중간 차량 하나 안에서 구티에레스 이병은 소총을 움켜쥐고 울창한 숲을 바라보았습니다. 모든 포트홀과 그림자가 그의 심장을 철렁하게 했습니다. 늦은 오후의 햇살은 금이 간 앞유리를 황금빛으로 물들였지만, 그 아름다움은 오히려 긴장을 더 키울 뿐이었습니다. 갑자기 천둥 같은 폭발이 단조로움을 산산조각 냈습니다. 대열 맨 앞의 트럭이 흙과 파편 기둥 속에서 터져 올랐고, 나머지 호송대는 급히 멈춰 섰습니다.\n\n병사들은 차량에서 쏟아져 나와 우거진 풀과 도랑으로 흩어졌고, 눈은 더 많은 지뢰나 숨은 위협을 찾았습니다. 공기는 아드레날린과 금속성 공포의 냄새로 진동했습니다. 한순간, 구티에레스의 귀에서 울리는 이명 말고는 모든 것이 조용했습니다. 그러다 위쪽에서 불길한 윙윙거림이 들리기 시작했습니다. 처음에는 희미했지만, 곧 벌떼처럼 커졌습니다.\n"드론이다!" 누군가가 공포 섞인 목소리로 외쳤습니다. 누구도 반응하기 전에 폭탄을 실은 쿼드콥터 무리가 호송대 위로 내려왔고, 모터가 날카롭게 울며 급강하했습니다. 폭발이 연이어 트럭들을 찢어발겼고, 저녁 하늘은 불덩이들로 밝혀졌습니다. 병사들이 차축 아래로 몸을 던지거나 흙바닥을 기어가며 엄폐하려 애쓰는 가운데, 세계는 불과 연기와 비명으로 녹아내렸습니다.\n\n구티에레스는 자신을 쓰러뜨린 폭발을 보지 못했습니다. 그가 기억하는 것은 세상이 빙글빙글 돌던 것, 폭발의 천둥소리, 입안에 고인 피맛뿐이었습니다. 정신을 차렸을 때, 다른 병사가 불타는 잔해에서 멀리 떨어진 풀밭으로 그를 끌고 가고 있었습니다. 밤공기는 연기와 부상당한 평화유지군들의 울음소리로 가득했습니다. 남은 보급품은 뒤틀린 금속과 재뿐이었습니다. 그 손실은 굶주린 배와 빈 연료 탱크에서 느껴지겠지만, 구티에레스에게는 꿈속까지 따라붙을 것이었습니다. 불타는 트럭과 쓰러진 전우들의 기억, 피로 치른 대가로 말입니다."
lra_fuel.12.a: "한순간엔 집으로 가는 길이고, 다음 순간엔 불길 속이다."

lra_fuel.13.t: "유리와 먼지의 무덤"
lra_fuel.13.d: "분대는 폐허가 된 사무실 건물 바닥에 몸을 붙였습니다. 군화 밑에서는 유리가 바스러졌고, 공기는 먼지로 가득했습니다. 모든 창문에는 깨진 유리조각이 들쭉날쭉 남아 있었고, 벽은 총탄 구멍과 파편 자국으로 움푹 패여 있었습니다. RPG가 외벽을 두들기자 콘크리트 덩어리와 잔해 구름이 쏟아져 내렸습니다. 바깥에서는 적 IFV의 기관포가 끊임없이 끊어지는 소리로 건물 정면을 위아래로 꿰매듯 파괴했고, 거대한 예광탄은 그들의 머리 바로 몇 인치 위를 스쳐 지나갔습니다. 연발 사격이 이어질 때마다 분대원들은 몸을 움찔했고, 뒤집힌 책상과 무너진 칸막이 뒤에서 엄폐를 찾는 동안 석고와 모래먼지가 쏟아졌습니다.\n\n무전기에서는 지원을 요청하는 절박한 목소리가 지직거렸고, 갇힌 다른 부대들의 목소리는 분대 자신의 도움 요청과 뒤섞였습니다. "브라보 투, 우리는 제압당했다! 즉각 지원 요청!" 류 하사가 총성의 불협화음 속에서 간신히 들릴 만큼 외쳤습니다. 평화유지군 하나가 감히 반격할 때마다, 길 건너 숨은 적에게서 총알 폭풍과 조롱 섞인 고함이 날아왔습니다. 분대의 탄약은 바닥나고 있었고, 신경은 끊어질 듯 팽팽했습니다.\n\n수류탄 하나가 근처에 떨어져 귀를 찢는 굉음과 함께 폭발했고, 분대 위로 먼지와 파편을 뿌렸습니다. 한 평화유지군은 다리에 지혈대를 묶으며 분노와 고통이 뒤섞인 목소리로 외쳤습니다.\n"우리는 제압당했다! 놈들이 우리를 가둬 놓았어!" 류는 창가로 기어가 필사적인 사격을 하며 외쳤습니다. 잠시 동안은 절망적으로 보였습니다. 죽음은 확실해 보였고, 건물은 무덤이나 다름없었습니다. 그러나 혼돈 속에서 엔진의 울림과 무거운 궤도의 천둥소리가 들려왔습니다. 유엔 전차들이 현장으로 돌입했고, 포는 불을 뿜었습니다. 적 IFV는 화염구로 변했고, 지원군이 제압 사격을 퍼붓자 길 건너 건물은 유리와 콘크리트의 폭발 속에서 산산조각 났습니다. 두들겨 맞았지만 살아남은 분대는 구조대가 거리를 쓸어내는 모습을 지켜보았습니다. 적어도 지금은 안전했습니다. 유엔의 강철과 용기가 그들을 구한 것입니다."
lra_fuel.13.a: "전차가 성공한다면, 승리는 뒤따른다."

lra_fuel.14.t: "보급 조달 스캔들"
lra_fuel.14.d: "유엔이 맡아 온 모든 임무에는 저마다 고유한 문제가 있었습니다. 이제 남부에서 커지는 우려는, 자신들이 배치된 바로 그 임무에 보급을 담당하는 푸른 헬멧들의 의심스러운 충성심입니다.\n\n부패와 자금 유용은 대부분의 군대에 존재하는 문제이며, 신병의 질이 의심스러운 상황에서 유엔 내부에서도 횡령 사례가 발생하는 것은 불가피했습니다. 이미 고위 지휘부에는 평화유지군이 거액의 잔돈을 개인적으로 챙기거나, 지급된 자금을 사적으로 사용했다는 소식이 흘러들어오고 있습니다.\n\n문제는 광범위하고 보편적이며, 이 문제를 멈추려면 단속만으로는 부족할 듯합니다. 그러나 현재 상태에서는 그러한 단속조차 시행할 수 없습니다."
lra_fuel.14.a: "언제나 대가는 따르게 되어 있었다."

lra_fuel.21.t: "등유의 밤"
lra_fuel.21.d: "전선에서 떨어진 동네들에서, 가족들은 이제 전쟁을 전기가 들어오는 시간으로 셉니다. 진료소 뒤에서는 발전기가 웅웅거리고, 아파트 창문들은 예전보다 더 일찍 어두워지며, 사람들은 촛불이나 임시 램프로 밝혀진 식탁에 모여듭니다. 유엔 종군기자가 한 여성에게 이런 생활이 얼마나 계속될 수 있겠느냐고 묻자, 그녀는 그저 어깨를 으쓱했습니다.\n"필요한 만큼이겠죠." 그녀가 말했습니다. "하지만 제 아이들은 아직도 묻습니다. 왜 평화유지군에게는 트럭을 위한 연료와 보급품이 있는데, 집에는 없느냐고요."\n\n그 불만은 완전히 공정하지는 않더라도 이해할 만합니다. 임무단은 병사와 구급차와 구호품을 움직이기 위해 연료와 보급품이 필요합니다. 하지만 전쟁에 쓰이는 1톤은 민간인 누군가가 줄에서 더 오래 기다려야 한다는 뜻입니다. 조용한 저녁이 되면, 이런 선택들은 외면하기 어렵습니다."
lra_fuel.21.a: "나눠 줄 만큼 충분한 것은 결코 없다."


unnews.1.t: "애틀랜타가 불탄다!"
unnews.1.d: "애틀랜타 [AP] - 유엔 평화유지 부대가 화요일 새벽, 도시의 넓은 구역을 불길에 휩싸이게 한 지속적인 공중 폭격 이후 마침내 애틀랜타 북부 구역에 진입했습니다. 유엔 관할 아메리카, 즉 UNAA는 남아 있는 민간인들에게 인도주의 물자를 전달하기 위해 파견된 초기 군수 분견대가 "진행 중인 적극적 폭격을 발견했으며, 고정익 항공 자산에 의한 것으로 높은 신뢰도로 판단된다"고 확인했습니다.\n남부 연방사령부와 아메리카 연합 어느 쪽도 책임을 주장하지 않았습니다. 그러나 두 세력은 모두 이 지역에서 폭격기 운용이 가능한 유일한 현지 세력입니다.\n\n유엔 사무총장 대행 아미나 J. 모하메드는 동트기 전 짧은 성명을 발표했습니다. "어젯밤 애틀랜타에서 벌어진 일은 군사작전이 아니었습니다. 그것은 민간인에 대한 부당하고 야만적인 파괴였습니다. 우리 임무단은 이러한 배신적 범죄가 벌어지는 것을 방관하지 않을 것입니다." 이 발언은 임무단이 구 미합중국 본토의 옛 국경 전역으로 활동 범위를 확대하겠다는 발표 직전에 나왔습니다.\n\n유엔 지상군은 도시 외곽을 확보하기 위해 이동을 시작했습니다. 현장의 구호 요원들은 남부와 중앙 구역 전역에 광범위한 파괴가 벌어졌다고 설명했습니다.\n이번 개입은 제2차 미국 내전이 시작된 이래 UNAA 병력이 아메리카 연합의 명시적 영유권 주장에 맞서 움직인 첫 사례입니다."
unnews.1.a: "임무단은 자신의 입장을 분명히 했다."
unnews.1.b: "오, 인류여!"

unnews.2.t: "미국 유엔 임무단 선포"
unnews.2.d: "유엔 안전보장이사회는 남부 플로리다에 평화유지 임무단을 설립하는 긴급 결의안을 승인했습니다. 연방 정부가 붕괴하고 무장 세력이 전국으로 확산되는 가운데, 유엔은 이 상황을 국제 평화와 안보에 대한 위협으로 선언했습니다. 뉴욕시가 완전한 혼돈에 빠지고 도시의 통제권을 두고 다투는 여러 세력에 포위된 상황에서, 안전보장이사회는 마이애미가 개입에 가장 적합한 위치라고 판단했습니다.\n\n이른 새벽, 첫 번째 평화유지군 물결이 마이애미에 상륙하기 시작했고, 도시를 장악한 라 라사를 축출하는 작전이 성공했습니다. 화물기와 민간 전세기가 잇따라 도착해 구호품 팔레트와 함께 급히 유엔 표식을 칠한 장갑차를 하역했습니다. 푸른 헬멧들은 경계선을 형성했고, 연락장교들은 현지 당국과 만났으며, 인도주의 조정관들은 임시 본부를 설치했고, 북쪽에서 평화유지군과 군벌 사이의 무력 충돌이 격화되는 가운데 공병들은 즉각적인 확장을 위해 항구와 비행장을 조사했습니다.\n\n임무단이 안정화 세력이 될지, 아니면 미국에 몰려드는 폭풍 속의 또 다른 깃발이 될지는 앞으로 며칠 안에 결정될 것입니다."
unnews.2.a: "세계가 우리를 지켜보고 있다."

unnews.3.t: "유엔이 마이애미를 확보하다"
unnews.3.d: "몇 시간 동안 이어진 격렬한 폭동, 약탈, 광범위한 공황 끝에 마이애미 시는 유엔 평화유지군의 임시 통제 아래 놓였습니다. 이번 개입은 남부 플로리다에 깊숙이 자리 잡고 있던 라 라사 카르텔이 치열한 작전 끝에 도시에서 축출되면서 이루어졌습니다. 유엔 평화유지군은 플로리다의 분열된 통치 체제를 악용해 도시를 장악했던 카르텔의 손아귀에서 마이애미를 되찾았습니다.\n\n유엔은 마이애미와 그 주변 지역을 보호령으로 선포했으며, 론 디샌티스 주지사와 남아 있는 주민들의 반발에도 불구하고 이곳을 대규모 난민 재배치의 중심지로 삼을 계획을 추진하고 있습니다. 디샌티스는 "플로리다는 국제 기구의 지시를 따르지 않을 것"이라고 선언했지만, 그의 병력은 주 전체를 확보할 자원이 없는 상황입니다.\n\n안토니우 구테흐스 유엔 사무총장은 아직 이 작전에 대해 논평하지 않았으며, 안전보장이사회 내부에서는 이번 개입의 더 넓은 함의를 두고 논쟁이 벌어지고 있습니다. 현대사에서 처음으로 유엔은 미국 영토 위의 한 지역을 안정화하고 통치해야 하는 과제에 직면했습니다. 이는 주권과 미국 붕괴에 대한 세계적 대응을 둘러싼 중대한 질문을 제기하고 있습니다."
unnews.3.a: "유엔이? 뭔가를 한다고?"
unnews.3.b: "우리는 더 이상 방관하지 않을 것이다!"

unnews.4.t: "유엔이 뉴욕으로 돌아오다"
unnews.4.d: "제2차 미국 내전은 낯설지만 분명한 깃발 아래 끝났습니다. 오늘, 임무단의 권위에 맞선 마지막 조직적 저항이 얼마 전 붕괴하면서, 유엔 평화유지군은 해방된 뉴욕시의 거리를 행진했습니다. 이는 유엔 통치 아래 미합중국이 사실상 재통일되었음을 의미합니다. 전투가 시작된 이래 처음으로 푸른 깃발은 다시 이스트강 위에 휘날리고 있습니다. 전쟁에 포위된 본부 위가 아니라, 새로운 질서의 정치적 심장으로 되찾은 도시 위에서 말입니다.\n\n외교관, 평화유지군, 지친 민간인들 앞에서 조심스럽게 연출된 연설을 통해, 새로 선출된 사무총장 [ROOT.GetLeader]은 이 전쟁이 정복이 아니라 회복으로 끝났다고 선언했습니다. 수년간의 국가적 파멸 이후 법과 평화, 공동의 미래를 회복하는 일이라고 말입니다. 새 행정부는 헌정적 합의, 유엔 후견 아래 연방 제도의 재건, 그리고 전시 임무단을 영구 민간 권위로 전환할 것을 약속했습니다. 지지자들은 이 순간을 미국이 완전한 붕괴에서 구원받은 순간으로 환영합니다. 반면 국내외 비판자들은 이를 국제 통치 아래 옛 공화국이 매장된 순간이라고 부릅니다.\n\n로어 맨해튼에 모인 군중은 평화유지군이 옛 유엔 단지 주변 도로를 확보하고, 공병과 민간 직원들이 전쟁 초기의 혼돈 속에서 버려졌던 건물로 다시 들어가는 모습을 지켜보았습니다. 어떤 이들은 환호했고, 어떤 이들은 침묵했으며, 다른 이들은 자신들이 이제 어느 나라에 속한 것인지 확신하지 못한 채 바람에 펄럭이는 깃발을 올려다볼 뿐이었습니다. 역사가 이 새로운 국가에 어떤 이름을 붙이든, 한 가지 사실만은 이미 논쟁의 여지가 없습니다. 유엔은 미국의 붕괴에서 단순히 살아남은 것이 아닙니다. 그것은 대륙을 통치하는 권력으로 그 붕괴 속에서 떠올랐습니다."
unnews.4.a: "푸른 깃발이 미국 위로 솟아오른다."

unnews.5.t: "미국을 위한 녹색 여명"
unnews.5.d: "제2차 미국 내전은 첫 총성이 울렸을 때 누구도 상상하기 어려웠던 결과로 끝났습니다. 유엔의 권위 아래 미합중국이 재통일된 것입니다. 오늘, 유엔군과 민간 행정관들이 뉴욕시에 완전히 진입하여 이 도시를 정부 소재지로 복원하고, 조직을 상징적으로 옛 본부가 있는 이스트강으로 되돌려 놓았습니다. 그러나 아힘 슈타이너 사무총장에게 이 승리는 외국 점령의 승리가 아니라, 그가 "현대 최대의 재건 노력"이라고 부른 것의 시작으로 제시되었습니다.\n\n뉴욕에서의 첫 연설에서 슈타이너는 군사적 성공보다 재생에 대해 더 많이 말했습니다. 그는 새 행정부가 열병식이나 법령이 아니라, 무너진 도시를 재건하고, 공공 보건을 회복하며, 청정에너지를 확대하고, 수백만 명에게 일자리를 만들고, 전쟁으로 파괴된 사회가 더 공정하고 지속가능한 토대 위에서 다시 만들어질 수 있음을 증명할 수 있는지로 평가받을 것이라고 약속했습니다. 새 정부와 가까운 관리들은 이미 재건, 긴급 주거, 공공사업 계획, 그리고 거의 모든 국가 부처에 녹색 개발 원칙을 통합하는 대대적인 계획을 제시했습니다. 지지자들은 이를 국가 붕괴에 대한 인간적인 해답이라고 부릅니다. 비판자들은 승리한 군대가 뒷받침하는 이상주의도 결국 권력이라고 경고합니다.\n\n전 세계의 반응은 호기심만큼이나 불안합니다. 어떤 이들은 슈타이너의 승리에서 명령하기 전에 재건하는 더 온건한 국제 질서의 가능성을 봅니다. 다른 이들은 재생이라는 언어로 포장된, 미국 땅 위의 유엔 후계국 탄생이라는 불편한 현실만을 봅니다. 뉴욕 자체에서는 푸른 깃발이 재건 현수막과 환경 구호 옆에 나부끼는 가운데, 도시는 피로와 희망 사이에 걸려 있는 듯 보입니다. 세계가 무엇이라 부르든, 이 새로운 미국은 자신을 정복당한 나라가 아니라 다시 태어난 나라로 내세우려 합니다."
unnews.5.a: "재건이 시작된다."

unnews.6.t: "세계주의의 성채"
unnews.6.d: "제2차 미국 내전은 옛 미합중국의 복원이 아니라 새로운 국제 질서의 공개적 승리로 끝났습니다. 오늘, 유엔 평화유지군은 마지막 공식 저항이 마침내 항복하면서 미국에서의 임무를 완료했습니다. 이제 유엔은 정부 소재지를 공식적으로 이스트강으로 이전했으며, 복원된 유엔 본부는 더 이상 단순한 외교 단지가 아니라 장피에르 라크루아 사무총장 아래 재통일된 미국의 수도로 기능하게 되었습니다. 승리 연설에서 라크루아는 이 전쟁을 단순히 극복된 국가적 비극이 아니라, 분열된 주권의 시대가 끝나 가고 있다는 증거로 묘사했습니다.\n\n라크루아 아래에서 새 정권은 자신의 야망의 규모를 숨기려 거의 노력하지 않았습니다. 뉴욕의 관리들은 상호의존성을 운명으로, 상품과 사람과 사상의 자유로운 이동을 평화의 토대로, 그리고 유엔을 붕괴하는 세계에 질서를 강제할 정통성과 의지를 모두 갖춘 유일한 제도로 공개적으로 말합니다. 지지자들은 이 순간을 한 세기 동안의 마비 뒤 국제주의가 정당화된 순간으로 환영하며, 미국이 보편적 미래의 첫 진정한 거점이 되었다고 주장합니다. 비판자들은 이 "미래"가 무력으로 건설되었고, 뉴욕에서 떠오르는 것은 민족들의 연방이라기보다 세계국가의 핵심에 가깝다고 답합니다.\n\n해외의 반응은 즉각적이고 격렬했습니다. 어떤 수도에서는 신중한 찬사가 나왔고, 다른 수도에서는 공황에 가까운 경계심이 번지고 있습니다. 시장과 부처들은 라크루아의 승리가 단순히 미국 내전의 종식을 의미하는지, 아니면 푸른 깃발의 형상대로 세계를 재편하려는 더 넓은 전역의 시작을 의미하는지 이해하려 애쓰고 있습니다. 오늘 밤, 불이 켜진 유엔 본부의 정면은 다시 한 번 맨해튼 위로 빛납니다. 그러나 멀리서 지켜보는 많은 이들에게, 그것은 더 이상 nations의 집처럼 보이지 않습니다. 훨씬 더 거대한 무언가의 첫 성채처럼 보입니다."
unnews.6.a: "이제 뉴욕은 세계의 것이다."

unnews.7.t: "유엔이 소집되다!"
unnews.7.d: "미국 내전이 새천년의 현상 유지를 무너뜨린 가운데, 유엔은 1964년 런던 이후 처음으로 다시 소집되었습니다. 현재의 분쟁으로 인해 워싱턴의 외교관들이 불참한 것이 두드러지는 가운데, 전 세계의 외교관들은 내전에 서로 다른 반응을 보이며 총회 자체도 격렬한 갈등의 소용돌이에 휩싸였습니다. 압둘라 샤히드의 중재를 통해서야 총회가 완전한 혼돈에 빠지는 것은 막을 수 있었습니다.\n\n우선 법 질서 붕괴로 급증하는 난민 인구를 지원하고 고갈되어 가는 물자를 보충하기 위해, 미국 동부 해안과 주변 국가들에 즉시 배치될 인도주의 평화유지 태스크포스를 창설하자는 합의가 이루어졌습니다.\n\n한국전쟁 당시와 같은 노골적인 유엔 연합국 파견안은 중국과 러시아 양측의 거부권 행사로 무산되었습니다. 중국의 유엔 대표 장쥔의 표현에 따르면 그 이유는 "미국의 공인된 권위의 부재"였습니다. 한 세기만에 두 번째 초강대국이 붕괴하면서 새로운 분쟁이 떠오를 운명에 놓인 지금, 총회는 몰려오는 폭풍에 대비하고 있습니다."
unnews.7.a: "이제 무슨 일이 벌어지는가?"

#Battle of Atlanta
unnews.8.t: "애틀랜타 전투"
unnews.8.d: "미국 남부 전역에서 몇 주간 이어진 혼돈과 붕괴 끝에, UNMIA는 도시를 두고 다투던 잡다한 무장 집단들과의 치열한 시가전 끝에 애틀랜타를 점령했다고 발표했습니다. 유엔 종대가 외곽에 접근했을 때, 도시는 이미 서로 싸우고 외부에서 도시를 공격하려는 모든 세력과도 교전하는 적대적 고립 지대들로 갈라져 있었습니다.\n\n전투는 곧 한 블록씩 전진하는 지리멸렬한 전역으로 변했습니다. 유엔 평화유지군은 저격수의 사격을 받으며 부서진 고속도로를 따라 밀고 들어갔고, 근접전으로 아파트 단지를 소탕했으며, 유엔 기갑이 적 기갑과 충돌하는 가운데 주요 교차로를 장악하기 위해 싸웠습니다. 공병들이 폭발물을 해체하고 도로를 다시 열기 위해 작업하는 동안 인도주의 호송대는 반복적으로 지연되었고, 의료팀은 손상된 학교와 환승센터 안에 임시 분류소를 설치했습니다.\n\n오늘 새벽, 유엔군은 도심 내 마지막 주요 거점을 확보하고 핵심 행정 건물 위에 깃발을 올렸습니다. 고립된 지역에서는 산발적인 총성이 계속되고 있지만, 애틀랜타는 이제 유엔 통제 아래 있는 것으로 간주됩니다. 임무단은 이 도시를 우선 안정화 구역으로 선포하며, 상황이 허락하는 대로 구호 배급 재개, 기본 서비스 복원, 핵심 기반시설 재개방을 약속했습니다."
unnews.8.a: "남부의 중대한 전환점이다."

#Battle of Fort Myers
unnews.9.t: "포트마이어스 전투"
unnews.9.d: "유엔 임무단은 몇 주간의 치열한 전투 끝에 포트마이어스를 점령했다고 발표했습니다. US-41과 I-75를 따라 진격하는 것으로 시작된 작전은, 칼루사해치로 향하는 접근로가 곧 양면 전투로 변하면서 복잡해졌습니다. 유엔 종대가 안쪽으로 밀고 들어가는 동안, 플로리다 주방위군은 혼란을 이용하려고 북쪽 외곽에서 탐색과 소규모 교전을 벌였습니다.\n\n퍼스트 스트리트와 강변 근처 도심 블록에 참호를 구축한 아톰바펜 전투원들은 부비트랩과 인간 방패를 활용하며 필사적인 지연전을 벌였습니다. 평화유지군은 상층부에서 날아오는 저격수 사격, 골목에서 벌어지는 자살폭탄범의 매복, 주요 도로 주변에 설치된 급조폭발물을 보고했습니다. 전투가 교량과 지하차도까지 번지면서 공병들은 건물 하나하나를 확보하며 경로를 열어야 했고, 의료팀은 리 메모리얼 병원 근처에 환자 분류소를 설치했습니다.\n\n새벽 무렵, 도심 안의 마지막 조직적 저항은 지속적인 압박 아래 붕괴했습니다. 유엔 부대는 도심 핵심부를 확보하고 남은 무장분자들을 도주하거나 항복하게 만든 뒤, 포트마이어스 외곽 안정화로 방향을 돌려 도시 가장자리를 탐색하던 주방위군을 보급로를 끊기 전에 밀어냈습니다. 주방위군의 공격은 계속되고 있지만, 포트마이어스는 이제 유엔 통제 아래 있는 것으로 간주되며, 주요 도로 곳곳에 검문소가 설치되고 인도주의 팀들이 전선 뒤로 들어가고 있습니다."
unnews.9.a: "유엔은 계속 행진한다."

#Battle of Tampa
unnews.10.t: "탬파 전투"
unnews.10.d: "유엔 임무단은 도시 전역에 참호를 구축한 주방위군 편제와의 지속적인 전투 끝에 탬파에서의 승리를 선언했습니다. 평화유지군이 I-275를 따라 진격하자, 세인트피터즈버그로의 도하를 막기 위해 선샤인 스카이웨이 브리지가 폭파되었습니다. 이는 45년 전 첫 붕괴 이후 두 번째 붕괴였습니다. 탬파 자체에 가까워지자 밀집한 동네들에서 근접전이 벌어졌고, 도심으로 이어지는 병목 지점을 지키려는 방어자들의 반복된 시도 속에서 민간인들이 십자포화에 휘말렸습니다.\n\n가장 치열한 전투는 포트 탬파 베이와 맥딜 공군기지 접근로 근처에서 벌어졌습니다. 주방위군 병력은 유엔이 전략적 거점을 확보하지 못하도록 싸웠습니다. 평화유지군은 요새화된 교차로에서 날아오는 기관총 사격, 주차 구조물에 구축된 방어진지, 해안가 근처에 산발적으로 떨어지는 박격포탄을 보고했습니다. 작전을 더욱 복잡하게 만든 것은 유엔과 주방위군 전선 양쪽에서 활동하던 소규모 아톰바펜 게릴라 세포들이었습니다. 이 세포들은 고립되고 무질서했으며 이동하는 전선 사이에 갇혀 있었지만, 뒷골목과 버려진 건물에서 갑작스러운 공격을 벌였습니다. 땅을 지키기보다는 가능한 한 많은 사상자를 내는 것이 목적인 듯했습니다.\n\n오늘 새벽, 유엔 부대는 남은 방어선을 돌파하고 도심 회랑을 확보했으며, 후속 병력은 이버 시티와 주요 교통로를 소탕해 테러 세포의 추가 사보타주를 막았습니다. 탬파는 이제 유엔 통제 아래 있는 것으로 평가되며, 임무단 관계자들은 도시의 그림자 속에서 여전히 활동하는 극단주의 잔당을 제거하기 위한 표적 급습을 수행하는 한편, 연료 저장소, 항만 시설, 핵심 기반시설 확보에 우선순위를 둘 것이라고 밝혔습니다."
unnews.10.a: "빅 구아바가 함락되었다."

#Battle of Orlando
unnews.11.t: "올랜도 전투"
unnews.11.d: "올랜도는 미국 위기에서 지금까지 벌어진 가장 혼란스러운 시가전 중 하나 끝에 유엔군에 의해 점령되었습니다. 단일한 지배 권위가 있던 다른 도시들과 달리, 올랜도의 통제권은 카르텔 조직, 군벌 민병대, 극단주의 세포, 주방위군 분견대 등 사이에 쪼개져 있었고, 어느 쪽도 거리를 완전히 장악하지 못했습니다.\n\n전투는 I-4 회랑을 따라, 그리고 인터내셔널 드라이브 주변의 밀집한 도시 확장 지역으로 번졌습니다. 디즈니 월드와 주변 관광지는 많은 카르텔 전투원의 거점이 되었고, 끊임없는 매복과 부비트랩이 벌어지는 피비린내 나는 전투로 이어졌습니다. 유엔 부대는 시간마다 바뀌는 겹겹의 "전선"을 지나 전진했고, 오렌지 카운티 컨벤션 센터 근처에서 교전을 벌이며 라이벌 집단들이 후퇴하고 재집결하고 반격하는 가운데 이올라 호수 방향으로 밀고 나아갔습니다. 요새화된 상점, 돌아다니는 테크니컬 차량, 갑작스러운 매복은 단순한 도로 횡단을 주요 교전으로 바꾸었습니다. 올랜도 국제공항에서는 무장 세력들이 도주하거나 항공기와 연료를 차지하려 하자, 평화유지군이 활주로와 터미널 확보를 위해 싸웠습니다.\n\n새벽 무렵, 유엔군은 도심을 확보하고 연속적인 경계선을 세우며 남은 무장 집단들을 고립된 포켓으로 분단했습니다. 임무단은 다수의 무기가 압수되었고 포로 처리를 위한 여러 구금 시설이 설치되었다고 보고했습니다. 평화유지군이 계속 북쪽으로 진격하는 가운데, 올랜도는 이제 유엔 행정 아래 있는 것으로 간주됩니다. 며칠 안에 구호 호송대가 도시에 진입할 것으로 예상되며, 한때 거리를 지배했던 혼돈이 되돌아오지 않도록 확대된 순찰대가 이를 경호할 것입니다."
unnews.11.a: "지상에서 가장 행복한 도시가 돌아올 수 있을까?"

#Battle of Jacksonville
unnews.12.t: "잭슨빌 전투"
unnews.12.d: "잭슨빌은 폐허가 된 도시 전역에서 벌어진 잔혹한 전투 끝에 유엔 통제 아래 들어갔습니다. 도시는 대부분 플로리다 주 병력이 장악하고 있었지만, 법질서의 붕괴는 동네 전체를 포식의 대상으로 방치했습니다. 유엔 부대가 접근하자, 주민들이 MS-13으로 식별한 카르텔 총잡이들이 더 넓은 전투의 혼란 속에서 상점을 약탈하고 민간인을 위협하고 있다는 보고가 퍼졌습니다.\n\n전투의 중심은 세인트존스강 도하 지점과 도심으로 이어지는 주요 동맥이었습니다. 유엔군은 산발적인 사격을 받으며 I-95와 I-10 교차로를 돌파한 뒤, 방어자들이 북안과 남안 사이의 이동을 막으려 하자 메인 스트리트 브리지와 아코스타 브리지 장악을 두고 싸웠습니다. TIAA 뱅크 필드와 항만 접근로 근처에서는 소규모 교전이 번졌고, 기갑 부대는 기관총 진지가 있던 건물을 파괴했습니다. 별도 분견대는 리버사이드와 버려진 상업 지구를 따라 무장 약탈자들과 충돌했습니다. 평화유지군은 이 전투를 "동시에 벌어진 두 개의 전쟁"으로 묘사했습니다. 하나는 조직화된 진지를 상대로 한 전쟁이고, 다른 하나는 혼돈을 이용하는 떠돌이 갱단을 상대로 한 전쟁이었습니다.\n\n곧 유엔군은 핵심 행정 시설과 교통 회랑을 확보하여 남은 방어자들의 철수를 강요하고, 카르텔 집단을 흩어진 잔존 거점으로 쪼개 놓았습니다. 순찰대는 이제 부두, 철도 야적장, 외곽 항공 시설로 이동해 폭력의 재발을 막고 있습니다. 임무단은 유엔이 마침내 조지아 국경까지 통제권을 확대함에 따라 잭슨빌을 우선 안정화 구역으로 선포했으며, 즉각적인 구호 배급과 도시 붕괴 속에서 번성한 포식적 무장 집단에 대한 단속을 약속했습니다."
unnews.12.a: "강의 도시에 질서가 돌아온다."

#Battle of Tallahassee
unnews.13.t: "탤러해시 전투"
unnews.13.d: "유엔 임무단은 플로리다주의 남은 중앙 지휘 구조를 끝장낸 격렬한 전투 끝에 탤러해시를 점령했다고 발표했습니다. 오랫동안 충성파 보안 병력에 의해 요새화되었던 주도는, 유엔 종대가 남쪽과 동쪽 접근로를 따라 진격하고 캐피털 서클 근처 방어선을 탐색하며 도심 지구로 밀고 들어가면서 초점이 되었습니다. 플로리다 주의사당 단지와 플로리다 주립대학교로 이어지는 회랑 주변에서 전투가 격화되었고, 방어자들은 구축 진지, 용치 장애물, 집중된 기관총 살상 구역으로 진격을 늦추려 했습니다.\n\n유엔 부대가 도심 통제를 좁혀 가자, 저항은 고립된 주방위군 소규모 포켓들로 갈라졌습니다. 작전의 마지막 단계에서 가장 극적인 순간이 벌어졌습니다. 평화유지군과 UNPOL 병력이 핵심 정부 관저와 기록 보관소를 확보하러 이동했을 때였습니다. 한 사저에서는 무장 경비들이 수색을 지연시키려 하며 짧은 교전이 벌어졌습니다. 충돌은 빠르게 끝났고, 론 디샌티스는 큰 부상 없이 유엔 구금하에 들어갔습니다. 임무단 관계자들은 그가 삼엄한 경비 아래 구금되어 있으며, 유엔 행정 법률 권위 아래 재판 절차에 직면할 예정이라고 확인했습니다.\n\n밤이 되자 유엔군은 도시 전역의 주요 건물 대부분을 확보하고 검문소 설치를 시작했습니다. 가장 완강한 잔존 세력과의 전투는 계속되고 있지만, 탤러해시는 이제 유엔 통제 아래 있는 것으로 간주됩니다. 임무단은 이 도시를 플로리다와 미국 전체의 조정 작전 중심지로 선포했으며, 플로리다 주민들에게 정상성의 감각을 되돌리기 위한 추가 안정화 조치를 약속했습니다."
unnews.13.a: "탤러해시의 폭군이 쓰러졌다."

#Cindy McCain Victory
unnews.14.t: "미합중국의 재탄생"
unnews.14.d: "제2차 미국 내전은 유엔의 권위 아래 미합중국이 재통일되는 것으로 끝났지만, 신디 매케인 사무총장 아래에서 그 결과는 기묘한 국제 후계국의 탄생이라기보다 미국 공화국 그 자체의 회복으로 규정되었습니다. 오늘, 유엔군은 뉴욕시에서 마지막 치안 작전을 완료했으며, 수도는 공식적으로 이전되었고 옛 유엔 본부는 새 국가 정부의 소재지로 복원되었습니다. 미국과 유엔의 상징 아래 진행된 승리 연설에서 매케인은 전쟁이 혹독한 교훈을 증명했다고 선언했습니다. 세계는 실패한 국가, 극단주의자, 망설이는 외교에 맡겨 두기에는 너무 위험하다는 교훈입니다.\n\n매케인 정부는 더 강한 유엔의 규율, 영향권, 국제적 의무를 갖추고 미합중국의 제도를 재건하겠다고 약속했습니다. 지지자들은 이 합의를 미국의 회복과 세계적 책임의 결합으로 묘사하며, 오직 회복된 미국만이 옛 유엔이 제공하기에는 너무 약했던 안정과 개입주의적 지도력을 제공할 수 있다고 주장합니다. 그러나 비판자들은 복원의 상징이 더 깊은 변화를 숨기고 있다고 경고합니다. 미국은 단순히 다시 태어난 국가가 아니라, 훨씬 더 적극적인 국제 질서의 무장한 정치 중심지로 재편되었다는 것입니다.\n\n해외 반응은 엇갈리고 있습니다. 일부 동맹국 정부는 그 기반이 얼마나 달라졌든 익숙한 미국 국가가 돌아온 듯 보이는 것을 환영했습니다. 다른 이들은 더 불편한 진실을 봅니다. 승리한 유엔은 단순히 미합중국의 붕괴에서 살아남은 것이 아니라, 그것을 더 강하고 더 중앙집권적이며 해외로 권력을 투사하려는 의지가 훨씬 강한 무언가로 재건했습니다. 뉴욕이 다시 한 번 재통일된 미국의 수도가 된 지금, 많은 이들은 이것이 정말 공화국의 귀환인지, 아니면 그 최종적 재발명의 시작인지 궁금해하고 있습니다."
unnews.14.a: "미국은 푸른 깃발 아래 돌아온다."

#Cheryl Pearce Victory
unnews.15.t: "미국에 질서가 회복되다"
unnews.15.d: "오늘 뉴욕시에서, 유엔 본부는 내전이 시작된 이후 처음으로 공식적으로 유엔의 수도로 복원되었으며 새로운 미국의 새 정치 수도 역할을 하게 되었습니다. 셰릴 피어스 사무총장은 국민을 향한 연설에서 더 이상 정글의 법칙에 지배되지 않고, 유능하고 규율 잡힌 지휘 아래 하나로 묶인 새로운 시대에 대해 말했습니다.\n\n고위 관리들은 피어스의 새 정부가 평화유지군의 영구적 존재 위에 세워진 정부라고 설명했습니다. 이 병력은 안정의 닻이자 공화국의 중추로 변화하고 있습니다. 지지자들은 혼돈을 끝낸 피어스의 노력을 칭송했지만, 비판자들은 미국 민주주의가 영원히 군대의 그림자 아래 살아가게 될 것이라고 주장했습니다.\n\n국제사회의 반응은 엇갈리고 있습니다. 미국의 붕괴로 피해를 입은 국가들은 안정을 떠받드는 새 정부를 따뜻하게 받아들였지만, 일부는 이것을 이 세계의 모든 주권국에 대한 경고로 봅니다. 유엔이 옛 초강대국을 지배할 수 있다면, 그들에게는 또 무엇이 기다리고 있겠습니까?"
unnews.15.a: "평화는 훈련을 통해 영속화되었다."

#Alexandre Zouev or Daniel Prins Victory
unnews.16.t: "감독 아래의 공화국"
unnews.16.d: "뉴욕시 점령과 조직적 저항의 최종 붕괴로, 제2차 미국 내전은 역사적이면서도 기묘한 합의 속에 끝났습니다. 유엔은 자신의 권위 아래 미합중국을 재통일했으며, [ROOT.GetLeader] 사무총장 아래 새 국가는 단순한 복원이 아니라 감독되는 정치 질서로 공개적으로 묘사되고 있습니다. 이제 정부 소재지이기도 한 복원된 유엔 본부에서 진행된 공식 연설에서, [ROOT.GetLeader]은 미국의 붕괴가 너무 많은 국가들이 여전히 인정하기를 거부하는 진실을 보여주었다고 선언했습니다. 정부가 책임 있게 통치할 능력을 입증하지 못할 때, 주권은 더 이상 의심받지 않는 권리로 남을 수 없다는 진실입니다.\n\n[ROOT.GetLeader] 행정부는 관리들이 과도 신탁통치 공화국이라고 부르는 체제의 토대를 놓기 시작했습니다. 그것은 법, 감시, 다층적 감독 위에 세워진 질서입니다. 민간 행정, 안보 기관, 지방 통치는 모두 보존될 것이지만, 옛 공화국의 혼돈이 되돌아오지 못하도록 보장하는 감독 체계 안에서만 허용될 것입니다. 지지자들은 이것이 현대 국가 붕괴에 대한 유일하게 제정신인 해답이라고 주장합니다. 방치 대신 후견, 노골적 폭정 없는 질서, 자유에 앞선 책임이라는 것입니다. 비판자들은 이를 더 세련된 언어로 포장한 온정주의, 자치를 국제적 감독 아래 획득해야 할 특권으로 취급하는 부드러운 말투의 제국이라고 부릅니다.\n\n세계의 반응은 긴장되고 깊게 갈라져 있습니다. 어떤 이들은 유엔의 승리에서 곧 다른 불안정 지역으로 수출될지도 모르는 모델, 즉 유엔 제도가 집행하는 "책임 있는 주권"이라는 새로운 교리를 봅니다. 다른 이들은 국가가 스스로를 통치하거나 전혀 통치하지 않는다는 오래된 원칙이 조용히 매장되는 소리만을 듣습니다. 오늘 밤 뉴욕, 이스트강의 불빛 아래에서 유엔 본부는 외교 건물 이상의 무언가가 되었습니다. 그것은 한 국민이 스스로를 다스릴 준비가 되었는지를 결정할 권리를 주장하는 국가의 수도가 되었습니다."
unnews.16.a: "감독은 주권이 된다."

#UN VS WG
unnews.500.t: "유엔과 세계정부의 전쟁"
unnews.500.d: "인류의 미래를 둘러싼 거대한 투쟁이 공개 전쟁으로 폭발했습니다. 뉴욕과 브뤼셀에서 동시에 송출된 방송에서, 유엔과 클라우스 슈밥의 세계정부는 서로가 세계 평화에 대한 최후이자 최대의 위협이 되었다고 비난했습니다. 한때 외교가에서 피할 수 없는 충돌로 속삭여지던 것이 이제 현실이 되었습니다. 지구를 다시 만들 권리를 주장하는 두 보편적 계획이 각자의 규탄을 선언으로 바꾼 것입니다.\n\n뉴욕에서 유엔 당국은 이 전쟁을 국제주의를 지배로 뒤틀어 버린 정권에 맞선 최후의 저항으로 규정하며, 세계정부를 국가와 정체성, 정치적 삶을 하나의 기술관료적 질서로 납작하게 만들기 위해 만들어진 기계라고 비난했습니다. 브뤼셀에서 슈밥의 정부도 똑같은 분노로 응답하며, 유엔을 평화의 언어 아래 정복을 감추려는 푸른 위선의 제국이라고 규탄했습니다. 양측은 이제 모두 자신이 통합을 대표한다고 주장합니다. 양측 모두 상대가 문명의 가면을 쓴 악몽이라고 말합니다.\n\n군사 동원은 이미 진행 중입니다. 대서양 항로는 무장 호위 아래 조여들고, 대사관은 비워지고 있으며, 지구상의 모든 수도는 가장 광범위한 두 국제 프로젝트가 자신들의 분쟁을 무력으로 해결하기로 선택한 세계에서 중립이 아직 가능한지 판단하기 위해 분주히 움직이고 있습니다. 이것은 지역 전쟁도, 국경이나 조약을 둘러싼 분쟁도 아닙니다. 누구에게, 혹은 그 누구에게도 인류를 통치할 권리가 있는지를 둘러싼 투쟁입니다.\n\n오늘 밤, 세계는 단순히 군대가 움직이는 것을 지켜보는 것이 아닙니다. 그것은 시대의 오래된 질문이 끔찍한 형태로 돌아오는 것을 지켜보고 있습니다. 하나의 세계 질서만이 존재할 수 있다면, 누가 그것을 세울 것이며, 누가 그 안에서 살아남을 것인가?"
unnews.500.a: "이 세계는 둘을 담기에는 너무 좁다."
unnews.500.b: "최후의 대결이 시작된다."

#UN VS POA
unnews.501.t: "유엔과 중국의 전쟁"
unnews.501.d: "태평양 전역에서 오랫동안 우려되던 대립이 공개 전쟁으로 변했습니다. 처참한 평화유지 임무단에서 적극적인 세계 권력으로 새롭게 변모한 유엔은 중화인민공화국과 직접 충돌에 들어갔습니다. 몇 달간 이어진 비난의 고조, 전략적 태세 과시, 외교적 붕괴 끝에 뉴욕과 베이징의 관리들은 이제 적대 행위가 진행 중임을 확인했습니다.\n\n베이징에게 미국에서 군사화되고 주권을 갖춘 유엔이 부상하는 것은 언제나 용납할 수 없는 일이었습니다. 미합중국의 껍데기 안에서 다시 태어난 외국의 보편적 계획이, 한 대륙뿐만 아니라 국제 질서의 미래 자체에 대한 권위를 주장하고 있었기 때문입니다. 유엔에게 중국은 통합된 세계 체계라는 비전에 남은 최대의 도전자입니다. 오래되고, 거대하며, 규율 잡힌 국가이자, 자기 형상대로 세워지지 않은 어떤 질서에도 복종하기를 거부하는 국가입니다. 이제 어느 쪽도 타협의 언어를 말하지 않습니다. 양측은 서로를 평화에 남은 최후의 장애물로 묘사합니다.\n\n그 함의는 충격적입니다. 태평양을 가로지르는 해상로는 이미 위협받고 있고, 금융시장은 요동쳤으며, 도쿄에서 델리에 이르는 각국 정부는 수 세대에 걸친 세력 균형을 다시 그릴 수 있는 충돌의 충격파에 대비하기 위해 분주히 움직이고 있습니다. 군사 분석가들은 전투가 동아시아의 항로와 항공 회랑에서부터 전 세계의 대리 전선과 정치적 위기까지 뻗어 나갈 수 있다고 경고합니다.\n\n태평양 전역에서 첫 경보가 울리는 가운데, 나머지 세계는 그저 지켜보며 궁금해할 수밖에 없습니다. 이것이 단지 21세기를 누가 이끌지를 결정하는 전쟁인지, 아니면 그 세기가 온전하게 살아남을 수 있을지까지 결정하는 전쟁인지 말입니다."
unnews.501.a: "태평양이 숨을 죽인다."
unnews.501.b: "세기를 건 투쟁이 시작된다."

