#Last Bastion Of Hope
lra.30.t: "빈 의자"
lra.30.desc: "탤러해시의 회의장은 이런 일을 위해 지어진 곳이 아니었습니다. 플로리다 주의사당의 낡은 위원회실은 주 예산, 지역 분쟁, 그리고 일상적인 주 정부 활동이라는 느린 기계를 위해 만들어졌지, 반쯤 밀려난 유엔이 여전히 미래를 가질 수 있는지를 결정하는 비상 회의를 위해 만들어진 곳은 아니었습니다. 그러나 모든 자리는 가득 찼습니다. 제복을 입은 평화유지군은 몇 달 전까지만 해도 뉴욕에서 일하던 공무원, 구호 조정관, 외교관 옆 벽을 따라 서 있었습니다. 방의 앞쪽에는 의자 하나가 유난히 비어 있었습니다.\n\n처음에는 아무도 안토니우 구테흐스의 이름을 말하지 않았습니다. 그 이름을 둘러싼 침묵은 어떤 연설보다 무거웠습니다. 서류가 뒤섞이고, 전문이 앞으로 전달되었으며, 짧은 순간 동안 임무단 전체가 슬픔과 불확실성 사이에 멈춘 듯했습니다. 그러자 아미나 J. 모하메드가 일어섰습니다. 그녀의 목소리는 방을 진정시키기에 충분할 만큼 침착했습니다. 그녀는 마이애미 폭탄 테러가 사무총장을 죽이는 것 이상을 노린 것이라고 말했습니다. 그것은 임무단의 담력을 꺾고, 유엔도 다른 겁먹은 기관처럼 퇴각하도록 겁줄 수 있다고 세계를 설득하려는 것이었습니다.\n"그렇게 되지 않을 것입니다"라고 그녀는 단호히 말했습니다. "이 임무단은 분열되지 않을 것입니다. 유엔은 도망치지 않을 것입니다. 플로리다와 미국 전체는 민병대, 군벌, 그리고 혼돈을 권력으로 착각하는 자들에게 버려지지 않을 것입니다."\n\n탁자 주변의 고개들이 올라갔고, 몇몇 사람들은 박수를 치기 시작했습니다. 그녀는 유엔이 다음 선출자를 결정할 만큼 안정될 때까지 당분간 사무총장 대행의 직무를 맡겠다고 말했습니다. 교리, 지도부, 미래의 모습에 대한 논쟁은 머지않아 벌어질 것입니다. 하지만 오늘 밤은 아닙니다. 오늘 밤에는 유엔이 미국과 전 세계에서 마주한 역경에도 흔들리지 않을 것임을 보여주는 것이 중요했습니다."
lra.30.a: "공개 연설을 발표하라. 임무는 계속된다."

#The Eagle's Nest
lra.31.t: "탤러해시 합동작전센터"
lra.31.desc: "플로리다가 통합되면서 플로리다 주의사당의 사무실들은 임시 작전센터로 지정되었습니다. 물론 여러 문제가 있습니다. 카펫은 너무 낡았고, 복도는 너무 좁으며, 벽에는 대륙적 위기의 긴박함보다는 주 관료제의 낡은 위엄이 아직 남아 있습니다. 하지만 이제 그런 것은 중요하지 않습니다. 케이블이 바닥을 기어가고, 액자에 든 사진 위에는 지도가 고정되었으며, 한때 입법 보좌관들이 전화를 받던 자리에서는 무전기가 지직거립니다. 주말이 끝날 무렵, 건물 한쪽은 더 이상 의사당처럼 보이지 않고, 평화작전국이 늘 원하던 것과 닮기 시작했습니다. 단단해진 지휘부의 신경중추 말입니다.\n\n플로리다의 통합은 임무단을 바꾸어 놓았습니다. 우리는 더 이상 마이애미에서 필사적으로 버티는 교두보가 아니라, 반도를 넘어 깊이와 영토, 의무를 가진 세력이 되었습니다. 탤러해시에서 장교들은 이제 호송 경로, 비행장, 예비대 배치, 공병 일정, 북쪽에서 끊임없이 도착하는 보고의 흐름을 추적합니다. 플로리다를 벗어나는 모든 길은 기회이자 취약점입니다. DPO는 임무단이 국경 너머에서 모여드는 폭풍을 살아남으려면 호텔 로비와 임시 주둔지에서 즉흥적으로 움직이는 일을 계속할 수 없다고 주장합니다. 임무단에는 둥지가 필요합니다. 투쟁 전체를 명확히 보고, 목적을 가지고 지휘할 수 있는 하나의 장소가 필요합니다. 평화가 강제되어야 한다면, 그 계획은 먼저 이곳에서 세워질 것입니다."
lra.31.a: "일을 시작하자!"

#Legacy of the Dove
lra.32.t: "탤러해시 행정부"
lra.32.desc: "플로리다 주의사당의 모든 방이 지도와 제복으로 채워지는 것은 아닙니다. 복합청사의 다른 구역과 새 체계에 빠르게 편입된 인근 사무용 건물들에서는 안전보장이사회 잔존 직원들이 더 조용하지만 결코 덜 중요하지 않은 무언가를 구축하기 시작했습니다. 외교관과 행정관들이 '임시 행정부'라 부르는 것은 얼핏 보기에는 거의 민망할 만큼 평범해 보입니다. 온갖 민간 행정관들이 탤러해시로 몰려들고, 클립보드와 노트북, 커피 얼룩이 묻은 서식을 든 남녀들이 절차 하나하나로 나라를 작동시키려 합니다.\n\n그러나 바로 그 평범함이 핵심입니다. 미국에는 이미 충분히 많은 무장 권위가 있습니다. 건물이나 도시를 장악하고 그것을 권력이라 부를 수 있는 사람들은 충분히 많습니다. 임무단이 내전의 폭력과 화력에 실려 가는 또 하나의 정권 이상이 되려면, 싸우는 만큼 통치도 해야 합니다. 식량은 세고 배급되어야 하며, 계약은 읽고 서명되어야 하고, 청구는 심리되어야 하며, 부패는 푸른 헬멧과 비상 칙령 뒤에 뿌리내리기 전에 쫓겨나야 합니다. 안전보장이사회 블록은 그 위험을 분명히 이해하고 있습니다. 명확한 행정 없는 군사적 승리는 또 다른 이름의 점령일 뿐입니다. 그래서 플로리다 너머에서 전쟁이 계속되는 동안, 탤러해시는 유엔 통치의 시작을 품게 될 것입니다. 그리고 머지않아 유엔은 지나가는 임무단이라기보다 머무를 준비를 하는 권위처럼 행동하기 시작할 것입니다."
lra.32.a: "임시 행정부를 공식화하라."

#Mandate of Force (Invoke Chapter VII of the UN Charter)
lra.33.t: "무력 위임"
lra.33.desc: "탤러해시의 새 안전보장이사회 회의장은 뉴욕의 회의장보다 작고, 덜 웅장하며, 훨씬 더 즉흥적입니다. 그러나 그 앞에 놓인 결정의 무게는 조금도 가볍지 않습니다. 임무단이 미국에 도착한 이후, 무력 사용은 불안한 법적 황혼 속에 있었습니다. 남부 플로리다의 폐허에서 잔혹 행위의 첫 증거가 드러난 뒤 보호책임이 발동되었고, 이후 발견된 극단주의 은신처와 온라인으로 촬영·배포된 대량 학살은 유엔이 방관자로 남을 수 없다는 인식을 더욱 강화했습니다. 하지만 공세 작전은 제7장 위임의 공식적 명확성 없이 계속되었고, 이는 해외의 비판을 불러오며 임무단이 즉흥적으로 전쟁에 말려들었다는 비난을 키웠습니다.\n\n이제 그 모호함은 끝나고 있습니다. 종군기자, 인도주의 감시단, 카메라를 든 민간인들로부터 보고가 계속 쏟아지고 있습니다. 처형, 보복, 실종, 그리고 세력마다 비전투원을 고의로 표적으로 삼는 행위들입니다. 과거의 유엔은 다른 재앙에서 너무 오래 기다렸다는 이유로 비난받았습니다. 학살 하나하나를 비상사태가 아니라 토론거리처럼 취급했기 때문입니다. 이번에 탤러해시 내부의 주장은 지연이 더 이상 도덕적으로도 정치적으로도 방어될 수 없다는 것입니다. 제7장을 발동함으로써, 안전보장이사회는 미국의 붕괴를 국제 평화와 안보에 대한 위협으로 공식 선언하고, 더 광범위한 군사 행동을 승인하며, 계속되는 무력 사용을 감독할 군사참모위원회를 설치하게 됩니다. 임무단은 더 이상 교두보를 방어하는 데 그치지 않고, 질서와 평화를 회복한다는 이름으로 행동할 권한을 부여받게 될 것입니다."
lra.33.a: "더 이상 주저하지 않을 것이다!"

#Atlanta Burns
lra.34.t: "애틀랜타가 불탄다..."
lra.34.desc: "이아손과 그의 동료 평화유지군 몇 명은 애틀랜타가 내려다보이는 인근 산을 올랐습니다. 평화유지 임무단은 파괴된 도시에 구호를 보내려 하고 있었지만, 먼저 도시의 피해와 임무의 위험을 평가해야 했습니다.\n\n이아손과 그가 속한 평화유지군은 유엔을 위해 이 정찰 임무를 수행하도록 파견되었습니다. 이아손은 소총을 옆으로 돌리고 쌍안경을 꺼냈습니다. 도시를 바라보던 그는 갱단들이 서로에게, 그리고 민간인에게까지 총을 쏘는 모습을 보았습니다. 다른 구역을 바라보자, RRR과 근위군 병사들이 서로 사격하는 동안 민간인들이 필사적으로 차를 몰고 도망치려는 모습이 보였습니다.\n\n이아손이 쌍안경을 내리고 상황을 무전으로 보고하려던 순간, 갑자기 공습 경보가 울렸습니다. 이아손과 분대원들은 서서히 언덕의 숲 가장자리로 물러나며 하늘을 올려다보았습니다. 애틀랜타 상공의 구름 사이로 작은 섬광들이 여기저기서 보였습니다.\n"저건 씨발 뭐야?" 분대원 한 명이 말했습니다. "저거... 번개야?" 다른 사람이 물었습니다.\n\n이아손은 다시 쌍안경을 들었습니다. "보아하니.. 어어.. 무슨 폭격기 같은데?" 그는 누구 소속인지 보려고 눈을 가늘게 뜨며 말했습니다. "아메리카 연합 같아 보이는데?" 그는 폭격기 날개에 그려진 연합의 독특한 문장을 발견하고 말했습니다. "그래도 남부 연방사령부일 수도 있고..."\n\n"대체 저놈들이 여기서 뭘 하는 거지?" 그가 생각하던 순간, 큰 폭발이 애틀랜타 도심을 뒤흔들었습니다. 폭발은 너무 커서 분대 전체가 가슴속으로 충격파를 느꼈습니다. 이아손은 땅에 넘어지며 쌍안경을 떨어뜨렸습니다. 몸을 일으키며 그는 더 많은 폭발이 도시 곳곳을 강타하는 것을 보았고, 도심 전체가 거대한 폭발에 휩싸이는 것을 순수한 공포 속에서 지켜보았습니다.\n\n이아손은 무전기를 붙잡고 말하기 시작했습니다. "여기는 유엔 정찰조 #3, 애틀랜타 도심이 현재 아메리카 연합의 폭격을 받고 있다. 놈들이... 그-" 그는 잠시 멈췄습니다. 아톰바펜과의 유엔 작전을 겪은 참전용사인 그조차 자신이 보고 있는 것을 믿을 수 없었습니다.\n"놈들이 뭘 하고 있다고!?" 무전 반대편의 장교가 외쳤습니다."
lra.34.a: ""놈들이 거리에서 집속탄을 쓰고 있습니다...""

#The Benning Talks(Negotiate With Fort Benning)
lra.35.t: "베닝 협상"
lra.35.desc: "그들은 포트 베닝 외곽 방어선의 긴 그림자 속, 철조망 가장자리에서 백기 아래 만났습니다. 기지는 수개월 동안 오로지 규율과, 나라의 나머지를 집어삼킨 붕괴에 굴복하지 않겠다는 장교들의 완고한 거부만으로 버텨 왔습니다. 문 밖에서 기다리는 병사들은 지쳐 보였고, 제복은 해져 있었으며, 얼굴은 불면과 배급으로 움푹 패여 있었습니다. 그러나 그들은 여전히 똑바로 서 있었고 자신들의 신념과 나라를 굳게 붙들고 있었습니다. 그들은 이미 약탈자, 민병대, 그리고 낡은 미군 제복 조각을 걸친 절박한 자들의 여러 차례 공격을 살아남았습니다. 그때마다 그들은 한때 자신들이 지키기 위해 존재한다고 믿었던 바로 그 주민에게 발포해야 했습니다.\n\n유엔 대표단의 어조에는 승리감이 없었고, 오직 필요만이 있었습니다. 식량, 연료, 의약품, 그리고 요새 안의 사람들이 적이 될 필요는 없다는 단순한 약속을 제시했습니다. 맞은편 장교들은 감사로 답하지 않았습니다. 그들은 자부심으로 답했습니다. 유엔은 그들의 지휘 계통을 존중해야 하며, 그들이 맹세한 깃발을 존중해야 하고, 미국 그 자체가 무너진 것처럼 보였을 때조차 이들이 탈영하지 않았다는 사실을 존중해야 했습니다. 대화는 모든 침묵이 위험하게 느껴질 만큼 긴장되어 있었지만, 끝에 이르러 신뢰보다 단단한 무언가가 형성되었습니다. 인정이었습니다. 포트 베닝은 합의에 따라 유엔 통제하에 들어갈 것이며, 살아남은 병사와 장교들은 한때 철조망 뒤에서 바라보기만 했던 임무단에 조심스럽게, 한 걸음씩 통합될 것입니다."
lra.35.a: "결국 외교가 승리한다."

#The World's Busiest Airport
lra.36.t: "세계에서 가장 바쁜 공항"
lra.36.desc: "하츠필드-잭슨은 한때 미국 남부의 뛰는 심장이었습니다. 매일 수천 편의 항공편이 오가고, 세계가 게이트 하나 너머에 있는 듯했던 장소였습니다. 내전이 시작된 뒤, 그 리듬은 오래전에 죽었습니다. 터미널은 약탈자들에게 벗겨졌고, 탑승동은 총격으로 상처 입었으며, 활주로에는 구덩이가 파이거나 수개월간의 전투 잔해가 널려 있었습니다.\n\n이제 애틀랜타가 확보되고 재건이 진행되면서, 공항은 마침내 다시 숨을 쉬기 시작했습니다. 유엔 공병들은 오래된 잔해를 치우고 있고, 항법 장비는 다시 배선되고 있으며, 첫 인도주의 계획 담당자들은 복원된 하츠필드-잭슨이 임무단에 어떤 의미가 될 수 있을지 이미 구상하고 있습니다. 그러나 사업이 진행되면서 계획 담당자들은 원래 제안서에 반영되지 않은 미사용 공간과 잉여 수용력을 발견했습니다. 이제 문제는 공항이 다시 살아날 것인지가 아니라, 어떤 종류의 생명선이 될 것인지입니다. 임무단 내부 일부는 애틀랜타를 대규모 군용 항공 거점, 수송기와 요격 비행대, 남부 전역 신속 배치를 위한 강화된 노드로 바꾸어야 한다고 주장합니다. 다른 이들은 유엔이 진정으로 미국을 재건하려 한다면 공항은 먼저 사람들을 섬겨야 한다고 주장합니다. 민간 화물, 구호 운송, 그리고 지역에 정상적인 삶을 떠올리게 할 상업 이동을 위해 말입니다."
lra.36.a: "우리는 아직 이겨야 할 전쟁이 있다!"
lra.36.b: "정상성 없는 평화가 무슨 의미가 있나?"

#A Visit (Expand the Troy Facility)
lra.37.t: "방문"
lra.37.desc: "오늘 트로이 시설의 창고 중 하나 입구에서는, 뒤로 넘긴 희끗한 머리와 약간의 수염을 가진 말끔한 차림의 인물이 떠 있는 듯 서서 무장 경비원에게 명함을 내미는 모습을 볼 수 있었습니다. 명함에는 "유엔 산업연락관, 콘라트 마이어 박사"라고 적혀 있었습니다. 얼마 지나지 않아 그는 더 안쪽으로 안내되었고, 그와 비슷한 인상의 신사에게 맞이되었습니다. 팔을 내민 남자가 그에게 인사했습니다.\n\n"환영합니다, 마이어 씨. 여기서 뵙게 되어 반갑습니다."\n\n"마이어 박사입니다." 그가 정정했습니다. "예, 그렇군요."\n\n참았던 어색한 숨과 악수 뒤, 상대 남자가 말을 이었습니다. "제 이름은 론 헨더슨입니다. 이곳 생산 라인의 책임자이자 현장 관리자입니다." 또 한 번의 어색한 숨이 이어졌습니다. "제가 안내해 드리겠습니다, 박사님." 마이어는 숨긴 불안 속에서 미소를 지으며 고개를 끄덕였습니다.\n\n두 남자와 헨더슨 씨의 차관보 한 명은 공장 바닥을 따라 걸으며 FGM-148 재블린의 CLU에 장착되는 탄두 생산 라인을 보여주었습니다. 헨더슨 씨가 설명하는 동안 마이어 박사는 생각에 잠긴 채, 죽음과 파괴를 위해 정교하게 설계된 도구들을 만들어내며 돌아가는 인간과 기계의 거대한 배열을 바라보았습니다. 그는 이전에 바이엘, 셀레시오, 지멘스에서 생산 엔지니어로 일하던 때와 이것을 대조했습니다. 만들어지는 미사일들 사이를 걷는 동안, 그는 불편함을 느꼈습니다.\n\n"여기 저장 공간이 좀 있습니다..." 헨더슨 씨는 그들을 생산 라인 너머, 재블린 미사일용 빈 발사관들이 줄지어 있는 구역으로 이끌었습니다. 일행은 멈췄습니다.\n\n"박사님, 묻겠습니다. 이 미사일들이 임무 수행 중인 유엔 평화유지군을 기갑 위협으로부터 보호해 왔습니까?" 헨더슨 씨가 말문을 열었습니다. 대답은 필요 없었습니다. 답은 뻔했습니다. "오늘이 끝날 때쯤이면 이 중 절반 정도는 채워져 출고될 겁니다. 하지만 기계에 기름을 조금 더 치면 이 시설을 확장해 생산량을 쉽게 두 배, 세 배로 늘릴 수 있습니다. 활용할 수 있는 미사용 부지도 많고, 당신들 병력을 보호하는 데 도움이 될 수 있습니다."\n\n"확장 계획을 설명해 주십시오." 마이어 박사가 차갑게 말했습니다. 그는 빠져나갈 길, 생산 라인이나 공장에 지연이나 차질을 일으킬 만한 문제를 찾고 있었지만, 그것이 무의미하다는 것을 알고 있었습니다. 확장을 막는 것은 불가능했을 것입니다. 전쟁은 격화되고 있었고, 평화유지군에게는 그 도구가 필요했습니다.\n\n헨더슨 씨는 마이어 박사가 무슨 생각을 하는지 전혀 개의치 않았습니다. 그는 근처 문을 가리켰습니다."
lra.37.a: ""제 사무실로 들어오시죠.""

#The Miami Assembly (Restart International Diplomacy)
lra.38.t: "마이애미 총회"
lra.38.desc: "수개월 동안 임무단은 한 비상사태에서 다음 비상사태로 버텨 왔습니다. 카르텔과 군벌의 통제에서 거리의 안정을 되찾는 것부터, 플로리다의 혼돈 속에서 어떤 형태로든 질서를 강제하는 것까지 말입니다. 그러나 전투가 북쪽으로 확산되는 와중에도, 마이애미에서는 더 조용한 노력이 시작되었습니다. 뉴욕이 여전히 유엔의 직접 권위 밖에 있는 가운데, 외교관, 참모 장교, 살아남은 사무국 인원들은 호텔, 정부 청사, 징발된 회의장을 임시 국제 총회로 바꾸었습니다. 세계와 유엔에 혼돈이 닥쳤음에도, 우리는 무슨 일이 있어도 더 나은 곳으로 만들기 위해 더 넓은 세계와 접촉할 것입니다.\n\n새 총회 내부의 분위기는 탈진과 낙관이 뒤섞여 있습니다. 일부 대표단은 직접 도착하고, 다른 일부는 디지털 방식으로만 참석합니다. 많은 국가는 이미 세계 곳곳에서 각자의 분쟁과 긴장에 휘말려 있으며, 유엔이 무슨 말을 하든 관심이 없습니다. 임무단이 살아남으려면, 내전을 고립된 채 홀로 싸우는 외로운 주둔지로 남을 수 없습니다. 마이애미는 필요에 의해 세워진 본부 이상이 되어야 합니다. 그것은 인정 확보, 외국 수도와의 채널 재개, 그리고 남은 세계를 설득해 유엔이 여전히 세계 외교를 형성하는 역할을 맡고 있음을 보여줄 수 있는 새로운 외교 노력의 중심이 되어야 합니다."
lra.38.a: "총회를 세계에 개방하라."

#Integrity As An Organization
lra.39.t: "푸른 선, 붉은 선"
lra.39.desc: "서류철은 의식도 없이 도착했습니다. 이미 사상자 요약, 경로 지도, 배급 보고서로 가득한 책상 위로 밀려왔습니다. 그것은 누구도 예상하지 못했을 만큼 두꺼웠습니다. 안에는 민간인 진술서, 내부 메모, 검문소와 골목 곳곳에서 찍힌 사진, 그리고 첨부 자료를 보고 나면 갑자기 다르게 읽히는 사후 보고서들이 들어 있었습니다. 승인되지 않은 압수, 거친 구금, 그리고 담배, 휘발유, 보석으로 "수수료"를 낼 때까지 멈춰 선 호송대. 소수의 평화유지군이 푸른 헬멧을 총알뿐만 아니라 감시로부터 자신을 지키는 방패처럼 사용해 온 듯했습니다. 각각을 따로 보면 임무단 전체를 단죄하기에는 충분하지 않습니다. 하지만 모두 합치면, 미국인과 국제사회가 임무단을 바라보는 시선을 오염시키기에는 충분했습니다.\n\n유엔은 두려움의 대상이 되기 위해 미국에 온 것이 아닙니다. 그러나 두려움은 전쟁에서 쓸모가 있고, 질서의 짐은 본질적으로 추한 것이라고 조용히 주장하는 장교들도 이미 있습니다. 민간인들은 불평할 것이고, 전선은 깨끗한 손으로 관리될 수 없으며, 모든 분쟁의 모든 임무는 거친 모서리를 가지게 마련이라는 주장입니다. 다른 이들은 바로 그렇게 임무가 썩기 시작한다고 답합니다. 하나의 잔혹 행위가 아니라, 더 작은 죄들이 서서히 정상화되는 방식으로 말입니다. 유엔 통제 아래 있는 사람들이 평화유지군을 총구로 복종을 갈취하는 또 하나의 무장 권위로 보게 된다면, 정통성에 대한 모든 연설은 입안에서 재가 될 것입니다. 문제는 조치를 취해야 하는지 여부가 아니라, 어떻게 조치할 것인가입니다. 내부적으로, 조용히, 최소한의 혼란으로 처리해야 합니까? 아니면 가해자들을 공개적으로 본보기로 삼아 푸른 깃발이 진정한 정의로부터 아무도 보호하지 않는다는 것을 증명해야 합니까?"
lra.39.a: ""빛 아래로 가져와라.""
lra.39.b: ""내부적으로 처리하라.""

#A Broken Promise
lra.40.t: "우리가 지키는 맹세"
lra.40.desc: "누군가가 해가 뜨기 전 복도에 명판을 걸었습니다. 작전동을 지나 안으로 들어온 첫 직원들이 그것을 처음 보았습니다. 사무실들이 늘어선 벽 옆에 볼트로 고정된 반짝이는 금속판, 그 위에는 마이애미 상륙 이후 사망한 평화유지군들의 이름이 새겨져 있었습니다. 사람들은 그 앞을 지나며 속도를 늦춥니다. 한 서기는 액자 가장자리를 만질 만큼 오래 멈춰 섰습니다. 또 다른 이는 거의 혼잣말처럼 중얼거렸습니다. "벌써 너무 길어."\n\n나중에, 창문 없는 브리핑룸에서 대화는 음울하고 거침없어졌습니다. 르완다. 시리아. 스레브레니차. 아이티. 유엔이 약속을 했지만 그것을 지키기에는 너무 느렸거나, 너무 약했거나, 너무 분열되어 있었던 장소들이었습니다. 그 방 안의 누구도 역사 수업을 필요로 하지 않았습니다. 그 이름들만으로도 공기는 씁쓸해졌고, 몇몇은 끔찍한 잔혹 행위를 기억할 만큼 나이가 많았습니다. 미국이 그 오랜 망설임과 후회의 유산에 또 하나의 항목으로 추가되어서는 안 됩니다. 임무단이 여기서 무너진다면, 모든 연설과 모든 죽음 이후 전 세계가 지켜보는 가운데 실패한다면, 그것은 단순히 전쟁에서 지는 것이 아닐지도 모릅니다. 그것은 유엔이라는 발상이 더 이상 살아남을 자격이 없다는 것을 증명할지도 모릅니다.\n\n밖에서 명판은 설치된 자리에 그대로 남아, 차가운 천장 조명을 받아 반짝였습니다. 저녁 무렵, 지나가던 평화유지군 한 명이 그 아래에 푸른 베레모 하나를 놓고 단순한 말을 속삭였습니다:"
lra.40.a: ""우리는 여기서 실패하지 않을 것이다.""

#Deal With The Southern Company
lra.41.t: "평화를 위한 전력"
lra.41.desc: "회의는 아직 먼지와 석고보드 냄새가 희미하게 남은 방에서 열렸습니다. 임시 사무실과 지휘소 사이 어딘가 같은 장소였습니다. 밖에서는 발전기들이 도시 절반의 불을 살리기 위해 웅웅거렸습니다. 안쪽에서는 서던 컴퍼니 대표들이 이 모든 것에 전혀 동요하지 않는 듯 앉아 있었습니다. 그들은 이전에도 국가들과 협상해 보았고, 이번에도 이 국가와 협상할 것이라고 예상하는 사람들이 짓는 익숙한 표정을 하고 있었습니다. 그들 중 한 명이 탁자 위에 폴더를 내려놓고 거의 부드럽게 말했습니다. "병원은 당신들 유엔의 '정통성'으로 돌아가지 않습니다."\n\n추악한 진실이었기에, 아무도 즉시 대답하지 않았습니다. 유엔은 질서, 정의, 재건을 단어가 낡아빠질 때까지 약속할 수 있습니다. 하지만 전력망이 무너지면 그 모든 것은 연극처럼 들릴 뿐입니다. 대표들은 이 사실을 알고 있습니다. 그들은 새 변전소, 송전 회랑, 비상 발전, 그리고 유엔 자신의 수사와도 깔끔하게 맞아떨어지는 더 깨끗한 에너지로 가는 길을 구축하는 일을 말했습니다. 그 대가로 그들은 사적 전력이 늘 원하는 것을 요구했습니다. 보호, 접근권, 보장, 그리고 잉크가 마르기 전에 결정이 내려지는 소리를 들을 수 있을 만큼 회의장 가까운 자리입니다. 사절 중 한 명이 중얼거렸습니다. "우리가 요청한 건 전기이지, 두 번째 정부가 아닙니다." 맞은편의 임원은 불쾌한 기색 없이 미소 지었습니다. "외람되지만," 그가 말했습니다. "그 둘은 종종 같은 것입니다."\n\n방 안의 모든 도덕적 불편함에도, 딜레마는 고통스러울 만큼 단순했습니다. 유엔 통치 아래 있는 사람들은 연설을 기억할지도 모릅니다. 하지만 정전은 훨씬 더 오래 기억할 것입니다."
lra.41.a: ""...협정에 서명하라.""

#Peacekeeper Background Checks
lra.42.t: "심사 지침"
lra.42.desc: "지원서 더미는 터무니없어 보일 만큼 높았습니다. 붕괴를 기념하는 종이 기념비 같았습니다. 그중에는 과거 복무 기록을 가진 미국인들이 많았고, 텔레비전에서 불타는 모습으로만 본 나라에서 푸른 헬멧을 쓰기 위해 지구 반대편을 건너온 외국인 자원자들도 여럿 있었습니다. 전직 주방위군, 예비군, 이상주의자, 떠돌이, 의무의 언어로 말하는 자, 복수의 언어로 말하는 자들. 날마다 더미는 커졌고, 날마다 전선은 더 많은 몸을 요구했습니다.\n\n탁자 건너편의 정보장교들은 열정에 감동하지 않았습니다. 그들에게는 자신들만의 서류철이 있었습니다. 더 얇고, 더 차갑고, 훨씬 더 위험한 것들이었습니다. 제복 속으로 사라지려는 알려진 극단주의자들. 배지가 과거를 씻어주길 바라는 범죄자들. 충성심이 여전히 죽은 주지사, 죽은 깃발, 혹은 아직 충분히 죽지 않은 대의에 머물러 있는 지원자들. 한 분석관이 말했습니다. "그들 중 일부는 정확히 자신들이 주장하는 바로 그 사람들입니다. 그게 문제입니다." 평화작전국은 지금 당장 신병을 원하고, 안전보장이사회는 공황 속에서 만들어진 병력은 공황 속에서 무너질 것이라고 주장합니다. 논쟁은 몇 시간 동안 이어졌고, 마침내 누군가가 아무도 듣고 싶지 않은 말을 꺼냈습니다. "전쟁이 불편하다는 이유로 기준을 낮춘다면, 그 기준은 이미 사라진 것입니다."\n\n이어진 지침은 단호하고 값비쌌습니다. 모든 신병은 심사를 받을 것입니다. 모든 기록은 추적될 것입니다. 모든 지연은 어딘가에서 대가를 치를 것입니다. 전선에서, 현장에서, 피로 사들인 시간 속에서 말입니다. 그러나 푸른 깃발이 어떤 의미를 가지려면, 신뢰는 나중에 생각할 것이 되어서는 안 됩니다."
lra.42.a: ""엄격한 심사가 시행될 것이다.""

#The Suspension Compromise
lra.43.t: "간신히 이어진 전선"
lra.43.desc: "탤러해시에서 온 서류철은 새 행정부에서 이어진 모든 회의의 분위기를 바꾸었습니다. 평화유지군의 비위는 더 이상 소문도 아니었고, 피비린내 나는 내전에서 필연적으로 생기는 거친 면이라고 치부할 수도 없었습니다. 수백 명이 지목되고, 분류되고, 논의되었으며, 대중의 빛 아래 노출되었습니다. 미국과 국제 여론이 행동을 요구하자, 평화작전국은 자신들의 답을 내놓았습니다. 유엔은 문제를 부정하지 않을 것입니다. 그러나 전쟁이 여전히 타오르는 동안 유엔이 그것을 어떻게 다룰지는 유엔이 정할 것입니다.\n\n브리핑은 기자들과 국내 행정관들로 가득 찬 방에서 진행되었습니다. 최악의 가해자들은 정직되고, 민감한 보직에서 제거될 것입니다. 다른 이들은 분산되고, 재배치되며, 여전히 전선에서 필요한 부대 안으로 다시 접어 넣어질 것입니다.\n"우리는 불완전한 지휘와 지휘의 부재 사이에서 선택하고 있습니다." 한 작전장교가 지친 목소리로 담담하게 말했습니다.\n\n방 안은 놀란 웅성거림으로 터져 나왔고, DPO라는 방패 뒤에 전범을 숨긴다는 말들이 흘러나왔습니다. DPO 소속 대령이 방을 조용히 시키고, 그들이 다시 말하기 전에 대답했습니다.\n"우리는 이것이 진정한 정의가 아님을 압니다. 이것은 응급 처치입니다. 먼저 출혈을 멈춰야 하고, 그래야 아직 살릴 수 있는 것을 구할 수 있습니다. 전투에서 이기면 정의는 실현될 것입니다. 하지만 여기서 전투에 진다면 누구에게도 정의는 없을 것입니다."\n\n아무도 이 정책이 깨끗하다고 가장하지 않습니다. 그것은 평시의 병에 대한 전시의 대답입니다. 그러나 DPO의 입장은 이제 분명합니다. 개혁은 올 것입니다. 하지만 대륙 규모의 전쟁 한복판에서 지휘 계통을 무너뜨리는 대가로 오지는 않을 것입니다. 그 전선은 유지되어야 합니다. 그것을 이어 붙이고 있는 것이 타협일지라도 말입니다."
lra.43.a: "타협은 미국의 이야기다."

#Lacrioix's Concerns
lra.44.t: "임무이지, 정권이 아니다"
lra.44.desc: "라크루아는 방 안의 사람들이 지칠 만큼 말하도록 내버려 둔 뒤에야 입을 열었습니다. 그때쯤 회의장의 분위기는 이미 굳어 있었습니다. 현장 보고, 통합 논쟁, 규율은 전쟁에서 이긴 뒤에나 챙길 수 있다는 늘 같은 주장들이 오갔습니다. 그는 두 손을 모으고 아무것도 드러내지 않는 표정으로 듣고 있었습니다. 방이 마침내 조용해지자, 그의 목소리는 그가 고른 말에 비해 너무나 차분했습니다.\n\n"여러분은 승리가 모든 것을 정당화하는 것처럼 말하고 있습니다."\n\n몇몇 고개가 돌아갔습니다. 누군가 대답하려 했지만, 그는 계속 말했습니다. 그는 내일의 작전이나 다음 주 모집 수치가 아니라, 그 이후에 올 것에 대해 말했습니다. 도로와 건물 말고 전쟁 뒤에 무엇이 남는지에 대해서였습니다. 선례, 그는 말했습니다. 습관. 위기 속에서 굳어져 다시는 부드러워지지 않는 지휘 문화. 멈출 시간이 없어서 뇌물을 받는 평화유지군. 기존 규칙이 불편하다는 이유로 현장에서 자기 규칙을 쓰는 장교들. 자신에게 편리할 때만 복종하는 미국 부대와, 결과를 낸다는 이유로 그 불복종을 보상하는 외국 지휘관들. "우리가 불충을 결과로 보상한다면," 그가 마침내 말했습니다. "우리는 또 하나의 세력이 될 것입니다. 그리고 세력은 평화를 지키지 않습니다. 권력을 지킬 뿐입니다."\n\n아무도 쉽게 반박하지 못했습니다. 그 경고가 먹혀든 것은 방 안의 너무 많은 이들이 그가 이론을 말하는 것이 아님을 알고 있었기 때문입니다. 위험은 패배만이 아닙니다. 유엔이 자신을 다른 군벌들과 구분해 주던 것이 무엇인지 더 이상 기억하지 못할 만큼 부주의하게 산 승리입니다."
lra.44.a: ""우리가 왜 이곳에 있는지 기억해야 한다.""

#Strip Them Of Their Positions
lra.45.t: "푸른 깃발 아래 면책은 없다"
lra.45.desc: "'평화유지군 전원에게:\n\n이곳에서 유엔 임무는 언제나 동일했습니다. 무고한 이들을 모든 위험으로부터 보호하고, 그들에게 번영하는 삶을 제공하는 것입니다.\n\n우리는 UNCAC의 지침 아래 평화유지군의 뇌물 수수, 갈취, 또는 어떤 형태의 비위도 용납하지 않을 것입니다. 임무단은 가해자를 푸른 깃발 뒤에 숨기면서 미국인이나 어떤 공동체에게 그 깃발을 신뢰하라고 요구할 수 없습니다.\n\n인사부.'\n\n편지를 읽은 뒤, 앤더슨은 코웃음을 치며 그것을 옆으로 던졌습니다. 그는 중앙아프리카에서 인도주의 구호 군수 장교가 된 이후 이런 편지를 수도 없이 읽었습니다. 늘 같은 약속, 결코 없는 행동. 그들이 정말로 끝까지 밀고 나갔다면, 애초에 그는 자신의 재산을 쌓지 못했을 것입니다.\n"각하," 갑자기 헌병 두 명이 들어왔습니다. "귀하는 인도주의 구호 물자를 절취하고 판매했다는 혐의로 조사를 받게 되었습니다. 저희와 함께 가 주시겠습니까."\n\n"뭐라고?" 앤더슨은 벌떡 일어섰고, 목소리에는 짙은 불신이 묻어 있었습니다. "말도 안 되는 소리야! 나는 여기서 몇 년을 일했어. 이제 와서 어떻게 나를 고발할 수 있지? 나는 이 조직에 내 인생을 바쳤다고!"\n\n헌병들은 그의 항의를 무시했고, 그중 한 명이 입을 열었습니다:"
lra.45.a: ""글쎄요, 시대가 바뀌었으니까요.""

#The Dove Prevails
lra.46.t: "내일을 위한 헌장"
lra.46.desc: "비상권한과 전체주의를 가르는 선은 정상성이 돌아올 것이라는 약속입니다. 수개월 동안 이 약속은 보이지 않았습니다. 사무총장이 견제받지 않는 권력을 계속 붙잡고 있는 가운데, 사람들은 유엔이 그저 "푸른 도적질"에 불과한지 의문을 품고 있으며, 유엔의 신뢰라는 자본은 곧 고갈될 것입니다.\n\n급진주의에 맞선 전선은 이념적 극단주의자들에 맞선 전선보다 훨씬 더 넓게 뻗어 있습니다. 국가라는 복잡한 장치 아래에서, 수백만의 자유를 사랑하는 미국인들의 지지를 받는 낡은 이상주의자들과 헌장 근본주의자들의 연합은 스스로를 수호천사라 칭하는 내부 군국주의자와 권위주의자들을 상대로 전쟁을 벌여 왔습니다.\n\n이상주의자들의 미래관은 결국 우위를 점했고, DPO 구성원들은 모든 정책 결정권을 안전보장이사회에 넘기겠다고 발표했습니다. 이로써 안전보장이사회는 유엔의 유일한 지도부로 확립되었고, 자유와 민주주의를 자유의 땅에 회복하는 길에서 다시는 도전받지 않을 것입니다."
lra.46.a: "우리는 결코 지속불가능성에 굴복하지 않을 것이다!" # Achim
lra.46.b: "전진하라! 번영하는 통일을 향해!" # Amina
lra.46.c: "인권을 다시 협상장으로 가져오라!" # Turk
lra.46.d: "우리는 영원히 헌장을 수호할 것이다!" #Lacroix

#Evaluating Our Past (Ending Non-Interventionalism)
lra.47.t: "우리의 과거 평가"
lra.47.desc: "성명서 초안은 완전한 침묵 속에서 손에서 손으로 넘어갔습니다. 긴 문서는 아니었고, 그래서인지 더 무겁게 느껴졌습니다. 장엄한 수사도, 의식으로 포장하려는 시도도 없었습니다. 조심스럽게 고른 몇 문단과 하나의 핵심 진실뿐이었습니다. 낡은 시대는 끝났습니다. 유엔이 안전한 거리에서 규탄 성명을 내는 동안 위기가 학살로 익어 가던 세월은 여기, 전 세계가 결코 무너질 수 없다고 여겼던 국가의 폐허 속 미국에서 끝났습니다.\n\n문구가 낭독될 때, 그것은 거의 절제에 가까울 만큼 차분했습니다. 하지만 방 안의 누구도 그 의미를 오해하지 않았습니다. 유엔은 더 이상 도시가 불타고 민병대가 궁지에 몰아넣은 이들을 학살하는 동안 관찰, 중재, 진정 호소에만 스스로를 제한하지 않을 것입니다. 휴전은 단순히 감시되는 것이 아니라, 필요하다면 강제될 것입니다. 난민 수용소든, 부서진 교외든, 외국 수도든, 대중은 더 이상 웅변을 원하지 않습니다. 그들은 살육이 멈추기를 원합니다. 논쟁은 더 이상 무력을 사용해야 하는지에 대한 것이 아니라, 그것을 어떤 정신이 이끌어야 하는지에 대한 것입니다. 집행은 여전히 법, 권리, 인간 존엄의 종이어야 합니까? 아니면 더 차가운 무언가, 질서와 억지와 공포의 도구가 되어 누구도 두 번 다시 시험할 엄두를 내지 못하게 해야 합니까?"
lra.47.a: "집행은 법과 인권에 봉사해야 한다."
lra.47.b: "집행은 질서와 억지에 봉사해야 한다."

#A New Standard (Redesign The Blue Helmet)
lra.48.t: "새로운 기준"
lra.48.desc: "많은 평화유지군은 서로 다른 표식이 붙은 오래된 장비를 가지고 왔습니다. UNMISS, UNPROFOR, 심지어 UNDOF의 장비까지 대열에서 볼 수 있었습니다. 이 제복들은 낡고 보호력이 부족할 뿐만 아니라, 상징적인 푸른 헬멧이 아니었다면 착용자를 식별하기도 매우 어려웠을 것입니다.\n\n"수십 년 동안 푸른 헬멧은 우리의 수동성, 우리의 무기력, 그리고 바로 우리 코앞에서 군벌들에게 거두어진 수천 명의 생명으로 알려져 왔습니다." 탤러해시 시청 앞의 기자단은 대변인의 말을 들었습니다. "오늘 우리는 평화유지 노력의 새로운 시대를 선언합니다."\n\n문 뒤에서 세 명의 평화유지군이 모습을 드러냈습니다. 다양한 환경에 맞춘 위장무늬를 적용한 새 제복, 더 높은 다용성을 위한 전술 조끼와 바지, 삽입물을 넣을 공간, 그리고 당연히 상징적인 푸른 헬멧이 있었습니다. 헬멧은 관통 저항 성능이 개선되었고 선택 장비를 장착할 수 있는 레일이 달려 있었습니다.\n\n기자들은 청록색 완장과 "UNMIA"라고 적힌 새로운 패치를 알아차렸습니다. AP, ABC, BBC 기자들은 세계가 간절히 알고 싶어 하는 질문을 한꺼번에 던졌습니다. 이렇게 중무장한 평화유지군의 새로운 역할은 무엇입니까? 대변인은 목을 가다듬고 자신 있게 대답했습니다:"
lra.48.a: ""우리는 언제나처럼 평화를 지키기 위해 이곳에 있습니다.""
lra.48.b: ""테러리스트의 심장 깊숙한 곳에 공포를 새겨 넣을 군대입니다.""

#The School of the Mission (Pass Down Army Education)
lra.49.t: "임무단의 학교"
lra.49.desc: "전쟁의 규모가 계속 커지면서, DPO는 전직 미국 군인을 활용해 현직 및 신규 평화유지군에게 올바른 군사 교리를 훈련시키는 프로그램을 제안했습니다. 접힌 지도들이 벽에 기대어 있고, 분필 먼지가 공중에 떠 있으며, 뒤섞인 제복을 입은 남녀들이 형광등 아래 줄지어 앉아 자신들이 물려받으리라고는 생각지 못했던 전쟁을 배우고 있습니다. 일부는 베테랑 평화유지군이고, 일부는 전직 주방위군이며, 일부는 불과 몇 달 전만 해도 미국 남부에서의 제병협동 공세를 준비하기는커녕 전선에서 몇 마일 떨어진 곳에서 구호 호송대를 호위하던 이들입니다.\n\n한 교실 앞에서는 전직 주방위군 하사가 오래된 마커 자국이 남은 칠판 위에 화살표와 살상 구역을 그립니다. 그 옆에서 유엔 장교가 듣다가 중간에 끼어들어, 거친 미국식 약어를 유엔 임무 교리의 더 정돈된 언어로 번역합니다. 그 결과는 완전히 새로운 것입니다. 국제군의 이상을 거쳐 걸러진 국가 군대의 습관입니다. 평화작전국은 전쟁이 더 커지기 전에 모든 평화유지군, 모든 초급 장교, 모든 참모 기획자가 기동, 군수, 조율에 대해 같은 언어를 말하기를 원합니다.\n\n더 나은 교리는 실수를 줄이고, 공세를 더 깔끔하게 만들며, 부대를 더 강하게 합니다. 그러나 교실 밖에는 전반적인 불안이 남아 있습니다. 외교관들은 미국 군사 실무에서 빌려온 모든 교훈이 유엔을 자신이 대체하고 있는 국가에 조금 더 묶어 놓는다고 경고합니다. 전문화는 힘을 가져오지만, 동시에 정체성도 가져옵니다. 그리고 일부는 너무도 조용히 묻습니다. 전쟁을 수행하는 법을 너무 잘 배워버린 평화유지군은 무엇이 되는가?"
lra.49.a: "그들에게 미국식 전쟁 방식을 가르쳐라."

#Bridges Before Borders (Deploy The Army Corps of Engineers)
lra.50.t: "국경보다 다리가 먼저인가?"
lra.50.desc: "미 육군 공병대는 세계에서 가장 오래된 공학 조직 중 하나로, 오랫동안 군사공학의 기준을 세워 왔습니다. 그들의 많은 참전용사들은 우리가 평화유지군에 흡수한 뒤 푸른 헬멧을 쓰게 되었습니다. 그들의 지식을 활용함으로써, 유엔은 전쟁으로 찢긴 경제의 회복을 앞당기고 일상생활을 지탱하는 핵심 기반시설을 재건할 것입니다.\n\n새로 설립된 유엔 육군 공병대는 이 유산을 바탕으로 하며, 과거 유사한 부대에서 복무했던 자원자들의 지원으로 구성되었습니다. 그러나 댐, 교량, 도로를 재건하는 사이에도 새로 훈련받은 공병 중 상당수는 아직 활용되지 않고 있습니다. 우리는 그들을 전략적으로 배치해야 합니다. 먼저 나라를 재건할 것인지, 아니면 먼저 군대를 재건할 것인지 말입니다."
lra.50.a: "우리는 먼저 사람들을 섬겨야 한다."
lra.50.b: "군대가 우리의 우선순위가 되어야 한다."

#Talks Under a White Flag" (Diplomatic Delay)
lra.51.t: "백기 아래의 회담"
lra.51.desc: ""헨더슨 씨, 거의 다 왔습니다." 레베카가 옆에 앉은 노련한 협상가를 향해 몸을 돌리며 말했습니다. 노인은 언제나 흔들림 없는 닻과 같았고, 앞에 무엇이 놓여 있든 전혀 동요하지 않는 듯 보였습니다. "이게 통할 거라고 생각하세요?" 그녀가 물었습니다.\n\n"최선을 다해 봐야지." 그가 답했습니다. 헨더슨은 그들이 전쟁을 끝내러 온 것이 아니라는 사실을 누구보다 잘 알고 있었습니다. 총에 미친 군벌들이 양복 입은 관료들의 세련된 말에 설득될 수 있을 리가 없었습니다. 그는 타협의 언어를 유창하게 말했고, 타협이 이곳에서는 불가능하다는 것도 뼈저리게 알고 있었습니다.\n그들의 임무는 진정한 평화가 아니라 시간이었습니다. 지연시키고, 늦추고, 작전이 뿌리내릴 만큼 충분히 오래 총성을 멈추게 하는 것. 무고한 이들을 이곳에서 빼낼 만큼 오래. 힘을 모아, 이 허약한 평화가 무너지는 순간 충분한 병력으로 이 분쟁을 계속할 수 있을 만큼 오래.\n\n차량이 상대 협상단이 기다리는 건물 앞에 멈춰 서자 침묵이 공중에 걸렸습니다. 경비병들의 소총과 장갑은 어떤 말보다도 더 크게 전쟁을 선언하고 있었습니다. 레베카가 먼저 내렸고, 헨더슨이 바로 뒤따랐습니다. 두 사람은 천천히 회의장으로 걸어 들어갔고, 먼지 묻은 제복을 입은 남자가 그들을 맞이하기 위해 일어섰습니다. "환영합니다, 헨더슨 씨." 남자는 손을 내밀며 말했습니다. "오늘 우리가 왜 이곳에 모였는지 알고 계시리라 믿습니다."\n"물론입니다." 헨더슨은 그 손을 단단히 잡으며 대답했습니다. 그의 얼굴에는 직업적인 미소가 고정되어 있었습니다. "그럼, 시작해 볼까요?""
lra.51.a: "때로 가장 유용한 문장은 다음 총성을 늦추는 문장이다."

#Work With General Hass
lra.52.t: "푸른 깃발 곁의 또 다른 깃발"
lra.52.desc: "카메라는 쉬운 부분을 담아냅니다. 말끔한 제복을 입은 하스 장군이 여러 깃발 아래에서 유엔 장교의 손을 맞잡으며 절제된 미소를 보이는 장면입니다. 그들 뒤에서 마이크는 협력, 안정, 공동 책임 같은 단어들을 주워 담습니다. 그것은 임무단이 절실히 필요로 하는 종류의 이미지입니다. 푸른 깃발 곁에 서면서도 움찔하지 않는 미국 장군 말입니다.\n\n카메라가 담지 못한 것은 실제 대화가 얼마나 노골적이었는가입니다. 하스는 환상을 품고 오지 않았습니다. "내 부하들은 영원히 낯선 이들에게 경례하지 않을 겁니다." 그는 거친 형광등 불빛 아래 놓인 탁자 위에서 말했습니다. "그들에게는 급여, 식량, 그리고 자신들이 그저 외국 제복을 입고 있는 것이 아니라는 믿음의 이유가 필요합니다." 유엔의 대답도 똑같이 분명했습니다. 임무단은 그런 것들을 제공할 수 있습니다. 군수, 의약품, 임금, 체계 말입니다. 그러나 그 대가로 해외에서 수입할 수 없는 것을 얻게 될 것입니다. 유엔 통제 아래 살아가는 미국 땅과 미국인들의 습성을 아는 미국인들입니다. 검문소에 서서 미국인처럼 말하고 미국인처럼 보일 수 있는 이들입니다.\n\n위험한 거래입니다. 임무단에 들어오는 모든 미국 장교는 인력 이상의 것을 가지고 옵니다. 그는 자기 충성심, 자기 자부심, 그리고 유엔 자신의 정치 영역 안에서 독자적인 무게중심을 가지고 옵니다. 그러나 대안은 더 나쁩니다. 해외 원조는 말라가고 있고, 해외에서 새로운 전쟁이 벌어질 때마다 자원자는 점점 더 드물어집니다. 유엔이 미국에서 살아남으려면, 완전히 외국적인 존재로 남을 수 없습니다. 그 일부는 자신이 구하려는 나라처럼 들리고, 그렇게 보여야 합니다."
lra.52.a: "필요한 타협이다."

#Aim To Disorganize
lra.53.t: "지침: 교란"
lra.53.desc: ""여기는 델타, 위치에 도착했다, 오버."\n"델타, 여기는 마더 구스. 표적을 확인했다." 무전 너머 여자의 목소리가 말했습니다. "보급 트럭 5대, APC 2대, 지역 내 민간인은 없다. 임무를 진행하라."\n"수신." 해리스가 답하고 승무원을 향해 고개를 돌렸습니다. "준비해, 얘들아. 드론이 적 호송대를 발견했다. 곧 사정권 안에 들어온다. HEAT 장전."\n\n장전수는 시간을 낭비하지 않았습니다. 그는 뒤쪽에서 포탄을 집어 약실에 밀어 넣었습니다. "HEAT 장전 완료!" 포탑이 천천히 도로를 향해 움직였습니다. 어느 순간이든 시야에 들어올 것입니다. 해리스는 조준기에 매달린 채 속삭였습니다. "침착하게...."\n그러자 첫 번째 APC가 시야에 들어왔습니다. "조금만 더 기다려, 침착하게... 지금! 포수, HEAT, PC!"\n\n주포가 즉시 불을 뿜었고, 포탄은 선두 APC를 향해 날아가 측면에 꽂혔습니다. 차량은 멈춰 섰고, 전체 대열도 함께 멈췄습니다. "좋은 사격! 후미 차량! 발사!" 포가 다시 발사되었고, 이번에는 포탄이 뒤쪽 APC에 명중했습니다. 충돌 지점에서 불꽃이 튀며 차량은 즉시 화염에 휩싸였습니다.\n"놈들은 앉은 오리다! 트럭을 쏴!" 동축기관총이 포효하며 이제 취약해진 트럭들을 갈기갈기 찢었습니다. 그들에게 승산은 없었고, 일부 인원들은 현장에서 달아나기 시작했습니다. 불운하게도 달아나지 못한 이들은, 한때 자신들이 타고 있던 불타는 차량 잔해와 함께 그곳에 남았습니다.\n\n현장이 마침내 조용해졌을 때, 포수가 입을 열었습니다. "세상에," 그가 말했습니다. "평화유지 하러 간다고 했을 때 이런 건 예상 못 했는데요. 그냥 앉아서 민간인을 보호할 줄 알았습니다."\n"나이젤, 우리는 민간인을 보호하고 있다." 해리스가 답했습니다. "하지만 전선의 우리 애들이 그들을 보호하려면 완벽한 조건이 필요하지.""
lra.53.a: "그리고 우리는 그 조건을 만들고 있다."

#The Eagle Soars
lra.54.t: "발톱이 지휘권을 잡다"
lra.54.desc: "무기가 내려지고 모든 사람이 공동의 미래를 꿈꾸기 위해 함께 모였을 때, 많은 이들은 평화와 번영의 시대를 떠올렸습니다. 유엔은 그 희망의 상징으로 창설되었습니다. 평화의 산들바람이 불자, 독수리는 자신이 너무 오래 머물렀다고 느꼈고, 곧이어 비둘기가 지휘권을 맡았습니다.\n\n그러나 그 비전은 결코 진정으로 우리의 손이 닿는 곳에 있지 않았습니다.\n\n둥지의 새들은 다시 한 번 싸웠습니다. 서로를 향한 폭력, 서로를 향한 차별, 서로를 향한 증오는 전쟁 없는 세계라는 환상을 찢어발겼습니다. 새 시대의 수호자가 될 예정이었던 비둘기는 자기 관료주의에 짓눌리고, 힘을 얻은 주요 국제 행위자들에게 매인 무력하고 무능한 전령에 불과하다는 것이 드러났습니다.\n\n둥지는 완전한 붕괴의 가장자리에 매달려 있었습니다.\n\n그때 변화의 바람이 독수리를 다시 데려왔습니다. 우리는 인간이 문제를 평화적으로 해결할 수 있고, 인간이 다시는 폭력에 의존하지 않으며, 인간이 하나로 협력할 것이라고 어리석게 믿었습니다. 이제 우리는 이것을 바로잡아야 하며, 인류 안 깊숙이 박혀 수천 년 동안 우리를 괴롭혀 온 인류의 가장 큰 적, §Y인간의 본성§!과 싸워야 합니다.\n\n...\n\n구체제에 맞선 투쟁에서 완전한 승리를 거둔 지금, 총회와 안전보장이사회는 우리의 의지에 완전히 굴복하는 거수기로 바뀌었습니다. 마지막 질문만이 남았습니다. 누가 인류를 마땅히 누려야 했던 번영으로 이끌 것인가?"
lra.54.a: "미국은 세계를 새롭게 지키기 위해 일어설 것이다!"
lra.54.b: "질서는 자유를 인류에게 되돌리는 길을 인도해야 한다!"
lra.54.c: "신뢰는 경계와 힘으로 얻는 것이다!"
lra.54.d: "규율이 평화를 보장할 것이다!"

# Armistice in Ashes

lra.55.t: "잿더미 속의 휴전"
lra.55.desc: "UNMISF가 아톰바펜 사단과 한때 플로리다주를 점령했던 다른 군벌들을 상대로 승리한 뒤, 유엔 외교관들은 마이애미에서 아메리카 연합과 미국 헌법정부 대표들과 협상에 나섰습니다. 이 협상의 주된 목표는 양측이 적대 행위를 중단하는 휴전 협정에 서명하게 하거나, 적어도 중서부 전선의 오물통 속에 휘말린 부상 민간인들을 대피시키고 치료할 수 있도록 한 달간의 정전에 합의하게 하는 것이었습니다.\n\n숙련된 외교관들의 최선의 노력에도 불구하고 협상은 처참하게 실패했으며, 마이애미 회담의 초기 성공에도 불구하고 연합주의자와 헌법주의자 대표단은 모두 '분노하여 퇴장'한 것으로 알려졌습니다. 이 불행한 전개로 인해 우리는 미국 전역으로 유엔 평화유지 작전을 확대할 준비를 하는 것 외에는 선택지가 없습니다. 트럼프와 바이든이 이 피비린내 나는 분쟁을 끝내지 않을 것이라면, 유엔이 끝낼 것입니다."
lra.55.a: "평화를 유지하고 강제하는 것은 우리의 의무다."

# Blue Helmets, One Voice

lra.56.t: "푸른 헬멧, 하나의 목소리"
lra.56.desc: "너무 오랫동안 임무단은 하나의 깃발 아래 싸우는 일관된 전투부대가 아니라, 여러 파견대의 연합체처럼 운영되어 왔습니다. 각 구역 지휘관들은 제한된 조율 속에서 자기 전선을 관리했고, 그 사이의 틈은 민간인과 평화유지군 모두의 소중한 생명을 앗아갔습니다. UNMIF는 하나의 지휘 계통 아래 임무단의 모든 병력을 통합할 단일 사령관을 임명함으로써 이를 바로잡아야 합니다.\n\n임무단이 선택한 임명자는 카를루스 아우베르투 두스 산투스 크루스 장군입니다. 그의 경력은 분명히 말해 줍니다. 아이티에서 콩고에 이르기까지, 다른 이들이 불가능하다고 결론 내린 곳에서 평화유지가 작동하도록 만들어 온 경력입니다. 그의 지휘 아래 임무단은 지형과 적이 이미 우리에게 가르쳐 준 사실을 받아들일 것입니다. 보병만으로는 임무단이 감당할 수 없는 손실을 흡수하게 됩니다. 기갑과 기계화 부대는 전투의 무게를 나누는 데 도움을 줄 것입니다. 걸어가는 대신 타고 가는 모든 평화유지군은 집으로 돌아오는 평화유지군입니다."
lra.56.a: "이제 임무단은 하나의 목소리로 말한다. 이동하라!"

# The Dove Squadrons

lra.57.t: "비둘기 비행대"
lra.57.desc: "마크 "마요" 영킨 대위는 편대를 바짝 붙여 비행했습니다. 그가 조종간을 오른쪽으로 1인치만 더 당기면 F-15의 날카로운 가장자리가 윙맨의 조종석을 베어낼 것 같았습니다. 그는 긴장해 있었습니다. 주방위군 조종사로서는 이런 일을 겪어 본 적이 없었습니다. 그는 UNMIF-PAF와 함께한 지난 몇 주 동안 평생 겪은 것보다 더 많은 실전을 겪었습니다. 예전 삶이었다면 그는 이륙해 멕시코만을 순찰하거나 훈련을 했을 것이고, 다시 내려올 것이라는 확신도 훨씬 컸을 것입니다.\n "레이더 접촉, 적기, 우리 위치 기준 0-트리-나이너, 접근 중, 20마일 밖, 단기 편대처럼 보임." 무전이 갑자기 지직거렸습니다. 편대장인 에이다 "허니배저" 라빈 대위였습니다. 그녀가 이어 말했습니다. "자칼 1-3, 1-4, 이건 너희가 맡아라. 1-2, 좌측 이탈 후 상승. 가까이 붙어."\n\n 젠장.\n\n "수신, 4번, 따라와. 트리플 오로 밀고 들어가 요격한다." 마크는 편대 주파수로 호출하며 목소리를 침착하게 유지했습니다. 이글들은 흩어졌고, 비행운으로 아름다운 형태를 그렸습니다.\n "탤리, 레이더 접촉, 시각 접촉도 된 것 같다." 그것은 F-15A였고, 마요의 기체와 거의 같은 모델이라 구름 사이로 보기 어려웠습니다.\n "마요, 네 거다." 그는 무전을 들었습니다. 그는 레이더 화면에서 표적을 정렬했고, 말하자면 십자선에 넣었습니다. 좋은 톤이 들렸고, 헤드업 디스플레이에 'SHOOT'가 켜졌습니다. 그는 방아쇠를 당겼습니다.\n\n 미사일의 비행운이 자신을 지나 쏘아져 나가자, 그는 왜 비행기 한 대만, 홀로, 고립된 채, 어떤 지원도 없이 올려보내졌는지 생각했습니다. 그는 그 조종사가 자신을 향해 미사일이 날아오고 있다는 것을 알면서, 등을 봐줄 사람이 아무도 없다는 사실을 알 때 어떤 기분이었을지 생각했습니다. 그리고 무엇보다, 이 일이 이 전쟁이 불러낸 죽음에 대한 자신의 사색을 바꾸어 놓을지 궁금했습니다.\n 화염구가 적기를 집어삼켰습니다. 마요는 낙하산을 보았습니다. 결국 그는 자신의 첫 공대공 격추를 기뻐해도 될 것 같았습니다."
lra.57.a: ""스플래시 원, 이글.""

# Board of Commanders

lra.58.t: "지휘관 위원회"
lra.58.desc: "유엔 깃발 아래 복무하는 평화유지군은 다양한 국적, 군사 교리, 전문적 전통을 가지고 도착합니다. 이러한 다양성을 유지하면서 효율성을 극대화하기 위해, 임무단은 기업의 관리 구조와 같은 통합 지휘관 위원회 설립이 가장 효과적인 길이라고 판단했습니다. 각 지휘관은 자신이 맡은 병력과 지정 전선에 대한 직접 감독권을 유지하여 책임성과 적응성을 보장할 것입니다.\n\n분산형 지휘 구조는 필연적으로 사단 간 소통을 복잡하게 만들겠지만, 지휘관 수를 늘림으로써 임무단은 단일 지휘관에게 대륙 규모의 전선에 대한 책임을 과도하게 지우지 않고, 더 많은 인원을 전선에 배치할 수 있습니다. 그 결과 우리는 적보다 더 많은 병력을 투입할 수 있을 것입니다."
lra.58.a: "많다는 것은 언제나 더 낫다는 뜻이다."

# Florida's Arteries

lra.59.t: "플로리다의 동맥"
lra.59.desc: "유엔군이 미국 남부 깊숙이 진격할수록 군수의 어려움은 점점 더 심각해집니다. 전투는 고속도로와 철도를 폐허로 만들었고, 보급 호송대는 전선과 전방 작전기지에 도달하기 위해 산산이 부서진 기반시설을 수 마일씩 통과해야 합니다. 이 상황은 큰 위험을 초래합니다. 불안정한 도로는 우리 인원을 위험에 빠뜨리고, 필수 보급품 전달 지연은 작전 효율을 위협합니다. 최악의 경우 이러한 군수 실패는 전술적 후퇴와 불필요한 인명 손실로 이어질 수 있습니다.\n\n다행히 최고사령부는 I-75와 I-95 회랑의 포괄적인 재건을 승인했습니다. 이 핵심 동맥을 재건하는 것은 보급망의 효율성을 회복할 뿐만 아니라, 계속되는 분쟁으로 삶의 터전을 잃은 미국인들에게 일자리를 제공해 수천 개의 고용을 창출할 것입니다. 이렇게 기반시설 수리는 군사적 필요이자 국가 재생의 수단이 됩니다."
lra.59.a: "일석이조다."

# Stand Up Force Intervention Brigades

lra.60.t: "평화유지는 과정이다"
lra.60.desc: ""여기서 멈춰." 장교가 명령한 뒤 무전기를 잡고 말했습니다. "마스티프 빅터들, 여기는 마스티프 6, 차량 정지, 하차 대기. 보고에 따르면 그 집단은 전술 장비와 '화려한 상의'를 착용했다. 부갈루 놈들일 수도 있으니 경계하라."\nMRAP의 크고 둔중한 바퀴들이 앨라배마주 몽고메리 교외의 연석을 넘어 굴러갔습니다. 경장비와 푸른 헬멧을 착용한 병사들이 차량 뒤쪽에서 쏟아져 나와 사방을 확보했고, 이어 부대 무전에 또 다른 지시가 내려졌습니다. "마스티프 1, 신고자와 대화하라. '1261'로 표시된 집에 있다. 추가 정보를 줄 수 있는지 확인하라. 끊고, 마스티프 2, 남쪽으로 100미터 전진하라. 신고자는 그 집단이 그 방향으로 이동하는 것을 봤다고 했다. 마스티프 3, 경계 유지."\n\n여러 응답이 잇따랐고, 병사들은 각자의 임무를 수행하기 위해 이동하거나 제자리에 머물렀습니다. 장교는 MRAP 근처에 남아 상급 지휘부 주파수를 듣고, 양쪽에서 들어오는 새로운 전개를 전달했습니다. 잠시 후 무전에서 "마스티프 6, 여기는 1, 신고자와 이야기했지만 새로운 정보는 없다"라는 말이 들렸고, 곧바로 "마스티프 2, 설명과 일치하는 개인 집단을 시야에 포착했다. 경기장에 모여 있는 듯하다. 무기와 보급품 은닉처도 보인다"라는 말이 이어졌습니다.\n"수신, 마스티프 1, 3, 탑승. 기습으로 제압하고 구금한다. 1과 3은 남쪽에서 페어뷰 애비뉴를 따라 진입하고, 2는 북쪽에서 차단하도록 병행 이동한다. 가자."\n\n이것은 일이고, 의무였습니다. 치열한 전투에서 승리하는 영광도, 노력에 대한 큰 인정도 수반하지 않았지만, 이 남녀가 이 일을 하는 이유는 그것이 아니었습니다. 그들은 거리를 범죄와 무장 폭력으로부터 안전하게 지키고, 사람들이 굶주리거나 보살핌과 거처 없이 방치되지 않도록 이 일을 했습니다. 현지 기관들이 그 기준을 충족하지 못할 때, 누군가는 그 대가를 치러야 합니다.\n장교의 차량이 방심한 무장 집단을 기습하기 위해 굴러 내려가던 때, 그는 무전에서 이런 말을 들었습니다. "마스티프, 여기는 가디언, 준비되면 처리할 또 다른 911 신고가 있다.""
lra.60.a: "그는 한숨을 쉬었다. 아직 하루는 길었다."

# UN Weapon Trials

lra.61.t: "유엔 무기 시험"
lra.61.desc: "소총은 병사의 효율성을 떠받치는 초석입니다. 현재 유엔에는 단일 제식 소총이 없습니다. 대신 각자의 본국이 제공한 장비를 사용하고 있으며, 그 결과 매우 다양한 무기가 뒤섞여 군수의 악몽을 낳고 있습니다.\n\n이 문제를 해결하기 위해 유엔 임무단은 무기 시험을 승인했습니다. 미국의 콜트에서 독일의 헤클러&코흐에 이르기까지 세계 각지의 선도적 제조사들이 푸른 헬멧의 신뢰를 얻기 위해 치열하게 경쟁했습니다. 그러나 그중 한 회사가 동료들 사이에서 두각을 나타냈습니다. 바로 적응형 전투소총을 내세운 맥풀 인더스트리였습니다. 개조 능력과 낮은 반동 덕분에, 이 소총은 결국 행사에 참석한 유엔 대표들의 선택을 받았습니다.\n\n현재 탤러해시에 생산 본부를 세우는 계획이 진행 중이며, 그곳에서는 유엔 평화유지군을 위해 특별히 제작될 새로운 파생형, ACR-UN이 생산될 것입니다."
lra.61.a: "이것은 우리의 소총이다! 이것은 우리의 총이다!"

# UN Volunteer Surge

lra.62.t: "평화유지군 자원 급증"
lra.62.desc: "우리 평화유지 임무단의 모집소에는 미국인 지원자가 꾸준히 늘어나고 있습니다. 미국 해방이 계속되면서, 우리는 유엔이 더 이상 한때 여겨졌던 것처럼 무력한 기관이 아니라는 사실을 세계에 보여주고 있습니다.\n\n한때 우리의 임무를 의심하던 시민들은 이제 유엔의 위임에 신뢰를 두고 있습니다. 그들은 더 이상 우리의 존재를 해외에서 강요된 먼 개입으로 보지 않고, 평화를 회복하고 제도를 재건하며 조국의 존엄을 지키기 위한 정당한 노력으로 보고 있습니다.\n\n전국 곳곳에서 공병부터 의사, 조종사, 병사에 이르기까지 사람들이 하나둘씩 우리의 투쟁에 합류하고 있으며, 자신이 할 수 있는 어떤 방식으로든 기여할 준비가 되어 있습니다. 모두가 주권을 되찾고, 분열을 치유하며, 더 밝은 미래의 토대를 놓는다는 같은 목표 아래 단결하고 있습니다."
lra.62.a: "유엔이 행진한다!"

# A New Age of Total War

lra.63.t: "총력전의 새 시대"
lra.63.desc: "담배 연기가 탬파 사무실 밖 발코니의 유리 우리를 흐리게 만들었습니다. 그 안의 사람들은 이야기를 나누고 많이 웃으며, 평소 업무일에는 좀처럼 찾아오지 않는 이 순간을 음미하고 있었습니다. 그들은 동료, 상사, 가족에 대한 험담으로 시작했습니다. 점차 대화는 더 정치적인 분위기를 띠었습니다.\n\n"요즘 새 마감 일정들 때문에 우리 허리가 부러질 지경이지, 안 그래?" 한 사람이 말했습니다. 나머지는 말없이 동의했습니다.\n\n"그래, 우리가 받는 재무 보고서가 점점 새로 문을 여는 시설들에서 더 많이 오고 있어." 다른 사람이 말을 이었습니다. "하나 끝냈다 싶으면, 쾅, 어디선가 세 개가 더 튀어나오는 느낌이야! 새 생산 라인에 보내겠다고 부서 절반을 데려간 뒤로는 따라잡는 게 거의 불가능해졌어!"\n\n"재러드가 그 생산 라인 중 한 곳으로 끌려갔다고 들었어. 거기서 정확히 뭘 하는지는 모르겠지만, 그래도 크게 불평하지는 않는 것 같더라." 세 번째 사람이 끼어들었습니다. "전쟁이 저절로 이겨지는 건 아니니까."\n\n"난 아직도 유니언 역 밖의 시위대가 계속 모이도록 내버려 두는 게 놀라워." 첫 번째 사람이 연설하듯 말했습니다. "전쟁에서 이기려 하고 우리를 뼈 빠지게 일시키면서, 어떻게 후방에서 불화를 퍼뜨리는 걸 그냥 놔둘 수 있지? 이건 전쟁이라기보다 경기침체 같은데."\n\n"글쎄, 난 문제 없다고 봐. 시위하게 둬. 그건 그들의 권리야. 우리가 유엔 깃발 아래 산다고 해도 여전히 미국인이잖아." 세 번째 사람이 맞받았습니다. "게다가 그들이 모범을 보이고 선의를 공개적으로 보여주는 건 좋은 일이라고 생각해."\n\n담배 불빛이 희미해지기 시작했습니다. 일행은 모두 함께 시계를 보고, 타는 재를 털어내고, 한숨을 내쉬었습니다. 서로를 둘러본 뒤, 그들은 흡연 구역을 나와 각자의 칸막이 자리로 걸어갔습니다."
lra.63.a: "다시 일하러."

# B-52UN Rollout

lra.64.t: "B-52UN 공개"
lra.64.desc: "작업 중"
lra.64.a: "작업 중"

#Send It.
lra.65.t: "베테랑 대테러 요원"
lra.65.desc: ""마크, 트럭 기준 7시 방향으로 가." "접촉." "표적이 나타날 때까지 기다려." 켈빈은 장교의 명령을 전달하며 말했습니다.\n "이봐, 아프가니스탄 때랑 비교하면 어때?"\n "네 생각엔 어떨 것 같냐?" 켈빈이 답했습니다.\n 오른쪽 눈을 트럭 앞바퀴에 고정한 채, 마크가 말을 이었습니다. "네가 말해 봐. 난 다른 테러리스트는 본 적이 없거든."\n\n"어쩐지 내 동포들이 아프가니스탄의 도망다니는 쥐새끼들보다 더 못 싸우는군." 켈빈이 답했습니다. "제길, 아마 저놈들은 자기들을 노리는 저격수가 네 명은 된다고 생각할걸."\n 잡담도 이 전직 해병이 미묘한 움직임을 관찰하는 것을 방해하지 못했습니다. 토요타 뒤에 엄폐한 전투원이 짧은 벽까지 닿을 수 있는지 보려고 고개를 내밀기 시작했습니다. 그는 저격수를 보지 못했고, 엄폐를 벗어나 달릴 준비를 했습니다.\n "표적 이동 중, 준비해." "파란 목토시를 한 놈 하나 보입니다. 소총을 들고 바퀴 옆에 웅크렸고, 착용한 건-" "그놈이 네 표적이다." "준비 완료."\n 그는 AR-15의 운반손잡이를 붙잡고 앞으로 뛰쳐나갔습니다.\n\n"쏴.""
lra.65.a: ""또 하나가 먼지가 됐군.""

# Sky Aces

lra.66.t: "하늘의 에이스"
lra.66.desc: "조종사 막사의 TV가 밝게 빛났습니다. 몇몇은 TV 내용에 집중하고 있었지만, 대부분은 담배를 피우고, 카드놀이를 하고, 기지에서 허용되지 않은 음료를 마시고 있었습니다. 출격 경보나 다른 비상상황이 일어나기를 거의 바라며 기다리는, 평범하고 지루한 저녁이었습니다. 시계는 오후 7시를 가리켰습니다.\n\nTV 뉴스 프로그램의 진행자 목소리가 들리기 시작했습니다. "마이애미 시각 7시입니다. 미국 내 유엔 임무단의 최신 소식입니다. 유엔 활동의 새로운 떠오르는 별이 많은 이들의 관심을 사로잡았습니다. 소셜 미디어에서 유엔 공군 F-15 전투기와 워싱턴 정부에 충성하는 F-16 두 대 사이의 공중전 영상이 여러 게시물을 통해 입소문을 타면서입니다. 영상은 유엔 공군기가 두 대 모두를 격파하는 장면을 보여주었습니다-"\n\n"마요!" TV를 보던 조종사 중 한 명이 외쳤습니다. "봐, 네 얘기 하고 있어!" TV는 더 많은 호기심 어린 시선을 끌었고, 마요 본인도 거기에 포함되었습니다. TV 볼륨이 올라갔습니다.\n\n"-많은 고G 선회와, 일부 전문가들이 지적했듯 기체 속도를 독특하게 활용한 방식으로 말입니다. 이로 인해 유엔 항공기의 흰색 도색을 가리키는 '화이트 블러'라는 별명이 붙었습니다. 유엔 대변인은 '화이트 블러'가 7기 이상의 확인된 공대공 격추를 기록했다고 밝혔습니다. 또한 '화이트 블러' 같은 조종사들이 하늘의 지배권을 확보하는 데 얼마나 핵심적이었는지도 덧붙였지만, 일부 전문가들은 이것이 입소문을 이용하려는 유엔의 홍보 전략이라고 말합니다. 이어서 움직임-"\n\n"'화이트 블러'라." 마요가 소리 내어 생각했습니다.\n\n"그래, 웃기고 있네. 넌 언제가 돼도 '마요'를 속도로 따라잡지 못할걸, 마요." 방 안에서 웃음이 터졌습니다.\n\n'화이트 블러'... 마크는 속으로 생각했습니다. 그는 그것을 어떻게 받아들여야 할지 몰랐습니다. 자신이 우상화되고 있었지만, 그럴 자격이 있는지는 확신하지 못했습니다. 그에게 그것은 그저 생존이었습니다. 하지만 어쩌면 자부심, 우상화되는 것을 즐기고 싶은 마음을 느꼈을지도 모릅니다. 그가 추구한 것은 아니었지만... 분명 나쁘지는 않았습니다. 어쨌든 그는 아직 어느 정도 익명이었습니다."
lra.66.a: "그게 그였다는 것을 아무도 알 필요는 없었다."

# American Armor Revival

lra.67.t: "미국 기갑의 부활"
lra.67.desc: "하차한 소대가 큼직하고 각진 FAMAS 소총을 들고 앨라배마주 포트 러커의 주도로를 따라 이동하자, 보병들의 군홧발 소리가 불규칙하게 울렸습니다. 그들의 중대는 감시 결과 기지의 이전 점유자들이 철수하는 모습이 포착된 뒤 시설을 확보하라는 임무를 받았습니다. 거리는 달빛에 잠겨 있었고, 가로등도 켜져 있었습니다. 군홧발 소리는 계속 울렸습니다. 두 줄의 보병이 경계하며 함정이나 매복을 주시한 채 거리 양쪽을 장식했습니다. 이따금 몇몇 병사들이 갈라져 건물을 수색했습니다. 나머지는 밖에 남아 최대한 준비를 갖췄습니다. 조용했습니다. 한 보병, 샤쇠르 한 명이 벽을 따라 무릎을 꿇고 소총을 뻗었습니다. 침묵은 문을 걷어차는 소리로 깨졌습니다. 다시 조용해졌습니다. 그 보병은 주변을 둘러보다가 MRAP, 트럭, 심지어 AFV 한두 대까지 가득한 대형 차고를 발견했습니다. 또 다른 문이 걷어차였습니다. 그 보병은 전우에게 속삭였습니다.\n\n"Regarde, 놈들이 차량을 두고 갔나?"\n"경계." 그의 전우가 경계 태세를 유지하라고 명령했습니다. 또 다른 문이 부서졌습니다. "나중에 말해 주지."\n\n이제 해가 떠오르기 시작했습니다. 보병들은 훨씬 더 느슨하게 움직이고 있었습니다. 그날 밤, 소대는 차량 보급고를 지나쳤습니다. 이제 그들은 보급고의 차량을 손보고 있었고, 튀며 기침하는 엔진 소리가 모두의 고막을 채웠습니다. 우리의 샤쇠르는 다시 전우에게 물었습니다.\n "그래서, 왜 놈들이 차량을 두고 간 거야? 보급고 거의 전체가 차량으로 가득하잖아. 브래들리 AFV도 몇 대 있는데!"\n "퇴각할 때 모든 걸 가져갈 수 없으면 어떻게 하지?"\n "파괴하죠, 아닌가?"\n\n"Oui. 하지만 가끔은 완전히 파괴할 수 없어. 예를 들어 폭약이 없을 때처럼. 그래서 사보타주를 하지." 그는 주차장 근처 구석에 던져진 시중에서 산 설탕 포대를 가리켰습니다. "연료 탱크에 설탕을 충분히 넣으면 필터가 막히고, 차량이 시동되지 않아. 수리는 아주 간단하지만 오래 걸리고 예비 부품 없이는 불가능하지."\n한 정비공이 험비의 연료 탱크를 비우는 모습이 보였습니다. 또 다른 정비공은 좌절감에 다른 험비를 두드리고 있었습니다.\n"사실, 그래도 아무리 봐도 놈들은 파괴한 게 아니야..." 그는 잠시 멈췄습니다."
lra.67.a: ""그들은 아마추어이기 때문이지.""

# Reconstruction

lra.68.t: "재건"
lra.68.desc: "제임스와 그의 건설회사가 마지막으로 일을 본 지는 길고 긴 여섯 달이 지났습니다. 코로나 팬데믹은 회사를 거의 문 닫게 만들었고, 계속되는 내전은 그들의 어려움을 더욱 깊게 했습니다. 여러 세대 동안 이 회사는 지역의 자부심이었고, 그의 가족에게 전해져 내려왔으며, 한때 이 지역 최고의 건설회사로 여겨졌습니다. 이제 제임스는 회사가 하루라도 더 버틸 수 있을지 의문을 품었습니다.\n\n그러나 운명은 마침내 그의 편으로 돌아서는 듯했습니다. 유엔은 재건을 돕기 위해 건설회사들과 계약하기 시작했고, 제임스의 회사도 그중 하나로 선정되었습니다. 수개월간의 불확실성 끝에, 그들의 사업은 마침내 다시 일어설 기회를 얻었습니다.\n\n건설 현장을 점검하던 중, 제임스는 낯익은 얼굴을 마주쳤습니다. "덱스터? 말도 안 돼, 친구. 아직 여기 있었구나!" 그 나이 든 남자는 대규모 해고 이전부터 오랫동안 일해 온 직원이었습니다. "저도 돌아와서 좋습니다, 사장님." 덱스터는 미소 지으며 제임스를 껴안았습니다.\n\n"아들은 어떻게 지내, 덱스?"\n\n"..." 그는 대답하지 않고 손을 내렸습니다. "나쁜 결정을 했고, 나쁜 결과를 받았습니다."\n\n"아, 젠장." 친구의 입에서 나온 말을 들은 제임스는 미소를 멈췄습니다. "이봐... 정말 미안해."\n\n짧은 침묵 뒤에 덱스터가 다시 입을 열었습니다. "괜찮습니다. 과거에 매달리지 맙시다.""
lra.68.a: ""미래를 재건하는 데 집중합시다.""

#A Secure Energy Grid
lra.71.t: "남부 전력"
lra.71.desc: "2030 의제가 밝히듯, 전통적 에너지원에서 벗어나야 한다는 긴급성은 새롭고 지속가능한 대안을 찾는 일을 우선순위로 만들고 있습니다. 이에 대응하여 우리의 전력 계획 담당관들은 미국 남부 전체에 걸칠 수 있는 통합 에너지 체계를 계획하고 있으며, 이는 미래 사업을 위한 시험장이 될 수 있습니다.\n\n전력망 통합에 대한 초기 논의는 순조롭게 진행되었지만, 이제 논쟁은 재생에너지에 대한 투자를 우선할지, 원자력에 대한 투자를 우선할지로 옮겨갔습니다. 재생에너지는 빠르게 하락하는 비용, 확장성, 장기적 지속가능성을 약속하며 세계 기후 목표와 맞아떨어집니다. 반면 원자력은 비할 데 없는 안정성과 고용량 기저부하 발전을 제공합니다. 우리는 선택해야 합니다. 재생에너지의 역동성을 받아들일 것인지, 아니면 입증된 원자력의 안정성을 받아들일 것인지 말입니다."
lra.71.a: "'빅 3'에 집중하자."
lra.71.b: "원자력은 언제나 녹색이었다."

#Hands Tied
lra.72.t: "묶인 손"
lra.72.a: "애틀랜타에 새로운 차선이 생길 것이다."
lra.72.b: "철도는 애틀랜타에서 사바나까지 뻗을 것이다."
lra.72.desc: ""내 시절에는 의원들이 민주당과 공화당이었는데. 지금은..." \n\n"그만하세요, 영감님." 앤더슨 대표가 말했습니다. "그게 어땠는지는 압니다."\n\n"농담도 못 받아들이나 보군? 그래도 경계가 바뀐 걸 보니 영 거슬려."\n\n구 기득권층이 붕괴한 뒤, 주 단위 민주주의는 사실상 죽었습니다. 의회, 총회, 법원, 그 어느 것도 동네들이 내부에서 불타오르는 동안 새 회기를 소집할 권한이나 자원을 갖지 못했습니다. 유엔의 전역이 극단주의자들을 쓸어내고 질서를 회복하자, [ROOT.GetLeader] 사무총장은 미국인들의 마음속에서 임무단의 정통성을 높이기 위해 주 의회 새 회기를 소집하는 계획을 승인했습니다.\n\n"조지아 주 전역 확장 특별예산안의 통과 여부에 대한 표결을 시작합니다..." 하원의장이 표결 절차를 시작했습니다. "의원 여러분은 전자 장치로 표를 기록해 주십시오." 얼마 지나지 않아 모든 표가 들어왔습니다. 애틀랜타 출신 의원들은 모두 반대표를 던졌고, 조지아 나머지 지역 의원들의 초당적 지지에 맞섰습니다. 의장은 어느 쪽도 절대다수를 확보하지 못했다고 발표했고, 회의장은 빠르게 혼란에 빠졌습니다. "이봐요, 결정을 내려야 합니다." 임무단 지도자 피어슨 대표가 말했습니다. "밖에서 시간을 낭비할 여유가 없습니다."\n\n피어슨은 연단에 올라 유엔 대표들이 결정표를 행사하겠다고 발표했습니다. 15분 뒤, 피어슨은 닫힌 문 뒤에서 나와 유엔 대표들의 최종 결정을 발표했습니다:"

#A new style of transportation
lra.73.t: "자금 조달의 문제"
lra.73.a: "애틀랜타-걸프 연안 고속선."
lra.73.b: "애틀랜타-댈러스 고속선."
lra.73.c: "뉴욕까지 전속력으로!"
lra.73.desc: "구 미합중국에 대한 우리의 통제가 확대되면서, 유엔 재건·기반시설위원회는 우리 통제 아래 있는 주들을 예전의 위엄으로 재건하는 임무를 맡았습니다. 특히 두드러지는 부분은 국가의 철도망입니다. 구 연방의 철도 대기업들은 특별히 뛰어난 성과를 내지 못했고, 현재의 철도망은 해외의 철도망과 비교할 수준이 아닙니다. 적절한 철도망이 다른 산업 부문을 되살릴 수 있는 잠재력을 고려하면, 이는 특히 큰 문제입니다.\n\nUNRIC는 실패한 철도망을 복구하는 임무를 맡고 세 개의 가상 노선을 작성했지만, 안타깝게도 현재 자금은 하나를 추진하기에만 충분합니다. 결국 위원회는 선택합니다..."

#The Permian Basin(flavor)
lra.74.t: "검은 금, 푸른 깃발"
lra.74.a: "거친 시대는 이상한 동맹을 만든다."
lra.74.desc: "현대 국가는 인간의 몸과도 같습니다. 부서는 장기이고, 전력선은 동맥이며, 에너지는 그 안을 흐르는 피입니다. 미국의 에너지는 일부 운 좋은 주에 불균형하게 분포되어 있습니다. 캘리포니아의 태양광, 텍사스의 석유, 중서부의 풍력은 모두 유엔 통제 밖에 있어, 우리는 해외에서 에너지를 수입할 수밖에 없습니다. 이는 우리의 지출을 변동성 큰 에너지 시장에 매우 취약하게 만들 뿐만 아니라, 우리의 임무를 에너지 수출 카르텔의 손아귀에 맡겨 놓습니다.\n\n이제 버려진 페름기 분지가 우리 통제 아래 들어오자, 회계 담당자와 외교관들은 SDG 7을 일시적으로 내려놓고 텍사스 석유 산업 부활에 투자하라고 정책 결정자들에게 로비하고, 때로는 노골적으로 위협하기까지 했습니다. 주유소가 2020년 이후 처음으로 합리적인 가격을 발표하기 시작하자, 주민과 평화유지군 모두 우리의 "실용적 접근"에 긍정적으로 반응했습니다. 그럼에도 누구도 모두를 만족시킬 수는 없습니다. "배신당했다"고 느낀 강경 환경주의자들은 반세계주의 보수파와 손잡고, 유엔이 새롭게 확보한 석유 독점에 대한 실망과 반대를 표출하고 있습니다."

#Start a new ITER Program
lra.75.t: "미래에 불을 밝히다"
lra.75.a: "역경을 넘어 별을 향해."
lra.75.desc: "배급의 고난과 느린 재건의 소모 속에서, 유엔은 ITER에서 영감을 받은 새로운 에너지 구상을 발표했습니다. 그것은 최첨단 연구 프로그램이자, 임무단이 단지 전쟁을 견디고 미국인들에게 그 여파를 떠넘기는 것이 아니라 살아갈 가치가 있는 미래를 건설하려 한다는 상징적 선언이기도 했습니다.\n\n이 발표는 더 밝은 미래에 대한 약속이자, 과학과 진보가 회복의 닻이 될 것이라는 신호였습니다. 이미 국가의 취약한 전력망에서 효율성과 안전성을 개선하는 것을 목표로, 첨단 핵분열 원자로 설계를 시험하는 새 시설에 상당한 자원이 투입되고 있었습니다. 전쟁 이후의 번영을 만들기 위해 핵융합 에너지의 잠재력을 연구하는 작업도 시작되었다는 소문이 있습니다."

#The Supply Map - Fix the Logistical Nightmare
lra.76.t: "보급 지도"
lra.76.a: "우리 삶의 대가로."
lra.76.desc: ""월터, 며칠째인데 왜 아직 여기 갇혀 있는 거야?" 애덤이 다른 병사를 보며 물었습니다. 그들은 원래 빠르게 진격하고 있었지만, 공세는 일주일 전부터 서서히 멈춰 섰습니다. 월터는 소총에서 고개를 들고 입을 열었습니다. "왜냐고? 망할, 우리 기계들에게 먹일 연료가 하나도 없으니까 그렇지."\n\n유엔이 미국 깊숙이 밀고 들어가면서 보급선은 끊임없이 늘어났습니다. 적들이 철도와 항만을 파괴했고, 보급선에 대한 지속적인 사보타주는 단순한 재보급을 매일의 위기로 바꾸었습니다. 많은 부대는 필수 연료, 탄약, 차량 예비 부품을 기다려야 했고, 구호 수송품은 혼란 속에서 사라졌습니다.\n호송대는 매복당했고, 지휘관들은 전선을 전진시키는 대신 생명선을 지키기 위해 귀중한 인력을 돌릴 수밖에 없었습니다. 한때 단순한 군수 작전이었던 일은 이제 그 자체로 하나의 전투가 되었습니다.\n\n"어, 윗분들은 그걸 예상 못 했대? 그냥 그렇게 무능한 거야?" 애덤은 오가는 몇 대의 트럭을 바라보며 고개를 돌려 말했습니다. "내 백수 사촌도 자기 멍청한 전략 게임에서 병력 보급은 해야 한다는 걸 알던데."\n"우리는 원래 그냥 평화유지였어, 애덤." 월터가 답했습니다.\n"보급망이 없으면 전투에서 이기는 건 아무 의미도 없다는 걸 배워야겠군.""

#Temporary War Economy
lra.77.t: "스위치가 내려가다"
lra.77.a: "더 큰 대업에 비하면 소수의 고통은 아무것도 아니다."
lra.77.desc: "전쟁이 격화되면서 유엔은 공식적으로 임시 전시경제를 시행했습니다. 긴급 조달, 배급, 핵심 수송로 장악, 그리고 전선과 필수 서비스에 대한 생산의 엄격한 우선 배정입니다. 메시지는 분명했습니다. 이것은 더 이상 "미국을 안정화"하기 위한 평화유지 임무가 아닙니다. 이것은 분쟁을 끝내기 위한 전시 국가의 행정입니다.\n\n많은 이들에게 유엔의 규제는 한때 정상으로의 복귀, 내전 이전 삶의 회복을 약속하는 것이었습니다. 그 환상은 이제 깨졌습니다. 전쟁은 다시 그들의 문턱에 도달했습니다. 이러한 조치는 유엔과 그 병력을 지탱할 수는 있지만, 대중의 반감을 키우고 임무단이 점령 정부의 역할로 미끄러지고 있다는 비난을 강화할 위험이 있습니다. 소셜 미디어에서 비판자들은 이미 임무단이 미국의 주권을 지우려는 세계주의자들의 가면이라고 주장하고 있으며, 유엔 행정구역 안에서는 소규모 시위가 타오르기 시작했습니다."

#Focus on the people's trust
lra.78.t: "OCHA의 대응"
lra.78.a: "전쟁의 공포로 고통받는 이들을 위한 구호."
lra.78.b: "경제를 부양하라. 강한 경제는 도움이 필요한 이들을 도울 더 많은 자원을 의미한다."
lra.78.desc: "인도주의업무조정국은 유엔 임무단 아래 살아가는 사람들을 지원하는 데 매우 귀중한 기관임이 입증되었으며, 절실한 필요에 처한 이들에게 필수 구호를 제공해 왔습니다.\nOCHA는 유엔 임무단 전역의 피해 지역에 인도주의 구호를 전달하기 위한 방대한 군수 기반시설을 갖추고 있으며, 평소의 사무국 운영에도 정통합니다. 그러나 최근 임무단 전역에서 지역 경제가 정체되고 있다는 보고가 많이 들어오고 있습니다. 산업에 집중하는 다른 유엔 기관들이 대응을 준비하고 있기는 하지만, OCHA는 최근의 경제적 어려움을 돕기 위해 지역 경제에 현금 기반 경기부양책을 제공할 기회를 가지고 있습니다.\n\n하지만 올해 예산 배정에서 특히 드러나듯, OCHA의 자원은 무한하지 않습니다. 따라서 인도주의 구호를 제공할지, 경제 부양책을 시행할지 선택해야 합니다."

#A new banknote(flavor)
lra.79.t: "달러에서 유니타스로"
lra.79.a: ""그들은 괜한 걱정을 하고 있을 뿐이다.""
lra.79.desc: "계속되는 내전은 미국 금융 체계를 완전히 산산조각 냈습니다. 미국 달러는 그 가치를 보증할 통합된 연방 권위가 없는 가운데 서서히 무너지고 있으며, 여러 세력은 다음 미국 달러가 무엇인지에 대한 영향력을 두고 경쟁하며 각자의 통화를 찍어내고 있습니다. 이로 인해 평범한 미국인의 삶은 극도로 어려워졌습니다. 물가는 미친 듯이 변동하고, 임금은 하루아침에 의미를 잃으며, 식량이나 연료를 사는 단순한 행위조차 그 자체로 도박이 되었습니다.\n\n이에 대응하여 유엔은 보호 아래 있는 영토의 상업을 안정시키기 위해 유니타스라는 긴급 지폐를 공개했습니다. 많은 이들에게 유니타스는 취약한 생명줄이었습니다. 분열된 정부가 아니라 국제사회의 집단적 권위가 뒷받침하는 통화였기 때문입니다.\n\n그 의미는 경제를 넘어섰습니다. 유니타스의 수용은 정통성의 시험에 가까워졌습니다. 미국인들이 그것을 사용하기로 받아들인다면, 그들은 임무단의 커져 가는 권위도 받아들이게 될 것입니다. 그러나 유니타스가 발표되자마자 새로운 우려도 곧 표면화되기 시작했습니다. 유엔이 망가진 경제를 구하고 있는 것인지, 아니면 미합중국의 정체성 자체를 다시 쓰고 있는 것인지에 대한 논쟁이 시작된 것입니다."

#Establish the ESCNA
lra.80.t: "한 국가를 위한 이사회"
lra.80.a: ""...그렇다면 우리가 그 일을 끝내겠습니다.""
lra.80.desc: ""좋은 아침입니다, 신사 숙녀 여러분. 저는 무니르 아크람입니다. 모두 아시다시피 유엔은 북아메리카 경제사회이사회를 설립했습니다. 이 새로운 조직은 북아메리카 내 유엔 신탁통치 지역 전역의 재건과 통치를 조율하는 중앙 기관으로 기능할 것입니다."\n"우리의 과제는 단순히 잃어버린 것을 복구하는 것이 아니라, 더 회복력 있고 공정하며 번영하는 사회의 토대를 세우는 것입니다. 교통, 사회복지, 빈곤 퇴치, 그리고 미국인들에게 이익을 줄 훨씬 더 많은 분야의 장기 계획과 함께 말입니다. 이제 다음으로 넘어가겠습니다...."\n\n그날 밤, 무니르는 책상 뒤에 구부정하게 앉아 보고서 더미에 파묻혀 있었습니다. 각 페이지에는 끝나지 않은 일의 무게가 실려 있었고, 앞에 놓인 과제는 결코 쉬울 것을 약속하지 않았습니다. 문이 삐걱이며 열렸습니다. 그의 비서가 조용히 들어와 김이 나는 커피 한 잔을 그의 앞에 놓았습니다.\n"오늘 잘하셨습니다." 그녀가 말했습니다. "하지만 온라인에서는 우리가 미국의 주권을 훼손하고 있다고 말하는 사람들이 있습니다. 심지어 유엔이 나라를 점령하려 한다고 주장하는 사람들도 있어요."\n\n무니르는 컵을 들어 한 모금 마신 뒤 대답했습니다. "주권이라고요? 말해 보세요, 이곳에 아직 어떤 주권이 존재합니까? 민간인들은 저 미친놈들이 가져온 혼돈으로 고통받고 있습니다. 아무도 그들을 보호하지 않습니다. 서로 죽이느라 바빠서 그들을 도울 수 있거나 도우려는 정부는 없습니다. 그리고 자기 시민도 돌보지 못한다면...""

#Tomorrow, On Paper
lra.81.t: "종이 위의 내일"
lra.81.a: "지금은 차가운 맥주 한 잔 할 시간이다."
lra.81.desc: "마리아는 켄터키 시골의 작고 조금 낡은 진료소에서 일하는 평범한 간호사입니다. 유엔은 이곳을 한동안 관리해 왔고, 삶은 사소한 것들을 제외하면 늘 그랬던 것처럼 계속됩니다. 전등은 더 이상 하루에 두 번씩 깜빡이지 않습니다. 농부 데이브는 들판에서 긴 하루를 보낸 뒤 한 시간 동안 대기실에서 기다리지 않고도 마침내 허리를 진료받을 수 있습니다. 그리고 상냥한 노부인 베티는 숨은 비용에 대한 예전의 두려움 없이 치료를 받으러 옵니다.\n\n"좋아요, 여러분. 오늘 수업은 여기까지입니다. 해산." 잭슨은 학생들이 가방을 싸고 하나씩 나가는 사이 손에 든 책을 덮었습니다. 어떤 학생은 손을 흔들었고, 다른 학생들은 다음 수업을 향해 달려갔습니다. 그는 표지를 흘끗 보았습니다. STEAM. 20년 동안 가르치며, 유엔이 오기 전까지 그는 이런 책을 본 적이 없었습니다. 그것은 그가 자라며 보았던 낡은 책들과 전혀 달랐습니다. 사람들은 이 책이 미래를 위한 혁신적인 정신을 일깨우기 위한 것이라고 말합니다. 잭슨은 그것을 어떻게 받아들여야 할지 확신하지 못했지만, 그 약속이 진짜라면 어쩌면 미래는 그의 아내가 늘 농담하던 것만큼 나쁘지 않을지도 모릅니다.\n\n어둠이 디트로이트 위에 내려앉자, 밀러는 버스에서 내려 문을 잠갔습니다. 긴 하루였습니다. 예전보다 더 길었습니다. 그는 더 많은 얼굴들이 버스에 오르고, 노선 주변 건물들에 더 많은 불빛이 켜지는 것을 알아차렸습니다. 그는 이 변화가 푸른 헬멧을 쓴 사람들이 도착했을 때 시작된 것인지 궁금해했습니다. 그럴지도 모릅니다. 아닐지도 모릅니다. 어느 쪽이든, 그것은 내일 생각할 일입니다."

#Shock Doctrine
lra.82.t: "충격 교리"
lra.82.a: "잘했다. 전부 목록화해."
lra.82.desc: "급습은 해질 무렵 직전에 시작되었습니다. 유엔 헌병 분견대는 소총 분대의 지원을 받아, 납치된 구호 요원이 억류되고 밀수 무기가 보관되어 있는 것으로 의심되는 은신처가 있다고 여겨진 폐쇄된 구역을 조용히 지나갔습니다. 진입은 시끄럽고 혼란스러웠습니다. 좁은 복도, 어두운 방, 공황에 빠진 목소리들이 공기를 채웠고, 유엔 인원과 의심되는 테러리스트들 사이에서 명령이 고함처럼 오갔습니다. 돌입한 첫 병사들은 즉시 무장 저항에 부딪혔고, 사격을 받자 빠르게 엄폐했습니다.\n\n이것은 평화작전국이 배포한 새로운 압전탄의 첫 실전 사용이었습니다. 짧은 연사가 큰 총성과 빠른 '찌직' 소리 뒤에 경비원 두 명을 쓰러뜨렸고, 그들은 혼란에 빠지고 움직이지 못하며 반격할 수 없게 되었습니다. 건물은 몇 분 만에 확보되었습니다. 구호 요원은 뒤쪽 방에서 살아 있는 채 발견되었고, 충격을 받았지만 다치지는 않았습니다. 여러 구금자들은 약간의 타박상, 긁힘, 화상 자국 정도의 최소한의 부상만 입은 채 체포되었습니다. 전화기, 문서, 무전기도 압수되었습니다. 어떤 이들에게는 사소한 물건일지 모르지만, 올바른 손에 들어가면 테러 네트워크를 빠르게 풀어낼 수 있는 종류의 물건들입니다."

#The Cost of Advancing
lra.83.t: "진격의 대가"
lra.83.a: ""누가 고속도로 지도 좀 가져와...""
lra.83.desc: "플로리다가 평정되면서, 제2차 미국 내전에 대한 유엔 개입의 새로운 장이 열렸습니다. 탤러해시는 주 정부, 분리주의자, 급진 집단들이 격렬하게 다투는 미국 남부 주들에 눈을 돌렸고, 평화유지군은 딥 사우스를 안정시키기 위해 주 경계를 넘어설 준비를 마친 채 주변에 대기하고 있습니다.\n\n그러나 단일 주의 관리 가능한 규모 덕분에 지금까지는 대체로 무시할 수 있었지만, 미합중국 본토의 광대한 지역으로 진군하게 된다면 우리의 군수는 심각한 문제가 될 수밖에 없습니다. 우리 조직은 보급품 처리에서 비교적 자유로웠기 때문에, 의지할 수 있는 제도와 경험이 거의 없거나 전혀 없습니다. 현지 주민이 우리의 평화유지 노력을 지원하리라고 기대할 수도 없습니다. 결국 우리에게 남은 선택지는 하나입니다. 처음부터 군수망을 구축하는 것입니다.\n\n사령관님, 전쟁 기계가 깨어났고, 우리는 그것을 먹여 살려야 합니다."

# 84 and 84 reserved for hidden helper events

#Storm Chasing
lra.86.t: "폭풍 추적"
lra.86.desc: "유엔과 세계 전반은 겹겹이 누적된 지구온난화와 마비된 미국의 무력화로 인해 훨씬 강력한 폭풍 시즌이 올 것이라고 예상했지만, 그 규모는 임무단조차 허를 찔리게 만들었습니다. 그 시즌의 첫 주목할 만한 허리케인인 허리케인 라파엘은 3등급으로 마이애미 해안에 충돌해 플로리다 반도를 가로지르며 이 지역에 세워진 임무단의 초기 기반을 파괴했습니다. 두 번째인 허리케인 베릴은 시속 270km의 바람과 최대 5미터에 이르는 홍수를 동반한 5등급 허리케인이었습니다.\n\n이 폭풍은 카트리나 이후 가장 강력한 허리케인으로 드러날 것이었습니다. 거센 바람과 밀려드는 홍수는 텍사스와 루이지애나 해안을 강타했고, 샌안토니오, 휴스턴, 뉴올리언스, 배턴루지, 그리고 테네시, 앨라배마, 조지아, 캐롤라이나 전역의 수많은 도시를 초토화했습니다. 초기 추산에 따르면 사망자는 2,000명, 잃어버린 주택은 250만 채, 피해액은 약 1,150억 달러에 이릅니다. 대자연의 분노는 임무단에 친절하지 않으며, 우리는 이러한 위기에 맞서기 위해 적응해야 합니다."
lra.86.a: "멈추지 않는 폭풍."

#A Blue Banner Ablaze
lra.87.t: "불타오르는 푸른 깃발"
lra.87.desc: "유엔이 캘리포니아 서해안을 따라 나아가는 가운데, 이 지역을 새로운 지옥으로 밀어 넣을 위협적인 생태 재앙이 시작되었습니다.\n\n캘리포니아 잔존 반체제 세력은 유엔의 진격을 방해하기 위한 최후의 시도로 캘리포니아의 황야에 불을 질렀습니다. 그것은 문자 그대로의 '초토화' 접근이었습니다. 건조한 캘리포니아 숲의 끝없는 면적이 밝은 주황빛과 붉은빛의 지옥도로 빠져들고, 야생동물과 사람들의 무리가 맹렬한 화마를 피해 달아나고 있습니다.\n\n2020년과 2021년의 산불에 맞먹는 규모의 산불은 엄청나며, 이를 완화하려면 그에 상응하는 힘이 필요합니다. 텍사스 유전의 지옥도에서 교훈을 얻은 소방 항공기 비행대는 넓은 산림 지역에 방화제를 살포하도록 승인받았습니다. 이러한 노력도 환경에는 독성이 될 것이며, 이미 죽어가는 생태계를 죽이는 것은 임무단이 계속 나아가기 위해 삼켜야 할 쓰디쓴 약입니다."
lra.87.a: "산불이 다시 치솟는다..."


#UN RECRUITMENT EVENTS#
#DOMESTIC
lra.200.t: "미국인 자원병 준비 완료!"
lra.200.d: "유엔 통제 아래 해방된 영토 전역에서 진행한 모집 활동이 결실을 맺기 시작했습니다. 전직 경찰관, 예비군, 정비공, 학생, 그리고 군복을 입어 본 적조차 없는 남녀에 이르기까지, 미국인 자원자들이 푸른 깃발 아래 복무하라는 부름에 응답했습니다. 이들은 외국 정예 파견대와 같은 세련됨을 갖추고 오지는 않지만, 해외의 어떤 부대도 가져올 수 없는 것을 가지고 옵니다. 현지 지식, 익숙한 목소리, 그리고 미국인들 앞에 섰을 때 완전히 이방인처럼 보이지 않는 능력입니다.\n\n이들의 헌신은 단순한 인력 이상의 방식으로 임무단을 강화할 것입니다. 우리 대열에 합류하는 미국인 한 명 한 명은 평화유지군과 주민 사이의 거리를 좁히고, 이 투쟁이 미국을 둘러싸고 벌어지는 것만이 아니라 점점 미국인들 자신에 의해 수행되고 있음을 증명합니다. 이 자원자들이 훈련을 마치고 우리의 지휘 구조에 편입되면, 그들은 불안정과 테러에 맞서 질서를 지키는 새로운 수호자로서 전선에 합류할 것입니다."
lra.200.a: "미국은 스스로를 구하는 데 동참할 것이다."

#EUROPE
lra.201.t: "프랑스 증원군 도착!"
lra.201.d: "유럽의 후원국들은 전투 준비를 마친 병력과 첨단 무장을 제공하기 위한 일련의 조치를 승인했습니다. 이 부대들은 교육 수준이 높고, 규율 잡혀 있으며, 경험이 풍부할 뿐만 아니라 여러 단계의 훈련에 참여했던 노련한 지휘관들의 지휘를 받고 있습니다.\n\n프랑스의 기여는 분명 우리의 평화유지 노력에 대한 그들의 영향력과 관여를 확대할 것입니다. 이것이 평화유지 지휘부에 대한 그들의 통제력을 키우는 일이기는 하지만, 테러리스트와 싸우는 지금 우리에게 정치적 문제를 따질 여유는 없습니다. 프랑스 병력은 마이애미에서 하역을 마치고 우리의 지휘 구조에 익숙해지는 대로, 불안정과 혼돈에 맞서는 날카로운 창끝으로서 우리 병력에 합류할 것입니다."
lra.201.a: "확인했다."

