#SOUTHERN LOGISTICAL CRISIS DECISIONS#
LRA_fuel_burn_rate_mission: "보급 소모율"
LRA_fuel_burn_rate_mission_desc: "전역이 매주 이어질 때마다 임무단의 이미 빠듯한 보급 예비량은 줄어듭니다. 새로운 유지 수단이 없다면, 전쟁 수행은 꾸준히 더 유지하기 어려워질 것입니다."
LRA_fuel_burn_rate_rationed_mission: "보급 소모율"
LRA_fuel_burn_rate_rationed_mission_desc: "비상 배급제는 보급품을 군과 필수 서비스에 우선 배정함으로써 임무단의 보급 소모를 일시적으로 늦추었습니다. 예비량은 여전히 줄어들고 있지만, 이전보다는 느리게 감소하고 있습니다."
LRA_secure_the_gulf_lifeline_mission: "걸프 생명선 확보"
LRA_secure_the_gulf_lifeline_mission_desc: "뉴올리언스는 지도 위의 또 다른 도시 이상입니다. 그 항구, 창고, 수송망은 임무단의 남부 보급망을 지탱하고, 원정 예비량에 가해지는 압박을 완화할 수 있습니다."
LRA_hold_the_southern_junction_mission: "남부 교차점 점령"
LRA_hold_the_southern_junction_mission_desc: "애틀랜타는 남부의 도로, 철도, 지휘 기반시설의 중심에 서 있습니다. 임무단이 제때 이곳을 확보할 수 있다면, 남부 전역 전체를 훨씬 더 쉽게 유지할 수 있을 것입니다."
LRA_open_the_texas_fuel_gate_mission: "텍사스 연료 관문 개방"
LRA_open_the_texas_fuel_gate_mission_desc: "휴스턴의 터미널, 저장소, 수송 기반시설은 텍사스의 에너지 부로 들어가는 첫 번째 진정한 통로입니다. 그것 없이는 임무단의 전쟁 기계는 위험할 정도로 노출된 채 남게 될 것입니다."
LRA_seize_the_fields_mission: "유전 장악"
LRA_seize_the_fields_mission_desc: "서부 텍사스의 유전은 남부 전역의 거대한 전리품입니다. 이곳을 임무단 통제 아래 둘 수 있다면, 유엔은 마침내 대륙 규모의 전쟁을 유지할 수단을 손에 넣게 될 것입니다."
LRA_emergency_fuel_rationing: "비상 보급 배급제"
LRA_emergency_fuel_rationing_desc: "임무단은 민간 보급품 사용을 급격히 제한하고 군 수송, 응급 서비스, 핵심 주 기능을 우선함으로써 남은 예비량을 더 오래 버틸 수 있습니다. 이는 시간을 벌어줄 수 있지만, 그 사회적 비용은 곧 주민들에게 느껴질 것입니다."
LRA_civilian_requisition_program: "민간 징발 프로그램"
LRA_civilian_requisition_program_desc: "남부 곳곳에 아직 흩어져 있는 연료 저장고, 수송 차량, 정비 비축품과 기타 보급품을 임무단 통제 아래 둘 수 있습니다. 이런 징발은 전역을 계속 움직이게 하겠지만, 민간인과 지방 당국은 그 부담을 달가워하지 않을 것입니다."
LRA_fuel_distribution_program: "보급 분배 프로그램"
LRA_fuel_distribution_program_desc: "임무단은 자체 보급 예비량의 일부를 지역 공동체, 발전소, 병원, 응급 서비스에 방출함으로써 민간인의 고통을 덜 수 있습니다. 이런 조치는 대중의 신뢰를 높이고 전시 배급제의 거친 모서리를 누그러뜨리겠지만, 내어준 모든 1톤은 전역 유지를 위해 사용할 수 없는 1톤입니다."
LRA_black_market_procurement: "암시장 조달"
LRA_black_market_procurement_desc: "합법적인 경로가 더 이상 임무단에 보급품을 제공할 수 없다면, 평판이 덜 좋은 중개인들에게 맡겨야 할지도 모릅니다. 누가 그 거래로 이익을 얻었는지 너무 자세히 들여다보는 사람이 없다면, 보급품은 빠르고 조용히 도착할 것입니다."
#OMS Decisions
LRA_approve_oms_theater_expansion: "OMS 작전 확장 승인"
LRA_approve_oms_theater_expansion_desc: "플로리다는 제한된 개입으로 관리할 수 있었습니다. 딥 사우스는 그렇지 않습니다. 임무단이 단일 주를 넘어 진격하려면, 임무지원실은 조달, 창고 관리, 수리 일정, 그리고 군대를 계속 움직이게 하는 데 필요한 끝없는 행정 업무를 조율할 수 있는 진정한 전역급 전시 기구로 확대되어야 합니다. 비용은 많이 들겠지만, 즉흥 대처만으로는 더 멀리 나아갈 수 없습니다."
#future banner here
LRA_prioritize_strategic_network_repairs: "전략망 수리 우선"
LRA_prioritize_strategic_network_repairs_desc: "끊어진 철도 지선, 손상된 보급소, 파괴된 교량, 방치된 정비장은 남부 전역의 동맥을 막고 있습니다. 노동력, 자금, 공병 역량을 가장 중요한 교차점에 집중함으로써, 우리는 공세 유지에 가장 중요한 경로를 복구할 수 있습니다. 수리된 모든 노선은 전쟁 기계를 살아 있게 하는 사슬의 또 다른 고리가 됩니다."
LRA_redeploy_engineer_battalions_to_rear_area_sustainment: "공병대대를 후방 유지 업무로 재배치"
LRA_redeploy_engineer_battalions_to_rear_area_sustainment_desc: "전투공병은 전선에서만 유용한 것이 아닙니다. 교량 작업반, 경로 개척팀, 기술대대는 보급소 작업, 긴급 수리, 후방 군수 관리로 재배치될 수 있으며, 과도하게 늘어난 유엔 지원망의 부담을 일부 완화할 수 있습니다. 유지 능력의 향상은 분명하겠지만, 다른 임무에서 철수되는 모든 부대에는 기회비용이 따릅니다."
LRA_establish_forward_supply_depots: "전방 보급소 설치"
LRA_establish_forward_supply_depots_desc: "남부 진격은 플로리다만으로는 유지될 수 없습니다. 연료, 탄약, 예비 부품, 의료 비축품 같은 것들은 전선에 더 가까이 밀어 넣고, 지속 작전을 지원할 수 있는 전방 보급소로 조직되어야 합니다. 그런 시설은 유엔이 계속 움직이는 데 도움이 되겠지만, 동시에 자원을 소비하고 방어해야 할 새로운 목표물이 될 것입니다."
LRA_intensify_unpol_counterinsurgency_operations: "UNPOL 대반란 작전 강화"
LRA_intensify_unpol_counterinsurgency_operations_desc: "사보타주와 게릴라 공격은 단지 병사들을 죽이는 데 그치지 않습니다. 그것들은 현장의 평화유지군을 지탱하는 군수망의 숨통을 조입니다. UNPOL의 대반란 작전과 후방 지역 치안 작전을 강화함으로써, 우리는 보급 이동의 차질을 줄이고 해가 진 뒤에도 누군가는 도로를 장악하고 있다는 사실을 민간인들에게 안심시킬 수 있습니다. 후방의 질서는 때로 전선의 힘만큼이나 가치가 있습니다."
#DOS Decisions
LRA_integrate_relief_efforts_into_dos: "구호 활동을 DOS에 통합"
LRA_integrate_relief_efforts_into_dos_desc: "인도주의 구호와 군사적 유지는 더 이상 별개의 세계로 다룰 수 없습니다. 작전지원부는 민간 구호 전달, 연료 배분, 수송 일정, 비상 비축품을 하나의 행정 체계 아래에서 조율할 권한을 부여받아야 합니다. 유엔이 동시에 통치하고 싸워야 한다면, 그 제도들 또한 그렇게 하는 법을 배워야 합니다."
#future banner here
LRA_request_foreign_aid: "해외 원조 요청"
LRA_request_foreign_aid_desc: "임무단은 여전히 우호적인 정부, 자선단체, 해외의 제도적 협력자들에게 비상 물자와 군수 지원을 요청할 수 있습니다. 이런 요청은 절실히 필요한 연료, 장비, 구호 비축품을 공급해 줄 수 있지만, 선의는 무한하지 않습니다. 모든 호소는 정치적 자본을 소모하며, 반복되는 요청은 점점 더 정당화하기 어려워질 것입니다."
LRA_repair_critical_highway_links: "핵심 고속도로 연결망 수리"
LRA_repair_critical_highway_links_desc: "남부 대부분에서 전쟁은 철도만큼이나 고속도로에 의존합니다. 손상된 고가도로, 포탄 구덩이가 난 분기점, 무너져 가는 도로는 수송대를 늦추고, 마을을 고립시키며, 모든 이동을 느린 도박으로 바꿉니다. 가장 중요한 고속도로 연결망을 수리하면 군사 기동성과 민간 신뢰가 모두 개선되겠지만, 적지 않은 재정 비용이 따를 것입니다."
LRA_expand_refugee_camps: "난민 수용소 확장"
LRA_expand_refugee_camps_desc: "유엔이 남부 깊숙이 진격할수록, 전투와 경제 붕괴로 삶의 터전을 잃는 민간인은 늘어납니다. 난민 수용소와 그 주변 서비스를 확장하면 인도주의적 압박을 완화하고, 무질서를 줄이며, 유엔이 단지 점령하러 온 것이 아니라 보호하고 안정시키기 위해 왔음을 보여줄 수 있습니다. 이는 값비싼 부담이지만, 방치하는 것은 훨씬 더 나쁠 것입니다."
LRA_acquire_norfolk_southern_railway: "노퍽 서던 철도 인수"
LRA_acquire_norfolk_southern_railway_desc: "철도 없이는 어떤 군대도 대륙 규모의 전역을 유지할 수 없고, 우리는 철도 군수에 정확히 대비해서 온 것도 아닙니다. 노퍽 서던의 철도망과 군수 기반시설을 유엔 통제 아래 둠으로써, 우리는 남부의 거대한 수송 중추 중 하나를 군사와 구호 양쪽 모두에 사용할 수 있도록 확보할 수 있습니다. 대가는 막대하겠지만, 장기 유지 능력의 이득 또한 그만큼 클 것입니다."

