#Infantry Equipment
LRA_infantry_equipment_1: "FN FAL"
LRA_infantry_equipment_1_short: "FN FAL"
LRA_infantry_equipment_1_desc: "1946년, 첫 FAL 시제총이 완성되었습니다. 이 총은 제2차 세계대전 당시 독일군이 슈투름게베어 44 돌격소총에 사용했던 7.92x33mm 쿠르츠 중간탄을 발사하도록 설계되었습니다. 1948년 이 시제총을 시험한 뒤, 영국 육군은 FN에 새로운 .280 브리티시, 즉 7x43mm 중간탄을 사용하는 불펍 구성 시제총을 포함한 추가 시제총 제작을 요구했습니다. 그러나 단일 불펍 시제총을 평가한 뒤, FN은 향후 생산을 위해 원래의 전통적 설계로 돌아가기로 결정했습니다."
LRA_infantry_equipment_2: "M16A2"
