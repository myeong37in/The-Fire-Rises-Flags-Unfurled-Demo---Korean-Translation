LRA_crisis_of_confidence_in_miami_idea_desc: "약속한 일정 안에 탤러해시를 점령하지 못한 실패는 임무단의 핵심을 뒤흔들었습니다. 전역에 대한 신뢰는 국제 무대에서뿐만 아니라 유엔과 임무단 내부에서조차 흔들리고 있습니다. 유엔 임무단이 이러한 상태에 빠진 지금, 모든 지연은 유엔이 자신이 끝내기 위해 온 전쟁에 대한 통제력을 잃어가고 있다는 증거처럼 느껴집니다."

