#FOCUSES
######################################################
###########
#INTRO TREE
###########
UN_Commission: "제2차 미국 내전 유엔 위원회"
UN_Commission_desc: "제2차 미국 내전이 격화되는 가운데, 우리는 세계 무대 위에서 벌어지는 범죄와 비인도적 잔혹 행위를 더 이상 외면할 수 없습니다. 유엔은 이 지구에서 모든 형태의 인간 고통과 분쟁을 근절하겠다는 희망 속에 창설되었고, 지난 수십 년 동안 그 목표는 변하지 않았습니다. 두 대통령이 국가의 정통성을 두고 싸우고 급진주의자들이 미국 전역에서 들고일어나는 지금, 우리가 행동할 시간이 왔습니다. 우리는 마이애미를 통해 이 전쟁으로 찢어진 나라에 들어가 미국 전역에 다시 한 번 평화와 안정을 가져올 것입니다. 우리는 세계 평화의 수호자이기 때문입니다."
Form_UNMISF: "UNMIF 창설"
Form_UNMISF_desc: "유엔 결의안 2580호는 긴급한 인도주의 위기와 지역 불안정을 해결하기 위해 제2차 미국 내전 유엔 위원회의 설립을 승인했습니다. 다른 위원회와 달리, UNCSACW, 다른 이름으로 내전 위원회는 안전보장이사회로부터 막대한 권한을 부여받았으며, 사실상 플로리다 유엔 임무단의 통치 기관으로 기능하면서 군사, 민정, 유엔과의 관계를 감독합니다."
auxiliary_peacekeepers: "보조 평화유지군 창설"
auxiliary_peacekeepers_desc: "우리 병력이 햇살 가득한 마이애미 해변에 발을 디디자, 많은 민간인들은 마피아 국가와 그것이 초래한 불안정에 종지부를 찍기를 바라며 우리 군에 의지했습니다. 우리의 임무를 지지해 스스로 무장한 민간인들은 훌륭한 선전 소재가 되지만, 이 민병대원들이 우리의 지휘 체계와 완전히 분리되어 있으며 특히 조율 측면에서 극히 저조한 능력을 보인다는 사실을 무시할 수는 없습니다. 이 자원자들을 최대한 활용하려면, 그들을 우리의 평화유지 활동에 제대로 통합하기 시작해야 합니다."
refugee_camps: "난민 수용소 설립"
refugee_camps_desc: "혼돈이 미국을 집어삼키고 정부의 통제가 주요 도시, 심지어는 도심지 일부를 넘어서지 못하게 되면서, 많은 교외와 주거 지역은 주민들이 보호를 찾아 도시 중심부로 몰려들며 버려졌습니다. 우리는 이 문제뿐만 아니라, 아톰바펜 테러 정권을 피해 우리의 보호를 구하며 마이애미로 달려오는 사람들의 유입에도 직면해 있습니다. 지역 주민들의 환대와 빈 건물의 재활용에도 불구하고, 모든 난민을 수용하는 일은 점점 더 어려워지고 있습니다. 따라서 우리는 통제 아래 있는 모든 가용 토지에 더 많은 난민 수용소를 건설해야 합니다. 주차장, 체육관, 공원, 학교까지, 우리의 천막과 서비스 센터는 모든 곳에 닿을 것입니다."
wynwood_walls_massacre: "윈우드 월스 학살"
wynwood_walls_massacre_desc: "윈우드에 비극이 닥쳤습니다.\n\n한밤중, 평온하고 조용한 예술 지구의 잠은 잔혹하고 난폭한 총성에 산산이 부서졌습니다. 폭력이 우리의 통제 구역을 집어삼켰고, 우리가 보호하겠다고 맹세한 바로 그 사람들이 학살당했습니다. 현지 평화유지군은 지구를 구하기 위해 황급히 움직였지만, 배치 병력 부족으로 인해 음모자들이 이미 목적을 달성한 뒤에야 그들을 체포할 수 있었습니다.\n\n언론이 윈우드 월스 학살을 르완다 집단학살과 같은 또 하나의 중대한 평화유지 실패로 부르기 시작하는 데는 24시간도 걸리지 않았습니다. 게다가 체포된 가해자들이 즉결 처형되면서 평화유지군의 규율에 대한 의문까지 제기되었습니다. 우리의 임무가 르완다에서의 임무처럼 끝나는 것을 막고 싶다면, 과감한 변화가 필요합니다."
shift_in_strategy: "전략의 전환"
shift_in_strategy_desc: "우리의 기존 평화유지 전략이 다시 한 번 효과가 없음이 입증되었다는 것은 분명합니다. 1994년부터 2021년까지 30년 동안 우리는 아무것도 배우지 못한 것처럼 보입니다. 따라서 전략의 전환이 이루어져야 합니다.\n\n더 이상 개입을 두려워하지 않을 것입니다. 더 이상 테러리스트를 신뢰하지 않을 것입니다. 더 이상 무력 사용을 제한하지 않을 것입니다. 테러리스트들이 이해하는 언어는 힘뿐입니다. 우리는 평화유지군을 빠르게 확충해야 할 뿐만 아니라, 우리만의 군수산업도 시작해야 합니다. 안전보장이사회가 정치적, 관료적 싸움에 얽매여 있는 동안, 우리는 진짜 전쟁을 치르고 있습니다. 예산 논의는 나중에 할 수 있지만, 테러 세력의 파괴는 더 이상 기다릴 수 없습니다."
we_have_you_surrounded: "너희는 포위됐다"
we_have_you_surrounded_desc: "솔직히 말해, 아톰바펜 사단이 가져온 파괴는 이미 충분하지 않았습니까? 왜 계속 이 무정부주의자들이 날뛰도록 내버려 두어야 합니까? 우리에게 필요한 것은 혼돈이 아니라 질서이며, 우리는 또 다른 광신적이고 급진적인 집단이 플로리다에서 일어나는 것을 절대 허용하지 않을 것입니다.\n\n가서 전하십시오. 우리는 그들을 포위했습니다. 그들은 우리의 통제에 복종하거나, 우리가 그들을 쓸어버릴 때까지 광기에 매달릴 수 있을 뿐입니다."
the_civilian_connection: "민간과의 연결"
the_civilian_connection_desc: "팬데믹, 폭동, 시위, 그리고 최근의 내전은 한때 번영했던 마이애미-포트로더데일 광역권을 모두 황폐화시켰습니다. 상황을 더 나은 방향으로 바꾸고 우리의 보호 아래 있는 사람들의 복지를 보장하는 것은, 이제 혼돈에 지친 이들이 우리를 지지할 강력한 이유가 될 것입니다. 지역 건설업을 되살림으로써, 우리는 도시를 재건하는 동시에 고용도 늘릴 수 있습니다."
not_another_rwanda: "또 다른 르완다는 안 된다"
not_another_rwanda_desc: "1993년부터 1996년까지, 전 세계는 가장 어둡고 피비린내 나는 학살 중 하나를 목격했습니다. 그리고 우리 유엔은 유혈 사태를 막기 위해 UNAMIR를 파견했습니다.\n\n우리는 우리가 할 수 있는 모든 일을 했다고 믿었지만, 진실은 그렇지 않았습니다. 르완다 집단학살에서 약 80만 명, 어쩌면 그보다 더 많은 생명이 잔혹하게 지워졌습니다. 민병대와 군대뿐만 아니라, 민간인이 다른 민간인을 상대로도 끔찍한 잔혹 행위를 저질렀습니다.\n\n1999년, 우리는 우리의 실패라는 현실을 마주해야 했습니다. 유엔이 르완다의 집단학살을 예방하지 못하고, 이후 멈추지도 못한 것은 유엔 체계 전체의 실패였습니다.\n\n그리고 이제 이 평화유지 임무는 유엔의 명예를 회복할 기회입니다. 우리는 역사의 실수를 반복해서는 안 됩니다. 병사들이여! 전진하십시오! 폭력을 끝내십시오! 평화가 단어가 아니라 실현되어야 할 행동임을 그들에게 보여주십시오."
invite_the_red_cross: "적십자 초청"
invite_the_red_cross_desc: "제2차 미국 내전의 여파가 나타난 직후, 국제 NGO들은 이미 구 미합중국의 민간인을 돕기 위해 움직이고 있었습니다. 많은 세력이 저마다의 이유로 그들의 도움을 거절했지만, 우리는 주저하지 않고 그들을 마이애미로 초청했습니다. 유엔 결의안 2588호에 따라, 총회는 유엔을 탈퇴한 회원국에서 일하던 일부 관료들을 우리 위원회에 파견하여 국경없는의사회와 명망 높은 ICRC 같은 국제 NGO를 감독하고 지원하는 데 동의했습니다. 우리의 의료 지구가 이미 미국에서 두 번째로 많은 병원과 연구시설이 밀집한 곳인 만큼, 마이애미는 곧 미국 전역의 의료 중심지로 알려질 것입니다."
the_tyrant_of_tallahessee: "탤러해시의 폭군"
the_tyrant_of_tallahessee_desc: "플로리다 주 정부는 지역의 질서를 회복하려는 우리의 임무에 협력하기를 거부했을 뿐만 아니라, 우리를 미합중국 영토를 불법 점령한 소위 '국제 침략자'라고 비난했습니다. 주 정부가 폭력배와 테러리스트보다는 협력 파트너로 나은 것은 사실이지만, 우리 임무단과 자칭 합법 주 정부 사이의 충돌은 피할 수 없습니다.\n\n따라서 우리는 주 정부를 평정하기 위한 대중적, 국제적 지지를 모두 구축해야 합니다. 그 시작으로, 주방위군이 저지른 잔혹 행위를 폭로해야 합니다."
venerate_nordbat_2: "NORDBAT 2를 기리다"
venerate_nordbat_2_desc: "태평하고, 방아쇠를 쉽게 당기며, 교전규칙을 무시한다. 이것이 보스니아에 배치되어 스웨덴 장군들의 지휘를 받았던 과거 평화유지 임무의 NORDBAT 2에 대해 최고위 정치인들이 가졌던 인상이었습니다. 군에서 불복종은 용납될 수 없지만, 스웨덴 장교들의 결과주의적 철학이 투즐라 매복에서 덴마크 전차부대를 구했고 보스니아 세르비아군의 매복을 성공적으로 격퇴했다는 사실은 부정할 수 없습니다.\n\n우리가 마침내 더 공격적인 전략을 채택하는 지금, NORDBAT 2는 지역 안정을 위협하는 반군을 상대로 무력을 성공적으로 사용한 가장 초기의 평화유지 부대 중 하나로 평가되어야 합니다."
heal_the_cities: "도시 치유"
heal_the_cities_desc: "마이애미-포트로더데일 광역권을 재건하기 위해 최선을 다했음에도, 도시들이 여전히 완전한 혼란 속에 있으며 전쟁 전 수준의 삶의 질을 진정으로 회복하기까지는 아직 갈 길이 멀다는 사실은 부정할 수 없습니다. 교통의 무질서, 난민 유입이 기반시설에 주는 부담, 심지어 물과 전기의 배급까지. 이 모든 문제는 우리의 보호를 받는 이들의 삶뿐만 아니라 우리에 대한 지지에도 타격을 주고 있습니다. 다행히도, 우리의 계약업체들은 필수 서비스를 복구하는 재건 노력의 2단계를 시작할 준비를 이미 마쳤습니다."
partner_with_lockheed: "록히드와 협력"
partner_with_lockheed_desc: "미국이 붕괴하는 동안, 많은 미국 기업들은 뒤처지는 대신 수많은 자산을 포기하면서까지 혼돈과 광기에서 벗어나기 위해 가능한 모든 일을 했습니다.\n\n그러나 그렇지 않은 기업들도 있었습니다. 한때 미국 최대 항공기 기업 중 하나였던 록히드 마틴은 미국과 마찬가지로 조각났고, 아메리카의 모든 전쟁에 서비스를 제공하기 시작했습니다. 이제 남부에 남은 가장 큰 세력이 우리에게 거래를 제안하고 있습니다.\n\n거절할 방법이 있겠습니까? 우리가 플로리다에서 굳건히 서고 권력을 유지하려면, 먼저 마이애미의 하늘을 확보해야 합니다. 다른 겁쟁이 기업들이 남기고 간 공장과 자원을 그들에게 주십시오. 그들이 UNMIF를 위해 생산하게 하십시오."
reopen_the_happiest_place_on_earth: "세상에서 가장 행복한 곳 재개장"
reopen_the_happiest_place_on_earth_desc: "모든 것이 제2차 미국 내전으로 망가졌습니다. 디즈니 월드, 참으로 멋진 곳이었죠. 하지만 이제 올랜도 곳곳에서 피와 살점, 사람들의 잔해가 한때 마법 같았던 이 땅을 물들이고 있습니다. 우리는 이곳을 다시 열기 위해 노력해야 합니다.\n\n왜 다시 열어야 하느냐고요? 답은 간단합니다. 아이들의 미소를 위해, 우리 사람들의 행복을 위해, 그리고 전쟁 뒤 우리의 마음을 치유하기 위해서입니다. 세상에서 가장 행복한 곳은 다시 열려야 합니다."
strengthen_unpol: "UNPOL 강화"
strengthen_unpol_desc: "플로리다에서의 유엔 평화유지 작전은 날이 갈수록 점점 더 성공적임이 입증되고 있습니다. 평화유지군은 마이애미를 벗어나 플로리다 남부로 진격하며 아톰바펜 사단과 다른 플로리다 군벌들을 상대로 더 많은 지역을 확보하고 있습니다. 그러나 우리는 문제에 직면했습니다.\n\n대부분의 병력이 전선에 집중된 상황에서, 해방된 땅의 질서와 권위를 유지하는 데 도움을 줄 더 많은 평화유지군이 절실합니다. 그 결과, 우리 유엔 사무총장 중 한 명은 UNPOL을 플로리다로 재배치해 달라는 청원을 유엔 안전보장이사회에 제출했습니다. 그들이 결의안을 통과시키고 이를 승인하기까지 오래 걸리지는 않을 것이며, 이는 우리에게 큰 도움이 될 것입니다."
the_miami_airlift: "마이애미 공수"
the_miami_airlift_desc: "1948년의 위대한 도시 베를린처럼, 오늘날 마이애미도 적들에 의한 유사한 육상 봉쇄에 직면해 있습니다. 해상 접근권 덕분에 서류상으로는 베를린보다 상황이 나아 보이지만, 항구는 보호를 구하는 난민과 보급품을 기다리며 부두를 가득 메운 상선들로 넘쳐나고 있습니다. 해상 관리가 완전한 혼란에 빠진 탓에, 항구가 우리 임무를 위한 병력과 무기를 하역할 수 있는 능력은 심각하게 제한되어 있습니다. 다행히도 마이애미에 착륙하려는 민간 항공기는 거의 없었고, 마이애미 국제공항과 포트로더데일 국제공항 같은 대형 공항은 우리가 사용할 수 있게 되었습니다.\n\n우리는 1948년 베를린이 그랬던 것처럼, 필요한 보급품을 공수하여 이 봉쇄를 돌파해야 합니다."
what_are_we_now: "이제 우리는 무엇인가?"
what_are_we_now_desc: "유엔은 이제 한때 플로리다였던 황폐한 땅 위에 서 있습니다. 번성하던 도시들은 이제 잔해로 변했습니다. 이 분쟁이 전개되는 가운데, 우리는 스스로에게 질문해야 합니다.\n\n우리는 민간인을 보호하는 우선순위에서 진정으로 나아졌습니까? 과거의 실수에서 진정으로 배웠습니까? 우리는 정말 야만적인 군벌들과 싸우고 있는 것입니까, 아니면 다른 깃발을 들었을 뿐 또 다른 군벌이 된 것입니까? 아니면 우리는 여전히 더 나은 세계를 세우고 인류를 전쟁의 죄악에서 해방하려는 국제적 평화의 사도입니까? 제2차 미국 내전이 계속되는 한, 우리의 지휘관들은 이 질문들에 영원히 괴로워할 것입니다."
##################################
#EAGLE AND DOVE BRANCH, 35 FOCUSES
##################################
last_bastion_of_hope: "희망의 마지막 보루"
last_bastion_of_hope_desc: "미합중국 말기의 선샤인 스테이트였던 플로리다는 한때 조직범죄와 테러리스트의 공포에 뒤덮이고, 한때 내전의 안개 속에 길을 잃었지만, 이제 더 밝고 희망적인 미래를 보고 있습니다. 우리의 평화유지 노력이 밝히는 횃불 아래에서 범죄자들은 정의의 망치로부터 숨을 그림자를 찾지 못하고, 그들의 부패한 정신이 더 많은 플로리다 주민에게 영향을 미치기 전에 신속히 진압됩니다. 우리가 탬파와 윈우드의 피 위에 서 있기는 하지만, 마이애미와 미 본토 최남단 주는 마침내 평화를 되찾았으며, 이 피비린내 나는 내전 속 혼돈의 세력에 맞서는 희망의 마지막 보루가 될 것입니다."
leg_of_the_dove: "비둘기의 유산"
leg_of_the_dove_desc: "임무단은 여전히 무장하고 있으며, 우리의 목적은 여전히 평화를 위해 싸우는 것입니다. 그러나 이 비상 상태가 무기한이어서는 안 됩니다. 유엔은 결정을 내렸습니다. 우리의 목표는 모든 현관문 앞에 총구를 겨눈 영구 정부가 아니라, 미국인들에게 희망을 되찾아 줄 민간 위임통치입니다.\n\n안전보장이사회의 지도 아래, 민간 주도의 전환이 공식화될 것입니다. 행정, 재건, 권리, 정통성은 미래의 어떤 '새로운 미국'이 세워질 기둥이 될 것입니다. 또한 우리의 비전을 이끌고 달성하며 이 끔찍한 분쟁을 단번에 끝낼 수 있는 지도자를 선택해야 합니다."
the_eagle_nest: "독수리 둥지"
the_eagle_nest_desc: "수십 년 동안 미국의 상징은 흰머리수리였고, 최근 전투에 합류한 많은 평화유지군이 본래 미국인이었기에, 그들이 말하는 '고향'의 요소가 이곳에서의 작전 구조에 복제되는 것은 필연적이었습니다.\n\n미국인 주도 참모진의 유사한 파벌이 플로리다 작전에서 주도권을 잡았고, 지휘 계통의 많은 이들은 그들을 '독수리'라 불리는 소규모 파벌로 보고 있습니다. 이 평화유지군 집단은 전략과 현장 양쪽에서 평화유지군을 현대화하는 일을 맡았습니다.\n\n하스 소장이 이끄는 장군, 평화유지군, 참모진의 준군사적 집단은 현재 평화유지 작전에 이해관계를 가지고 있습니다. 그러나 지금은 당면한 임무에 집중해야 합니다. 미합중국을 구한다는 것이 무엇을 의미하는지에 대한 우리의 이상은 나중의 일입니다. 그리고 이 파벌처럼, 우리도 행동해야 합니다."
Invoke_chapter_VII: "유엔 헌장 제7장 발동"
Invoke_chapter_VII_desc: "미국의 내전은 이미 중재의 모든 한계를 넘어섰습니다. 극단주의 게릴라와 민병대는 민간인을 학살하고, 동네 전체를 불태우며, 난민 지역을 폭격하고 있습니다. 제6장이 강화한 평화적 분쟁 해결 방식은 우리가 아메리카에서 마주하는 위협에는 효과가 없을 것입니다. 제7장을 발동함으로써, 우리는 더 지속가능한 방식으로 평화를 증진할 수 있습니다.\n\n나아가 제7장을 발동하면, 우리는 이곳 아메리카에 존재하는 다양한 유형의 테러리스트에 맞서기 위해 자원과 인력을 재배치할 수도 있습니다."
atlanta_burns: "애틀랜타가 불탄다..."
atlanta_burns_desc: "미국 최대 도시 중 하나이자 한때 상업과 문화의 등대였던 애틀랜타는 이제 여러 세력과 민병대가 도시 안에서 매일 서로 싸우며 붕괴 직전에 놓여 있습니다. 이 도시는 워싱턴에 기반을 둔 연방주의 정부를 포함한 모든 방향에서 폭격, 포격, 그리고 온갖 공격을 받고 있으며, 끝없는 듯한 난민 행렬이 지역의 혼돈을 피해 달아나려 하면서 독자적인 난민 위기까지 겪고 있습니다.\n\n이 상황 앞에서, 애틀랜타와 주변 지역을 확보하고 질서를 회복하는 작전은 점점 더 피할 수 없는 일이 되었습니다. 이제 이 분쟁의 어떤 세력도 이성적으로 대화할 상대가 아니라는 사실을 이해한 이상, 유엔은 임무단을 구 미합중국의 나머지 지역으로 확대할 것입니다. 우리는 아메리카에 평화를 가져오는 데 실패하지 않을 것입니다."
negotiate_with_fort_bennings: "포트 베닝과 협상"
negotiate_with_fort_bennings_desc: "구 미합중국 최대 규모의 군사 시설 중 하나였던 포트 베닝은 워싱턴의 명령에 따라 봉쇄된 채 중립을 유지했습니다. 지난 몇 주, 몇 달 동안 무장 세력들이 기지를 습격해 왔기 때문에, 포트 베닝 내부의 주방위군 구성원들이 워싱턴과 덴버에 기반을 둔 세력 외에는 모든 외부 세력을 의심하는 것은 당연한 일입니다.\n\n하지만 이제 우리가 이 지역의 통제와 평화를 굳혔으니, 포트 베닝의 고위 지휘부와 그들의 복무, 그리고 기지와 보급품의 유엔 통제 이양에 대한 가능한 합의를 논의할 수 있을지도 모릅니다."
ending_non_interventionalism: "비개입주의의 종식"
ending_non_interventionalism_desc: "비개입 원칙은 수십 년 동안 평화유지 작전을 이끌어 왔으며, 분쟁이 통제 불능으로 치닫는 것을 막기 위해 긴장 완화, 중재, 자제를 강조해 왔습니다. 그러나 조직이 마주한 가장 복잡하고 폭력적인 분쟁인 제2차 미국 내전에서, 바로 이 교리는 우리의 가장 큰 장애물 중 하나가 되었습니다.\n\n테러리스트와 반군은 우리의 소극성을 이용해 잔혹 행위를 저지르고 민간인을 학살하는 동안, 우리는 그저 지켜보며 아무것도 하지 않았습니다. 우리가 아메리카 대륙에 평화를 회복하고자 한다면, 이것이 우리의 길을 가로막도록 둘 수 없습니다. 이 범죄자들을 대하는 방식은 달라져야 합니다. 선제 타격, 테러리스트에 대한 결정적 행동, 무엇보다 민간인의 생명이 위험할 때 공격하는 방식이 필요합니다."
implementing_rationing_measures: "배급 조치 시행"
implementing_rationing_measures_desc: "인도주의 활동이 민간인을 위한 보급을 최적 수준으로 유지하기 위해 최선을 다하고 있음에도, 식량과 물자는 부족하며 매일 줄어들고 있습니다. 새로운 수송품이 도착하기도 전에 창고가 비어 가고 있습니다.\n\n상황이 더 큰 위기로 치닫는 것을 막기 위해, 우리는 엄격한 배급제를 시행하여 우리가 가진 자원을 가장 필요한 곳으로 돌리고, 사재기나 보급품 전용을 막기 위해 통제된 분배를 유지해야 합니다."
recruiting_american_generals: "새로운 미국 장군 모집"
recruiting_american_generals_desc: "전쟁 초기에 우리의 초기 진격은 빠르고, 정밀하며, 효과적이었습니다. 그러나 분쟁이 확대될 때마다, 같은 승리들은 점점 지속가능한 전략의 결과라기보다는 운 좋은 우연처럼 보이고 있습니다.\n\n전장에서의 성공을 일관되게 유지하려면, 주방위군, 현지 민병대, 전 미합중국 육군 장성들 가운데 경험 많은 장교들을 모집하여 귀중한 전술 지식과 지역적 통찰을 우리의 대열에 들여오는 것이 필수적입니다."
eagle_work_with_general_hass: "하스 장군과 협력"
eagle_work_with_general_hass_desc: "평화유지군은 같은 문제를 두 번 마주치는 일이 드뭅니다. 주된 이유는 모든 임무가 이전과 완전히 다른 문화, 언어, 지형을 가진 지역에서 이루어졌기 때문입니다. 그러나 그것은 평화유지군을 끊임없이 괴롭혀 온 하나의 문제도 낳았습니다. 바로 작전 지역에 대한 낯섦입니다.\n\n탤러해시의 폭군이 쓰러졌을 때, 기득권층의 많은 구성원들은 우리가 옛 미국 사회의 모든 마지막 조각까지 차지하러 오는 것이라며 편집증적으로 반응했습니다. 다행히도 존 D. 하스를 포함한 많은 이들의 마음에는 곧 이성이 돌아왔습니다. 그는 플로리다 주 정부 휘하에서 복무한 장군이었습니다. 우리 팀은 협력을 바라며 그에게 접촉했습니다. 결국 우리는 안내자가 필요하고, 그는 일자리가 필요합니다."
redesign_blue_helmet: "푸른 헬멧 재설계"
redesign_blue_helmet_desc: "유엔은 수십 년 동안 장비가 부족하고, 인원이 부족하며, 테러리스트와 반군 조직에 맞설 준비가 되어 있지 않다는 끊임없는 비판에 직면해 왔습니다. 제2차 미국 내전이 시작되면서 이 서사는 더 강해졌고, 평화유지군은 그저 관찰자이거나 테러리스트의 표적 연습감에 불과한 존재로 묘사되었습니다.\n\n이 거짓 서사를 단번에 무너뜨릴 때가 왔습니다. 유엔 평화유지군을 반군을 제거할 준비가 충분한 전문 조직으로 개혁하고, 전투 장비 현대화와 평화유지군 훈련 강화를 중심에 두어야 합니다."
pass_down_army_education: "군사 교육 전수"
pass_down_army_education_desc: "우리는 바퀴를 다시 발명할 자원도 시간도 없습니다. 옛 미군이라는 거대한 조직은 수십 년간의 피와 불, 시행착오를 통해 효과가 입증된 군사 교육 체계를 기반으로 했습니다.\n\n우리 훈련교관들은 유능하고 전투 준비가 된 평화유지군을 빠르게, 그리고 대량으로 양성할 체계가 절실합니다. 이제 많은 전직 미군 지휘관으로 구성된 최고사령부는 옛 체계를 유엔의 임무와 이 전례 없는 내전의 특성에 맞게 조정했습니다. 이제 남은 것은 그것을 시행하는 것뿐입니다."
deploy_army_corp_engineers: "육군 공병대 배치"
deploy_army_corp_engineers_desc: "아메리카의 들판은 단순한 전장이 아닙니다. 폭파된 교량, 잔해로 뒤덮인 도로, 붕괴된 건물은 전쟁의 복잡성을 크게 높였고, 쥐새끼들은 폐허 속으로 물러나기 전에 치고 빠지는 전술을 사용합니다. 게다가 기본적인 필요를 위한 기반시설조차 존재하지 않아 아메리카에서의 삶은 극도로 어려워졌고, 사람들은 절망하고 있습니다.\n\n다행히 주방위군과 육군 인력을 통합하려는 우리의 노력은 예상치 못한 선물을 가져다주었습니다. 바로 공병 인력입니다. 이 전투공병들은 평화유지군을 따라 햇빛조차 들지 않는 곳까지 들어갈 것입니다. 폭파조는 들개들을 몰아낼 것이고, 나머지는 공동체들을 다시 나라와 연결하여 모두에게 희망을 가져다줄 것입니다."
eagle_aim_to_disorganize: "혼란을 노려라"
eagle_aim_to_disorganize_desc: "테러 집단과의 협상과 외교는 보통 실패합니다. 그러나 미국 영토에 존재하는 이념적 광신성 때문에, 이 과제는 사실상 불가능해졌고 그들에게 재편성과 반격의 시간만 벌어 주고 있습니다.\n\n우리는 이 집단들 때문에 더 이상 지체할 여유가 없습니다. 오히려 경고 없이 그들을 공격하고, 보급선, 지휘소, 집결지를 파괴해 허를 찌르며, 큰 어려움 없이 그들을 제압할 수 있도록 해야 합니다."
dove_diplomatic_delay: "외교적 지연"
dove_diplomatic_delay_desc: "아메리카 전역에서 내전이 격화되는 가운데, 수천만 명의 무고한 사람들이 안타깝게도 탈출구도 없이 극단주의자 통제 지역에 둘러싸이고 갇히게 되었습니다. 평화유지군이 이런 상황을 마주할 때, 무작정 총을 쏘며 들어가거나 눈에 보이는 모든 것을 폭격해서는 안 됩니다.\n\n십자포화에 휘말린 무고한 민간인의 안전을 우선하기 위해, 우리는 일부 세력과 협력하여 합의와 거래를 이끌어내야 합니다. 설령 협상이 실패하더라도, 우리는 이미 추가 작전을 위한 평화유지군과 보급선을 준비해 두었을 것이므로 헛된 일은 아닐 것입니다." #
brand_new_armoured_units: "신형 기갑부대"
brand_new_armoured_units_desc: "지난 세기 이래로 기갑차량은 현대전에서 핵심적인 역할을 해 왔습니다. 역사적으로 유엔 평화유지군은 그러한 부대를 주로 지원 역할로 사용했을 뿐, 진정한 전투부대로 삼지는 않았습니다. 그러나 이 임무는 우리 누구도 예상하지 못했던 것보다 훨씬 더 어려운 것으로 드러났습니다. 적들은 현대화된 기갑차량으로 무장하고 있으며, 제대로 된 장비가 없다면 우리는 패배하는 싸움을 하게 될 것입니다.\n\n수백 대의 적 전차를 노획하고, 옛 미국 기지와 비축품을 통제하게 되면서, 우리는 '기갑 평화유지부대'를 창설할 기회를 얻었습니다. 이들은 민간인을 보호하고 적대적 기갑세력과 교전할 수 있으며, 동시에 우리 장비를 훨씬 더 우수한 미국제 장갑으로 업그레이드할 것입니다."
production_and_procurement_techniques: "생산 및 조달 조치"
production_and_procurement_techniques_desc: "국제사회의 원조를 제외하면, 현지 소화기와 대전차무기 제조업체들은 우리의 최대 공급자이자 협력자이며, 우리의 지상전 노력이 계획보다 더 오래 지속될 수 있도록 보장하고 있습니다. 그러나 모든 군대의 중추이자 모든 평화유지 작전의 가장 중요한 구성요소인 보병은 장기 작전을 유지하기에 충분한 장비를 여전히 갖추지 못하고 있습니다.\n\n따라서 우리는 기관총, 박격포, 휴대용 대전차 체계 등 모든 범주의 소화기 국내 생산을 확대하고 증가시켜야 합니다. 이는 평화유지군이 제대로 장비를 갖추도록 보장할 뿐만 아니라, 마주치는 어떤 반군, 테러리스트, 민병대도 극복할 수 있는 군대로 만들기 위한 것입니다."
nationalize_local_resources: "현지 자원 국유화"
nationalize_local_resources_desc: "미국을 황폐화시키는 분쟁은 전국의 천연자원 채굴지에 대한 민간 통제를 파괴했습니다. 광업과 벌목 작업을 독점하던 기업들은 나라 밖으로 쫓겨나거나 붕괴했고, 그 뒤에는 민병대나 현지인들이 흔히 약탈하는 시설, 장비, 자원이 남았습니다.\n\n그러나 이 버려진 자원은 전쟁 기계를 공급하고 유지하며, 우리가 할 수 있는 재건을 수행하는 데 필수적입니다. 따라서 시설과 자원을 모두 국유화하여 평화유지군의 직접 행정 아래 두는 것이 필요합니다."
repurpose_jackson_airport: "하츠필드-잭슨 공항 용도 전환"
repurpose_jackson_airport_desc: "한때 미국에서 가장 붐비는 공항 중 하나이자 미국 남부 최대 규모의 공항 중 하나였던 애틀랜타의 하츠필드-잭슨 국제공항은 거의 완전히 버려진 상태로 남아 있습니다. 그러나 이제 이 지역이 우리의 통제와 행정 아래 들어온 만큼, 이 시설을 되살리고 인도주의 및 군사 작전을 지원하는 데 활용할 기회는 유리한 것으로 검토되고 평가되었습니다.\n\n이 시설은 주민에게 필수 보급품을 전달하고 인도주의 목적을 수행하는 거점 역할을 할 뿐만 아니라, 지역 작전, 평화유지군의 이동, 보급품과 군사 장비 운송을 위한 전략적 거점도 제공합니다."
protect_strat_targets: "전략 표적 보호"
protect_strat_targets_desc: "'외로운 늑대'들이 저지르는 폭력과 테러는 영토와 우리의 임무에 남아 있는 가장 위험한 위협 중 하나입니다. 그들은 예측 불가능하고 자기 목숨을 돌보지 않으며, 피해를 최대화하는 데 집중하기 때문입니다.\n\n병원, 정부 건물, 인도주의 기관 사무소, 난민 수용소처럼 우리에게 전략적이고 고가치인 지역은 거의 모든 공격에서 테러리스트의 표적이 됩니다. 따라서 우리는 정예 병사와 대테러 요원으로 경비를 강화해야 합니다."
expand_the_troy_facility: "트로이 시설 확장"
expand_the_troy_facility_desc: "내전이 발발했을 때, 록히드 마틴을 포함해 전국에 걸친 많은 기업들은 대부분의 시설을 포기해야 했습니다. 록히드 마틴이 남긴 가장 큰 공장 중 하나는 앨라배마주 트로이에 있었습니다. 트로이 시설로 더 잘 알려진 이 건물에는 도적과 갱단이 약탈하기에는 너무 무거웠던 많은 중공업 장비가 남아 있습니다.\n\n이 시설은 과거의 영광을 되찾기 위해 약간의 추진력만 있으면 됩니다. 이 공장을 재가동하는 것은 어떤 국제적 재앙이 일어나더라도 우리의 비축품이 고갈되지 않도록 보장하기 위한 첫걸음이 될 것입니다. 다만 그 대가로 안전보장이사회의 영향력은 줄어들 것입니다."
restart_international_diplo: "국제 외교 재개"
restart_international_diplo_desc: "뉴욕시의 함락과 그에 따른 우리의 상설 본부 상실은 조직을 고립되고, 무질서하며, 여러 국가의 감시 아래 놓이게 만들었습니다.\n\n이제 마이애미가 우리의 통제 아래 들어온 만큼, 우리가 한때 가졌던 정통성과 존중을 되찾기 위해 이 지역에 임시 본부를 설치하고 정상회담과 회의를 위해 국제 외교관들을 초청하는 것이 무엇보다 중요합니다."
integrity_as_an_org: "조직으로서의 청렴성"
integrity_as_an_org_desc: "마이애미를 확보하고 라 라사를 도시에서 몰아내려는 경쟁은 일부 지역에서 통제를 벗어났습니다. 이 지역을 서둘러 점령하는 과정에서 평화유지군과 지원 인력 일부는 비전투원에게 과도한 무력을 사용하고, 사유재산을 약탈했으며, 교전규칙을 위반했습니다. 이러한 사건은 널리 퍼진 것은 아니었고 규탄도 받았지만, 기록되어 다른 세력에게 이용되었고 우리의 평판 일부를 더럽혔습니다.\n\n이러한 위반 각각은 우리의 정통성을 훼손하고, 미국의 민간인들이 우리를 점점 더 불신하게 만듭니다. 우리는 이것이 계속되도록 둘 수 없습니다. 이러한 행위에 책임 있는 이들을 조사해 법의 심판대에 세워야 하며, 우리의 원칙을 강화하고 그러한 사건에 대한 관용을 줄여야 합니다."
strict_logi_ident: "엄격한 군수 식별"
strict_logi_ident_desc: "테러리스트와 그들의 예측 불가능한 비대칭전 전술은 보통 우리 병력이 대처하기 어려운 문제가 아니지만, 막후에서 그들은 효율적입니다. 그들의 가장 효과적인 방법 중 하나인 위장은 우리를 괴롭혀 왔습니다. 반군은 차량에 유엔 표식을 위조하고 제복을 훔쳐 우리 병력인 척하며 보급선에 침투했습니다. 우리는 이미 소규모 보급소 일부가 이러한 위장자들에게 습격당하거나 폭격당한 사건을 겪었습니다. 더 큰 재앙이 일어나기 전에, 우리는 평화유지군의 확인 체계를 강화해야 합니다."
sweep_command_units: "부패한 지휘부 소탕"
sweep_command_units_desc: "우리는 미국에서의 평화유지 임무가 평화롭고 비교적 단순할 것이라고 기대하고 바랐지만, 현실은 그렇지 않았습니다. 주민을 돕고 영토의 질서를 회복하려는 모든 노력에도 불구하고, 부패가 침투해 확산되었습니다. 뇌물, 갈취, 족벌주의, 돈이나 보급품을 받는 대가로 현지 작전 지연에 동의한 장교들에 대한 보고, 보급 방해, 민간 재산 갈취가 너무 흔해져 더 이상 방치할 수 없게 되었습니다.\n\n이러한 행위는 위임권을 확대하는 우리의 능력뿐만 아니라, 민간인과 쌓아 가려는 신뢰도 훼손합니다. 이를 방치한다면 우리는 모든 것을 위험에 빠뜨릴지도 모릅니다. 따라서 이 상황을 끝내고 부패한 자들에게 책임을 묻는 것은 아메리카에서의 작전을 지속하는 데 필수적입니다."
a_broken_promise: "깨진 약속"
a_broken_promise_desc: "유엔은 인류가 목격한 가장 파괴적인 전쟁 중 하나의 잿더미 속에서 태어났으며, 미래 세대를 전쟁의 참화에서 구하겠다는 유일하고도 엄숙한 약속을 품고 있었습니다. 지난 세기 동안 이 약속의 회복력은 여러 차례 시험받았고, 헤아릴 수 없이 많은 순간에 실패했습니다. 르완다, 스레브레니차, 다르푸르, 그리고 무고한 사람들이 목숨을 잃은 수많은 장소들이 있었습니다.\n\n우리는 우리가 창설된 목적, 단 하나의 임무를 집행하는 데 실패했습니다. 거부권, 관료주의, 그리고 규칙 위의 규칙에 붙잡힌 우리의 푸른 헬멧들은 행동해야 할 때 망설였고, 때로는 행동할 능력조차 잃었습니다. 이제 미합중국의 심장부에서, 조직 창설 이래 가장 큰 도전이 떠올랐습니다. 이것은 돌아갈 수 없는 지점입니다. 실수는 허용되지 않을 것입니다. 실수가 벌어진다면 상상을 초월하는 비극이 펼쳐질 수 있기 때문입니다."
dove_lacroix_concern: "라크루아의 우려"
dove_lacroix_concern_desc: "평화작전 담당 사무차장 장피에르 라크루아는 아메리카 임무단이 향하고 있는 진로와 방향에 대해 심각한 우려를 표명해 왔습니다. 그는 지휘부 일부가 평화유지의 본래 범위에 비해 지나치게 야심적이고 공격적인 태도를 보이고 있다고 경고하며, 주방위군 부대의 급속한 편입이 전투와 전쟁에는 유용할지 몰라도 충성심 측면에서는 심각한 위험을 도입한다고 지적합니다. 특히 마이애미의 유엔 국경사령부에 대한 불복종을 강조하고 있습니다.\n\n우리는 부대들의 충성심이 갈라지는 것을 감당할 수 없습니다. 이 문제를 해결하고 부패하고 불충한 자들을 우리 대열에서 숙청하는 것이 필수적입니다."
deal_with_southern_company: "서던 컴퍼니와 거래"
deal_with_southern_company_desc: "무엇이든, 특히 황폐해진 땅의 재건 노력에서 에너지는 우리가 단기적이든 장기적이든 이루고자 하는 진전의 핵심입니다. 이런 중요성에도 불구하고 우리는 필요한 양을 갖추지 못했고, 서던 컴퍼니는 남부에 남은 발전 능력의 상당 부분을 통제하고 있습니다.\n\n불공정한 계약이든 회사에 대한 정치적 양보이든, 우리가 감수해야 할 예상치 못한 결과가 무엇이든 간에, 우리 영토 내 민간 생활의 안정화를 완성하고 기반시설의 가장 중요한 지점들이 수리되도록 보장하려면 협상을 즉시 시작해야 합니다."
dove_peacekeeper_checks: "평화유지군 신원 조사"
dove_peacekeeper_checks_desc: "아메리카에서 활동하는 평화유지군은 우리가 대륙에 회복하겠다고 맹세한 청렴성과 안정의 상징입니다. 따라서 아무리 사소한 위반이라도, 불안정한 행동이나 기록상의 흠은 임무단 전체의 이미지를 위태롭게 합니다. 우리는 테러리스트나 악의적 행위자가 조직에 대한 대중의 신뢰나 작전 보안을 훼손하게 둘 수 없습니다. 이러한 이유로, 신규 모집병에 대해 더 엄격하고 철저한 신원 조사가 실시될 것입니다."
eagle_the_suspension_compromise: "정직 타협"
eagle_the_suspension_compromise_desc: "내부 균열은 우리 조직 안에서 누구에게도 도움이 되지 않으며, 그저 테러리스트와 전복 세력이 우리의 깃발에 맞서 행동할 틈만 제공할 뿐입니다. 최근 약탈, 과도한 무력 사용, 뇌물, 승인되지 않은 보복, 기타 일반적인 비행 사례가 급증하면서 평화유지군에게 주어진 대중의 신뢰가 파괴될 위기에 처했습니다.\n\n그러나 우리는 지휘 구조를 해체하고 핵심 평화유지 병력을 제거하며 테러리스트들에게 우리를 상대로 행동할 더 큰 틈을 주는 전면적 숙청이라는 사치를 감당할 수 없습니다. 따라서 조직 내 특정 대상은 정직, 재배치되거나, 조용히 물러나도록 유도될 것입니다. 일시적인 대중의 분노를 감수하더라도, 전체 구조는 온전하게 유지되어야 합니다."
dove_strip_them_of_their_positions: "그들의 직위를 박탈하라"
dove_strip_them_of_their_positions_desc: "유엔이 미국인들의 신뢰를 얻고자 한다면, 우리의 깃발이 면책이 아니라 법과 정의를 상징한다는 것을 증명해야 합니다. 이를 위해 우리는 부패한 지휘 구조를 해체하고, 그들이 얼마나 유용해 보이든 상관없이 오염된 장교들을 제거할 것입니다. 그들은 대의와 그것을 달성하는 우리의 방식에 충성하는 검증된 인력으로 대체될 것입니다.\n\n이 과정은 혼란스럽고 정치적으로 위험하겠지만, 필수적입니다. 정통성을 회복하고 평화유지군에 대한 민간인의 신뢰를 강화함으로써, 우리는 세계에 분명한 신호를 보낼 것입니다. 유엔은 분쟁 지역을 안정시키는 데 그치지 않고, 법과 공정성, 책임이 전장을 넘어 지속되는 사회를 기르는 데 헌신하고 있습니다."
civilian_economic_symbiosis: "민간 경제 공생"
civilian_economic_symbiosis_desc: "도시에 식량을 공급하는 임무단은 환영받지만, 그 도시에 일자리를 주는 임무단은 신뢰받습니다. UNMIA는 보급품을 운반하고, 경계를 확보하며, 평화를 유지하는 일상적 존재로 충분히 오래 활동해 왔습니다. 그러나 그 모델에는 한계가 있습니다. 전적으로 긴급 구호에 의존하는 공동체는 현재 임무단의 상태로는 안정될 수 없습니다.\n\n전환은 지금 시작됩니다. 재건 계약은 지역 기업이 존재하는 곳에서는 그들에게 흘러갈 것이며, 존재하지 않는 곳에서는 그들을 세우는 데 도움을 줄 것입니다. 일자리 프로그램은 확대되고, 임무단이 이미 필요로 하는 기반시설 사업과 직접 연결될 것입니다. 행정 사무소와 시민 서비스는 지역 공동체 기관과의 협력 아래 운영될 것입니다.\n\n목표는 더 이상 우리가 떠받치지 않아도 되는 경제입니다. 그날이 오면, 그것은 우리가 아니라 미국인들의 것이어야 합니다."
the_emboldened_replacements: "대담해진 대체자들"
the_emboldened_replacements_desc: "부패 숙청과 조용한 정직은 썩은 부분을 도려낼 수 있지만, 지휘가 있어야 할 자리에 공백도 남깁니다. 너무 깊이 베어내면 전선이 휘청일 수 있고, 전혀 베어내지 않으면 부패가 퍼질 것입니다. 미래를 위한 답은 망설임이 아니라 대체입니다. 새로운 세대의 장교들을 빠르게 길러내야 합니다. 전문 평화유지군, 신뢰할 수 있는 하급 지휘관, 그리고 푸른 깃발 아래 자신을 증명하려는 현지 모집병들이 필요합니다. 그들의 승진은 앞당겨질 것이며, 무질서가 자리 잡기 전에 이 신뢰받는 대체자들이 올라설 것입니다. 지휘 계통을 재건함으로써 우리는 단순히 공석을 채우는 것 이상을 합니다. 우리는 임무단의 무장 병력을 이전보다 더 강하고, 더 깨끗하며, 더 충성스러운 것으로 빚어냅니다."
the_eagle_soars: "독수리가 날아오르다"
the_eagle_soars_desc: "제2차 미국 내전의 비극은 수십 년 동안 평화유지 교리가 낳아 온 모든 약점을 드러냈습니다. 집단학살 앞에서의 봉쇄, 민간인들이 군벌에게 기관총으로 쓸리고 불태워지는 동안의 망설임과 후퇴. 르완다, 스레브레니차, 다르푸르는 조직이 꼬리를 말고 겁먹어 달아난 부끄러운 사건들 중 일부에 불과합니다. 그 목록은 길고, 우리 누구도 감히 소리 내어 읽을 용기를 내지 못할 만큼 깁니다.\n\n각각의 경우에 유엔은 너무 늦게 도착했고, 상황에 대처하기에 부족한 자원을 가지고 있었거나, 소심하고 두려움에 찬 방식으로 행동했습니다.\n\n그러나 우리는 배웠습니다. 모든 비명, 모든 총알, 모든 죽음, 피에 굶주린 테러리스트들의 손에 죽은 모든 희생자는 우리의 병사와 관료들의 피부에 교훈을 새겼습니다. 평화작전국은 고삐를 쥐고 있으며, 아메리카 임무는 우리에게 구조적 변화를 요구합니다. 나약하고 겁 많은 조직에서, 야만인들이 질서와 평화를 파괴한 곳에 그것을 강제할 권한을 부여받은 전시 체제로의 전환 말입니다.\n\n어제의 유엔은 오늘의 유엔이 아니며, 이 전쟁이 끝나는 즉시 우리는 다시는 주변으로 밀려나지 않을 것입니다."
the_dove_prevails: "비둘기가 우세하다"
the_dove_prevails_desc: "아메리카에서의 우리의 평화유지 임무는 우리가 해방자로 꾸민 또 다른 군벌이 아니라는 것을 미국인들에게 보여주어야 합니다. 안전보장이사회가 내부 투쟁에서 승리한 지금, 우리는 행정을 더욱 확대하고 폭정 정권들로부터 해방한 땅의 기반시설을 투자하고 재건하는 데 관심을 돌릴 수 있습니다.\n\n아메리카에서의 평화유지 작전 동안 유엔은 많은 변화를 겪었을지 모르지만, 핵심 가치와 신념을 잃지는 않았습니다. 외교, 재건, 새롭고 안정적인 국가의 구축은 여전히 유엔의 주된 목표입니다. 미국인들을 예속시키기 위해서도, 끊임없이 전쟁을 벌이기 위해서도 아닙니다. 우리는 미국인들을 위한 더 나은 미래를 만들기 위해 이곳에 있을 뿐이며, 그 임무가 끝까지 완수되도록 할 것입니다."
