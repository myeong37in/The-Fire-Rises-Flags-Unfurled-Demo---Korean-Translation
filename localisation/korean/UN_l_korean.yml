#Reward at the end of the Southern Logistical Crisis#
LRA_lessons_southern_logistical_crisis_excellent: "남부에서 얻은 쓰라린 교훈"
LRA_lessons_southern_logistical_crisis_excellent_desc: "남부 전역은 유엔이 그 어떤 평화유지군도 감당하도록 설계되지 않았던 규모의 전쟁을 유지하는 법을 배우도록 강요했습니다. 규율, 제도적 적응, 보급의 세심한 관리를 통해 유엔은 이동 통제, 수리, 조달, 작전 지속 능력에 대해 훨씬 더 강한 이해를 갖추고 이 위기에서 벗어났습니다."
LRA_lessons_southern_logistical_crisis_good: "남부에서 얻은 쓰라린 교훈"
LRA_lessons_southern_logistical_crisis_good_desc: "남부 군수 위기는 임기응변의 한계를 드러냈고, 유엔이 더 성숙한 유지 체계를 개발하도록 강요했습니다. 그 과정은 값비싸고 종종 불균등했지만, 연료 배분, 수리 작업, 작전 조율에서 얻은 교훈은 전쟁 수행을 이전보다 더 회복력 있게 만들었습니다."
LRA_lessons_southern_logistical_crisis_mixed: "남부에서 얻은 쓰라린 교훈"
LRA_lessons_southern_logistical_crisis_mixed_desc: "임무단은 남부 보급 위기에서 살아남았지만, 그 과정에 부담이 없었던 것은 아닙니다. 호송대는 지연되었고, 보급소는 바닥을 드러냈으며, 제도는 확신이 아니라 압박 속에서 세워졌습니다. 그럼에도 이 전역은 분열된 대륙을 가로질러 병력과 물자를 계속 움직이게 하는 데 대한 고생 끝의 경험을 남겼습니다."
LRA_lessons_southern_logistical_crisis_poor: "남부에서 얻은 쓰라린 교훈"
LRA_lessons_southern_logistical_crisis_poor_desc: "남부 전역은 유엔의 유지 능력을 거의 앞질러 버릴 뻔했습니다. 부족, 지연, 비상조치가 전쟁 수행을 규정했고, 그 대가는 탈진과 불안정으로 치러졌습니다. 그러나 거의 붕괴 직전까지 간 상황도 교훈을 남기는 법이며, 유엔은 이제 군대를 살아 있게 하는 기계를 방치하는 대가를 이해하게 되었습니다."

